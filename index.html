<html>
<head>
  <title>Fight Simulator</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=9" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0e1116;
      color: #edf2f7;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(188, 68, 37, 0.28), transparent 28%),
        radial-gradient(circle at top right, rgba(205, 164, 84, 0.18), transparent 24%),
        linear-gradient(180deg, #12161d 0%, #0b0e13 100%);
      overflow-x: hidden;
      overflow-y: auto;
    }

    * {
      box-sizing: border-box;
    }

    .shell {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topbar,
    .panel,
    .log-panel,
    .hero,
    .card,
    .create-card {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(17, 22, 29, 0.88);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .topbar {
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background:
        linear-gradient(135deg, rgba(157, 43, 26, 0.78), rgba(28, 34, 44, 0.94)),
        rgba(17, 22, 29, 0.88);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f4c56b;
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .subtitle {
      font-size: 15px;
      color: #c7d0dc;
      max-width: 680px;
      line-height: 1.4;
    }

    .week-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      font-size: 16px;
      font-weight: 700;
      color: #ffe19b;
    }

    .layout {
      min-height: 0;
      flex: 1;
      display: block;
      overflow: visible;
    }

    .layout:after {
      content: "";
      display: block;
      clear: both;
    }

    .sidebar,
    .main-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar {
      float: left;
      width: 28%;
      margin-right: 1.5%;
    }

    .main-panel {
      float: left;
      width: 42%;
      margin-right: 1.5%;
    }

    .layout .log-panel {
      float: right;
      width: 27%;
    }

    .panel,
    .log-panel {
      border-radius: 18px;
      padding: 14px;
      overflow: auto;
    }

    .panel-title {
      margin: 0 0 10px 0;
      font-size: 24px;
      font-weight: 700;
    }

    .muted {
      color: #a9b4c2;
      line-height: 1.55;
    }

    .hero {
      border-radius: 24px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
      background:
        radial-gradient(circle at top right, rgba(220, 133, 44, 0.18), transparent 32%),
        linear-gradient(155deg, rgba(25, 31, 41, 0.96), rgba(13, 17, 23, 0.94));
    }

    .create-grid,
    .card-grid,
    .action-grid,
    .stat-grid,
    .skill-grid,
    .choice-grid,
    .fight-grid {
      display: grid;
      gap: 10px;
    }

    .create-grid,
    .card-grid,
    .skill-grid,
    .choice-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .action-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .stat-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .fight-grid {
      grid-template-columns: 1.1fr 0.9fr;
    }

    .card,
    .create-card {
      border-radius: 16px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card.selected,
    .create-card.selected {
      border-color: rgba(244, 197, 107, 0.58);
      box-shadow: 0 0 0 1px rgba(244, 197, 107, 0.22), 0 18px 38px rgba(0, 0, 0, 0.28);
      background: rgba(27, 33, 43, 0.98);
    }

    .card h3,
    .create-card h3 {
      margin: 0;
      font-size: 21px;
    }

    .card .meta,
    .create-card .meta {
      color: #f4c56b;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card p,
    .create-card p {
      margin: 0;
      color: #cad4e0;
      line-height: 1.35;
      font-size: 16px;
    }

    .button,
    .ghost,
    .danger {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    .button:hover,
    .ghost:hover,
    .danger:hover {
      transform: translateY(-1px);
    }

    .button {
      background-color: #f4c56b;
      background-image: linear-gradient(135deg, #f4c56b, #dd9e39);
      color: #11161d;
    }

    .ghost {
      background-color: #eef2f6;
      color: #11161d;
    }

    .danger {
      background: rgba(174, 41, 41, 0.92);
      color: #fff1f1;
    }

    .button:disabled,
    .ghost:disabled,
    .danger:disabled {
      cursor: not-allowed;
      opacity: 0.38;
      transform: none;
    }

    .nameplate {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
    }

    .fighter-name {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.1;
    }

    .fighter-class {
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #f4c56b;
    }

    .meter-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .meter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 16px;
      color: #dfe7f1;
    }

    .meter {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .meter span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #cf5030, #f1c25b);
    }

    .mini-list {
      margin: 0;
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: #c8d2df;
      line-height: 1.45;
    }

    .record-row,
    .stats-row,
    .fight-row,
    .split-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: #edf2f7;
      font-size: 15px;
      font-weight: 700;
    }

    .chip.gold {
      color: #1b1407;
      background: #f4c56b;
    }

    .chip.red {
      background: rgba(172, 55, 42, 0.9);
    }

    .log-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .log-entry {
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.05);
      color: #d9e1ea;
      line-height: 1.45;
      font-size: 16px;
    }

    .log-entry.good {
      border-left: 3px solid #66c08c;
    }

    .log-entry.bad {
      border-left: 3px solid #d15a4f;
    }

    .log-entry.warn {
      border-left: 3px solid #f4c56b;
    }

    .summary-box {
      border-radius: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .summary-box strong {
      color: #fff;
    }

    .footer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .result-banner {
      border-radius: 18px;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(182, 66, 37, 0.94), rgba(29, 36, 46, 0.92));
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #d9e1eb;
      font-size: 16px;
    }

    .empty-state {
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      color: #c8d2df;
      line-height: 1.65;
      font-size: 16px;
    }

    .ring-board {
      display: block;
      margin-top: 12px;
      width: 74%;
      max-width: 920px;
      min-width: 560px;
      height: 420px;
      padding: 46px 62px 66px 62px;
      margin-left: auto;
      margin-right: auto;
      background-color: #d8dde6;
      background-image: url('ring_top_view.png');
      background-repeat: no-repeat;
      background-position: center 44%;
      background-size: 100% 108%;
      font-size: 0;
      text-align: center;
    }

    .ring-row {
      display: block;
      white-space: nowrap;
      margin-bottom: 6px;
    }

    .ring-cell {
      width: 18%;
      height: 58px;
      margin: 0 1% 0 1%;
      display: inline-block;
      vertical-align: top;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        rgba(15, 20, 28, 0.18);
      position: relative;
      text-align: center;
    }

    .ring-cell::after {
      content: attr(data-cell);
      position: absolute;
      right: 8px;
      bottom: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.26);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .token {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
      margin: 10px auto 0 auto;
    }

    .token.player {
      background: linear-gradient(135deg, #f4c56b, #dd9e39);
      color: #11161d;
    }

    .token.opponent {
      background: linear-gradient(135deg, #d35433, #9b2d24);
      color: #fff3ef;
    }

    .token.attack-right {
      animation: tokenAttackRight 1s ease-in-out;
    }

    .token.attack-left {
      animation: tokenAttackLeft 1s ease-in-out;
    }

    .token.attack-up {
      animation: tokenAttackUp 1s ease-in-out;
    }

    .token.attack-down {
      animation: tokenAttackDown 1s ease-in-out;
    }

    .token.hit-react {
      animation: tokenHitReact 0.34s linear 2;
    }

    .token.dodge-right {
      animation: tokenDodgeRight 1s ease-in-out;
    }

    .token.dodge-left {
      animation: tokenDodgeLeft 1s ease-in-out;
    }

    .token.dodge-up {
      animation: tokenDodgeUp 1s ease-in-out;
    }

    .token.dodge-down {
      animation: tokenDodgeDown 1s ease-in-out;
    }

    @keyframes tokenAttackRight {
      0% { transform: translateX(0); }
      35% { transform: translateX(18px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenAttackLeft {
      0% { transform: translateX(0); }
      35% { transform: translateX(-18px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenAttackUp {
      0% { transform: translateY(0); }
      35% { transform: translateY(-18px); }
      100% { transform: translateY(0); }
    }

    @keyframes tokenAttackDown {
      0% { transform: translateY(0); }
      35% { transform: translateY(18px); }
      100% { transform: translateY(0); }
    }

    @keyframes tokenHitReact {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-6px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenDodgeRight {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(16px) translateY(-10px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeLeft {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(-16px) translateY(-10px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeUp {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(12px) translateY(-16px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeDown {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(12px) translateY(16px); }
      100% { transform: translateX(0) translateY(0); }
    }

    .fight-dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .fight-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .fight-actions .button,
    .fight-actions .ghost,
    .fight-actions .danger {
      min-height: 42px;
      padding: 10px 12px;
      font-size: 16px;
    }

    .ring-note {
      font-size: 15px;
      color: #aeb8c5;
      line-height: 1.5;
    }

    .battle-shell {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
    }

    .battle-topbar,
    .battle-stage,
    .battle-bottom,
    .battle-result {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(17, 22, 29, 0.9);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      border-radius: 18px;
    }

    .battle-topbar {
      padding: 12px 16px;
      margin-bottom: 12px;
      background:
        linear-gradient(135deg, rgba(157, 43, 26, 0.78), rgba(28, 34, 44, 0.94)),
        rgba(17, 22, 29, 0.88);
    }

    .battle-topbar:after,
    .battle-stage:after,
    .battle-bottom:after {
      content: "";
      display: block;
      clear: both;
    }

    .battle-health-card {
      width: 49%;
      float: left;
      padding: 0 0 0 0;
    }

    .battle-health-card.right {
      float: right;
    }

    .battle-stage {
      padding: 10px 12px 8px 12px;
      margin-bottom: 10px;
      text-align: center;
    }

    .battle-bottom {
      padding: 10px;
    }

    .battle-tabs {
      margin-bottom: 8px;
    }

    .battle-tabs .button,
    .battle-tabs .ghost {
      margin: 0 8px 8px 0;
      min-width: 160px;
    }

    .battle-column {
      width: 50%;
      float: left;
    }

    .battle-column.right {
      float: right;
    }

    .battle-panel {
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px;
      margin-bottom: 8px;
    }

    .battle-panel:last-child {
      margin-bottom: 0;
    }

    .battle-panel strong {
      display: block;
      margin-bottom: 8px;
    }

    .battle-actions-row {
      margin-top: 8px;
      text-align: left;
    }

    .battle-actions-row .button,
    .battle-actions-row .ghost,
    .battle-actions-row .danger {
      display: inline-block;
      width: 31%;
      margin: 0 1% 8px 1%;
      min-height: 42px;
      font-size: 16px;
      vertical-align: top;
    }

    .battle-actions-row.compact .ghost {
      width: 23%;
    }

    .battle-stats-line {
      margin-top: 8px;
    }

    .battle-chip-line {
      margin-top: 8px;
    }

    .battle-chip-line .chip {
      margin: 0 8px 8px 0;
    }

    .battle-log {
      max-height: 140px;
      overflow-y: auto;
    }

    .battle-result {
      padding: 16px;
    }

    @media screen and (max-height: 1080px) {
      .sidebar {
        width: 27%;
      }

      .main-panel {
        width: 43%;
      }

      .layout .log-panel {
        width: 27%;
      }

      .ring-board {
        width: 72%;
        height: 360px;
        padding: 38px 50px 56px 50px;
      }

      .ring-cell {
        height: 50px;
      }
    }

    @media screen and (max-width: 980px) {
      .shell {
        padding: 10px;
        gap: 10px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .create-grid,
      .card-grid,
      .skill-grid,
      .choice-grid,
      .action-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .sidebar,
      .main-panel,
      .log-panel {
        float: none;
        width: 100%;
        margin-right: 0;
        overflow: visible;
      }

      .week-chip {
        align-self: flex-start;
      }

      .ring-board {
        width: 92%;
        min-width: 0;
        height: 300px;
        padding: 32px 30px 46px 30px;
      }

      .ring-cell {
        height: 40px;
      }

      .token {
        width: 30px;
        height: 30px;
        font-size: 10px;
        margin-top: 4px;
      }

      .battle-health-card,
      .battle-health-card.right,
      .battle-column,
      .battle-column.right {
        float: none;
        width: 100%;
      }

      .battle-actions-row .button,
      .battle-actions-row .ghost,
      .battle-actions-row .danger,
      .battle-actions-row.compact .ghost {
        width: 48%;
        margin: 0 1% 8px 1%;
      }
    }

    body.scale-compact .title,
    body.scale-tight .title {
      font-size: 25px;
    }

    body.scale-compact .subtitle,
    body.scale-tight .subtitle {
      font-size: 14px;
    }

    body.scale-compact .sidebar {
      width: 26%;
    }

    body.scale-compact .main-panel {
      width: 44%;
    }

    body.scale-compact .layout .log-panel {
      width: 27%;
    }

    body.scale-compact .panel,
    body.scale-compact .log-panel,
    body.scale-compact .hero,
    body.scale-tight .panel,
    body.scale-tight .log-panel,
    body.scale-tight .hero {
      padding: 12px;
    }

    body.scale-compact .ring-board {
      width: 78%;
      max-width: 840px;
      min-width: 480px;
      height: 340px;
      padding: 36px 48px 52px 48px;
    }

    body.scale-compact .ring-cell {
      height: 46px;
    }

    body.scale-tight .sidebar,
    body.scale-tight .main-panel,
    body.scale-tight .layout .log-panel {
      float: none;
      width: 100%;
      margin-right: 0;
    }

    body.scale-tight .shell {
      padding: 10px;
      gap: 10px;
    }

    body.scale-tight .topbar {
      padding: 10px 14px;
    }

    body.scale-tight .create-grid,
    body.scale-tight .card-grid,
    body.scale-tight .skill-grid,
    body.scale-tight .choice-grid,
    body.scale-tight .action-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    body.scale-tight .ring-board {
      width: 96%;
      min-width: 0;
      max-width: none;
      height: 280px;
      padding: 26px 24px 36px 24px;
    }

    body.scale-tight .ring-cell {
      height: 34px;
    }

    body.scale-tight .battle-health-card,
    body.scale-tight .battle-health-card.right,
    body.scale-tight .battle-column,
    body.scale-tight .battle-column.right {
      float: none;
      width: 100%;
    }

    body.scale-tight .battle-actions-row .button,
    body.scale-tight .battle-actions-row .ghost,
    body.scale-tight .battle-actions-row .danger,
    body.scale-tight .battle-actions-row.compact .ghost {
      width: 48%;
      margin: 0 1% 8px 1%;
    }

    @media screen and (max-width: 680px) {
      .create-grid,
      .card-grid,
      .skill-grid,
      .choice-grid,
      .action-grid {
        grid-template-columns: 1fr;
      }

      .ring-board {
        width: 100%;
        height: 270px;
        padding: 18px 10px 22px 10px;
        background-position: center 42%;
        background-size: 112% 114%;
      }

      .ring-cell {
        height: 28px;
      }

      .token {
        width: 24px;
        height: 24px;
        font-size: 9px;
      }

      .battle-shell {
        padding: 8px;
      }

      .battle-stage,
      .battle-bottom,
      .battle-topbar,
      .battle-result {
        border-radius: 14px;
      }

      .battle-tabs .button,
      .battle-tabs .ghost {
        display: block;
        width: 100%;
        margin: 0 0 8px 0;
        min-width: 0;
      }

      .battle-actions-row .button,
      .battle-actions-row .ghost,
      .battle-actions-row .danger,
      .battle-actions-row.compact .ghost {
        width: 100%;
        margin: 0 0 8px 0;
      }
    }
  </style>
  <script type="text/javascript" src="country_data.js"></script>
  <script type="text/javascript">
    var DATA = {

    function attackExchange(attackerName, attackerStats, attackerTactic, attackerState, defenderName, defenderStats, defenderTactic, defenderState, attackerSkills, defenderSkills, morale, stress) {
      var attackData = DATA.tactics[attackerTactic];
      var defendData = DATA.tactics[defenderTactic];
      var regained;
      var accuracy;
      var defense;
      var hitChance;
      var staminaCost;
      var damage;
      var critical;
      var traumaGain;

      if (attackerTactic === "recover") {
        regained = 12 + Math.floor(attackerStats.endurance / 2);
        if (hasSkill(attackerSkills, "cold_mind")) {
          regained += 4;
        }
        attackerState.stamina = clamp(attackerState.stamina + regained, 0, 100);
        return { line: attackerName + " СЃРѕР±РёСЂР°РµС‚ РґС‹С…Р°РЅРёРµ Рё РІРѕР·РІСЂР°С‰Р°РµС‚ РєРѕРЅС‚СЂРѕР»СЊ.", critical: false };
      }

      accuracy = 41 + attackerStats.speed * 2 + attackerStats.technique * 1.7 + attackData.accuracy;
      accuracy += (morale - 50) / 5;
      accuracy -= hasSkill(attackerSkills, "cold_mind") ? 0 : Math.max(0, stress - 55) / 6;
      accuracy -= Math.max(0, 35 - attackerState.stamina) / 2;

      defense = 23 + defenderStats.speed * 1.4 + defenderStats.technique * 1.2 + defenderStats.heart * 1.2 + defendData.defense;
      if (defenderTactic === "counter" && hasSkill(defenderSkills, "step_back")) {
        defense += 5;
      }
      if (defenderTactic === "recover" && hasSkill(defenderSkills, "cold_mind")) {
        defense += 3;
      }

      hitChance = clamp(Math.round(accuracy - defense + 35), 18, 84);
      staminaCost = Math.max(4, attackData.stamina - attackerStats.endurance);
      attackerState.stamina = clamp(attackerState.stamina - staminaCost, 0, 100);

      if (!chance(hitChance)) {
        return { line: choice([
          attackerName + " РЅРµ РґРѕСЃС‚Р°РµС‚ РґРѕ С†РµР»Рё.",
          defenderName + " С‡РёС‚Р°РµС‚ Р°С‚Р°РєСѓ Рё СѓС…РѕРґРёС‚ РѕС‚ СѓРґР°СЂР°.",
          attackerName + " РјР°Р¶РµС‚, Рё РјРѕРјРµРЅС‚ СѓС…РѕРґРёС‚."
        ]), critical: false };
      }

      damage = 2 + attackerStats.power * 0.75 + attackerStats.technique * 0.35 - defenderStats.endurance * 0.35 - defenderStats.heart * 0.12 + attackData.damage + attackerState.stamina / 40;
      if (attackerTactic === "counter" && defenderTactic === "pressure") {
        damage += 2;
      }
      if (hasSkill(attackerSkills, "pressure_master") && attackerTactic === "pressure") {
        damage += 2.5;
      }
      if (hasSkill(attackerSkills, "bodywork") && (attackerTactic === "pressure" || attackerTactic === "precision")) {
        defenderState.stamina = clamp(defenderState.stamina - rand(4, 7), 0, 100);
      }
      if (hasSkill(attackerSkills, "step_back") && attackerTactic === "counter" && defenderTactic === "pressure") {
        damage += 2.5;
      }
      if (hasSkill(attackerSkills, "street_grit")) {
        damage += 1.5;
      }
      if (hasSkill(defenderSkills, "iron_chin")) {
        damage -= 1.2;
      }
      critical = damage >= (12 + (hasSkill(attackerSkills, "finisher") ? 2 : 0)) || chance(8);
      damage = Math.max(2, Math.round(damage + rand(-2, 2)));
      if (critical) {
        damage += rand(2, 5);
      }
      defenderState.hp -= damage;
      defenderState.damageTaken += damage;
      defenderState.score -= Math.max(1, Math.floor(damage / 2));
      attackerState.score += damage;
      traumaGain = damage >= 11 ? 1 : 0;
      traumaGain += critical && damage >= 14 ? 1 : 0;
      defenderState.trauma += traumaGain;
      if (critical) {
        return { line: attackerName + " Р»РѕРІРёС‚ РјРѕРјРµРЅС‚ Рё С‚СЏР¶РµР»Рѕ РїРѕРїР°РґР°РµС‚ РїРѕ " + defenderName + " РЅР° " + damage + " СѓСЂРѕРЅР°.", critical: true };
      }
      return { line: attackerName + " РґРѕРЅРѕСЃРёС‚ СЃРµСЂРёСЋ Рё СЃРЅРёРјР°РµС‚ " + damage + " РѕС‡РєРѕРІ РїСЂРѕС‡РЅРѕСЃС‚Рё.", critical: false };
    }

    function knockdownOrFinish(targetName, targetState, targetStats, targetSkills) {
      var riseChance;
      if (targetState.hp > 0) {
        return { over: false, line: "" };

      riseChance = 42 + targetStats.heart * 5 - targetState.trauma * 11 - targetState.knockdowns * 12;

    function fatalityRoll(loserState, loserCondition, winnerSkills, loserSkills) {
      var risk = Math.max(0, loserState.trauma - 2) * 6 + Math.max(0, -loserState.hp) * 2 + Math.max(0, 45 - loserCondition) / 3;
      if (hasSkill(winnerSkills, "street_grit")) {

    function playFightRound(playerTactic) {

      exchanges = [
        {

      if (playerTactic === "counter" && opponentTactic === "pressure") {

        exchanges = [exchanges[1], exchanges[0]];

      for (i = 0; i < exchanges.length; i += 1) {

      } else if (fight.fatality === "player") {

        pushLog("РџРѕРІСЂРµР¶РґРµРЅРёСЏ РѕРєР°Р·С‹РІР°СЋС‚СЃСЏ РєСЂРёС‚РёС‡РµСЃРєРёРјРё. Р­С‚РѕС‚ Р±РѕР№ СЃС‚Р°РЅРѕРІРёС‚СЃСЏ РїРѕСЃР»РµРґРЅРёРј.", "bad");

    function fullOpponentName(opponent) {

    function fightStateBySide(fight, side) {

    }

    function otherSide(side) {
      return side === "player" ? "opponent" : "player";
    }

    function canUseFightAction(fight, side, actionKey) {
      var action = FIGHT_ACTIONS[actionKey];
      var actor = fightStateBySide(fight, side);
      var target = fightStateBySide(fight, otherSide(side));
      var nextX;
      var nextY;
      var distance;
      if (!action) {
        return false;
      }
      if (action.type === "move") {
        nextX = actor.position.x + action.dx;
        nextY = actor.position.y + action.dy;
        return insideRing(nextX, nextY) && !(nextX === target.position.x && nextY === target.position.y);
      }
      distance = ringDistance(actor.position, target.position);
      if (action.reach === "close") {
        return distance === 1;
      }
      return distance >= 1 && distance <= action.range && (actor.position.x === target.position.x || actor.position.y === target.position.y);
    }

    function pushFightLine(fight, text) {
      fight.lines.unshift(text);
      if (fight.lines.length > 48) {
        fight.lines = fight.lines.slice(0, 48);

    function awardFightPressure(fight, side, amount) {
      fight.roundPoints[side] += amount;

    function moveActor(fight, side, actionKey) {
      var actor = fightStateBySide(fight, side);
      var action = FIGHT_ACTIONS[actionKey];
      var fromX = actor.position.x + 1;
      var fromY = actor.position.y + 1;
      actor.position = {
        x: actor.position.x + action.dx,
        y: actor.position.y + action.dy
      };
      pushFightLine(fight, fightNameBySide(fight, side) + " СЃРјРµС‰Р°РµС‚СЃСЏ: " + fromX + ":" + fromY + " -> " + (actor.position.x + 1) + ":" + (actor.position.y + 1) + ".");
    }

    function fatalityRoll(loserState, loserCondition) {
      var risk = Math.max(0, loserState.trauma - 4) * 7;
      risk += Math.max(0, -loserState.hp) * 2;
      risk += Math.max(0, loserState.bodyDamage - 24) / 2;
      risk += Math.max(0, 42 - loserCondition) / 3;
      return chance(Math.max(0, Math.round(risk)));
    }

    function resolveKnockdown(fight, victimSide) {
      var victim = fightStateBySide(fight, victimSide);
      var attackerSide = otherSide(victimSide);
      var victimStats = fightStatsBySide(fight, victimSide);
      var victimName = fightNameBySide(fight, victimSide);
      var riseChance = 34 + victimStats.heart * 5 + victimStats.endurance * 2 - victim.trauma * 8 - victim.knockdowns * 15;
      awardFightPressure(fight, attackerSide, 12);
      riseChance = clamp(riseChance, 5, 88);
      if (victim.knockdowns < 2 && chance(riseChance)) {
        victim.knockdowns += 1;
        victim.hp = 12 + victimStats.heart * 2;
        victim.stamina = clamp(victim.stamina - 12, 0, 100);
        victim.trauma += 1;
        resetRingPositions(fight);
        pushFightLine(fight, victimName + " РїР°РґР°РµС‚, РІСЃС‚Р°РµС‚ РЅР° СЃС‡РµС‚ Рё Р±РѕР№ РІРѕР·РІСЂР°С‰Р°РµС‚СЃСЏ РІ С†РµРЅС‚СЂ СЂРёРЅРіР°.");
        return false;
      }
      pushFightLine(fight, victimName + " Р±РѕР»СЊС€Рµ РЅРµ РїРѕРґРЅРёРјР°РµС‚СЃСЏ РїРѕСЃР»Рµ РѕС‚СЃС‡РµС‚Р°.");
      finalizeFight(
        victimSide === "player" ? "loss" : "win",
        "KO/TKO",
        [],
        fatalityRoll(victim, victimSide === "player" ? state.fighter.health : fight.opponent.condition) ? victimSide : ""

      return true;
    }

    function strikeActor(fight, side, actionKey) {
      var attacker = fightStateBySide(fight, side);
      var defender = fightStateBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);
      var defenderStats = fightStatsBySide(fight, otherSide(side));
      var attackerName = fightNameBySide(fight, side);
      var defenderName = fightNameBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var distance = ringDistance(attacker.position, defender.position);
      var hitChance;
      var damage;
      var critical;
      var bodyDrain;
      attacker.stamina = clamp(attacker.stamina - (action.stamina + Math.max(0, distance - 1)), 0, 100);
      if (!canUseFightAction(fight, side, actionKey)) {
        pushFightLine(fight, attackerName + " РІС‹Р±СЂР°СЃС‹РІР°РµС‚ " + action.label.toLowerCase() + ", РЅРѕ РґРёСЃС‚Р°РЅС†РёСЏ РЅРµ РїРѕР·РІРѕР»СЏРµС‚ РїРѕРїР°СЃС‚СЊ.");
        return false;
      }
      hitChance = action.accuracy + attackerStats.speed * 2 + attackerStats.technique * 2 + attackerStats.power * 0.4;
      hitChance -= defenderStats.speed * 1.5 + defenderStats.technique * 1.2 + defenderStats.heart * 0.35;
      hitChance -= Math.max(0, 40 - attacker.stamina) / 2;
      if (action.reach === "line" && distance === 2) {
        hitChance -= 8;
      }
      hitChance = clamp(Math.round(hitChance), 24, 90);
      if (!chance(hitChance)) {
        pushFightLine(fight, attackerName + " РЅРµ РґРѕРЅРѕСЃРёС‚ " + action.label.toLowerCase() + ", Рё " + defenderName + " СѓС…РѕРґРёС‚ СЃ Р»РёРЅРёРё Р°С‚Р°РєРё.");
        return false;
      }
      damage = action.damage + attackerStats.power * 1.1 + attackerStats.technique * 0.5 + attackerStats.speed * 0.2;
      damage -= defenderStats.endurance * 0.75 + defenderStats.heart * 0.25;
      if (action.reach === "line" && distance === 2) {
        damage -= 2;
      }
      if (actionKey === "uppercut") {
        damage += 2;
      } else if (actionKey === "hook") {
        damage += 1;
      } else if (actionKey === "jab") {
        damage -= 1;
      }
      damage = Math.max(4, Math.round(damage + rand(-2, 2)));
      critical = chance(clamp(8 + attackerStats.technique * 2 + (actionKey === "uppercut" ? 8 : 0) + (actionKey === "cross" ? 4 : 0), 8, 38));
      if (critical) {
        damage += rand(3, 6);
      }
      defender.hp -= damage;
      defender.damageTaken += damage;
      defender.trauma += action.trauma + (critical ? 1 : 0);
      if (chance(5)) {
        defender.trauma += 1;
        pushFightLine(fight, defenderName + " РїРѕР»СѓС‡Р°РµС‚ РґРѕРїРѕР»РЅРёС‚РµР»СЊРЅСѓСЋ С‚СЂР°РІРјСѓ РїРѕСЃР»Рµ С‚РѕС‡РЅРѕРіРѕ РїРѕРїР°РґР°РЅРёСЏ.");
      }
      awardFightPressure(fight, side, damage + (critical ? 4 : 2));
      if (action.body) {
        bodyDrain = rand(6, 10) + Math.max(0, attackerStats.power - 5);
        defender.stamina = clamp(defender.stamina - bodyDrain, 0, 100);
        defender.bodyDamage += damage;
      }
      if (critical) {
        pushFightLine(fight, attackerName + " Р»РѕРІРёС‚ РјРѕРјРµРЅС‚ Рё С‚СЏР¶РµР»Рѕ РїРѕРїР°РґР°РµС‚: " + action.label + " РїСЂРѕС…РѕРґРёС‚ РЅР° " + damage + " СѓСЂРѕРЅР°.");
      } else {
        pushFightLine(fight, attackerName + " РїРѕРїР°РґР°РµС‚ СѓРґР°СЂРѕРј '" + action.label + "' Рё СЃРЅРёРјР°РµС‚ " + damage + " РїСЂРѕС‡РЅРѕСЃС‚Рё.");
      }
      if (action.body) {
        pushFightLine(fight, defenderName + " С‚РµСЂСЏРµС‚ С‚РµРјРї РїРѕСЃР»Рµ СЂР°Р±РѕС‚С‹ РїРѕ РєРѕСЂРїСѓСЃСѓ.");
      }
      if (defender.hp <= 0) {
        return resolveKnockdown(fight, otherSide(side));
      }
      return false;
    }

    function doctorStopNeeded(fight, side) {

    function checkFightSafety(fight) {
      if (doctorStopNeeded(fight, "player")) {
        pushFightLine(fight, "Р’СЂР°С‡ РѕСЃС‚Р°РЅР°РІР»РёРІР°РµС‚ Р±РѕР№: С‚РІРѕРµРјСѓ СѓРіР»Сѓ РЅРµР»СЊР·СЏ РІС‹РїСѓСЃРєР°С‚СЊ С‚РµР±СЏ РґР°Р»СЊС€Рµ.");
        finalizeFight("loss", "РћСЃС‚Р°РЅРѕРІР»РµРЅ РІСЂР°С‡РѕРј", [], fatalityRoll(fight.playerState, state.fighter.health) ? "player" : "");

      if (doctorStopNeeded(fight, "opponent")) {
        pushFightLine(fight, "РЈРіРѕР» СЃРѕРїРµСЂРЅРёРєР° РІС‹Р±СЂР°СЃС‹РІР°РµС‚ РїРѕР»РѕС‚РµРЅС†Рµ. РџСЂРѕРґРѕР»Р¶Р°С‚СЊ РѕРїР°СЃРЅРѕ.");
        finalizeFight("win", "РћСЃС‚Р°РЅРѕРІР»РµРЅ РІСЂР°С‡РѕРј", [], fatalityRoll(fight.opponentState, fight.opponent.condition) ? "opponent" : "");
        return true;
      }
      return false;
    }

    function availableFightActions(fight, side, type) {
      var keys = [];
      var key;
      for (key in FIGHT_ACTIONS) {
        if (FIGHT_ACTIONS.hasOwnProperty(key) && (!type || FIGHT_ACTIONS[key].type === type) && canUseFightAction(fight, side, key)) {
          keys.push(key);
        }
      }
      return keys;
    }

    function pickAIMove(fight, retreat) {
      var keys = ["move_up", "move_left", "move_right", "move_down"];
      var actor = fight.opponentState;
      var target = fight.playerState;
      var best = [];
      var bestScore = retreat ? -999 : 999;
      var i;
      var action;
      var nextPos;
      var distance;
      var score;
      for (i = 0; i < keys.length; i += 1) {
        if (!canUseFightAction(fight, "opponent", keys[i])) {
          continue;
        }
        action = FIGHT_ACTIONS[keys[i]];
        nextPos = { x: actor.position.x + action.dx, y: actor.position.y + action.dy };
        distance = ringDistance(nextPos, target.position);
        score = distance * 10 + ((nextPos.x === target.position.x || nextPos.y === target.position.y) ? 0 : 1);
        if (retreat) {
          if (score > bestScore) {
            bestScore = score;
            best = [keys[i]];
          } else if (score === bestScore) {
            best.push(keys[i]);
          }
        } else if (score < bestScore) {
          bestScore = score;
          best = [keys[i]];
        } else if (score === bestScore) {
          best.push(keys[i]);
        }
      }
      return best.length ? choice(best) : null;
    }

    function pickAiAction(fight) {
      var ai = fight.opponentState;
      var player = fight.playerState;
      var distance = ringDistance(ai.position, player.position);
      var attacks = availableFightActions(fight, "opponent", "attack");
      var retreat = ai.hp < ai.maxHp * 0.25 || ai.trauma >= 6 || ai.stamina < 16;
      if (attacks.length) {
        if (distance === 1) {
          if ((player.hp < player.maxHp * 0.32 || player.trauma >= 5) && canUseFightAction(fight, "opponent", "uppercut")) {
            return "uppercut";
          }
          if (canUseFightAction(fight, "opponent", "hook") && chance(60)) {
            return "hook";
          }
          if (canUseFightAction(fight, "opponent", "body") && chance(35)) {
            return "body";
          }
        } else {
          if (canUseFightAction(fight, "opponent", "cross") && chance(55)) {
            return "cross";
          }
          if (canUseFightAction(fight, "opponent", "jab") && chance(70)) {
            return "jab";
          }
        }
        return choice(attacks);
      }
      return pickAIMove(fight, retreat || distance === 1);
    }

    function finishFightRound() {
      var fight = state.fight;
      var playerCard = 10;
      var opponentCard = 10;
      var delta = fight.roundPoints.player - fight.roundPoints.opponent;
      if (delta >= 14) {
        opponentCard = 8;
      } else if (delta > 0) {
        opponentCard = 9;
      } else if (delta <= -14) {
        playerCard = 8;
      } else if (delta < 0) {
        playerCard = 9;
      }
      fight.judges.player += playerCard;
      fight.judges.opponent += opponentCard;
      fight.roundCards.unshift("Р Р°СѓРЅРґ " + fight.round + ": " + playerCard + "-" + opponentCard);
      fight.roundsCompleted = fight.round;
      pushFightLine(fight, "Р Р°СѓРЅРґ " + fight.round + " Р·Р°РєСЂС‹С‚ РїРѕ Р°РєС‚РёРІРЅРѕСЃС‚Рё: " + playerCard + "-" + opponentCard + ".");
      pushLog("Р Р°СѓРЅРґ " + fight.round + " Р·Р°РІРµСЂС€РµРЅ. РљР°СЂС‚РѕС‡РєР° РѕС‚СЂРµР·РєРѕРІ: " + playerCard + "-" + opponentCard + ".", "warn");
      if (fight.round >= fight.opponent.rounds) {

          fight.judges.player > fight.judges.opponent ? "win" : (fight.judges.player < fight.judges.opponent ? "loss" : "draw"),

    function fightAction(actionKey) {
      var fight = state.fight;

      if (action.type === "move") {

      fight.playerActionsLeft -= 1;

      return { dx: toPos.x - fromPos.x, dy: toPos.y - fromPos.y, adx: Math.abs(toPos.x - fromPos.x), ady: Math.abs(toPos.y - fromPos.y) };
    }

    function attackZone(fromPos, toPos) {
      var vector = ringVector(fromPos, toPos);
      if (vector.adx === 0 && vector.ady === 0) {
        return "same";
      }
      if (Math.max(vector.adx, vector.ady) === 1) {
        return "close";
      }
      if ((vector.adx === 0 && vector.ady <= 2) || (vector.ady === 0 && vector.adx <= 2) || (vector.adx === vector.ady && vector.adx === 2)) {
        return "line";
      }
      return "far";
    }

    function animationDirection(fromPos, toPos) {
      var vector = ringVector(fromPos, toPos);
      if (vector.adx >= vector.ady) {
        return vector.dx >= 0 ? "right" : "left";
      }
      return vector.dy >= 0 ? "down" : "up";
    }

    function setFightAnimation(attackerSide, mode) {
      var fight = state.fight;
      var attacker = attackerSide === "player" ? fight.playerState : fight.opponentState;
      var defender = attackerSide === "player" ? fight.opponentState : fight.playerState;
      fight.animation = {
        attackerSide: attackerSide,
        defenderSide: attackerSide === "player" ? "opponent" : "player",
        mode: mode,
        direction: animationDirection(attacker.position, defender.position)
      };
    }

    function clearFightAnimation() {
      if (state.fight) {
        state.fight.animation = null;
      }
    }

    function tokenClassFor(side) {
      var fight = state.fight;
      var tokenClass = "token " + (side === "player" ? "player" : "opponent");
      var animation;
      if (!fight || !fight.animation) {
        return tokenClass;
      }
      animation = fight.animation;
      if (animation.attackerSide === side) {
        tokenClass += " attack-" + animation.direction;
      }
      if (animation.defenderSide === side) {
        tokenClass += animation.mode === "hit" ? " hit-react" : " dodge-" + animation.direction;
      }
      return tokenClass;
    }

    function canUseFightAction(fight, side, actionKey) {
      var actor = fightStateBySide(fight, side);
      var target = fightStateBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var nextX;
      var nextY;
      var zone;
      if (!action) {
        return false;
      }
      if (action.type === "move") {
        nextX = actor.position.x + action.dx;
        nextY = actor.position.y + action.dy;
        return insideRing(nextX, nextY) && !(target.position.x === nextX && target.position.y === nextY);
      }
      zone = attackZone(actor.position, target.position);
      if (action.reach === "close") {
        return zone === "close";
      }
      return zone === "line";
    }

    function resolveKnockdown(fight, victimSide) {
      var victim = fightStateBySide(fight, victimSide);
      var attackerSide = otherSide(victimSide);
      var victimStats = fightStatsBySide(fight, victimSide);
      var victimName = fightNameBySide(fight, victimSide);
      var riseChance = clamp(46 + victimStats.heart * 5 + victimStats.endurance * 2 - victim.knockdowns * 15, 8, 90);
      awardFightPressure(fight, attackerSide, 12);
      if (victim.knockdowns < 2 && chance(riseChance)) {
        victim.knockdowns += 1;
        victim.hp = 12 + victimStats.heart * 2;
        victim.stamina = clamp(victim.stamina - 12, 0, 100);
        resetRingPositions(fight);
        pushFightLine(fight, victimName + " РїР°РґР°РµС‚, РІСЃС‚Р°РµС‚ РЅР° СЃС‡РµС‚ Рё Р±РѕР№ РІРѕР·РІСЂР°С‰Р°РµС‚СЃСЏ РІ С†РµРЅС‚СЂ СЂРёРЅРіР°.");
        return false;
      }
      pushFightLine(fight, victimName + " Р±РѕР»СЊС€Рµ РЅРµ РїРѕРґРЅРёРјР°РµС‚СЃСЏ РїРѕСЃР»Рµ РѕС‚СЃС‡РµС‚Р°.");
      finalizeFight(victimSide === "player" ? "loss" : "win", "KO/TKO", [], "");
      return true;
    }

    function strikeActor(fight, side, actionKey) {
      var attacker = fightStateBySide(fight, side);
      var defender = fightStateBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);
      var defenderStats = fightStatsBySide(fight, otherSide(side));
      var attackerName = fightNameBySide(fight, side);
      var defenderName = fightNameBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var zone = attackZone(attacker.position, defender.position);
      var hitChance;
      var damage;
      var critical;
      var bodyDrain;
      attacker.stamina = clamp(attacker.stamina - (action.stamina + (zone === "line" ? 1 : 0)), 0, 100);
      if (!canUseFightAction(fight, side, actionKey)) {
        pushFightLine(fight, attackerName + " РІС‹Р±СЂР°СЃС‹РІР°РµС‚ " + action.label.toLowerCase() + ", РЅРѕ РґРёСЃС‚Р°РЅС†РёСЏ РЅРµ РїРѕР·РІРѕР»СЏРµС‚ РїРѕРїР°СЃС‚СЊ.");
        setFightAnimation(side, "miss");
        return false;
      }
      hitChance = action.accuracy + attackerStats.speed * 2 + attackerStats.technique * 2 + attackerStats.power * 0.4;
      hitChance -= defenderStats.speed * 1.5 + defenderStats.technique * 1.2 + defenderStats.heart * 0.35;
      hitChance -= Math.max(0, 40 - attacker.stamina) / 2;
      if (zone === "line") {
        hitChance -= 8;
      }
      hitChance = clamp(Math.round(hitChance), 24, 90);
      if (!chance(hitChance)) {
        pushFightLine(fight, attackerName + " РЅРµ РґРѕРЅРѕСЃРёС‚ " + action.label.toLowerCase() + ", Рё " + defenderName + " СѓС…РѕРґРёС‚ СЃ Р»РёРЅРёРё Р°С‚Р°РєРё.");
        setFightAnimation(side, "miss");
        return false;
      }
      damage = action.damage + attackerStats.power * 1.1 + attackerStats.technique * 0.5 + attackerStats.speed * 0.2;
      damage -= defenderStats.endurance * 0.75 + defenderStats.heart * 0.25;
      if (zone === "line") {
        damage -= 2;
      }
      if (actionKey === "uppercut") {
        damage += 2;
      } else if (actionKey === "hook") {
        damage += 1;
      } else if (actionKey === "jab") {
        damage -= 1;
      }
      damage = Math.max(4, Math.round(damage + rand(-2, 2)));
      critical = chance(clamp(8 + attackerStats.technique * 2 + (actionKey === "uppercut" ? 8 : 0) + (actionKey === "cross" ? 4 : 0), 8, 38));
      if (critical) {
        damage += rand(3, 6);
      }
      defender.hp -= damage;
      defender.damageTaken += damage;
      awardFightPressure(fight, side, damage + (critical ? 4 : 2));
      if (action.body) {
        bodyDrain = rand(6, 10) + Math.max(0, attackerStats.power - 5);
        defender.stamina = clamp(defender.stamina - bodyDrain, 0, 100);
        defender.bodyDamage += damage;
      }
      if (critical) {
        pushFightLine(fight, attackerName + " Р»РѕРІРёС‚ РјРѕРјРµРЅС‚ Рё С‚СЏР¶РµР»Рѕ РїРѕРїР°РґР°РµС‚: " + action.label + " РїСЂРѕС…РѕРґРёС‚ РЅР° " + damage + " СѓСЂРѕРЅР°.");
      } else {
        pushFightLine(fight, attackerName + " РїРѕРїР°РґР°РµС‚ СѓРґР°СЂРѕРј '" + action.label + "' Рё СЃРЅРёРјР°РµС‚ " + damage + " РїСЂРѕС‡РЅРѕСЃС‚Рё.");
      }
      if (action.body) {
        pushFightLine(fight, defenderName + " С‚РµСЂСЏРµС‚ С‚РµРјРї РїРѕСЃР»Рµ СЂР°Р±РѕС‚С‹ РїРѕ РєРѕСЂРїСѓСЃСѓ.");
      }
      setFightAnimation(side, "hit");
      if (defender.hp <= 0) {
        return resolveKnockdown(fight, otherSide(side));
      }
      return false;
    }

    function pickAIMove(fight, retreat) {
      var keys = ["move_up", "move_left", "move_right", "move_down"];
      var actor = fight.opponentState;
      var target = fight.playerState;
      var best = [];
      var bestScore = retreat ? -999 : 999;
      var i;
      var action;
      var nextPos;
      var zone;
      var score;
      for (i = 0; i < keys.length; i += 1) {
        if (!canUseFightAction(fight, "opponent", keys[i])) {
          continue;
        }
        action = FIGHT_ACTIONS[keys[i]];
        nextPos = { x: actor.position.x + action.dx, y: actor.position.y + action.dy };
        zone = attackZone(nextPos, target.position);
        score = (zone === "close" ? 1 : (zone === "line" ? 2 : 3)) * 10 + rand(0, 3);
        if (retreat) {
          if (score > bestScore) {
            bestScore = score;
            best = [keys[i]];
          } else if (score === bestScore) {
            best.push(keys[i]);
          }
        } else if (score < bestScore) {
          bestScore = score;
          best = [keys[i]];
        } else if (score === bestScore) {
          best.push(keys[i]);
        }
      }
      return best.length ? choice(best) : null;
    }

    function pickAiAction(fight) {
      var ai = fight.opponentState;
      var player = fight.playerState;
      var zone = attackZone(ai.position, player.position);
      var attacks = availableFightActions(fight, "opponent", "attack");
      var retreat = ai.hp < ai.maxHp * 0.25 || ai.stamina < 16;
      if (attacks.length) {
        if (zone === "close") {
          if (player.hp < player.maxHp * 0.32 && canUseFightAction(fight, "opponent", "uppercut")) {
            return "uppercut";
          }
          if (canUseFightAction(fight, "opponent", "hook") && chance(60)) {
            return "hook";
          }
          if (canUseFightAction(fight, "opponent", "body") && chance(35)) {
            return "body";
          }
        } else if (zone === "line") {
          if (canUseFightAction(fight, "opponent", "cross") && chance(55)) {
            return "cross";
          }
          if (canUseFightAction(fight, "opponent", "jab") && chance(70)) {
            return "jab";
          }
        }
        return choice(attacks);
      }
      return pickAIMove(fight, retreat || zone === "close");
    }

    function finalizeFightTurn() {
      var fight = state.fight;
      if (!fight || fight.result) {
        return;
      }
      if (fight.playerActionsLeft <= 0 && fight.aiActionsLeft <= 0) {
        completeFightSegment();
        if (fight.result) {
          return;
        }
      }
      fight.actionLock = false;
      render();

    function runAiAfterPlayer() {
      var fight = state.fight;
      var aiActionKey;
      if (!fight || fight.result) {
        return;
      }
      if (fight.aiActionsLeft > 0) {
        aiActionKey = pickAiAction(fight);
        if (aiActionKey) {
          if (FIGHT_ACTIONS[aiActionKey].type === "move") {
            moveActor(fight, "opponent", aiActionKey);
            fight.aiActionsLeft -= 1;
            finalizeFightTurn();
            return;
          }
          if (strikeActor(fight, "opponent", aiActionKey)) {
            fight.aiActionsLeft -= 1;
            render();
            setTimeout(function () {
              applyFightAnimationResult();
            }, 1000);
            return;
          }
          fight.aiActionsLeft -= 1;
          render();
          setTimeout(function () {
            applyFightAnimationResult();
            finalizeFightTurn();
          }, 1000);
          return;
        }
        fight.aiActionsLeft = 0;
        pushFightLine(fight, fullOpponentName(fight.opponent) + " С‚РµСЂСЏРµС‚ С‚РµРјРї Рё РЅРµ РЅР°С…РѕРґРёС‚ С‡РёСЃС‚РѕРіРѕ РґРµР№СЃС‚РІРёСЏ.");

    function fightAction(actionKey) {
      var fight = state.fight;
      var action = FIGHT_ACTIONS[actionKey];
      if (!fight || fight.result || !action || fight.playerActionsLeft <= 0 || fight.actionLock) {

      if (!canUseFightAction(fight, "player", actionKey)) {
        pushFightLine(fight, "Р­С‚Рѕ РґРµР№СЃС‚РІРёРµ СЃРµР№С‡Р°СЃ РЅРµРґРѕСЃС‚СѓРїРЅРѕ РїРѕ РїРѕР·РёС†РёРё РЅР° СЂРёРЅРіРµ.");

      fight.actionLock = true;
      if (action.type === "move") {
        moveActor(fight, "player", actionKey);
        fight.playerActionsLeft -= 1;
        fight.actionLock = false;
        finalizeFightTurn();

        return;
      }

        }
        runAiAfterPlayer();
      }, 1000);
    }

    function applyFightResults() {

        fighter.fame += fameGain;
        fighter.morale -= 12;
        fighter.stress += 6;
        pushLog("РџРѕСЂР°Р¶РµРЅРёРµ. Р”Р°Р¶Рµ РѕРЅРѕ РїСЂРёРЅРѕСЃРёС‚ С‡Р°СЃС‚СЊ РґРµРЅРµРі Рё РѕСЃС‚Р°РІР»СЏРµС‚ С€СѓРј РІРѕРєСЂСѓРі РёРјРµРЅРё.", "bad");
      } else {
        fameGain = Math.max(4, Math.floor(opponent.fameReward / 2));
        fighter.money += Math.floor(opponent.purse * 0.55);
        fighter.fame += fameGain;
        fighter.morale += 1;
        pushLog("РќРёС‡СЊСЏ. РўС‹ РІС‹Р¶РёР» РІ СЂСѓР±РєРµ Рё СѓС€РµР» СЃ РґРµРЅСЊРіР°РјРё Рё РёР·РІРµСЃС‚РЅРѕСЃС‚СЊСЋ.", "warn");
      }
      applyBounds(fighter);
    }

    function renderMainPanel() {
      if (state.panel === "character") { return renderCharacterPanel(); }
      if (state.panel === "careerLog") { return renderCareerLogPage(); }
      if (state.panel === "train") { return renderTrainPanel(); }
      if (state.panel === "skills") { return renderSkillPanel(); }
      if (state.panel === "recover") { return renderRecoverPanel(); }
      if (state.panel === "work") { return renderWorkPanel(); }
      if (state.panel === "life") { return renderLifePanel(); }
      if (state.panel === "travel") { return renderTravelPanel(); }
      if (state.panel === "fightSelect") { return renderFightSelectPanel(); }
      if (state.panel === "fightLive") { return renderFightLivePanel(); }
      if (state.panel === "fightResult") { return renderFightResultPanel(); }
      if (state.panel === "retire") { return renderRetirePanel(); }
      return renderHomePanel();
    }

    function renderLogPanel() {
      var html = [];
      var i;
      html.push("<div class='log-panel'><h2 class='panel-title'>Р›РµРЅС‚Р° РєР°СЂСЊРµСЂС‹</h2><div class='log-list'>");
      for (i = 0; i < state.log.length; i += 1) {
        html.push("<div class='log-entry " + state.log[i].tone + "'>" + state.log[i].text + "</div>");
      }
      html.push("</div></div>");
      return html.join("");
    }

    function renderLogPanelInner() {
      var html = [];
      var i;
      html.push("<h2 class='panel-title'>Р›РµРЅС‚Р° РєР°СЂСЊРµСЂС‹</h2><div class='log-list'>");
      for (i = 0; i < state.log.length; i += 1) {
        html.push("<div class='log-entry " + state.log[i].tone + "'>" + state.log[i].text + "</div>");
      }
      html.push("</div>");
      return html.join("");
    }

    function renderGame() {
      if (state.panel === "fightLive" || state.panel === "fightResult") {
        return renderMainPanel();
      }
      return "" +
        "<div class='shell'>" +
          "<div class='topbar'>" +
            "<div class='week-chip'>РќРµРґРµР»СЏ " + state.fighter.week + "</div>" +
          "</div>" +
          renderNavigationTabs() +
          "<div class='panel'>" + renderMainPanel() + "</div>" +
        "</div>";
    }

    function renderEnding() {
      var fighter = state.fighter;
      var reasonText = "";
      if (state.endingReason === "death") {
        reasonText = "РСЃС‚РѕСЂРёСЏ Р·Р°РєРѕРЅС‡РёР»Р°СЃСЊ СЃР»РёС€РєРѕРј СЂР°РЅРѕ Рё СЃР»РёС€РєРѕРј Р¶РµСЃС‚РєРѕ. РџРѕРІСЂРµР¶РґРµРЅРёСЏ РѕРєР°Р·Р°Р»РёСЃСЊ РєСЂРёС‚РёС‡РµСЃРєРёРјРё.";
      } else if (state.endingReason === "body") {
        reasonText = "РћСЂРіР°РЅРёР·Рј РѕРєР°Р·Р°Р»СЃСЏ РїСЂРµРґРµР»РѕРј, РєРѕС‚РѕСЂС‹Р№ РЅРµР»СЊР·СЏ РїСЂРѕРґР°РІРёС‚СЊ Р±РµСЃРєРѕРЅРµС‡РЅРѕ.";
      } else if (state.endingReason === "stress") {
        reasonText = "РџСЃРёС…РёРєР° РЅРµ РІС‹РґРµСЂР¶Р°Р»Р° РїРѕСЃС‚РѕСЏРЅРЅРѕРіРѕ РґР°РІР»РµРЅРёСЏ. РРіСЂР° Р·Р°РєРѕРЅС‡РёР»Р°СЃСЊ РЅРµСЂРІРЅС‹Рј СЃСЂС‹РІРѕРј.";
      } else {
        reasonText = "РўС‹ РІРѕРІСЂРµРјСЏ РІС‹С€РµР» РёР· РёРіСЂС‹ Рё СЃРѕС…СЂР°РЅРёР», С‡С‚Рѕ СѓСЃРїРµР» РїРѕСЃС‚СЂРѕРёС‚СЊ.";
      }
      return "" +
        "<div class='shell'>" +
          "<div class='hero'>" +
            "<div class='eyebrow'>Р¤РёРЅР°Р» Р·Р°Р±РµРіР°</div>" +
            "<div class='title'>" + fighter.name + "</div>" +
            "<div class='subtitle'>" + legacyRank(fighter) + ". " + reasonText + "</div>" +
            "<div class='record-row'>" +
              "<div class='chip gold'>Р РµРєРѕСЂРґ " + recordText(fighter) + "</div>" +
              "<div class='chip'>РЎР»Р°РІР° " + fighter.fame + "</div>" +
              "<div class='chip'>РќРµРґРµР»СЊ РїСЂРѕР¶РёС‚Рѕ " + fighter.week + "</div>" +
              "<div class='chip red'>РЎРјРµСЂС‚РµР№ РІ Р±РѕСЏС…: " + fighter.deathsCaused + "</div>" +
            "</div>" +
            "<div class='fight-grid'>" +
              "<div class='summary-box'>" +
                "<strong>Р¤РёРЅР°Р»СЊРЅРѕРµ СЃРѕСЃС‚РѕСЏРЅРёРµ</strong>" +
                meter("Р—РґРѕСЂРѕРІСЊРµ", fighter.health) +
                meter("РЎС‚СЂРµСЃСЃ", fighter.stress) +
                meter("РњРѕСЂР°Р»СЊ", fighter.morale) +
                meter("Р›РёС‡РЅР°СЏ Р¶РёР·РЅСЊ", fighter.relationship) +
              "</div>" +
              "<div class='summary-box'>" +
                "<strong>РЎР±РѕСЂРєР°</strong>" +
                "<div class='empty-state'>РќР°РІС‹РєРё Рё Р°СЂС…РµС‚РёРїС‹ Р±С‹Р»Рё РѕС‚РєР»СЋС‡РµРЅС‹ РЅР° РІСЂРµРјСЏ Р±РѕР»СЊС€РѕР№ РїРµСЂРµРґРµР»РєРё Р±РѕРµРІРєРё. Р­С‚РѕС‚ Р·Р°Р±РµРі С†РµР»РёРєРѕРј РґРµСЂР¶Р°Р»СЃСЏ РЅР° СЃС‚Р°С‚Р°С…, РјР°СЂС€СЂСѓС‚Р°С… РїРѕ СЃС‚СЂР°РЅР°Рј Рё СѓРїСЂР°РІР»РµРЅРёРё Р±РѕР№С†РѕРј РЅР° СЂРёРЅРіРµ 5x5.</div>" +
              "</div>" +
            "</div>" +
            "<div class='footer-actions'>" +
              "<button class='button' onclick='resetCreate(); render();'>РќРѕРІС‹Р№ Р±РѕРµС†</button>" +
            "</div>" +
          "</div>" +
        "</div>";
    }

    function render() {
      var app = document.getElementById("app");
      applyAdaptiveMode();
      if (state.screen === "create") {
        app.innerHTML = renderCreate();
      } else if (state.screen === "end") {
        app.innerHTML = renderEnding();
      } else {
        app.innerHTML = renderGame();
      }
    }

    function viewportWidth() {
      if (document.documentElement && document.documentElement.clientWidth) {
        return document.documentElement.clientWidth;
      }
      if (document.body && document.body.clientWidth) {
        return document.body.clientWidth;
      }
      return 1280;
    }

    function viewportHeight() {
      if (document.documentElement && document.documentElement.clientHeight) {
        return document.documentElement.clientHeight;
      }
      if (document.body && document.body.clientHeight) {
        return document.body.clientHeight;
      }
      return 720;
    }

    function applyAdaptiveMode() {
      var width = viewportWidth();
      var height = viewportHeight();
      var mode = "";
      if (!document.body) {
        return;
      }
      if (width <= 700) {
        mode = "scale-tight";
      } else if (width <= 1180 || height <= 700) {
        mode = "scale-compact";
      } else if (width <= 1500 || height <= 860) {
        mode = "scale-compact";
      }
      document.body.className = mode;
    }

    window.onload = function () {
      resetCreate();
      applyAdaptiveMode();
      render();
    };

    window.onresize = function () {
      applyAdaptiveMode();
      render();
    };
  </script>
