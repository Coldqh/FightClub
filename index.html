<html>
<head>
  <title>Fight Simulator</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=9" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <style>

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0d1117;
      color: #eff4fb;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(196, 73, 37, 0.26), transparent 26%),
        radial-gradient(circle at top right, rgba(229, 180, 90, 0.16), transparent 24%),
        linear-gradient(180deg, #12161d 0%, #0c1015 100%);
      overflow-x: hidden;
      overflow-y: auto;
      font-size: 20px;
      line-height: 1.5;
    }

    * {
      box-sizing: border-box;
    }

    .shell,
    .battle-shell {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
    }

    .update-banner-wrap {
      padding: 12px 12px 0 12px;
    }

    .update-banner {
      padding: 16px 18px;
      background: linear-gradient(135deg, rgba(217, 77, 103, 0.95), rgba(185, 45, 72, 0.95));
      border-color: rgba(255, 255, 255, 0.14);
      color: #fff4f6;
    }

    .update-banner strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .update-banner p {
      margin: 0 0 12px 0;
      font-size: 17px;
      line-height: 1.45;
      color: #fff4f6;
    }

    .update-banner .button {
      min-height: 58px;
      margin-bottom: 0;
      background: #fff4f6;
      color: #8e2039;
    }

    .debug-dock {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .debug-toggle {
      min-width: 72px;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(8, 12, 18, 0.96);
      color: #f8cf76;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .debug-panel {
      width: 240px;
      padding: 12px 14px;
      border: 1px solid rgba(248, 207, 118, 0.24);
      border-radius: 16px;
      background: rgba(8, 12, 18, 0.96);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
      color: #f5f8ff;
      font-size: 14px;
      line-height: 1.4;
    }

    .debug-panel strong {
      display: block;
      margin-bottom: 8px;
      color: #f8cf76;
      font-size: 15px;
    }

    .debug-row {
      margin-bottom: 6px;
    }

    .debug-row:last-child {
      margin-bottom: 0;
    }

    .topbar,
    .panel,
    .hero,
    .card,
    .create-card,
    .battle-topbar,
    .battle-stage,
    .battle-bottom,
    .battle-result {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(17, 22, 29, 0.92);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      border-radius: 20px;
    }

    .topbar,
    .panel,
    .hero,
    .battle-topbar,
    .battle-stage,
    .battle-bottom,
    .battle-result {
      padding: 18px;
      margin-bottom: 12px;
    }

    .card,
    .create-card {
      padding: 16px;
      margin-bottom: 10px;
      border-radius: 18px;
    }

    .hero {
      min-height: calc(100vh - 24px);
    }

    .menu-hero {
      min-height: calc(100vh - 24px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      padding-top: 6vh;
      background:
        radial-gradient(circle at top, rgba(211, 66, 66, 0.22), transparent 34%),
        linear-gradient(180deg, rgba(20, 24, 31, 0.98) 0%, rgba(11, 15, 21, 0.98) 100%);
    }

    .menu-stack {
      width: 100%;
      max-width: none;
      margin: 0 auto;
    }

    .menu-title {
      width: 100%;
      margin: 0 0 40px 0;
      color: #ffd8dd;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 122px;
      line-height: 0.86;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 0 0 #000, 0 8px 24px rgba(0, 0, 0, 0.42);
    }

    .menu-title span {
      display: block;
      width: 100%;
      padding: 14px 8px 16px 8px;
      background: linear-gradient(135deg, #d94d67, #b92d48);
      color: #fff4f6;
      box-shadow: 0 16px 34px rgba(185, 45, 72, 0.3);
      transform: rotate(-2deg);
    }

    .menu-actions {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .menu-actions .button,
    .menu-actions .ghost {
      min-height: 84px;
      font-size: 28px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .tab-screen {
      min-height: calc(100vh - 176px);
    }

    .tab-screen > .panel:first-child,
    .tab-screen > .hero:first-child {
      min-height: calc(100vh - 176px);
    }

    .hero .footer-actions {
      margin-top: auto;
      padding-top: 6px;
    }

    .page-stack {
      min-height: calc(100vh - 176px);
    }

    .fill-panel {
      min-height: calc(100vh - 210px);
    }

    .inset-panel {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: none;
    }

    .page-home .panel:first-child {
      min-height: 50vh;
    }

    .page-home .panel:last-child,
    .page-careerLog .panel:first-child,
    .page-skills .panel:first-child,
    .page-retire .panel:first-child {
      min-height: 34vh;
    }

    .page-careerLog .log-list {
      min-height: 52vh;
    }

    .brand {
      display: block;
      margin-bottom: 12px;
    }

    .eyebrow {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .title {
      font-size: 42px;
      line-height: 1.15;
      font-weight: 700;
      margin: 0;
    }

    .subtitle,
    .muted,
    .empty-state,
    .card p,
    .create-card p {
      color: #ced8e4;
      font-size: 20px;
      line-height: 1.55;
      margin: 0;
    }

    .week-chip,
    .chip {
      display: inline-block;
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #eff4fb;
      font-size: 18px;
      font-weight: 700;
      margin: 0 8px 8px 0;
      vertical-align: top;
    }

    .week-chip {
      background: rgba(255, 255, 255, 0.12);
      color: #ffe7a8;
    }

    .chip.gold {
      background: linear-gradient(135deg, #f4c56b, #dba647);
      color: #10151b;
    }

    .chip.red {
      background: linear-gradient(135deg, #d1583d, #a33227);
      color: #fff4ef;
    }

    .panel-title {
      margin: 0 0 14px 0;
      font-size: 34px;
      line-height: 1.2;
    }

    .fighter-name {
      font-size: 46px;
      line-height: 1.15;
      font-weight: 700;
      margin: 0 0 12px 0;
    }

    .fighter-class {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .nameplate {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 12px;
    }

    .footer-actions,
    .record-row,
    .battle-tabs,
    .battle-chip-line,
    .split-row {
      display: block;
    }

    .footer-actions:after,
    .record-row:after,
    .battle-tabs:after,
    .battle-chip-line:after,
    .split-row:after,
    .topbar:after,
    .battle-topbar:after,
    .battle-bottom:after {
      content: "";
      display: block;
      clear: both;
    }

    .nav-row,
    .battle-mode-row,
    .battle-actions-row {
      font-size: 0;
    }

    .nav-row .button,
    .nav-row .ghost {
      display: inline-block;
      width: 19.2%;
      margin-right: 1%;
      min-width: 0;
      min-height: 56px;
      padding: 12px 4px;
      font-size: 16px;
      vertical-align: top;
    }

    .nav-row .button:last-child,
    .nav-row .ghost:last-child {
      margin-right: 0;
    }

    .create-grid,
    .card-grid,
    .choice-grid,
    .fight-grid {
      display: block;
      margin-top: 14px;
    }

    .create-grid {
      font-size: 0;
    }

    .create-grid .create-card {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
      vertical-align: top;
      font-size: 20px;
    }

    .create-grid .create-card:nth-child(2n) {
      margin-right: 0;
    }

    .npc-card {
      margin-bottom: 12px;
    }

    .npc-meta-line {
      margin: 8px 0 12px 0;
    }

    .npc-action-grid {
      font-size: 0;
      margin-top: 12px;
    }

    .npc-action-grid .button,
    .npc-action-grid .ghost,
    .npc-action-grid .danger {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
      min-width: 0;
      min-height: 58px;
      padding: 12px 10px;
      font-size: 18px;
      vertical-align: top;
    }

    .npc-action-grid .button:nth-child(2n),
    .npc-action-grid .ghost:nth-child(2n),
    .npc-action-grid .danger:nth-child(2n) {
      margin-right: 0;
    }

    .button,
    .ghost,
    .danger {
      display: block;
      width: 100%;
      min-height: 64px;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      margin: 0 0 10px 0;
      font-size: 21px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      white-space: normal;
    }

    .button {
      background: linear-gradient(135deg, #f4c56b, #dba647);
      color: #10151b;
    }

    .ghost {
      background: #eef2f7;
      color: #10151b;
    }

    .danger {
      background: linear-gradient(135deg, #d1583d, #a33227);
      color: #fff4ef;
    }

    .button[disabled],
    .ghost[disabled],
    .danger[disabled] {
      opacity: 0.4;
      cursor: default;
    }

    .card h3,
    .create-card h3 {
      margin: 0 0 10px 0;
      font-size: 28px;
      line-height: 1.25;
    }

    .meta {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .create-card.selected {
      border-color: rgba(244, 197, 107, 0.88);
      box-shadow: 0 0 0 1px rgba(244, 197, 107, 0.32), 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .meter-block {
      margin-top: 12px;
    }

    .meter-row {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .meter-row span {
      color: #d7e0ea;
    }

    .meter-row strong {
      float: right;
      color: #ffffff;
    }

    .meter {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(135deg, #f4c56b, #dba647);
    }

    .empty-state {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
    }

    .log-list {
      margin-top: 12px;
    }

    .log-entry {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 10px;
      font-size: 20px;
      line-height: 1.5;
    }

    .log-entry.good {
      border-left: 4px solid #61d59a;
    }

    .log-entry.warn {
      border-left: 4px solid #f5c86f;
    }

    .log-entry.bad {
      border-left: 4px solid #d1583d;
    }

    .battle-shell {
      padding: 12px;
    }

    .battle-topbar,
    .battle-stage,
    .battle-bottom {
      width: 100%;
    }

    .battle-stage {
      min-height: 58vh;
    }

    .battle-result {
      min-height: calc(100vh - 24px);
    }

    .battle-health-card {
      width: 100%;
      margin-bottom: 10px;
    }

    .battle-health-card:last-child,
    .battle-column:last-child,
    .battle-panel:last-child,
    .panel:last-child,
    .card:last-child,
    .create-card:last-child {
      margin-bottom: 0;
    }

    .battle-column,
    .summary-box {
      width: 100%;
      margin-bottom: 10px;
    }

    .battle-panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .battle-panel strong {
      display: block;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .battle-log {
      max-height: none;
      overflow: visible;
    }

    .battle-tabs .button,
    .battle-tabs .ghost {
      display: inline-block;
      width: 32%;
      margin-right: 1%;
      min-width: 0;
      min-height: 54px;
      padding: 12px 8px;
      font-size: 20px;
    }

    .battle-tabs .button:last-child,
    .battle-tabs .ghost:last-child {
      margin-right: 0;
    }

    .battle-actions-row .button,
    .battle-actions-row .ghost,
    .battle-actions-row .danger {
      width: 100%;
      min-height: 72px;
      padding: 14px 12px;
      margin-bottom: 6px;
    }

    .battle-mode-row .button,
    .battle-mode-row .ghost {
      display: inline-block;
      width: 32%;
      margin-right: 2%;
      min-width: 0;
      vertical-align: top;
    }

    .battle-mode-row .button:nth-child(3n),
    .battle-mode-row .ghost:nth-child(3n) {
      margin-right: 0;
    }

    .battle-actions-row .fight-action-item {
      width: 100%;
      margin-bottom: 12px;
      vertical-align: top;
    }

    .battle-actions-row.move-grid .fight-action-item {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
    }

    .battle-actions-row.move-grid .fight-action-item:nth-child(2n) {
      margin-right: 0;
    }

    .battle-actions-row.attack-grid .fight-action-item {
      display: inline-block;
      width: 32%;
      margin-right: 2%;
    }

    .battle-actions-row.attack-grid .fight-action-item:nth-child(3n) {
      margin-right: 0;
    }

    .battle-actions-row.defense-grid .fight-action-item {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
    }

    .battle-actions-row.defense-grid .fight-action-item:nth-child(2n) {
      margin-right: 0;
    }

    .battle-stage {
      min-height: 0;
      padding-bottom: 14px;
    }

    .controls-stage .ring-board {
      margin-bottom: 12px;
    }

    .action-button-title {
      display: block;
      font-size: 24px;
      line-height: 1.2;
    }

    .action-button-meta {
      display: block;
      font-size: 20px;
      line-height: 1.45;
      font-weight: 800;
      text-align: center;
      padding: 2px 4px 0 4px;
    }

    .action-button-meta span {
      display: block;
      margin: 0 0 4px 0;
    }

    .action-blue {
      color: #7fd0ff;
    }

    .action-red {
      color: #ff8a80;
    }

    .action-yellow {
      color: #ffe189;
    }

    .knockdown-banner {
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(209, 88, 61, 0.95), rgba(163, 50, 39, 0.95));
      color: #fff4ef;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ring-board {
      display: block;
      width: 100%;
      max-width: none;
      height: 92vw;
      min-height: 360px;
      max-height: 520px;
      margin: 16px auto 0 auto;
      padding: 44px 8px 48px 8px;
      background-color: #d9dee6;
      background-image: url('ring_top_view.png');
      background-repeat: no-repeat;
      background-position: center 33%;
      background-size: 132% 130%;
      text-align: center;
      font-size: 0;
    }

    .ring-row {
      display: block;
      white-space: nowrap;
      margin-bottom: 8px;
    }

    .ring-cell {
      width: 18%;
      height: 16vw;
      min-height: 54px;
      max-height: 76px;
      margin: 0 1% 0 1%;
      display: inline-block;
      vertical-align: top;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(15, 20, 28, 0.12);
      position: relative;
      text-align: center;
    }

    .ring-cell:after {
      content: attr(data-cell);
      position: absolute;
      right: 5px;
      bottom: 4px;
      color: rgba(255, 255, 255, 0.28);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .token {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: inline-block;
      margin: 6px auto 0 auto;
      line-height: 42px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
      position: relative;
      transition: background 0.5s ease, box-shadow 0.5s ease, color 0.5s ease;
    }

    .token.player {
      background: linear-gradient(135deg, #f4c56b, #dd9e39);
      color: #10151b;
    }

    .token.opponent {
      background: linear-gradient(135deg, #d35433, #9b2d24);
      color: #fff4ef;
    }

    .token.attack-right { animation: tokenAttackRight 0.32s ease-out; }
    .token.attack-left { animation: tokenAttackLeft 0.32s ease-out; }
    .token.attack-up { animation: tokenAttackUp 0.32s ease-out; }
    .token.attack-down { animation: tokenAttackDown 0.32s ease-out; }
    .token.hit-react { animation: tokenHitReact 0.26s linear 1; }
    .token.crit-flash {
      background: linear-gradient(135deg, #ff6f61, #d12e2e) !important;
      color: #fff4ef !important;
      box-shadow: 0 0 0 4px rgba(255, 111, 97, 0.18), 0 12px 26px rgba(0, 0, 0, 0.28);
    }
    .token.dodge-right { animation: tokenDodgeRight 0.32s ease-out; }
    .token.dodge-left { animation: tokenDodgeLeft 0.32s ease-out; }
    .token.dodge-up { animation: tokenDodgeUp 0.32s ease-out; }
    .token.dodge-down { animation: tokenDodgeDown 0.32s ease-out; }

    @keyframes tokenAttackRight {
      0% { transform: translateX(0); }
      35% { transform: translateX(16px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenAttackLeft {
      0% { transform: translateX(0); }
      35% { transform: translateX(-16px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenAttackUp {
      0% { transform: translateY(0); }
      35% { transform: translateY(-16px); }
      100% { transform: translateY(0); }
    }

    @keyframes tokenAttackDown {
      0% { transform: translateY(0); }
      35% { transform: translateY(16px); }
      100% { transform: translateY(0); }
    }

    @keyframes tokenHitReact {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-6px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenDodgeRight {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(14px) translateY(-10px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeLeft {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(-14px) translateY(-10px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeUp {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(10px) translateY(-14px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeDown {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(10px) translateY(14px); }
      100% { transform: translateX(0) translateY(0); }
    }
  </style>

  <script type="text/javascript" src="country_data.js"></script>
  <script type="text/javascript" src="src/content/content_data.js"></script>
  <script type="text/javascript" src="src/content/event_data.js"></script>
  <script type="text/javascript" src="src/content/content_loader.js"></script>
  <script type="text/javascript" src="src/core/rng_manager.js"></script>
  <script type="text/javascript" src="src/core/save_manager.js"></script>
  <script type="text/javascript" src="src/core/event_engine.js"></script>
  <script type="text/javascript" src="src/core/time_system.js"></script>
  <script type="text/javascript" src="src/core/state_factory.js"></script>
  <script type="text/javascript" src="src/core/validators.js"></script>
  <script type="text/javascript" src="game_data.js"></script>
  <script type="text/javascript">
    var APP_VERSION = "2026.03.18.10";
    var SAVE_KEY = "street_boxer_save_v1";
    var DEBUG_MODE = false;

    var state = createLegacyRuntimeState({
      appVersion: APP_VERSION,
      debugMode: DEBUG_MODE
    });

    function buildSavePreview(sourceState) {
      var gameState;
      var name;
      var week;
      if (!sourceState) {
        return null;
      }
      gameState = sourceState.game ? sourceState.game : buildGameStateFromLegacySnapshot(sourceState, {
        appVersion: APP_VERSION,
        debugMode: DEBUG_MODE
      });
      name = gameState && gameState.player && gameState.player.profile ? gameState.player.profile.name : "";
      if (!name) {
        return null;
      }
      week = gameState && gameState.career ? gameState.career.week : 1;
      return {
        hasSave: true,
        name: name,
        week: week
      };
    }

    function syncGameStateFromRuntime() {
      state.game = buildGameStateFromRuntime(state, {
        appVersion: APP_VERSION,
        debugMode: !!(state.debug && state.debug.enabled)
      });
      return state.game;
    }

    function syncRuntimeStateFromGame(gameState) {
      return applyGameStateToRuntime(state, normalizeGameState(gameState, {
        appVersion: APP_VERSION,
        debugMode: DEBUG_MODE
      }), {
        appVersion: APP_VERSION,
        debugMode: DEBUG_MODE
      });
    }

    function supportsRemoteUpdateCheck() {
      try {
        return !!(window.location && /^https?:$/i.test(window.location.protocol) && typeof XMLHttpRequest !== "undefined");
      } catch (error) {}
      return false;
    }

    function buildUpdateUrl() {
      var base;
      if (!window.location) {
        return "";
      }
      base = String(window.location.href || "").split("#")[0].split("?")[0];
      return base + "?update=" + encodeURIComponent(state.remoteVersion || APP_VERSION) + "&t=" + new Date().getTime();
    }

    function applyAppUpdate() {
      var targetUrl;
      saveGameState();
      targetUrl = buildUpdateUrl();
      if (!targetUrl) {
        return;
      }
      if (window.location.replace) {
        window.location.replace(targetUrl);
      } else {
        window.location.href = targetUrl;
      }
    }

    function renderUpdateBanner() {
      if (!state.updateAvailable) {
        return "";
      }
      return "" +
        "<div class='update-banner-wrap'>" +
          "<div class='panel update-banner'>" +
            "<strong>Доступно обновление</strong>" +
            "<p>На сайте уже лежит новая версия. Прогресс текущего бойца сохранится, если нажать кнопку ниже.</p>" +
          "<button class='button' onclick='applyAppUpdate()'>Обновить приложение</button>" +
          "</div>" +
        "</div>";
    }

    function debugInfo() {
      var calendar = state.fighter ? currentCalendarView(state.fighter) : null;
      var age = state.fighter ? currentAgeView(state.fighter) : null;
      syncGameStateFromRuntime();
      return {
        week: state.fighter ? state.fighter.week : "-",
        month: calendar ? calendar.monthName + " " + calendar.year : "-",
        age: age ? age.label : "-",
        seed: RNG.describe(state.rng),
        saveVersion: state.game && state.game.meta ? state.game.meta.saveVersion : SAVE_VERSION,
        screen: state.screen,
        panel: state.panel
      };
    }

    function toggleDebugPanel() {
      if (!state.debug || !state.debug.enabled) {
        return;
      }
      state.debug.open = !state.debug.open;
      render();
    }

    function renderDebugPanel() {
      var info;
      if (!state.debug || !state.debug.enabled) {
        return "";
      }
      info = debugInfo();
      return "" +
        "<div class='debug-dock'>" +
          (state.debug.open ? (
            "<div class='debug-panel'>" +
              "<strong>Debug</strong>" +
              "<div class='debug-row'>Неделя: " + info.week + "</div>" +
              "<div class='debug-row'>Время: " + info.month + "</div>" +
              "<div class='debug-row'>Возраст: " + info.age + "</div>" +
              "<div class='debug-row'>Seed: " + info.seed + "</div>" +
              "<div class='debug-row'>Save version: " + info.saveVersion + "</div>" +
              "<div class='debug-row'>Экран: " + info.screen + " / " + info.panel + "</div>" +
            "</div>"
          ) : "") +
          "<button class='debug-toggle' onclick='toggleDebugPanel()'>" + (state.debug.open ? "Hide" : "Debug") + "</button>" +
        "</div>";
    }

    function checkForAppUpdate() {
      var xhr;
      var url;
      if (!supportsRemoteUpdateCheck()) {
        return;
      }
      url = "version.json?t=" + new Date().getTime();
      xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function () {
        var payload;
        if (xhr.readyState !== 4) {
          return;
        }
        if (xhr.status !== 200 && xhr.status !== 0) {
          return;
        }
        try {
          payload = JSON.parse(xhr.responseText);
        } catch (error) {
          return;
        }
        if (!payload || !payload.version) {
          return;
        }
        state.remoteVersion = payload.version;
        state.updateAvailable = payload.version !== APP_VERSION;
        render();
      };
      xhr.open("GET", url, true);
      xhr.setRequestHeader("Cache-Control", "no-cache, no-store, must-revalidate");
      xhr.send(null);
    }

    function sanitizeFightForSave(fight) {
      if (!fight) {
        return null;
      }
      if (fight.actionLock || fight.knockdown || fight.pendingTimeout || fight.animationTimeout) {
        return null;
      }
      return {
        opponent: fight.opponent,
        round: fight.round,
        turn: fight.turn,
        turnsPerRound: fight.turnsPerRound,
        uiTab: fight.uiTab || "controls",
        actionGroup: fight.actionGroup || "move",
        actionLock: false,
        lines: fight.lines || [],
        playerState: fight.playerState,
        opponentState: fight.opponentState,
        result: fight.result,
        method: fight.method,
        roundsCompleted: fight.roundsCompleted,
        judges: fight.judges,
        roundPoints: fight.roundPoints,
        roundCards: fight.roundCards,
        breakSummary: fight.breakSummary,
        knockdown: null,
        skipTurnRecovery: fight.skipTurnRecovery,
        pendingTimeout: null,
        animation: null,
        animationTimeout: null
      };
    }

    function buildSaveSnapshot() {
      var gameState;
      var sanitizedFight;
      if (!state.fighter) {
        return null;
      }
      sanitizedFight = sanitizeFightForSave(state.fight);
      if (state.fight && !sanitizedFight) {
        return null;
      }
      gameState = syncGameStateFromRuntime();
      gameState.battle.current = sanitizedFight;
      gameState.meta.appVersion = APP_VERSION;
      gameState.meta.saveVersion = SAVE_VERSION;
      gameState.meta.rng = RNG.cloneState(state.rng);
      gameState.ui.savedPreview = buildSavePreview({ game: gameState });
      return {
        version: SAVE_VERSION,
        saveVersion: SAVE_VERSION,
        appVersion: APP_VERSION,
        game: clonePlainData(gameState)
      };
    }

    function migrateSave(saveData) {
      var migrated;
      var validation;
      if (!saveData) {
        return null;
      }
      if (saveData.game) {
        migrated = normalizeGameState(saveData.game, {
          appVersion: saveData.appVersion || APP_VERSION,
          debugMode: DEBUG_MODE
        });
      } else {
        migrated = buildGameStateFromLegacySnapshot(saveData, {
          appVersion: saveData.appVersion || APP_VERSION,
          debugMode: DEBUG_MODE
        });
      }
      if (saveData.rng && (!migrated.meta.rng || migrated.meta.rng.mode !== "seeded")) {
        migrated.meta.rng = RNG.cloneState(saveData.rng);
      }
      migrated.meta.appVersion = saveData.appVersion || APP_VERSION;
      migrated.meta.saveVersion = SAVE_VERSION;
      migrated.ui.savedPreview = buildSavePreview({ game: migrated });
      validation = validateState(migrated);
      if (!validation.valid) {
        migrated = normalizeGameState(migrated, {
          appVersion: migrated.meta.appVersion,
          debugMode: DEBUG_MODE
        });
        migrated.ui.savedPreview = buildSavePreview({ game: migrated });
      }
      return {
        version: SAVE_VERSION,
        saveVersion: SAVE_VERSION,
        appVersion: migrated.meta.appVersion,
        game: migrated
      };
    }

    function saveGameState() {
      var snapshot;
      snapshot = buildSaveSnapshot();
      if (!snapshot) {
        return false;
      }
      state.savedPreview = buildSavePreview(snapshot);
      return SaveManager.save(SAVE_KEY, snapshot);
    }

    function loadSavedSnapshot() {
      return SaveManager.load(SAVE_KEY, migrateSave);
    }

    function refreshSavedPreview() {
      var saved = loadSavedSnapshot();
      state.savedPreview = buildSavePreview(saved);
      if (state.game && state.game.ui) {
        state.game.ui.savedPreview = state.savedPreview;
      }
    }

    function normalizeLoadedFight(fight) {
      if (!fight) {
        return null;
      }
      fight.uiTab = fight.uiTab || "controls";
      fight.actionGroup = fight.actionGroup || "move";
      fight.actionLock = false;
      fight.pendingTimeout = null;
      fight.animationTimeout = null;
      fight.animation = null;
      fight.knockdown = null;
      if (fight.playerState && fight.opponentState && fight.playerState.hp > 0 && fight.opponentState.hp > 0 && !fight.result) {
        return fight;
      }
      return null;
    }

    function continueSavedGame() {
      var saved = loadSavedSnapshot();
      var validation;
      if (!saved || !saved.game) {
        refreshSavedPreview();
        render();
        return;
      }
      validation = validateState(saved.game);
      clearFightTimers();
      syncRuntimeStateFromGame(saved.game);
      state.screen = state.screen === "end" ? "end" : "game";
      state.fight = normalizeLoadedFight(state.fight);
      state.savedPreview = buildSavePreview(saved);
      if (!state.fight && (state.panel === "fightLive" || state.panel === "fightBreak" || state.panel === "fightResult" || state.panel === "fightSelect")) {
        state.panel = "home";
        state.log.unshift({ text: "Активный бой не был сохранен полностью, поэтому карьера продолжена с главного экрана.", tone: "warn" });
      }
      if (state.activeEvent && state.screen === "game") {
        state.panel = "worldEvent";
      }
      if (state.screen === "game" && !state.panel) {
        state.panel = "home";
      }
      ensureLifeState();
      ensureNpcWorld();
      if (!state.world.offers.available.length) {
        refreshWorldState();
      }
      if (!validation.valid) {
        state.log.unshift({ text: "Сохранение было частично восстановлено через адаптер совместимости.", tone: "warn" });
      }
      syncGameStateFromRuntime();
      render();
    }

    function clamp(value, low, high) {
      return Math.max(low, Math.min(high, value));
    }

    function ensureRngState() {
      if (!state.rng) {
        state.rng = RNG.createNativeState();
      } else if (state.rng.mode === "seeded") {
        state.rng = {
          mode: "seeded",
          seed: RNG.createSeededState(state.rng.seed, state.rng.label).seed,
          value: typeof state.rng.value === "number" ? state.rng.value : RNG.createSeededState(state.rng.seed, state.rng.label).value,
          label: state.rng.label || String(state.rng.seed)
        };
      }
      return state.rng;
    }

    function rand(min, max) {
      return RNG.int(ensureRngState(), min, max);
    }

    function chance(percent) {
      return RNG.chance(ensureRngState(), percent);
    }

    function choice(list) {
      return RNG.choice(ensureRngState(), list);
    }

    function getCountryPool(countryKey) {
      return ContentLoader.getCountryPool(countryKey);
    }

    function flightCost(fromKey, toKey) {
      var from = getCountryInfo(fromKey);
      var to = getCountryInfo(toKey);
      var distance;
      if (!from || !to || fromKey === toKey) {
        return 0;
      }
      distance = Math.abs(from.x - to.x) + Math.abs(from.y - to.y);
      return Math.round((60 + distance * 22) / 5) * 5;
    }

    function currentTravelBonus(fighter) {
      var effects = ContentLoader.getCountryEffects(fighter.currentCountry);
      if (!effects) {
        return { money: 1.0, fame: 1.0 };
      }
      if (fighter.currentCountry === fighter.homeCountry) {
        return {
          money: effects.homeMoneyMultiplier,
          fame: effects.homeFameMultiplier
        };
      }
      return {
        money: 1.0,
        fame: effects.abroadFameMultiplier
      };
    }

    function baseStats() {
      return { str: 1, tec: 1, spd: 1, end: 1, vit: 1 };
    }

    function listCountries() {
      return ContentLoader.listCountries();
    }

    function defaultWorldState() {
      return {
        opponents: [],
        offers: {
          weekStamp: 0,
          available: [],
          headline: ""
        },
        npcs: [],
        relationships: [],
        contracts: [],
        eventState: {
          cooldowns: {},
          onceResolved: [],
          recentEvents: [],
          actionHistory: []
        },
        lastWeekAction: {
          type: "idle",
          label: "",
          meta: null
        },
        scene: {
          updatedWeek: 0,
          buzz: 0,
          temperature: 50
        }
      };
    }

    function ensureLifeState() {
      var worldDefaults;
      var fighter = state.fighter;
      if (!state.world || typeof state.world !== "object") {
        state.world = defaultWorldState();
      }
      worldDefaults = defaultWorldState();
      if (!(state.world.opponents instanceof Array)) {
        state.world.opponents = state.opponents || [];
      }
      if (!state.world.offers || typeof state.world.offers !== "object") {
        state.world.offers = worldDefaults.offers;
      }
      if (!(state.world.offers.available instanceof Array)) {
        state.world.offers.available = [];
      }
      if (typeof state.world.offers.weekStamp !== "number") {
        state.world.offers.weekStamp = 0;
      }
      state.world.offers.headline = state.world.offers.headline || "";
      if (!(state.world.npcs instanceof Array)) {
        state.world.npcs = [];
      }
      if (!(state.world.relationships instanceof Array)) {
        state.world.relationships = [];
      }
      if (!(state.world.contracts instanceof Array)) {
        state.world.contracts = [];
      }
      if (!state.world.eventState || typeof state.world.eventState !== "object") {
        state.world.eventState = clonePlainData(worldDefaults.eventState);
      }
      if (!state.world.eventState.cooldowns || typeof state.world.eventState.cooldowns !== "object") {
        state.world.eventState.cooldowns = {};
      }
      if (!(state.world.eventState.onceResolved instanceof Array)) {
        state.world.eventState.onceResolved = [];
      }
      if (!(state.world.eventState.recentEvents instanceof Array)) {
        state.world.eventState.recentEvents = [];
      }
      if (!(state.world.eventState.actionHistory instanceof Array)) {
        state.world.eventState.actionHistory = [];
      }
      if (!state.world.lastWeekAction || typeof state.world.lastWeekAction !== "object") {
        state.world.lastWeekAction = worldDefaults.lastWeekAction;
      }
      state.world.lastWeekAction.type = state.world.lastWeekAction.type || "idle";
      state.world.lastWeekAction.label = state.world.lastWeekAction.label || "";
      if (!state.world.scene || typeof state.world.scene !== "object") {
        state.world.scene = worldDefaults.scene;
      }
      if (typeof state.world.scene.updatedWeek !== "number") {
        state.world.scene.updatedWeek = 0;
      }
      if (typeof state.world.scene.buzz !== "number") {
        state.world.scene.buzz = 0;
      }
      if (typeof state.world.scene.temperature !== "number") {
        state.world.scene.temperature = 50;
      }
      if (!fighter) {
        return;
      }
      if (!fighter.calendar) {
        fighter.calendar = TimeSystem.createCalendar({
          totalWeeks: Math.max(0, (fighter.week || 1) - 1)
        });
      } else {
        fighter.calendar = TimeSystem.normalizeCalendar(fighter.calendar);
      }
      if (typeof fighter.startingAge !== "number") {
        fighter.startingAge = 22;
      }
      if (typeof fighter.fatigue !== "number") {
        fighter.fatigue = 0;
      }
      if (typeof fighter.wear !== "number") {
        fighter.wear = 0;
      }
      if (typeof fighter.morale !== "number") {
        fighter.morale = 55;
      }
      if (!(fighter.bioFlags instanceof Array)) {
        fighter.bioFlags = [];
      }
      if (!(fighter.bioHistory instanceof Array)) {
        fighter.bioHistory = [];
      }
      fighter.week = TimeSystem.getCalendarView(fighter.calendar).weekNumber;
      state.world.opponents = state.opponents || state.world.opponents;
      if (state.activeEvent != null && typeof state.activeEvent !== "object") {
        state.activeEvent = null;
      }
    }

    function currentCalendarView(fighter) {
      if (!fighter) {
        return {
          weekNumber: 1,
          year: 2026,
          monthIndex: 2,
          monthName: "Март",
          weekOfMonth: 1
        };
      }
      ensureLifeState();
      return TimeSystem.getCalendarView(fighter.calendar);
    }

    function currentAgeView(fighter) {
      if (!fighter) {
        return {
          years: 22,
          months: 0,
          label: "22 г. 0 мес."
        };
      }
      ensureLifeState();
      return TimeSystem.getAgeView(fighter.startingAge, fighter.calendar);
    }

    function applyConditionDelta(fighter, delta) {
      var changes = delta || {};
      if (!fighter) {
        return;
      }
      ensureLifeState();
      fighter.fatigue += changes.fatigue || 0;
      fighter.wear += changes.wear || 0;
      fighter.morale += changes.morale || 0;
      applyBounds(fighter);
    }

    function registerWeeklyAction(type, label, delta, meta) {
      var entry;
      ensureLifeState();
      applyConditionDelta(state.fighter, delta);
      state.world.lastWeekAction = {
        type: type || "idle",
        label: label || "",
        meta: meta ? clonePlainData(meta) : null
      };
      entry = {
        week: state.fighter ? state.fighter.week : 1,
        type: type || "idle",
        label: label || "",
        meta: meta ? clonePlainData(meta) : null
      };
      state.world.eventState.actionHistory.unshift(entry);
      if (state.world.eventState.actionHistory.length > 24) {
        state.world.eventState.actionHistory = state.world.eventState.actionHistory.slice(0, 24);
      }
    }

    function addBiographyHistory(text, tag) {
      if (!state.fighter || !text) {
        return;
      }
      if (!(state.fighter.bioHistory instanceof Array)) {
        state.fighter.bioHistory = [];
      }
      state.fighter.bioHistory.unshift({
        week: state.fighter.week,
        text: text,
        tag: tag || ""
      });
      if (state.fighter.bioHistory.length > 24) {
        state.fighter.bioHistory = state.fighter.bioHistory.slice(0, 24);
      }
    }

    function addBiographyFlags(addList, removeList) {
      var flags = uniqueList(state.fighter && state.fighter.bioFlags ? state.fighter.bioFlags : []);
      var output = [];
      var i;
      var j;
      var blocked;
      if (addList instanceof Array) {
        flags = uniqueList(flags.concat(addList));
      }
      if (removeList instanceof Array && removeList.length) {
        for (i = 0; i < flags.length; i += 1) {
          blocked = false;
          for (j = 0; j < removeList.length; j += 1) {
            if (flags[i] === removeList[j]) {
              blocked = true;
              break;
            }
          }
          if (!blocked) {
            output.push(flags[i]);
          }
        }
        flags = output;
      }
      state.fighter.bioFlags = uniqueList(flags);
    }

    function findChoiceInActiveEvent(choiceId) {
      var choices = state.activeEvent && state.activeEvent.choices ? state.activeEvent.choices : [];
      var i;
      for (i = 0; i < choices.length; i += 1) {
        if (choices[i].id === choiceId) {
          return choices[i];
        }
      }
      return null;
    }

    function buildWeeklyOffers() {
      var fighter = state.fighter;
      var country = getCountryInfo(fighter.currentCountry);
      var city = country ? country.city : "районе";
      var pool = [
        { id: "sparring", type: "gym", title: "Закрытый спарринг", text: "В " + city + " ищут жесткого партнера на закрытую сессию." },
        { id: "promoter", type: "contract", title: "Внимание промоутера", text: "Местный промоутер присматривается к тем, кто держит темп без шума." },
        { id: "contact", type: "relationship", title: "Новый контакт", text: "В зале появился человек, который может открыть дорогу к будущим контрактам." },
        { id: "short_notice", type: "contract", title: "Бой на коротком уведомлении", text: "По району пошел слух о возможном шорт-нотис бое в ближайшие недели." },
        { id: "district", type: "npc", title: "Гудит район", text: "Разговоры о тебе снова расходятся по дворам и залам " + city + "." }
      ];
      var offers = [];
      var used = {};
      var pick;
      while (offers.length < 2 && offers.length < pool.length) {
        pick = choice(pool);
        if (!used[pick.id]) {
          used[pick.id] = true;
          offers.push(clonePlainData(pick));
        }
      }
      return {
        weekStamp: state.fighter.week,
        available: offers,
        headline: offers.length ? offers[0].text : ""
      };
    }

    function npcRoleInfo(roleId) {
      var role = ContentLoader.getNpcRole ? ContentLoader.getNpcRole(roleId) : null;
      var fallback = {
        id: roleId,
        label: "Контакт",
        description: "Человек из твоего круга, который может стать важной частью карьеры.",
        statusPool: ["держится рядом"],
        traitsPool: ["наблюдательный"],
        relationPreset: {
          affinity: 35,
          respect: 35,
          trust: 30,
          tension: 10,
          relationTags: []
        }
      };
      if (!role) {
        return fallback;
      }
      return {
        id: role.id || fallback.id,
        label: role.label || fallback.label,
        description: role.description || fallback.description,
        statusPool: role.statusPool instanceof Array && role.statusPool.length ? role.statusPool : fallback.statusPool,
        traitsPool: role.traitsPool instanceof Array && role.traitsPool.length ? role.traitsPool : fallback.traitsPool,
        relationPreset: role.relationPreset ? clonePlainData(role.relationPreset) : clonePlainData(fallback.relationPreset)
      };
    }

    function uniqueList(list) {
      var out = [];
      var i;
      var j;
      var exists;
      if (!(list instanceof Array)) {
        return out;
      }
      for (i = 0; i < list.length; i += 1) {
        if (typeof list[i] !== "string" || !list[i]) {
          continue;
        }
        exists = false;
        for (j = 0; j < out.length; j += 1) {
          if (out[j] === list[i]) {
            exists = true;
            break;
          }
        }
        if (!exists) {
          out.push(list[i]);
        }
      }
      return out;
    }

    function pickUniqueTraits(pool, count) {
      var source = pool instanceof Array ? pool.slice(0) : [];
      var picked = [];
      var index;
      while (source.length && picked.length < count) {
        index = rand(0, source.length - 1);
        picked.push(source.splice(index, 1)[0]);
      }
      return picked;
    }

    function npcAgeRange(roleId) {
      if (roleId === "trainer" || roleId === "gym_owner" || roleId === "promoter" || roleId === "doctor") {
        return { min: 31, max: 58 };
      }
      if (roleId === "journalist") {
        return { min: 24, max: 45 };
      }
      return { min: 20, max: 34 };
    }

    function relationWeekStamp() {
      return state.fighter ? state.fighter.week : 1;
    }

    function relationSummary(relation) {
      if (!relation) {
        return "незнакомец";
      }
      if (relation.tension >= 75 && relation.affinity <= 20) {
        return "открытый конфликт";
      }
      if (relation.affinity >= 65 && relation.trust >= 60) {
        return "близкий круг";
      }
      if (relation.respect >= 65) {
        return "профессиональное уважение";
      }
      if (relation.affinity >= 50) {
        return "тёплая связь";
      }
      if (relation.tension >= 50) {
        return "напряжённые отношения";
      }
      return "рабочее знакомство";
    }

    function clampRelationValue(value) {
      return clamp(Math.round(value), 0, 100);
    }

    function appendHistoryEntry(list, entry, limit) {
      var target = list instanceof Array ? list : [];
      target.unshift(entry);
      if (target.length > limit) {
        target = target.slice(0, limit);
      }
      return target;
    }

    function findNpcById(npcId) {
      var i;
      ensureLifeState();
      for (i = 0; i < state.world.npcs.length; i += 1) {
        if (state.world.npcs[i].id === npcId) {
          return state.world.npcs[i];
        }
      }
      return null;
    }

    function findRelationship(npcId) {
      var i;
      ensureLifeState();
      for (i = 0; i < state.world.relationships.length; i += 1) {
        if (state.world.relationships[i].npcId === npcId) {
          return state.world.relationships[i];
        }
      }
      return null;
    }

    function syncNpcRelationSnapshot(npcId) {
      var npc = findNpcById(npcId);
      var relation = findRelationship(npcId);
      var tags;
      if (!npc || !relation) {
        return;
      }
      tags = uniqueList((relation.relationTags || []).concat([npc.role]));
      if (relation.affinity >= 70) { tags.push("close"); }
      if (relation.respect >= 70) { tags.push("valued"); }
      if (relation.tension >= 70) { tags.push("hostile"); }
      if (relation.tension >= 45 && relation.respect >= 40) { tags.push("heated"); }
      relation.relationTags = uniqueList(tags);
      npc.relationToPlayer = {
        affinity: clampRelationValue(relation.affinity),
        respect: clampRelationValue(relation.respect),
        trust: clampRelationValue(relation.trust),
        tension: clampRelationValue(relation.tension),
        summary: relationSummary(relation)
      };
      npc.flags = uniqueList((npc.flags || []).concat(relation.relationTags || []));
    }

    function syncAllNpcRelationSnapshots() {
      var i;
      ensureLifeState();
      for (i = 0; i < state.world.npcs.length; i += 1) {
        syncNpcRelationSnapshot(state.world.npcs[i].id);
      }
    }

    function createRelationshipForRole(npcId, roleId) {
      var role = npcRoleInfo(roleId);
      var preset = role.relationPreset || {};
      return {
        npcId: npcId,
        affinity: typeof preset.affinity === "number" ? preset.affinity : 35,
        respect: typeof preset.respect === "number" ? preset.respect : 35,
        trust: typeof preset.trust === "number" ? preset.trust : 30,
        tension: typeof preset.tension === "number" ? preset.tension : 10,
        lastInteractionWeek: relationWeekStamp(),
        historyEntries: [],
        relationTags: uniqueList((preset.relationTags || []).concat([roleId]))
      };
    }

    function ensureRelationshipForNpc(npc) {
      var relation;
      if (!npc) {
        return null;
      }
      relation = findRelationship(npc.id);
      if (relation) {
        return relation;
      }
      relation = createRelationshipForRole(npc.id, npc.role);
      state.world.relationships.push(relation);
      return relation;
    }

    function buildNpcName(countryKey) {
      var identity = makeIdentity(countryKey);
      if (!identity) {
        return "Новый контакт";
      }
      if (identity.firstName && identity.lastName) {
        return identity.firstName + " " + identity.lastName;
      }
      return identity.fullName || "Новый контакт";
    }

    function makeNpc(countryKey, roleId, overrides) {
      var role = npcRoleInfo(roleId);
      var config = overrides || {};
      var ageRange = npcAgeRange(roleId);
      var npc = {
        id: config.id || (roleId + "_" + relationWeekStamp() + "_" + rand(1000, 9999)),
        name: config.name || buildNpcName(countryKey),
        country: config.country || countryKey,
        role: roleId,
        age: typeof config.age === "number" ? config.age : rand(ageRange.min, ageRange.max),
        traits: config.traits ? clonePlainData(config.traits) : pickUniqueTraits(role.traitsPool, 2),
        status: config.status || choice(role.statusPool),
        relationToPlayer: {
          affinity: 0,
          respect: 0,
          trust: 0,
          tension: 0,
          summary: ""
        },
        history: [],
        flags: uniqueList((config.flags || []).concat([roleId, countryKey]))
      };
      var relation = createRelationshipForRole(npc.id, roleId);
      npc.history = appendHistoryEntry(npc.history, {
        week: relationWeekStamp(),
        type: "introduced",
        text: role.label + " входит в твой круг."
      }, 12);
      relation.historyEntries = appendHistoryEntry(relation.historyEntries, {
        week: relationWeekStamp(),
        type: "introduced",
        text: "Первое знакомство."
      }, 16);
      state.world.npcs.push(npc);
      state.world.relationships.push(relation);
      syncNpcRelationSnapshot(npc.id);
      return npc;
    }

    function addMissingNpcRole(roleId, countryKey) {
      var i;
      for (i = 0; i < state.world.npcs.length; i += 1) {
        if (state.world.npcs[i].role === roleId) {
          return state.world.npcs[i];
        }
      }
      return makeNpc(countryKey || state.fighter.homeCountry, roleId);
    }

    function generateCareerNpcWorld() {
      var homeCountry;
      var currentCountry;
      ensureLifeState();
      if (!state.fighter) {
        return;
      }
      homeCountry = state.fighter.homeCountry;
      currentCountry = state.fighter.currentCountry;
      state.world.npcs = [];
      state.world.relationships = [];
      makeNpc(homeCountry, "trainer");
      makeNpc(homeCountry, "friend");
      makeNpc(homeCountry, "rival");
      makeNpc(currentCountry, "promoter");
      makeNpc(homeCountry, "sparring");
      makeNpc(homeCountry, "doctor");
      makeNpc(homeCountry, "gym_owner");
      makeNpc(currentCountry, "journalist");
      syncAllNpcRelationSnapshots();
      pushLog("Вокруг тебя собирается круг людей: тренер, друг, соперник, промоутер и ещё несколько важных контактов.", "warn");
    }

    function ensureNpcWorld() {
      var i;
      var existing;
      ensureLifeState();
      if (!state.fighter) {
        return;
      }
      if (!state.world.npcs.length) {
        generateCareerNpcWorld();
        return;
      }
      for (i = 0; i < state.world.npcs.length; i += 1) {
        existing = state.world.npcs[i];
        if (!(existing.history instanceof Array)) {
          existing.history = [];
        }
        if (!(existing.flags instanceof Array)) {
          existing.flags = [];
        }
        ensureRelationshipForNpc(existing);
      }
      addMissingNpcRole("trainer", state.fighter.homeCountry);
      addMissingNpcRole("friend", state.fighter.homeCountry);
      addMissingNpcRole("rival", state.fighter.homeCountry);
      addMissingNpcRole("promoter", state.fighter.currentCountry);
      syncAllNpcRelationSnapshots();
    }

    function updateNpcWorldForWeek(action) {
      var fighter = state.fighter;
      var currentWeek = relationWeekStamp();
      var i;
      var npc;
      var relation;
      var weeksSince;
      ensureNpcWorld();
      for (i = 0; i < state.world.npcs.length; i += 1) {
        npc = state.world.npcs[i];
        relation = ensureRelationshipForNpc(npc);
        weeksSince = Math.max(0, currentWeek - (relation.lastInteractionWeek || currentWeek));
        if (weeksSince >= 6) {
          relation.affinity -= 1;
          relation.trust -= 1;
          if (npc.role !== "rival") {
            relation.tension -= 1;
          }
        }
        if (action.type === "train" && npc.role === "trainer") {
          relation.respect += 2;
          relation.trust += 1;
        }
        if (action.type === "recover" && (npc.role === "friend" || npc.role === "doctor")) {
          relation.affinity += 1;
          relation.trust += 1;
        }
        if (action.type === "fight" && npc.role === "promoter") {
          relation.respect += action.meta && action.meta.result === "win" ? 3 : 1;
        }
        if (action.type === "fight" && npc.role === "rival" && action.meta && action.meta.result === "win") {
          relation.respect += 1;
          relation.tension += 3;
        }
        if (action.type === "work" && npc.role === "gym_owner") {
          relation.respect += 1;
        }
        relation.affinity = clampRelationValue(relation.affinity);
        relation.respect = clampRelationValue(relation.respect);
        relation.trust = clampRelationValue(relation.trust);
        relation.tension = clampRelationValue(relation.tension);
        if (chance(35)) {
          npc.status = choice(npcRoleInfo(npc.role).statusPool) || npc.status;
        }
        if (chance(20) && npc.role === "rival" && fighter.fame >= 10) {
          relation.tension = clampRelationValue(relation.tension + 1);
        }
        syncNpcRelationSnapshot(npc.id);
      }
    }

    function roleHelpEffect(npc) {
      var fighter = state.fighter;
      var role = npc ? npc.role : "";
      if (role === "trainer") {
        fighter.skillPoints += 4;
        return "Тренер разложил лагерь по полочкам. +4 очка навыков.";
      }
      if (role === "friend") {
        fighter.stress -= 5;
        fighter.morale += 4;
        return "Друг вытянул тебя из тяжёлой головы. Стресс падает.";
      }
      if (role === "rival") {
        fighter.skillPoints += 2;
        fighter.stress += 2;
        return "Соперник дал жёсткий ориентир через спарринг. +2 очка навыков, но нервы на пределе.";
      }
      if (role === "promoter") {
        fighter.fame += 3;
        return "Промоутер бросил пару слов куда надо. +3 известности.";
      }
      if (role === "journalist") {
        fighter.fame += 4;
        fighter.stress += 2;
        return "Журналист подогрел интерес к твоему имени. +4 известности.";
      }
      if (role === "doctor") {
        fighter.health += 8;
        fighter.stress -= 2;
        return "Врач быстро собрал тебя обратно. +8 здоровья.";
      }
      if (role === "gym_owner") {
        fighter.money += 20;
        return "Владелец зала подкинул смену и крышу. +$20.";
      }
      fighter.skillPoints += 3;
      fighter.health -= 2;
      return "Контакт помог через спарринг и советы. +3 очка навыков.";
    }

    function interactWithNpc(npcId, interactionKey) {
      var npc = findNpcById(npcId);
      var relation = findRelationship(npcId);
      var label;
      var delta;
      var relationDelta;
      var roleInfo;
      var helpText = "";
      if (!npc || !relation || !state.fighter) {
        return;
      }
      roleInfo = npcRoleInfo(npc.role);
      label = "Встреча";
      delta = { fatigue: 2, wear: 0, morale: 1 };
      relationDelta = { affinity: 4, respect: 1, trust: 2, tension: -2 };
      if (interactionKey === "talk") {
        label = "Разговор";
        delta = { fatigue: 1, wear: 0, morale: 2 };
        relationDelta = { affinity: 3, respect: 2, trust: 3, tension: -1 };
      } else if (interactionKey === "help") {
        label = "Просьба о помощи";
        delta = { fatigue: 2, wear: 0, morale: 2 };
        relationDelta = { affinity: 1, respect: 3, trust: 5, tension: 0 };
        helpText = roleHelpEffect(npc);
      } else if (interactionKey === "conflict") {
        label = "Обострение";
        delta = { fatigue: 3, wear: 0, morale: -3 };
        relationDelta = { affinity: -8, respect: -2, trust: -7, tension: 12 };
      }
      relation.affinity = clampRelationValue(relation.affinity + relationDelta.affinity);
      relation.respect = clampRelationValue(relation.respect + relationDelta.respect);
      relation.trust = clampRelationValue(relation.trust + relationDelta.trust);
      relation.tension = clampRelationValue(relation.tension + relationDelta.tension);
      relation.lastInteractionWeek = relationWeekStamp();
      relation.historyEntries = appendHistoryEntry(relation.historyEntries, {
        week: relationWeekStamp(),
        type: interactionKey,
        text: label + " с " + npc.name + "."
      }, 16);
      npc.history = appendHistoryEntry(npc.history, {
        week: relationWeekStamp(),
        type: interactionKey,
        text: label + " с игроком."
      }, 12);
      registerWeeklyAction("npc", label + ": " + roleInfo.label, delta, {
        npcId: npc.id,
        role: npc.role,
        interaction: interactionKey
      });
      syncNpcRelationSnapshot(npc.id);
      applyBounds(state.fighter);
      pushLog(label + ": " + npc.name + " (" + roleInfo.label + "). Связь теперь: " + relationSummary(relation) + ".", interactionKey === "conflict" ? "bad" : "good");
      if (helpText) {
        pushLog(helpText, "good");
      }
      spendWeek();
    }

    function refreshWorldState() {
      var fighter = state.fighter;
      ensureLifeState();
      ensureNpcWorld();
      state.world.offers = buildWeeklyOffers();
      state.world.scene.updatedWeek = fighter.week;
      state.world.scene.buzz = clamp(Math.round(fighter.fame + fighter.morale * 0.35 - fighter.stress * 0.2), 0, 100);
      state.world.scene.temperature = clamp(Math.round(35 + fighter.fatigue * 0.35 + fighter.wear * 0.25), 0, 100);
      syncAllNpcRelationSnapshots();
    }

    function resolveEventActor(slot) {
      if (!state.activeEvent || !state.activeEvent.actors || !slot) {
        return null;
      }
      return state.activeEvent.actors[slot] || null;
    }

    function applyRelationEffect(effect) {
      var actor;
      var relation;
      if (!effect || !effect.slot) {
        return;
      }
      actor = resolveEventActor(effect.slot);
      if (!actor || !actor.id) {
        return;
      }
      relation = findRelationship(actor.id);
      if (!relation) {
        return;
      }
      relation.affinity = clampRelationValue(relation.affinity + (effect.affinity || 0));
      relation.respect = clampRelationValue(relation.respect + (effect.respect || 0));
      relation.trust = clampRelationValue(relation.trust + (effect.trust || 0));
      relation.tension = clampRelationValue(relation.tension + (effect.tension || 0));
      relation.lastInteractionWeek = relationWeekStamp();
      relation.historyEntries = appendHistoryEntry(relation.historyEntries, {
        week: relationWeekStamp(),
        type: "event",
        text: state.activeEvent.title
      }, 16);
      syncNpcRelationSnapshot(actor.id);
    }

    function applyEventEffect(effect) {
      var fighter = state.fighter;
      if (!effect || !fighter) {
        return;
      }
      if (effect.type === "resource") {
        if (effect.key === "money" || effect.key === "health" || effect.key === "stress" || effect.key === "fame" || effect.key === "skillPoints") {
          fighter[effect.key] += effect.delta || 0;
        }
      } else if (effect.type === "condition") {
        if (effect.key === "fatigue" || effect.key === "wear" || effect.key === "morale") {
          fighter[effect.key] += effect.delta || 0;
        }
      } else if (effect.type === "relation") {
        applyRelationEffect(effect);
      }
    }

    function recordResolvedEvent(activeEvent, choice) {
      var eventState = state.world.eventState;
      var eventEntry;
      if (!activeEvent || !choice) {
        return;
      }
      eventState.cooldowns[activeEvent.id] = state.fighter.week;
      if (activeEvent.once || activeEvent.repeatable === false) {
        eventState.onceResolved = uniqueList(eventState.onceResolved.concat([activeEvent.id]));
      }
      eventEntry = {
        id: activeEvent.id,
        title: activeEvent.title,
        choiceId: choice.id,
        week: state.fighter.week
      };
      eventState.recentEvents.unshift(eventEntry);
      if (eventState.recentEvents.length > 20) {
        eventState.recentEvents = eventState.recentEvents.slice(0, 20);
      }
      addBiographyHistory(activeEvent.title + ": " + choice.label + ".", "event");
    }

    function resolveActiveEventChoice(choiceId) {
      var activeEvent = state.activeEvent;
      var choice = findChoiceInActiveEvent(choiceId);
      var i;
      if (!activeEvent || !choice) {
        return;
      }
      for (i = 0; i < choice.effects.length; i += 1) {
        applyEventEffect(choice.effects[i]);
      }
      if (choice.tagChanges) {
        addBiographyFlags(choice.tagChanges.add || [], choice.tagChanges.remove || []);
      }
      recordResolvedEvent(activeEvent, choice);
      applyBounds(state.fighter);
      refreshWorldState();
      pushLog(activeEvent.title + ": " + choice.resultText, "warn");
      state.activeEvent = null;
      if (state.screen === "game") {
        state.panel = "home";
      }
      if (evaluateEndState()) {
        return;
      }
      render();
    }

    function weeklyEvent() {
      var gameState;
      var eventDef;
      ensureLifeState();
      if (state.activeEvent || !state.fighter) {
        return;
      }
      if (!chance(ContentLoader.getContextEventTriggerChance())) {
        return;
      }
      gameState = syncGameStateFromRuntime();
      eventDef = EventEngine.pickEvent(gameState, ContentLoader.getContextEvents(), state.rng);
      if (!eventDef) {
        return;
      }
      state.activeEvent = eventDef;
      state.panel = "worldEvent";
    }

    function runWorldTick() {
      var fighter = state.fighter;
      var previousCalendar;
      var nextCalendar;
      var previousAge;
      var nextAge;
      var action;
      ensureLifeState();
      previousCalendar = currentCalendarView(fighter);
      previousAge = currentAgeView(fighter);
      fighter.calendar = TimeSystem.advanceWeek(fighter.calendar);
      nextCalendar = currentCalendarView(fighter);
      nextAge = currentAgeView(fighter);
      fighter.money -= WEEKLY_EXPENSE;
      pushLog("Обязательные расходы недели: -$" + WEEKLY_EXPENSE + ".", "warn");
      if (previousCalendar.monthIndex !== nextCalendar.monthIndex || previousCalendar.year !== nextCalendar.year) {
        pushLog("Начинается " + nextCalendar.monthName + " " + nextCalendar.year + ".", "warn");
      }
      if (previousAge.years !== nextAge.years) {
        pushLog("Новый возраст: " + nextAge.label + ".", "good");
      }
      action = state.world.lastWeekAction || { type: "idle" };
      fighter.fatigue = clamp(fighter.fatigue - 3, 0, 100);
      if (action.type === "recover") {
        fighter.fatigue = clamp(fighter.fatigue - 4, 0, 100);
      }
      if (fighter.stress > 70) {
        fighter.health -= 1;
      }
      if (fighter.stress >= 75) {
        fighter.fatigue += 2;
        fighter.morale -= 2;
      }
      if (fighter.health <= 35) {
        fighter.morale -= 1;
      }
      if (fighter.fatigue >= 75) {
        fighter.health -= 1;
      }
      if (fighter.wear >= 70) {
        fighter.health -= 1;
      }
      if (fighter.morale >= 70 && fighter.stress > 0) {
        fighter.stress -= 1;
      }
      if (fighter.morale <= 30) {
        fighter.stress += 1;
      }
      applyBounds(fighter);
      updateNpcWorldForWeek(action);
      refreshWorldState();
      state.world.lastWeekAction = {
        type: "idle",
        label: "",
        meta: null
      };
      weeklyEvent();
    }

    function applyBounds(fighter) {
      var key;
      for (key in fighter.stats) {
        if (fighter.stats.hasOwnProperty(key)) {
          fighter.stats[key] = clamp(fighter.stats[key], 1, 99);
        }
      }
      fighter.money = Math.max(0, fighter.money);
      fighter.health = clamp(fighter.health, 0, 100);
      fighter.stress = clamp(fighter.stress, 0, 100);
      fighter.fame = Math.max(0, fighter.fame);
      fighter.skillPoints = Math.max(0, fighter.skillPoints || 0);
      fighter.fatigue = clamp(fighter.fatigue || 0, 0, 100);
      fighter.wear = clamp(fighter.wear || 0, 0, 100);
      fighter.morale = clamp(typeof fighter.morale === "number" ? fighter.morale : 55, 0, 100);
      fighter.startingAge = Math.max(16, Math.min(40, typeof fighter.startingAge === "number" ? fighter.startingAge : 22));
    }

    function recordText(fighter) {
      return fighter.wins + "-" + fighter.losses + " (КО: " + fighter.kos + ")";
    }

    function combatRating(fighter) {
      var stats = fighter.stats;
      var base = (stats.str + stats.tec + stats.spd + stats.end + stats.vit) / 5;
      return base + fighter.wins * 0.35 + fighter.fame * 0.04;
    }

    var RING_SIZE = 5;
    var ACTION_DELAY_MS = 500;
    var COUNT_STEP_MS = 500;
    var KO_TEXT_MS = 1000;
    var ACTION_ANIMATION_MS = 320;
    var COUNT_SHAKE_MS = 260;
    var CRIT_FLASH_MS = 500;

    function buildFightState(stats, condition, position) {
      var maxHp = 100 + stats.vit * 10;
      var maxStamina = 100 + stats.end * 5;
      var hp = Math.round(maxHp * clamp(condition, 0, 100) / 100);
      return {
        hp: clamp(hp, 1, maxHp),
        maxHp: maxHp,
        stamina: maxStamina,
        maxStamina: maxStamina,
        knockdowns: 0,
        damageTaken: 0,
        position: { x: position.x, y: position.y },
        defenseMode: null,
        lastAttackKey: null,
        attackChain: 0,
        actedAttack: false
      };
    }

    function startRingPosition(side) {
      return side === "player" ? { x: 0, y: 2 } : { x: 4, y: 2 };
    }

    function insideRing(x, y) {
      return x >= 0 && x < RING_SIZE && y >= 0 && y < RING_SIZE;
    }

    function resetRingPositions(fight) {
      fight.playerState.position = startRingPosition("player");
      fight.opponentState.position = startRingPosition("opponent");
    }

    function resetCreate() {
      clearFightTimers();
      state.screen = "create";
      state.panel = "home";
      state.create = {
        country: null,
        identity: null
      };
      state.fighter = null;
      state.opponents = [];
      state.world = defaultWorldState();
      state.fight = null;
      state.endingReason = "";
      state.log = [
        { text: "Новый забег начинается. Собери бойца и выбери, каким именем район будет его помнить.", tone: "warn" }
      ];
    }

    function startCareer() {
      var startingAge;
      var stats = baseStats();
      if (!state.create.country || !state.create.identity) {
        return;
      }
      startingAge = rand(18, 32);
      state.fighter = {
        name: state.create.identity.fullName,
        stats: stats,
        skillPoints: 0,
        money: 120,
        week: 1,
        calendar: TimeSystem.createCalendar(),
        startingAge: startingAge,
        health: 100,
        stress: 12,
        fatigue: 8,
        wear: 0,
        morale: 56,
        fame: 0,
        wins: 0,
        losses: 0,
        kos: 0,
        deathsCaused: 0,
        homeCountry: state.create.country,
        currentCountry: state.create.country
      };
      state.world = defaultWorldState();
      applyBounds(state.fighter);
      generateCareerNpcWorld();
      refreshWorldState();
      state.screen = "game";
      state.panel = "home";
      state.log.unshift({
        text: state.fighter.name + " стартует в " + getCountryInfo(state.fighter.homeCountry).name + ".",
        tone: "good"
      });
      render();
    }

    function setCreateCountry(key) {
      state.create.country = key;
      state.create.identity = makeIdentity(key);
      render();
    }

    function rerollName() {
      if (!state.create.country) {
        return;
      }
      state.create.identity = makeIdentity(state.create.country);
      render();
    }

    function pushLog(text, tone) {
      state.log.unshift({ text: text, tone: tone || "" });
      if (state.log.length > 32) {
        state.log = state.log.slice(0, 32);
      }
    }

    function meter(label, value, maxValue) {
      var limit = typeof maxValue === "number" ? maxValue : 100;
      var width = limit > 0 ? Math.round((value / limit) * 100) : 0;
      return "" +
        "<div class='meter-block'>" +
          "<div class='meter-row'><span>" + label + "</span><strong>" + value + "/" + limit + "</strong></div>" +
          "<div class='meter'><span style='width:" + clamp(width, 0, 100) + "%'></span></div>" +
        "</div>";
    }

    function statPointCost(value) {
      return Math.floor(value / 10) + 1;
    }

    function buyStatPoint(statKey) {
      var fighter = state.fighter;
      var cost = statPointCost(fighter.stats[statKey]);
      if (fighter.skillPoints < cost) {
        pushLog("На улучшение '" + DATA.statLabels[statKey] + "' не хватает очков.", "bad");
        render();
        return;
      }
      fighter.skillPoints -= cost;
      fighter.stats[statKey] += 1;
      applyBounds(fighter);
      pushLog(DATA.statLabels[statKey] + " выросла до " + fighter.stats[statKey] + ".", "good");
      render();
    }

    function openPanel(panel) {
      if (state.activeEvent && panel !== "worldEvent") {
        state.panel = "worldEvent";
        render();
        return;
      }
      state.panel = panel;
      render();
    }

    function spendWeek() {
      if (evaluateEndState()) {
        return;
      }
      advanceWeek();
      if (evaluateEndState()) {
        return;
      }
      state.panel = state.activeEvent ? "worldEvent" : "home";
      render();
    }

    function advanceWeek() {
      runWorldTick();
    }

    function evaluateEndState() {
      var fighter = state.fighter;
      if (!fighter) {
        return false;
      }
      if (fighter.health <= 0) {
        state.screen = "end";
        state.endingReason = "body";
        render();
        return true;
      }
      if (fighter.stress >= 100) {
        state.screen = "end";
        state.endingReason = "stress";
        render();
        return true;
      }
      return false;
    }

    function retireCareer() {
      state.screen = "end";
      state.endingReason = "retired";
      render();
    }

    function legacyRank(fighter) {
      var score = fighter.wins * 8 + fighter.fame - fighter.losses * 3;
      if (fighter.deathsCaused) {
        score += 10;
      }
      if (score >= 160) {
        return "Легенда подполья";
      }
      if (score >= 110) {
        return "Король района";
      }
      if (score >= 70) {
        return "Громкое имя";
      }
      if (score >= 40) {
        return "Известный боец";
      }
      return "Новичок улиц";
    }

    function travelToCountry(countryKey) {
      var fighter = state.fighter;
      var destination = getCountryInfo(countryKey);
      var cost = flightCost(fighter.currentCountry, countryKey);
      if (!destination || fighter.currentCountry === countryKey) {
        return;
      }
      if (fighter.money < cost) {
        pushLog("На перелет в " + destination.name + " сейчас не хватает денег.", "bad");
        render();
        return;
      }
      fighter.money -= cost;
      fighter.currentCountry = countryKey;
      fighter.stress += 4;
      registerWeeklyAction("travel", "Перелет в " + destination.name, {
        fatigue: 8,
        wear: 0,
        morale: 1
      }, {
        country: countryKey
      });
      applyBounds(fighter);
      pushLog("Перелет в " + destination.name + " обошелся в $" + cost + ". Новая арена: " + destination.city + ".", "warn");
      spendWeek();
    }

    function actionTrain(kind) {
      var fighter = state.fighter;
      var option = TRAINING_OPTIONS[kind];
      var trainDelta;
      if (!option) {
        return;
      }
      trainDelta = {
        light: { fatigue: 8, wear: 1, morale: 2 },
        medium: { fatigue: 14, wear: 2, morale: 1 },
        hard: { fatigue: 20, wear: 3, morale: -2 }
      }[kind] || { fatigue: 10, wear: 1, morale: 0 };
      fighter.skillPoints += option.points;
      fighter.health += option.health;
      fighter.stress += option.stress;
      registerWeeklyAction("train", option.label, trainDelta, { kind: kind });
      applyBounds(fighter);
      pushLog(fighter.name + " проводит " + option.label.toLowerCase() + " тренировку и получает +" + option.points + " очков навыков.", "good");
      spendWeek();
    }

    function actionRecover(kind) {
      var fighter = state.fighter;
      var option = RECOVERY_OPTIONS[kind];
      var recoveryDelta;
      if (!option) {
        return;
      }
      recoveryDelta = {
        home: { fatigue: -12, wear: 0, morale: 3 },
        doctor: { fatigue: -18, wear: -1, morale: 2 },
        therapy: { fatigue: -15, wear: -1, morale: 6 }
      }[kind] || { fatigue: -10, wear: 0, morale: 2 };
      if (fighter.money < option.cost) {
        pushLog("На вариант восстановления '" + option.label + "' сейчас не хватает денег.", "bad");
        render();
        return;
      }
      fighter.money -= option.cost;
      fighter.health += option.health;
      fighter.stress += option.stress;
      registerWeeklyAction("recover", option.label, recoveryDelta, { kind: kind });
      applyBounds(fighter);
      pushLog(option.label + " возвращает " + option.health + " здоровья и меняет стресс на " + option.stress + ".", "good");
      spendWeek();
    }

    function actionWork() {
      var fighter = state.fighter;
      fighter.money += LEGAL_JOB.money;
      fighter.health += LEGAL_JOB.health;
      fighter.stress += LEGAL_JOB.stress;
      registerWeeklyAction("work", LEGAL_JOB.label, {
        fatigue: 16,
        wear: 1,
        morale: -4
      }, null);
      pushLog(LEGAL_JOB.label + " приносит $" + LEGAL_JOB.money + ", здоровье " + LEGAL_JOB.health + " и стресс +" + LEGAL_JOB.stress + ".", "warn");
      applyBounds(fighter);
      spendWeek();
    }

    function getCountryInfo(countryKey) {
      return ContentLoader.getCountry(countryKey);
    }

    function makeIdentity(countryKey) {
      var identity;
      var country = getCountryInfo(countryKey);
      var override = country && country.identityOverride;
      if (override) {
        identity = {
          firstName: choice(override.first),
          lastName: choice(override.last),
          nickname: choice(override.nick)
        };
        identity.fullName = identity.firstName + ' "' + identity.nickname + '" ' + identity.lastName;
        return identity;
      }
      return window.makeIdentityBase ? window.makeIdentityBase(countryKey) : (function () {
        var pool = getCountryPool(countryKey);
        var seed = ContentLoader.getCountrySeedConfig(countryKey);
        var surnameParts;
        var firstName;
        var lastName;
        var nickname;
        if (!pool) {
          return null;
        }
        if (seed && seed.firstJoin === "join") {
          firstName = choice(pool.firstNames);
        } else {
          firstName = choice(seed.firstLeft.concat(seed.firstRight));
        }
        surnameParts = seed && seed.lastJoin === "join" ? pool.lastNames.slice(0) : seed.lastLeft.concat(seed.lastRight);
        lastName = choice(surnameParts);
        if (chance(5) && surnameParts.length > 1) {
          var secondSurname = choice(surnameParts);
          var separator = (countryKey === "mexico" || countryKey === "cuba" || countryKey === "philippines") ? " " : "-";
          while (secondSurname === lastName) {
            secondSurname = choice(surnameParts);
          }
          lastName = lastName + separator + secondSurname;
        }
        nickname = choice(pool.nicknames);
        return {
          firstName: firstName,
          lastName: lastName,
          nickname: nickname,
          fullName: firstName + ' "' + nickname + '" ' + lastName
        };
      }());
    }

    function generateOpponent(tier) {
      var fighter = state.fighter;
      var country = getCountryInfo(fighter.currentCountry);
      var arena = ContentLoader.getRandomArena(fighter.currentCountry);
      var identity = makeIdentity(fighter.currentCountry);
      var bonus = currentTravelBonus(fighter);
      var tierData = ContentLoader.getOpponentTier(tier);
      var tierBonus = tierData.tierBonus;
      var base = clamp(Math.round(combatRating(fighter)) + tierBonus + rand(-1, 1), 1, 40);
      var stats = {
        str: clamp(base + rand(-1, 2), 1, 45),
        tec: clamp(base + rand(-1, 2), 1, 45),
        spd: clamp(base + rand(-1, 2), 1, 45),
        end: clamp(base + rand(-1, 2), 1, 45),
        vit: clamp(base + rand(-1, 2), 1, 45)
      };
      return {
        firstName: identity.firstName,
        lastName: identity.lastName,
        nickname: identity.nickname,
        fullName: identity.fullName,
        countryKey: fighter.currentCountry,
        profile: choice(ContentLoader.getOpponentTypeLabels()),
        stats: stats,
        purse: Math.round((tierData.purseBase + base * 8 + rand(0, 24)) * bonus.money),
        fameReward: Math.round((tierData.fameBase + Math.max(0, base - 5) * 2 + rand(0, 4)) * bonus.fame),
        condition: rand(72, 100),
        rounds: choice(tierData.rounds),
        danger: tierData.danger,
        venue: arena ? arena.name : (country ? country.venueName : "")
      };
    }

    function fullOpponentName(opponent) {
      return opponent.fullName || (opponent.firstName + ' "' + opponent.nickname + '" ' + opponent.lastName);
    }

    function openFightSelect() {
      state.opponents = [generateOpponent("safe"), generateOpponent("even"), generateOpponent("danger")];
      ensureLifeState();
      state.world.opponents = state.opponents;
      state.panel = "fightSelect";
      render();
    }

    function fightStateBySide(fight, side) {
      return side === "player" ? fight.playerState : fight.opponentState;
    }

    function fightStatsBySide(fight, side) {
      return side === "player" ? state.fighter.stats : fight.opponent.stats;
    }

    function fightNameBySide(fight, side) {
      return side === "player" ? state.fighter.name : fullOpponentName(fight.opponent);
    }

    function otherSide(side) {
      return side === "player" ? "opponent" : "player";
    }

    function pushFightLine(fight, text) {
      fight.lines.unshift(text);
      if (fight.lines.length > 48) {
        fight.lines = fight.lines.slice(0, 48);
      }
    }

    function awardFightPressure(fight, side, amount) {
      fight.roundPoints[side] += amount;
    }

    function moveActor(fight, side, actionKey) {
      var actor = fightStateBySide(fight, side);
      var action = FIGHT_ACTIONS[actionKey];
      var fromX = actor.position.x + 1;
      var fromY = actor.position.y + 1;
      actor.stamina = clamp(actor.stamina - action.stamina, 0, actor.maxStamina);
      actor.position = {
        x: actor.position.x + action.dx,
        y: actor.position.y + action.dy
      };
      actor.actedAttack = false;
      actor.defenseMode = null;
      resetActionChain(actor);
