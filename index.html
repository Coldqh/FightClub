    function resolveKnockdown(fight, victimSide) {
      var victim = fightStateBySide(fight, victimSide);
      var attackerSide = otherSide(victimSide);
      var victimStats = fightStatsBySide(fight, victimSide);
      var victimName = fightNameBySide(fight, victimSide);
      var riseChance = clamp(46 + victimStats.heart * 5 + victimStats.endurance * 2 - victim.knockdowns * 15, 8, 90);
      awardFightPressure(fight, attackerSide, 12);
      if (victim.knockdowns < 2 && chance(riseChance)) {
        victim.knockdowns += 1;
        victim.hp = 12 + victimStats.heart * 2;
        victim.stamina = clamp(victim.stamina - 12, 0, 100);
        resetRingPositions(fight);
        pushFightLine(fight, victimName + " падает, встает на счет и бой возвращается в центр ринга.");
        return false;
      }
      pushFightLine(fight, victimName + " больше не поднимается после отсчета.");
      finalizeFight(victimSide === "player" ? "loss" : "win", "KO/TKO", [], "");
      return true;
    }

    function strikeActor(fight, side, actionKey) {
      var attacker = fightStateBySide(fight, side);
      var defender = fightStateBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);
      var defenderStats = fightStatsBySide(fight, otherSide(side));
      var attackerName = fightNameBySide(fight, side);
      var defenderName = fightNameBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var zone = attackZone(attacker.position, defender.position);
      var hitChance;
      var damage;
      var critical;
      var bodyDrain;
      attacker.stamina = clamp(attacker.stamina - (action.stamina + (zone === "line" ? 1 : 0)), 0, 100);
      if (!canUseFightAction(fight, side, actionKey)) {
        pushFightLine(fight, attackerName + " выбрасывает " + action.label.toLowerCase() + ", но дистанция не позволяет попасть.");
        setFightAnimation(side, "miss");
        return false;
      }
      hitChance = action.accuracy + attackerStats.speed * 2 + attackerStats.technique * 2 + attackerStats.power * 0.4;
      hitChance -= defenderStats.speed * 1.5 + defenderStats.technique * 1.2 + defenderStats.heart * 0.35;
      hitChance -= Math.max(0, 40 - attacker.stamina) / 2;
      if (zone === "line") {
        hitChance -= 8;
      }
      hitChance = clamp(Math.round(hitChance), 24, 90);
      if (!chance(hitChance)) {
        pushFightLine(fight, attackerName + " не доносит " + action.label.toLowerCase() + ", и " + defenderName + " уходит с линии атаки.");
        setFightAnimation(side, "miss");
        return false;
      }
      damage = action.damage + attackerStats.power * 1.1 + attackerStats.technique * 0.5 + attackerStats.speed * 0.2;
      damage -= defenderStats.endurance * 0.75 + defenderStats.heart * 0.25;
      if (zone === "line") {
        damage -= 2;
      }
      if (actionKey === "uppercut") {
        damage += 2;
      } else if (actionKey === "hook") {
        damage += 1;
      } else if (actionKey === "jab") {
        damage -= 1;
      }
      damage = Math.max(4, Math.round(damage + rand(-2, 2)));
      critical = chance(clamp(8 + attackerStats.technique * 2 + (actionKey === "uppercut" ? 8 : 0) + (actionKey === "cross" ? 4 : 0), 8, 38));
      if (critical) {
        damage += rand(3, 6);
      }
      defender.hp -= damage;
      defender.damageTaken += damage;
      awardFightPressure(fight, side, damage + (critical ? 4 : 2));
      if (action.body) {
        bodyDrain = rand(6, 10) + Math.max(0, attackerStats.power - 5);
        defender.stamina = clamp(defender.stamina - bodyDrain, 0, 100);
        defender.bodyDamage += damage;
      }
      if (critical) {
        pushFightLine(fight, attackerName + " ловит момент и тяжело попадает: " + action.label + " проходит на " + damage + " урона.");
      } else {
        pushFightLine(fight, attackerName + " попадает ударом '" + action.label + "' и снимает " + damage + " прочности.");
      }
      if (action.body) {
        pushFightLine(fight, defenderName + " теряет темп после работы по корпусу.");
      }
      setFightAnimation(side, "hit");
      if (defender.hp <= 0) {
        return resolveKnockdown(fight, otherSide(side));
      }
      return false;
    }

    function pickAIMove(fight, retreat) {
      var keys = ["move_up", "move_left", "move_right", "move_down"];
      var actor = fight.opponentState;
      var target = fight.playerState;
      var best = [];
      var bestScore = retreat ? -999 : 999;
      var i;
      var action;
      var nextPos;
      var zone;
      var score;
      for (i = 0; i < keys.length; i += 1) {
        if (!canUseFightAction(fight, "opponent", keys[i])) {
          continue;
        }
        action = FIGHT_ACTIONS[keys[i]];
        nextPos = { x: actor.position.x + action.dx, y: actor.position.y + action.dy };
        zone = attackZone(nextPos, target.position);
        score = (zone === "close" ? 1 : (zone === "line" ? 2 : 3)) * 10 + rand(0, 3);
        if (retreat) {
          if (score > bestScore) {
            bestScore = score;
            best = [keys[i]];
          } else if (score === bestScore) {
            best.push(keys[i]);
          }
        } else if (score < bestScore) {
          bestScore = score;
          best = [keys[i]];
        } else if (score === bestScore) {
          best.push(keys[i]);
        }
      }
      return best.length ? choice(best) : null;
    }

    function pickAiAction(fight) {
      var ai = fight.opponentState;
      var player = fight.playerState;
      var zone = attackZone(ai.position, player.position);
      var attacks = availableFightActions(fight, "opponent", "attack");
      var retreat = ai.hp < ai.maxHp * 0.25 || ai.stamina < 16;
      if (attacks.length) {
        if (zone === "close") {
          if (player.hp < player.maxHp * 0.32 && canUseFightAction(fight, "opponent", "uppercut")) {
            return "uppercut";
          }
          if (canUseFightAction(fight, "opponent", "hook") && chance(60)) {
            return "hook";
          }
          if (canUseFightAction(fight, "opponent", "body") && chance(35)) {
            return "body";
          }
        } else if (zone === "line") {
          if (canUseFightAction(fight, "opponent", "cross") && chance(55)) {
            return "cross";
          }
          if (canUseFightAction(fight, "opponent", "jab") && chance(70)) {
            return "jab";
          }
        }
        return choice(attacks);
      }
      return pickAIMove(fight, retreat || zone === "close");
    }

    function applyFightAnimationResult() {
      clearFightAnimation();
      render();
    }

    function finalizeFightTurn() {
      var fight = state.fight;
      if (!fight || fight.result) {
        return;
      }
      if (fight.playerActionsLeft <= 0 && fight.aiActionsLeft <= 0) {
        completeFightSegment();
        if (fight.result) {
          return;
        }
      }
      fight.actionLock = false;
      render();
    }

    function runAiAfterPlayer() {
      var fight = state.fight;
      var aiActionKey;
      if (!fight || fight.result) {
        return;
      }
      if (fight.aiActionsLeft > 0) {
        aiActionKey = pickAiAction(fight);
        if (aiActionKey) {
          if (FIGHT_ACTIONS[aiActionKey].type === "move") {
            moveActor(fight, "opponent", aiActionKey);
            fight.aiActionsLeft -= 1;
            finalizeFightTurn();
            return;
          }
          if (strikeActor(fight, "opponent", aiActionKey)) {
            fight.aiActionsLeft -= 1;
            render();
            setTimeout(function () {
              applyFightAnimationResult();
            }, 1000);
            return;
          }
          fight.aiActionsLeft -= 1;
          render();
          setTimeout(function () {
            applyFightAnimationResult();
            finalizeFightTurn();
          }, 1000);
          return;
        }
        fight.aiActionsLeft = 0;
        pushFightLine(fight, fullOpponentName(fight.opponent) + " теряет темп и не находит чистого действия.");
      }
      finalizeFightTurn();
    }

    function fightAction(actionKey) {
      var fight = state.fight;
      var action = FIGHT_ACTIONS[actionKey];
      if (!fight || fight.result || !action || fight.playerActionsLeft <= 0 || fight.actionLock) {
        return;
      }
      if (!canUseFightAction(fight, "player", actionKey)) {
        pushFightLine(fight, "Это действие сейчас недоступно по позиции на ринге.");
        render();
        return;
      }
      fight.actionLock = true;
      if (action.type === "move") {
        moveActor(fight, "player", actionKey);
        fight.playerActionsLeft -= 1;
        fight.actionLock = false;
        finalizeFightTurn();
        return;
      }
      if (strikeActor(fight, "player", actionKey)) {
        fight.playerActionsLeft -= 1;
        render();
        setTimeout(function () {
          applyFightAnimationResult();
        }, 1000);
        return;
      }
      fight.playerActionsLeft -= 1;
      render();
      setTimeout(function () {
        applyFightAnimationResult();
        if (fight.result) {
          return;
        }
        runAiAfterPlayer();
      }, 1000);
    }

    function renderFightStatsPanel(fight) {
      return "<div class='battle-panel'><strong>Статистика</strong><div class='battle-chip-line'><div class='chip'>Твои нокдауны " + fight.playerState.knockdowns + "</div><div class='chip'>Твоя позиция " + (fight.playerState.position.x + 1) + ":" + (fight.playerState.position.y + 1) + "</div><div class='chip'>Его нокдауны " + fight.opponentState.knockdowns + "</div><div class='chip'>Его позиция " + (fight.opponentState.position.x + 1) + ":" + (fight.opponentState.position.y + 1) + "</div></div></div>";
    }

    function renderFightLivePanel() {
      var fight = state.fight;
      var html = [];
      var x;
      var y;
      var i;
      var playerCell;
      var opponentCell;
      var activeTab = fight.uiTab || "controls";
      html.push("<div class='battle-shell'>");
      html.push("<div class='battle-topbar'>");
      html.push("<div class='battle-health-card'>");
      html.push("<div class='chip gold'>Ты</div>");
      html.push("<div class='battle-stats-line'>" + meter("Прочность", Math.round(fight.playerState.hp / fight.playerState.maxHp * 100)) + "</div>");
      html.push("<div class='battle-stats-line'>" + meter("Стамина", Math.round(fight.playerState.stamina)) + "</div>");
      html.push("</div>");
      html.push("<div class='battle-health-card right'>");
      html.push("<div class='chip red'>" + fullOpponentName(fight.opponent) + "</div>");
      html.push("<div class='battle-stats-line'>" + meter("Прочность", Math.round(fight.opponentState.hp / fight.opponentState.maxHp * 100)) + "</div>");
      html.push("<div class='battle-stats-line'>" + meter("Стамина", Math.round(fight.opponentState.stamina)) + "</div>");
      html.push("</div>");
      html.push("</div>");
      html.push("<div class='battle-stage'>");
      html.push("<div class='eyebrow'>Раунд " + fight.round + " / " + fight.opponent.rounds + " • Отрезок " + fight.segment + " / 10</div>");
      html.push("<div class='title' style='font-size:22px'>Ринг 5x5</div>");
      html.push("<div class='subtitle'>У тебя " + fight.playerActionsLeft + " действия, у соперника " + fight.aiActionsLeft + ".</div>");
      html.push("<div class='ring-board'>");
      for (y = 0; y < RING_SIZE; y += 1) {
        html.push("<div class='ring-row'>");
        for (x = 0; x < RING_SIZE; x += 1) {
          playerCell = fight.playerState.position.x === x && fight.playerState.position.y === y;
          opponentCell = fight.opponentState.position.x === x && fight.opponentState.position.y === y;
          html.push("<div class='ring-cell' data-cell='" + (x + 1) + ":" + (y + 1) + "'>" + (playerCell ? "<div class='" + tokenClassFor("player") + "'>Ты</div>" : (opponentCell ? "<div class='" + tokenClassFor("opponent") + "'>Он</div>" : "")) + "</div>");
        }
        html.push("</div>");
      }
      html.push("</div>");
      html.push("</div>");
      html.push("<div class='battle-bottom'>");
      html.push("<div class='battle-tabs'>");
      html.push("<button class='" + (activeTab === "controls" ? "button" : "ghost") + "' onclick='openFightTab(\"controls\")'>Управление</button>");
      html.push("<button class='" + (activeTab === "stats" ? "button" : "ghost") + "' onclick='openFightTab(\"stats\")'>Статистика</button>");
      html.push("<button class='" + (activeTab === "log" ? "button" : "ghost") + "' onclick='openFightTab(\"log\")'>Лента</button>");
      html.push("</div>");
      if (activeTab === "stats") {
        html.push(renderFightStatsPanel(fight));
        if (fight.roundCards.length) {
          html.push("<div class='battle-panel'><strong>Карточки</strong>");
          for (i = 0; i < Math.min(5, fight.roundCards.length); i += 1) {
            html.push("<div class='log-entry'>" + fight.roundCards[i] + "</div>");
          }
          html.push("</div>");
        }
      } else if (activeTab === "log") {
        html.push(renderFightLogPanel(fight));
      } else {
        html.push(renderFightControlsPanel(fight));
      }
      html.push("</div></div>");
      return html.join("");
    }

    function renderFightResultPanel() {
      var fight = state.fight;
      var resultLabel = fight.result === "win" ? "Победа" : (fight.result === "loss" ? "Поражение" : "Ничья");
      var html = [];
      var i;
      html.push("<div class='battle-shell'><div class='battle-result'>");
      html.push("<div class='result-banner'><div class='eyebrow'>Итог боя</div><div class='title' style='font-size:24px'>" + resultLabel + " через " + fight.method + "</div>");
      html.push("<div class='subtitle'>Раундов прошло: " + fight.roundsCompleted + ".</div></div>");
      html.push("<div class='battle-bottom' style='margin-top:12px'>");
      html.push("<div class='battle-column'><div class='battle-panel'><strong>Ты в бою</strong>" + meter("Прочность", Math.round(fight.playerState.hp / fight.playerState.maxHp * 100)) + meter("Стамина", Math.round(fight.playerState.stamina)) + "<div class='battle-chip-line'><div class='chip'>Нокдауны " + fight.playerState.knockdowns + "</div></div></div></div>");
      html.push("<div class='battle-column right'><div class='battle-panel'><strong>Соперник</strong>" + meter("Прочность", Math.round(fight.opponentState.hp / fight.opponentState.maxHp * 100)) + meter("Стамина", Math.round(fight.opponentState.stamina)) + "<div class='battle-chip-line'><div class='chip'>Нокдауны " + fight.opponentState.knockdowns + "</div></div></div></div>");
      html.push("</div>");
      if (fight.roundCards.length) {
        html.push("<div class='battle-panel' style='margin-top:12px'><strong>Карточки судей</strong>");
        for (i = 0; i < Math.min(8, fight.roundCards.length); i += 1) {
          html.push("<div class='log-entry'>" + fight.roundCards[i] + "</div>");
        }
        html.push("</div>");
      }
      html.push("<div class='battle-panel' style='margin-top:12px'><strong>Последние события</strong><div class='battle-log'>");
      for (i = 0; i < Math.min(10, fight.lines.length); i += 1) {
        html.push("<div class='log-entry'>" + fight.lines[i] + "</div>");
      }
      html.push("</div></div>");
      html.push("<div class='footer-actions'><button class='button' onclick='closeFightResult()'>Вернуться в карьеру</button></div>");
      html.push("</div></div>");
      return html.join("");
    }

    function applyFightResults() {
      var fight = state.fight;
      var fighter = state.fighter;
      var opponent = fight.opponent;
      var injury = Math.floor(fight.playerState.damageTaken * 0.22 + fight.playerState.knockdowns * 8 + fight.playerState.bodyDamage * 0.25);
      var fameGain;
      fighter.health -= injury;
      fighter.stress += 6 + Math.floor(fight.playerState.bodyDamage / 6);
      if (fight.result === "win") {
        fighter.wins += 1;
        fighter.money += opponent.purse;
        fighter.fame += opponent.fameReward;
        fighter.morale += 10;
        if (fight.method.indexOf("KO") !== -1) {
          fighter.kos += 1;
        }
        pushLog("Победа. Ты забираешь $" + opponent.purse + " и +" + opponent.fameReward + " к известности.", "good");
      } else if (fight.result === "loss") {
        fameGain = Math.max(2, Math.floor(opponent.fameReward / 3));
        fighter.losses += 1;
        fighter.money += Math.floor(opponent.purse * 0.35);
        fighter.fame += fameGain;
        fighter.morale -= 12;
        fighter.stress += 6;
        pushLog("Поражение. Даже оно приносит часть денег и оставляет шум вокруг имени.", "bad");
      } else {
        fameGain = Math.max(4, Math.floor(opponent.fameReward / 2));
        fighter.money += Math.floor(opponent.purse * 0.55);
        fighter.fame += fameGain;
        fighter.morale += 1;
        pushLog("Ничья. Ты выжил в рубке и ушел с деньгами и известностью.", "warn");
      }
      applyBounds(fighter);
    }

    function renderMainPanel() {
      if (state.panel === "character") { return renderCharacterPanel(); }
      if (state.panel === "careerLog") { return renderCareerLogPage(); }
      if (state.panel === "train") { return renderTrainPanel(); }
      if (state.panel === "skills") { return renderSkillPanel(); }
      if (state.panel === "recover") { return renderRecoverPanel(); }
      if (state.panel === "work") { return renderWorkPanel(); }
      if (state.panel === "life") { return renderLifePanel(); }
      if (state.panel === "travel") { return renderTravelPanel(); }
      if (state.panel === "fightSelect") { return renderFightSelectPanel(); }
      if (state.panel === "fightLive") { return renderFightLivePanel(); }
      if (state.panel === "fightResult") { return renderFightResultPanel(); }
      if (state.panel === "retire") { return renderRetirePanel(); }
      return renderHomePanel();
    }

    function renderLogPanel() {
      var html = [];
      var i;
      html.push("<div class='log-panel'><h2 class='panel-title'>Лента карьеры</h2><div class='log-list'>");
      for (i = 0; i < state.log.length; i += 1) {
        html.push("<div class='log-entry " + state.log[i].tone + "'>" + state.log[i].text + "</div>");
      }
      html.push("</div></div>");
      return html.join("");
    }

    function renderLogPanelInner() {
      var html = [];
      var i;
      html.push("<h2 class='panel-title'>Лента карьеры</h2><div class='log-list'>");
      for (i = 0; i < state.log.length; i += 1) {
        html.push("<div class='log-entry " + state.log[i].tone + "'>" + state.log[i].text + "</div>");
      }
      html.push("</div>");
      return html.join("");
    }

    function renderGame() {
      if (state.panel === "fightLive" || state.panel === "fightResult") {
        return renderMainPanel();
      }
      return "" +
        "<div class='shell'>" +
          "<div class='topbar'>" +
            "<div class='week-chip'>Неделя " + state.fighter.week + "</div>" +
          "</div>" +
          renderNavigationTabs() +
          "<div class='panel'>" + renderMainPanel() + "</div>" +
        "</div>";
    }

    function renderEnding() {
      var fighter = state.fighter;
      var reasonText = "";
      if (state.endingReason === "death") {
        reasonText = "История закончилась слишком рано и слишком жестко. Повреждения оказались критическими.";
      } else if (state.endingReason === "body") {
        reasonText = "Организм оказался пределом, который нельзя продавить бесконечно.";
      } else if (state.endingReason === "stress") {
        reasonText = "Психика не выдержала постоянного давления. Игра закончилась нервным срывом.";
      } else {
        reasonText = "Ты вовремя вышел из игры и сохранил, что успел построить.";
      }
      return "" +
        "<div class='shell'>" +
          "<div class='hero'>" +
            "<div class='eyebrow'>Финал забега</div>" +
            "<div class='title'>" + fighter.name + "</div>" +
            "<div class='subtitle'>" + legacyRank(fighter) + ". " + reasonText + "</div>" +
            "<div class='record-row'>" +
              "<div class='chip gold'>Рекорд " + recordText(fighter) + "</div>" +
              "<div class='chip'>Слава " + fighter.fame + "</div>" +
              "<div class='chip'>Недель прожито " + fighter.week + "</div>" +
              "<div class='chip red'>Смертей в боях: " + fighter.deathsCaused + "</div>" +
            "</div>" +
            "<div class='fight-grid'>" +
              "<div class='summary-box'>" +
                "<strong>Финальное состояние</strong>" +
                meter("Здоровье", fighter.health) +
                meter("Стресс", fighter.stress) +
                meter("Мораль", fighter.morale) +
                meter("Личная жизнь", fighter.relationship) +
              "</div>" +
              "<div class='summary-box'>" +
                "<strong>Сборка</strong>" +
                "<div class='empty-state'>Навыки и архетипы были отключены на время большой переделки боевки. Этот забег целиком держался на статах, маршрутах по странам и управлении бойцом на ринге 5x5.</div>" +
              "</div>" +
            "</div>" +
            "<div class='footer-actions'>" +
              "<button class='button' onclick='resetCreate(); render();'>Новый боец</button>" +
            "</div>" +
          "</div>" +
        "</div>";
    }

    function render() {
      var app = document.getElementById("app");
      applyAdaptiveMode();
      if (state.screen === "create") {
        app.innerHTML = renderCreate();
      } else if (state.screen === "end") {
        app.innerHTML = renderEnding();
      } else {
        app.innerHTML = renderGame();
      }
    }

    function viewportWidth() {
      if (document.documentElement && document.documentElement.clientWidth) {
        return document.documentElement.clientWidth;
      }
      if (document.body && document.body.clientWidth) {
        return document.body.clientWidth;
      }
      return 1280;
    }

    function viewportHeight() {
      if (document.documentElement && document.documentElement.clientHeight) {
        return document.documentElement.clientHeight;
      }
      if (document.body && document.body.clientHeight) {
        return document.body.clientHeight;
      }
      return 720;
    }

    function applyAdaptiveMode() {
      var width = viewportWidth();
      var height = viewportHeight();
      var mode = "";
      if (!document.body) {
        return;
      }
      if (width <= 700) {
        mode = "scale-tight";
      } else if (width <= 1180 || height <= 700) {
        mode = "scale-compact";
      } else if (width <= 1500 || height <= 860) {
        mode = "scale-compact";
      }
      document.body.className = mode;
    }

    window.onload = function () {
      resetCreate();
      applyAdaptiveMode();
      render();
    };

    window.onresize = function () {
      applyAdaptiveMode();
      render();
    };
  </script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
