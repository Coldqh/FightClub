<html>
<head>
  <title>Fight Simulator</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=9" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0e1116;
      color: #edf2f7;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(188, 68, 37, 0.28), transparent 28%),
        radial-gradient(circle at top right, rgba(205, 164, 84, 0.18), transparent 24%),
        linear-gradient(180deg, #12161d 0%, #0b0e13 100%);
      overflow-x: hidden;
      overflow-y: auto;
    }

    * {
      box-sizing: border-box;
    }

    .shell {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .topbar,
    .panel,
    .log-panel,
    .hero,
    .card,
    .create-card {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(17, 22, 29, 0.88);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .topbar {
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background:
        linear-gradient(135deg, rgba(157, 43, 26, 0.78), rgba(28, 34, 44, 0.94)),
        rgba(17, 22, 29, 0.88);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f4c56b;
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .subtitle {
      font-size: 15px;
      color: #c7d0dc;
      max-width: 680px;
      line-height: 1.4;
    }

    .week-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      font-size: 16px;
      font-weight: 700;
      color: #ffe19b;
    }

    .layout {
      min-height: 0;
      flex: 1;
      display: block;
      overflow: visible;
    }

    .layout:after {
      content: "";
      display: block;
      clear: both;
    }

    .sidebar,
    .main-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar {
      float: left;
      width: 28%;
      margin-right: 1.5%;
    }

    .main-panel {
      float: left;
      width: 42%;
      margin-right: 1.5%;
    }

    .layout .log-panel {
      float: right;
      width: 27%;
    }

    .panel,
    .log-panel {
      border-radius: 18px;
      padding: 14px;
      overflow: auto;
    }

    .panel-title {
      margin: 0 0 10px 0;
      font-size: 24px;
      font-weight: 700;
    }

    .muted {
      color: #a9b4c2;
      line-height: 1.55;
    }

    .hero {
      border-radius: 24px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: auto;
      background:
        radial-gradient(circle at top right, rgba(220, 133, 44, 0.18), transparent 32%),
        linear-gradient(155deg, rgba(25, 31, 41, 0.96), rgba(13, 17, 23, 0.94));
    }

    .create-grid,
    .card-grid,
    .action-grid,
    .stat-grid,
    .skill-grid,
    .choice-grid,
    .fight-grid {
      display: grid;
      gap: 10px;
    }

    .create-grid,
    .card-grid,
    .skill-grid,
    .choice-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .action-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .stat-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .fight-grid {
      grid-template-columns: 1.1fr 0.9fr;
    }

    .card,
    .create-card {
      border-radius: 16px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card.selected,
    .create-card.selected {
      border-color: rgba(244, 197, 107, 0.58);
      box-shadow: 0 0 0 1px rgba(244, 197, 107, 0.22), 0 18px 38px rgba(0, 0, 0, 0.28);
      background: rgba(27, 33, 43, 0.98);
    }

    .card h3,
    .create-card h3 {
      margin: 0;
      font-size: 21px;
    }

    .card .meta,
    .create-card .meta {
      color: #f4c56b;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card p,
    .create-card p {
      margin: 0;
      color: #cad4e0;
      line-height: 1.35;
      font-size: 16px;
    }

    .button,
    .ghost,
    .danger {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    .button:hover,
    .ghost:hover,
    .danger:hover {
      transform: translateY(-1px);
    }

    .button {
      background-color: #f4c56b;
      background-image: linear-gradient(135deg, #f4c56b, #dd9e39);
      color: #11161d;
    }

    .ghost {
      background-color: #eef2f6;
      color: #11161d;
    }

    .danger {
      background: rgba(174, 41, 41, 0.92);
      color: #fff1f1;
    }

    .button:disabled,
    .ghost:disabled,
    .danger:disabled {
      cursor: not-allowed;
      opacity: 0.38;
      transform: none;
    }

    .nameplate {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
    }

    .fighter-name {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.1;
    }

    .fighter-class {
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #f4c56b;
    }

    .meter-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .meter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 16px;
      color: #dfe7f1;
    }

    .meter {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .meter span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #cf5030, #f1c25b);
    }

    .mini-list {
      margin: 0;
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      color: #c8d2df;
      line-height: 1.45;
    }

    .record-row,
    .stats-row,
    .fight-row,
    .split-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: #edf2f7;
      font-size: 15px;
      font-weight: 700;
    }

    .chip.gold {
      color: #1b1407;
      background: #f4c56b;
    }

    .chip.red {
      background: rgba(172, 55, 42, 0.9);
    }

    .log-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .log-entry {
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.05);
      color: #d9e1ea;
      line-height: 1.45;
      font-size: 16px;
    }

    .log-entry.good {
      border-left: 3px solid #66c08c;
    }

    .log-entry.bad {
      border-left: 3px solid #d15a4f;
    }

    .log-entry.warn {
      border-left: 3px solid #f4c56b;
    }

    .summary-box {
      border-radius: 16px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .summary-box strong {
      color: #fff;
    }

    .footer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    .result-banner {
      border-radius: 18px;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(182, 66, 37, 0.94), rgba(29, 36, 46, 0.92));
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: #d9e1eb;
      font-size: 16px;
    }

    .empty-state {
      padding: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      color: #c8d2df;
      line-height: 1.65;
      font-size: 16px;
    }

    .ring-board {
      display: block;
      margin-top: 12px;
      width: 74%;
      max-width: 920px;
      min-width: 560px;
      height: 420px;
      padding: 46px 62px 66px 62px;
      margin-left: auto;
      margin-right: auto;
      background-color: #d8dde6;
      background-image: url('ring_top_view.png');
      background-repeat: no-repeat;
      background-position: center 44%;
      background-size: 100% 108%;
      font-size: 0;
      text-align: center;
    }

    .ring-row {
      display: block;
      white-space: nowrap;
      margin-bottom: 6px;
    }

    .ring-cell {
      width: 18%;
      height: 58px;
      margin: 0 1% 0 1%;
      display: inline-block;
      vertical-align: top;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        rgba(15, 20, 28, 0.18);
      position: relative;
      text-align: center;
    }

    .ring-cell::after {
      content: attr(data-cell);
      position: absolute;
      right: 8px;
      bottom: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.26);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .token {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
      margin: 10px auto 0 auto;
    }

    .token.player {
      background: linear-gradient(135deg, #f4c56b, #dd9e39);
      color: #11161d;
    }

    .token.opponent {
      background: linear-gradient(135deg, #d35433, #9b2d24);
      color: #fff3ef;
    }

    .token.attack-right {
      animation: tokenAttackRight 1s ease-in-out;
    }

    .token.attack-left {
      animation: tokenAttackLeft 1s ease-in-out;
    }

    .token.attack-up {
      animation: tokenAttackUp 1s ease-in-out;
    }

    .token.attack-down {
      animation: tokenAttackDown 1s ease-in-out;
    }

    .token.hit-react {
      animation: tokenHitReact 0.34s linear 2;
    }

    .token.dodge-right {
      animation: tokenDodgeRight 1s ease-in-out;
    }

    .token.dodge-left {
      animation: tokenDodgeLeft 1s ease-in-out;
    }

    .token.dodge-up {
      animation: tokenDodgeUp 1s ease-in-out;
    }

    .token.dodge-down {
      animation: tokenDodgeDown 1s ease-in-out;
    }

    @keyframes tokenAttackRight {
      0% { transform: translateX(0); }
      35% { transform: translateX(18px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenAttackLeft {
      0% { transform: translateX(0); }
      35% { transform: translateX(-18px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenAttackUp {
      0% { transform: translateY(0); }
      35% { transform: translateY(-18px); }
      100% { transform: translateY(0); }
    }

    @keyframes tokenAttackDown {
      0% { transform: translateY(0); }
      35% { transform: translateY(18px); }
      100% { transform: translateY(0); }
    }

    @keyframes tokenHitReact {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-6px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenDodgeRight {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(16px) translateY(-10px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeLeft {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(-16px) translateY(-10px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeUp {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(12px) translateY(-16px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeDown {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(12px) translateY(16px); }
      100% { transform: translateX(0) translateY(0); }
    }

    .fight-dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .fight-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .fight-actions .button,
    .fight-actions .ghost,
    .fight-actions .danger {
      min-height: 42px;
      padding: 10px 12px;
      font-size: 16px;
    }

    .ring-note {
      font-size: 15px;
      color: #aeb8c5;
      line-height: 1.5;
    }

    .battle-shell {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
    }

    .battle-topbar,
    .battle-stage,
    .battle-bottom,
    .battle-result {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(17, 22, 29, 0.9);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      border-radius: 18px;
    }

    .battle-topbar {
      padding: 12px 16px;
      margin-bottom: 12px;
      background:
        linear-gradient(135deg, rgba(157, 43, 26, 0.78), rgba(28, 34, 44, 0.94)),
        rgba(17, 22, 29, 0.88);
    }

    .battle-topbar:after,
    .battle-stage:after,
    .battle-bottom:after {
      content: "";
      display: block;
      clear: both;
    }

    .battle-health-card {
      width: 49%;
      float: left;
      padding: 0 0 0 0;
    }

    .battle-health-card.right {
      float: right;
    }

    .battle-stage {
      padding: 10px 12px 8px 12px;
      margin-bottom: 10px;
      text-align: center;
    }

    .battle-bottom {
      padding: 10px;
    }

    .battle-tabs {
      margin-bottom: 8px;
    }

    .battle-tabs .button,
    .battle-tabs .ghost {
      margin: 0 8px 8px 0;
      min-width: 160px;
    }

    .battle-column {
      width: 50%;
      float: left;
    }

    .battle-column.right {
      float: right;
    }

    .battle-panel {
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      padding: 10px;
      margin-bottom: 8px;
    }

    .battle-panel:last-child {
      margin-bottom: 0;
    }

    .battle-panel strong {
      display: block;
      margin-bottom: 8px;
    }

    .battle-actions-row {
      margin-top: 8px;
      text-align: left;
    }

    .battle-actions-row .button,
    .battle-actions-row .ghost,
    .battle-actions-row .danger {
      display: inline-block;
      width: 31%;
      margin: 0 1% 8px 1%;
      min-height: 42px;
      font-size: 16px;
      vertical-align: top;
    }

    .battle-actions-row.compact .ghost {
      width: 23%;
    }

    .battle-stats-line {
      margin-top: 8px;
    }

    .battle-chip-line {
      margin-top: 8px;
    }

    .battle-chip-line .chip {
      margin: 0 8px 8px 0;
    }

    .battle-log {
      max-height: 140px;
      overflow-y: auto;
    }

    .battle-result {
      padding: 16px;
    }

    @media screen and (max-height: 1080px) {
      .sidebar {
        width: 27%;
      }

      .main-panel {
        width: 43%;
      }

      .layout .log-panel {
        width: 27%;
      }

      .ring-board {
        width: 72%;
        height: 360px;
        padding: 38px 50px 56px 50px;
      }

      .ring-cell {
        height: 50px;
      }
    }

    @media screen and (max-width: 980px) {
      .shell {
        padding: 10px;
        gap: 10px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .create-grid,
      .card-grid,
      .skill-grid,
      .choice-grid,
      .action-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .sidebar,
      .main-panel,
      .log-panel {
        float: none;
        width: 100%;
        margin-right: 0;
        overflow: visible;
      }

      .week-chip {
        align-self: flex-start;
      }

      .ring-board {
        width: 92%;
        min-width: 0;
        height: 300px;
        padding: 32px 30px 46px 30px;
      }

      .ring-cell {
        height: 40px;
      }

      .token {
        width: 30px;
        height: 30px;
        font-size: 10px;
        margin-top: 4px;
      }

      .battle-health-card,
      .battle-health-card.right,
      .battle-column,
      .battle-column.right {
        float: none;
        width: 100%;
      }

      .battle-actions-row .button,
      .battle-actions-row .ghost,
      .battle-actions-row .danger,
      .battle-actions-row.compact .ghost {
        width: 48%;
        margin: 0 1% 8px 1%;
      }
    }

    body.scale-compact .title,
    body.scale-tight .title {
      font-size: 25px;
    }

    body.scale-compact .subtitle,
    body.scale-tight .subtitle {
      font-size: 14px;
    }

    body.scale-compact .sidebar {
      width: 26%;
    }

    body.scale-compact .main-panel {
      width: 44%;
    }

    body.scale-compact .layout .log-panel {
      width: 27%;
    }

    body.scale-compact .panel,
    body.scale-compact .log-panel,
    body.scale-compact .hero,
    body.scale-tight .panel,
    body.scale-tight .log-panel,
    body.scale-tight .hero {
      padding: 12px;
    }

    body.scale-compact .ring-board {
      width: 78%;
      max-width: 840px;
      min-width: 480px;
      height: 340px;
      padding: 36px 48px 52px 48px;
    }

    body.scale-compact .ring-cell {
      height: 46px;
    }

    body.scale-tight .sidebar,
    body.scale-tight .main-panel,
    body.scale-tight .layout .log-panel {
      float: none;
      width: 100%;
      margin-right: 0;
    }

    body.scale-tight .shell {
      padding: 10px;
      gap: 10px;
    }

    body.scale-tight .topbar {
      padding: 10px 14px;
    }

    body.scale-tight .create-grid,
    body.scale-tight .card-grid,
    body.scale-tight .skill-grid,
    body.scale-tight .choice-grid,
    body.scale-tight .action-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    body.scale-tight .ring-board {
      width: 96%;
      min-width: 0;
      max-width: none;
      height: 280px;
      padding: 26px 24px 36px 24px;
    }

    body.scale-tight .ring-cell {
      height: 34px;
    }

    body.scale-tight .battle-health-card,
    body.scale-tight .battle-health-card.right,
    body.scale-tight .battle-column,
    body.scale-tight .battle-column.right {
      float: none;
      width: 100%;
    }

    body.scale-tight .battle-actions-row .button,
    body.scale-tight .battle-actions-row .ghost,
    body.scale-tight .battle-actions-row .danger,
    body.scale-tight .battle-actions-row.compact .ghost {
      width: 48%;
      margin: 0 1% 8px 1%;
    }

    @media screen and (max-width: 680px) {
      .create-grid,
      .card-grid,
      .skill-grid,
      .choice-grid,
      .action-grid {
        grid-template-columns: 1fr;
      }

      .ring-board {
        width: 100%;
        height: 270px;
        padding: 18px 10px 22px 10px;
        background-position: center 42%;
        background-size: 112% 114%;
      }

      .ring-cell {
        height: 28px;
      }

      .token {
        width: 24px;
        height: 24px;
        font-size: 9px;
      }

      .battle-shell {
        padding: 8px;
      }

      .battle-stage,
      .battle-bottom,
      .battle-topbar,
      .battle-result {
        border-radius: 14px;
      }

      .battle-tabs .button,
      .battle-tabs .ghost {
        display: block;
        width: 100%;
        margin: 0 0 8px 0;
        min-width: 0;
      }

      .battle-actions-row .button,
      .battle-actions-row .ghost,
      .battle-actions-row .danger,
      .battle-actions-row.compact .ghost {
        width: 100%;
        margin: 0 0 8px 0;
      }
    }
  </style>
  <script type="text/javascript" src="country_data.js"></script>
  <script type="text/javascript">
    var DATA = {
      statLabels: {
        power: "Сила удара",

    var state = {
      screen: "create",
      panel: "home",

    function clamp(value, low, high) {
      return Math.max(low, Math.min(high, value));
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function chance(percent) {
      return rand(1, 100) <= percent;
    }

    function choice(list) {
      return list[rand(0, list.length - 1)];
    }

    function findByKey(list, key) {
      var i;
      for (i = 0; i < list.length; i += 1) {
        if (list[i].key === key) {
          return list[i];
        }
      }
      return null;
    }

    function hasSkill(skills, key) {
      return skills.indexOf(key) !== -1;
    }

    function getCountryInfo(countryKey) {
      var i;
      for (i = 0; i < COUNTRY_DATA.countries.length; i += 1) {
        if (COUNTRY_DATA.countries[i].key === countryKey) {
          return COUNTRY_DATA.countries[i];
        }
      }
      return null;
    }

    function getCountryPool(countryKey) {
      return COUNTRY_DATA.pools[countryKey];
    }

    function makeIdentity(countryKey) {
      var pool = getCountryPool(countryKey);
      var seed = COUNTRY_DATA.seeds[countryKey];
      var surnameParts;
      var firstName;
      var lastName;
      var nickname;
      if (!pool) {
        return null;
      }
      if (seed && seed.firstJoin === "join") {
        firstName = choice(pool.firstNames);
      } else if (countryKey === "russia") {
        firstName = choice(seed.firstLeft);
      } else {
        firstName = choice(seed.firstLeft.concat(seed.firstRight));
      }
      surnameParts = seed && seed.lastJoin === "join" ? pool.lastNames.slice(0) : seed.lastLeft.concat(seed.lastRight);
      lastName = choice(surnameParts);
      if (chance(5) && surnameParts.length > 1) {
        var secondSurname = choice(surnameParts);
        var separator = (countryKey === "mexico" || countryKey === "cuba" || countryKey === "philippines") ? " " : "-";
        while (secondSurname === lastName) {
          secondSurname = choice(surnameParts);
        }
        lastName = lastName + separator + secondSurname;
      }
      nickname = choice(pool.nicknames);
      return {
        firstName: firstName,
        lastName: lastName,
        nickname: nickname,
        fullName: firstName + ' "' + nickname + '" ' + lastName
      };
    }

    function flightCost(fromKey, toKey) {
      var from = getCountryInfo(fromKey);
      var to = getCountryInfo(toKey);
      var distance;
      if (!from || !to || fromKey === toKey) {
        return 0;
      }
      distance = Math.abs(from.x - to.x) + Math.abs(from.y - to.y);
      return Math.round((60 + distance * 22) / 5) * 5;
    }

    function currentTravelBonus(fighter) {
      if (fighter.currentCountry === fighter.homeCountry) {
        return { money: 1.2, fame: 1.0 };
      }
      return { money: 1.0, fame: 1.2 };
    }

    function baseStats() {
      return { power: 5, speed: 5, endurance: 5, technique: 5, heart: 5, charisma: 4 };
    }

    function cloneStats(source) {
      return {
        power: source.power,
        speed: source.speed,
        endurance: source.endurance,
        technique: source.technique,
        heart: source.heart,
        charisma: source.charisma
      };
    }

    function applyBounds(fighter) {
      var key;
      for (key in fighter.stats) {
        if (fighter.stats.hasOwnProperty(key)) {
          fighter.stats[key] = clamp(fighter.stats[key], 1, 14);
        }
      }
      fighter.money = Math.max(0, fighter.money);
      fighter.health = clamp(fighter.health, 0, 100);
      fighter.stress = clamp(fighter.stress, 0, 100);
      fighter.relationship = clamp(fighter.relationship, 0, 100);
      fighter.morale = clamp(fighter.morale, 0, 100);
      fighter.fame = Math.max(0, fighter.fame);
      fighter.skillPoints = Math.max(0, fighter.skillPoints);
    }

    function recordText(fighter) {
      return fighter.wins + "-" + fighter.losses + " (КО: " + fighter.kos + ")";
    }

    function combatRating(fighter) {
      var stats = fighter.stats;
      var base = (stats.power + stats.speed + stats.endurance + stats.technique + stats.heart) / 5;
      return base + fighter.wins * 0.25 + fighter.fame * 0.03;
    }

    function buildFightState(stats, condition, position) {
      var mult = 0.76 + condition / 330;
      var maxHp = Math.floor((70 + stats.endurance * 6 + stats.heart * 5) * mult);
      var stamina = clamp(Math.floor((52 + stats.endurance * 4 + stats.speed * 2) * mult), 35, 100);
      return {
        hp: maxHp,
        maxHp: maxHp,
        stamina: stamina,
        trauma: 0,
        knockdowns: 0,
        score: 0,
        damageTaken: 0,
        bodyDamage: 0,
        position: { x: position.x, y: position.y }
      };
    }

    function startRingPosition(side) {
      return side === "player" ? { x: 0, y: 2 } : { x: 4, y: 2 };
    }

    function ringDistance(a, b) {
      return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
    }

    function insideRing(x, y) {
      return x >= 0 && x < RING_SIZE && y >= 0 && y < RING_SIZE;
    }

    function resetRingPositions(fight) {

        html.push("<li><strong>" + findByKey(DATA.skills, skills[i]).name + "</strong></li>");

      html.push("</ul>");

          html.push("<div class='stat-line'><span>" + DATA.statLabels[key] + "</span><strong>" + stats[key] + "</strong></div>");

        return;

        return;
      }
      state.panel = "home";
      render();

    function advanceWeek() {
      var fighter = state.fighter;
      fighter.week += 1;
      if (fighter.stress > 70) {
        fighter.health -= 1;
      }
      if (fighter.week % 4 === 0 && fighter.relationship > 0) {
        fighter.relationship -= 1;
      }
      applyBounds(fighter);
      weeklyEvent();
    }

    function weeklyEvent() {
      var fighter = state.fighter;
      var pool;
      var event;
      if (!chance(48)) {
        return;
      }
      pool = ["mentor", "rumor", "cash", "pressure"];
      if (fighter.health < 40) {
        pool.push("injury");
      }
      if (fighter.relationship > 60) {
        pool.push("support");
      }
      if (fighter.stress > 70) {
        pool.push("burnout");
      }
      if (fighter.fame > 45) {
        pool.push("sponsor");
      }
      event = choice(pool);
      if (event === "mentor") {
        fighter.stats.speed += 1;
        fighter.morale += 4;
        pushLog("Старый тренер поправил работу ног. Скорость выросла на 1.", "good");
      } else if (event === "rumor") {
        fighter.fame += 5;
        fighter.relationship -= 3;
        pushLog("По району пошел новый слух о тебе. Слава вверх, дома чуть холоднее.", "warn");
      } else if (event === "cash") {
        fighter.money += rand(20, 45);
        pushLog("Случайный калым помог закрыть неделю чуть спокойнее.", "good");
      } else if (event === "pressure") {
        fighter.stress += 8;
        fighter.morale -= 3;
        pushLog("Напряжение вокруг боев растет. Голова гудит сильнее обычного.", "bad");
      } else if (event === "injury") {
        fighter.health -= 8;
        fighter.stress += 6;
        pushLog("Старая травма снова напоминает о себе. Тело сопротивляется графику.", "bad");
      } else if (event === "support") {
        fighter.relationship += 5;
        fighter.stress -= 8;
        pushLog("Кто-то близкий вытянул тебя из мрака обычным разговором.", "good");
      } else if (event === "burnout") {
        fighter.morale -= 8;
        fighter.stress -= 3;
        pushLog("Выгорание накрывает жестко. Даже победы больше не звучат так громко.", "warn");
      } else {
        fighter.money += 55;
        fighter.fame += 4;
        pushLog("Местный спонсор подкинул денег за имя на афише. +$55 и немного шума вокруг тебя.", "good");
      }
      applyBounds(fighter);
    }

    function evaluateEndState() {
      var fighter = state.fighter;
      if (!fighter) {
        return false;
      }
      if (!fighter.alive) {
        state.screen = "end";
        state.endingReason = "death";
        render();
        return true;
      }
      if (fighter.health <= 0) {
        state.screen = "end";
        state.endingReason = "body";
        render();
        return true;
      }
      if (fighter.stress >= 100) {
        state.screen = "end";
        state.endingReason = "stress";
        render();
        return true;
      }
      return false;
    }

      render();

    function legacyRank(fighter) {
      var score = fighter.wins * 8 + fighter.fame - fighter.losses * 3;
      if (fighter.deathsCaused) {
        score += 10;
      }
      if (score >= 160) {
        return "Легенда подполья";
      }
      if (score >= 110) {
        return "Король района";
      }
      if (score >= 70) {
        return "Громкое имя";
      }
      if (score >= 40) {
        return "Известный боец";
      }
      return "Новичок улиц";
    }

    function travelToCountry(countryKey) {
      var fighter = state.fighter;
      var destination = getCountryInfo(countryKey);
      var cost = flightCost(fighter.currentCountry, countryKey);
      if (!destination || fighter.currentCountry === countryKey) {
        return;
      }
      if (fighter.money < cost) {
        pushLog("На перелет в " + destination.name + " сейчас не хватает денег.", "bad");
        render();
        return;
      }
      fighter.money -= cost;
      fighter.currentCountry = countryKey;
      fighter.stress += 4;
      fighter.morale += 1;
      applyBounds(fighter);
      pushLog("Перелет в " + destination.name + " обошелся в $" + cost + ". Новая арена: " + destination.city + ".", "warn");
      spendWeek();
    }

    function actionTrain(statKey) {

      fighter.stats[statKey] += gain;
      fighter.health -= rand(2, 5);
      fighter.stress += rand(4, 7);
      fighter.morale += 2;
      applyBounds(fighter);
      pushLog(fighter.name + " качает '" + DATA.statLabels[statKey] + "' на +" + gain + ".", "good");

        fighter.money -= 20;

        fighter.morale += 10;
        fighter.health -= rand(3, 8);
        fighter.relationship -= rand(2, 6);
        fighter.stress -= 3;
        pushLog("Ночь была громкой. История красивая, последствия тоже настоящие.", "warn");
      }
      applyBounds(fighter);
      spendWeek();
    }

    function generateOpponent(tier) {
      var fighter = state.fighter;
      var country = getCountryInfo(fighter.currentCountry);
      var pool = getCountryPool(fighter.currentCountry);
      var identity = makeIdentity(fighter.currentCountry);
      var bonus = currentTravelBonus(fighter);
      var tierBonus = tier === "safe" ? -1 : (tier === "even" ? 0 : 2);
      var styleKey = choice(["slugger", "technician", "survivor", "stalker"]);
      var style = DATA.styles[styleKey];
      var base = Math.round(combatRating(fighter)) + tierBonus + rand(-1, 1);
      var stats;
      var key;
      base = clamp(base, 4, 11);
      stats = {
        power: base + rand(-1, 1),
        speed: base + rand(-1, 1),
        endurance: base + rand(-1, 1),
        technique: base + rand(-1, 1),
        heart: base + rand(-1, 1),
        charisma: rand(3, 8)
      };
      for (key in style.mods) {
        if (style.mods.hasOwnProperty(key)) {
          stats[key] += style.mods[key];
        }
      }
      for (key in stats) {
        if (stats.hasOwnProperty(key)) {
          stats[key] = clamp(stats[key], 3, 14);
        }
      }
      return {
        firstName: identity ? identity.firstName : choice(pool.firstNames),
        lastName: identity ? identity.lastName : choice(pool.lastNames),
        nickname: identity ? identity.nickname : choice(pool.nicknames),
        fullName: identity ? identity.fullName : "",
        countryKey: fighter.currentCountry,
        styleKey: styleKey,
        stats: stats,
        purse: Math.round(((tier === "safe" ? 60 : (tier === "even" ? 90 : 140)) + base * 7 + rand(0, 20)) * bonus.money),
        fameReward: Math.round(((tier === "safe" ? 6 : (tier === "even" ? 10 : 16)) + Math.max(0, base - 5) * 2 + rand(0, 4)) * bonus.fame),
        condition: rand(70, 100),
        rounds: tier === "danger" ? choice([6, 7, 8]) : choice([5, 6, 7]),
        danger: tier === "safe" ? "Ниже по риску" : (tier === "even" ? "Ровный бой" : "Очень опасен"),
        venue: country ? country.city : ""
      };
    }

    function fullOpponentName(opponent) {
      return opponent.fullName || (opponent.firstName + ' "' + opponent.nickname + '" ' + opponent.lastName);
    }

    function openFightSelect() {
      state.opponents = [generateOpponent("safe"), generateOpponent("even"), generateOpponent("danger")];

    function aiTactic(opponent, ownState, enemyState) {
      if (ownState.hp < ownState.maxHp * 0.28 || ownState.stamina < 28) {
        return choice(["recover", "recover", "recover", "counter", "counter", "precision"]);
      }
      if (enemyState.hp < enemyState.maxHp * 0.3) {
        if (opponent.styleKey === "technician") {
          return choice(["precision", "precision", "counter", "pressure"]);
        }
        return choice(["pressure", "pressure", "precision", "counter"]);
      }
      if (opponent.styleKey === "slugger") {
        return choice(["pressure", "pressure", "pressure", "precision", "recover"]);
      }
      if (opponent.styleKey === "technician") {
        return choice(["precision", "precision", "counter", "counter", "recover"]);
      }
      if (opponent.styleKey === "survivor") {
        return choice(["counter", "recover", "recover", "pressure", "precision"]);
      }
      return choice(["pressure", "pressure", "precision", "counter", "recover"]);
    }

    function attackExchange(attackerName, attackerStats, attackerTactic, attackerState, defenderName, defenderStats, defenderTactic, defenderState, attackerSkills, defenderSkills, morale, stress) {
      var attackData = DATA.tactics[attackerTactic];
      var defendData = DATA.tactics[defenderTactic];
      var regained;
      var accuracy;
      var defense;
      var hitChance;
      var staminaCost;
      var damage;
      var critical;
      var traumaGain;

      if (attackerTactic === "recover") {
        regained = 12 + Math.floor(attackerStats.endurance / 2);
        if (hasSkill(attackerSkills, "cold_mind")) {
          regained += 4;
        }
        attackerState.stamina = clamp(attackerState.stamina + regained, 0, 100);
        return { line: attackerName + " собирает дыхание и возвращает контроль.", critical: false };
      }

      accuracy = 41 + attackerStats.speed * 2 + attackerStats.technique * 1.7 + attackData.accuracy;
      accuracy += (morale - 50) / 5;
      accuracy -= hasSkill(attackerSkills, "cold_mind") ? 0 : Math.max(0, stress - 55) / 6;
      accuracy -= Math.max(0, 35 - attackerState.stamina) / 2;

      defense = 23 + defenderStats.speed * 1.4 + defenderStats.technique * 1.2 + defenderStats.heart * 1.2 + defendData.defense;
      if (defenderTactic === "counter" && hasSkill(defenderSkills, "step_back")) {
        defense += 5;
      }
      if (defenderTactic === "recover" && hasSkill(defenderSkills, "cold_mind")) {
        defense += 3;
      }

      hitChance = clamp(Math.round(accuracy - defense + 35), 18, 84);
      staminaCost = Math.max(4, attackData.stamina - attackerStats.endurance);
      attackerState.stamina = clamp(attackerState.stamina - staminaCost, 0, 100);

      if (!chance(hitChance)) {
        return { line: choice([
          attackerName + " не достает до цели.",
          defenderName + " читает атаку и уходит от удара.",
          attackerName + " мажет, и момент уходит."
        ]), critical: false };
      }

      damage = 2 + attackerStats.power * 0.75 + attackerStats.technique * 0.35 - defenderStats.endurance * 0.35 - defenderStats.heart * 0.12 + attackData.damage + attackerState.stamina / 40;
      if (attackerTactic === "counter" && defenderTactic === "pressure") {
        damage += 2;
      }
      if (hasSkill(attackerSkills, "pressure_master") && attackerTactic === "pressure") {
        damage += 2.5;
      }
      if (hasSkill(attackerSkills, "bodywork") && (attackerTactic === "pressure" || attackerTactic === "precision")) {
        defenderState.stamina = clamp(defenderState.stamina - rand(4, 7), 0, 100);
      }
      if (hasSkill(attackerSkills, "step_back") && attackerTactic === "counter" && defenderTactic === "pressure") {
        damage += 2.5;
      }
      if (hasSkill(attackerSkills, "street_grit")) {
        damage += 1.5;
      }
      if (hasSkill(defenderSkills, "iron_chin")) {
        damage -= 1.2;
      }
      critical = damage >= (12 + (hasSkill(attackerSkills, "finisher") ? 2 : 0)) || chance(8);
      damage = Math.max(2, Math.round(damage + rand(-2, 2)));
      if (critical) {
        damage += rand(2, 5);
      }
      defenderState.hp -= damage;
      defenderState.damageTaken += damage;
      defenderState.score -= Math.max(1, Math.floor(damage / 2));
      attackerState.score += damage;
      traumaGain = damage >= 11 ? 1 : 0;
      traumaGain += critical && damage >= 14 ? 1 : 0;
      defenderState.trauma += traumaGain;
      if (critical) {
        return { line: attackerName + " ловит момент и тяжело попадает по " + defenderName + " на " + damage + " урона.", critical: true };
      }
      return { line: attackerName + " доносит серию и снимает " + damage + " очков прочности.", critical: false };
    }

    function knockdownOrFinish(targetName, targetState, targetStats, targetSkills) {
      var riseChance;
      if (targetState.hp > 0) {
        return { over: false, line: "" };
      }
      riseChance = 42 + targetStats.heart * 5 - targetState.trauma * 11 - targetState.knockdowns * 12;
      if (hasSkill(targetSkills, "iron_chin")) {
        riseChance += 18;
      }
      riseChance = clamp(riseChance, 6, 92);
      if (chance(riseChance) && targetState.knockdowns < 2) {
        targetState.knockdowns += 1;
        targetState.hp = 8 + targetStats.heart;
        targetState.trauma += 1;
        return { over: false, line: targetName + " падает, но поднимается и продолжает бой." };
      }
      return { over: true, line: targetName + " больше не может продолжать бой." };
    }

    function fatalityRoll(loserState, loserCondition, winnerSkills, loserSkills) {
      var risk = Math.max(0, loserState.trauma - 2) * 6 + Math.max(0, -loserState.hp) * 2 + Math.max(0, 45 - loserCondition) / 3;
      if (hasSkill(winnerSkills, "street_grit")) {
        risk += 6;
      }
      if (hasSkill(loserSkills, "iron_chin")) {
        risk -= 8;
      }
      return chance(Math.max(0, Math.round(risk)));
    }

    function startFight(index) {
      var opponent = state.opponents[index];
      state.fight = {
        opponent: opponent,
        round: 1,
        playerState: buildFightState(state.fighter.stats, state.fighter.health),
        opponentState: buildFightState(opponent.stats, opponent.condition),
        lines: [
          "Бой против " + fullOpponentName(opponent) + " начинается. Раундов: " + opponent.rounds + "."
        ],
        result: null,
        method: null,
        fatality: "",
        roundsCompleted: 0
      };
      state.panel = "fightLive";
      render();
    }

    function playFightRound(playerTactic) {
      var fight = state.fight;
      var fighter = state.fighter;
      var opponent = fight.opponent;
      var playerSkills = fighter.skills.slice(0);
      var opponentSkills = [];
      var opponentTactic = aiTactic(opponent, fight.opponentState, fight.playerState);
      var exchanges = [];
      var lines = [];
      var i;

      if (!fight || fight.result) {
        return;
      }

      lines.push("Раунд " + fight.round + ": ты выбираешь '" + DATA.tactics[playerTactic].name + "', соперник отвечает '" + DATA.tactics[opponentTactic].name + "'.");

      exchanges = [
        {
          attackerName: fighter.name,
          attackerStats: fighter.stats,
          attackerTactic: playerTactic,
          attackerState: fight.playerState,
          defenderName: fullOpponentName(opponent),
          defenderStats: opponent.stats,
          defenderTactic: opponentTactic,
          defenderState: fight.opponentState,
          attackerSkills: playerSkills,
          defenderSkills: opponentSkills,
          morale: fighter.morale,
          stress: fighter.stress
        },
        {
          attackerName: fullOpponentName(opponent),
          attackerStats: opponent.stats,
          attackerTactic: opponentTactic,
          attackerState: fight.opponentState,
          defenderName: fighter.name,
          defenderStats: fighter.stats,
          defenderTactic: playerTactic,
          defenderState: fight.playerState,
          attackerSkills: opponentSkills,
          defenderSkills: playerSkills,
          morale: 55,
          stress: 20
        }
      ];

      if (playerTactic === "counter" && opponentTactic === "pressure") {
        exchanges.reverse();
      } else if (opponentTactic === "counter" && playerTactic === "pressure") {
        exchanges = [exchanges[1], exchanges[0]];
      }

      for (i = 0; i < exchanges.length; i += 1) {
        var ex = exchanges[i];
        var hit = attackExchange(ex.attackerName, ex.attackerStats, ex.attackerTactic, ex.attackerState, ex.defenderName, ex.defenderStats, ex.defenderTactic, ex.defenderState, ex.attackerSkills, ex.defenderSkills, ex.morale, ex.stress);
        var kd = knockdownOrFinish(ex.defenderName, ex.defenderState, ex.defenderStats, ex.defenderSkills);
        lines.push(hit.line);
        if (kd.line) {
          lines.push(kd.line);
          if (kd.line.indexOf("падает") !== -1) {
            if (ex.attackerName === fighter.name) {
              fight.playerState.score += 8;
            } else {
              fight.opponentState.score += 8;
            }
          }
        }
        if (kd.over) {
          if (ex.defenderName === fighter.name) {
            finalizeFight("loss", "KO/TKO", lines, fatalityRoll(fight.playerState, fighter.health, opponentSkills, playerSkills) ? "player" : "");
          } else {
            finalizeFight("win", "KO/TKO", lines, fatalityRoll(fight.opponentState, opponent.condition, playerSkills, opponentSkills) ? "opponent" : "");
          }
          return;
        }
      }

      if (fight.playerState.trauma >= 6 && fight.playerState.hp < fight.playerState.maxHp * 0.25) {
        lines.push("Доктор останавливает бой. Продолжать слишком опасно.");
        finalizeFight("loss", "Остановлен врачом", lines, fatalityRoll(fight.playerState, fighter.health, opponentSkills, playerSkills) ? "player" : "");
        return;
      }

      if (fight.opponentState.trauma >= 6 && fight.opponentState.hp < fight.opponentState.maxHp * 0.25) {
        lines.push("Врач соперника машет рукой: продолжать нельзя.");
        finalizeFight("win", "Остановлен врачом", lines, fatalityRoll(fight.opponentState, opponent.condition, playerSkills, opponentSkills) ? "opponent" : "");
        return;
      }

      if (fight.round >= opponent.rounds) {
        if (fight.playerState.score >= fight.opponentState.score + 6) {
          finalizeFight("win", "Решение судей", lines, "");
        } else if (fight.opponentState.score >= fight.playerState.score + 6) {
          finalizeFight("loss", "Решение судей", lines, "");
        } else {
          finalizeFight("draw", "Ничья", lines, "");
        }
        return;
      }

      fight.round += 1;
      fight.lines = lines.concat(fight.lines);
      pushLog("Раунд " + (fight.round - 1) + " завершен. Ты " + fight.playerState.hp + "/" + fight.playerState.maxHp + " HP, соперник " + fight.opponentState.hp + "/" + fight.opponentState.maxHp + ".", "warn");
      render();
    }

    function finalizeFight(result, method, lines, fatality) {
      var fight = state.fight;
      fight.result = result;
      fight.method = method;
      fight.fatality = fatality;
      fight.roundsCompleted = fight.round;
      fight.lines = lines.concat(fight.lines);
      applyFightResults();
      if (evaluateEndState()) {
        return;
      }
      advanceWeek();
      if (evaluateEndState()) {
        return;
      }
      state.panel = "fightResult";
      render();
    }

    function applyFightResults() {
      var fight = state.fight;
      var fighter = state.fighter;
      var opponent = fight.opponent;
      var injury = Math.floor(fight.playerState.damageTaken * 0.45 + fight.playerState.trauma * 5 + fight.playerState.knockdowns * 7);
      var fameGain;
      fighter.health -= injury;
      fighter.stress += 8 + fight.playerState.trauma * 4;
      if (fight.result === "win") {
        fighter.wins += 1;
        fighter.money += opponent.purse;
        fameGain = opponent.fameReward + (hasSkill(fighter.skills, "idol") ? 4 : 0);
        fighter.fame += fameGain;
        fighter.morale += 10;
        fighter.skillPoints += 2;
        if (fight.method === "KO/TKO") {
          fighter.kos += 1;
          if (hasSkill(fighter.skills, "street_grit")) {
            fighter.stress += 5;
          }
        }
        pushLog("Победа. Ты забираешь $" + opponent.purse + " и +" + fameGain + " к славе.", "good");
      } else if (fight.result === "loss") {
        fighter.losses += 1;
        fighter.money += Math.floor(opponent.purse * 0.35);
        fameGain = Math.max(2, Math.floor(opponent.fameReward / 3));
        fighter.fame += fameGain;
        fighter.morale -= 12;
        fighter.skillPoints += 1;
        fighter.stress += 6;
        pushLog("Поражение. Но даже за него приходит часть денег и немного шума вокруг имени.", "bad");
      } else {
        fighter.money += Math.floor(opponent.purse * 0.55);
        fameGain = Math.max(4, Math.floor(opponent.fameReward / 2));
        fighter.fame += fameGain;
        fighter.morale += 1;
        fighter.skillPoints += 1;
        pushLog("Ничья. Ты остался на ногах и ушел с деньгами и славой.", "warn");
      }
      if (fight.fatality === "opponent") {
        fighter.deathsCaused += 1;
        fighter.fame += 12;
        fighter.relationship -= 10;
        fighter.stress += 18;
        pushLog("Бой закончился трагедией. Район загудел, а жить с этим придется тебе.", "bad");
      } else if (fight.fatality === "player") {
        fighter.alive = false;
        pushLog("Повреждения оказываются критическими. Этот бой становится последним.", "bad");
      }
      applyBounds(fighter);
    }

    function getCountryInfo(countryKey) {
      var i;
      var country;
      var display;
      for (i = 0; i < COUNTRY_DATA.countries.length; i += 1) {
        country = COUNTRY_DATA.countries[i];
        if (country.key === countryKey) {
          display = COUNTRY_DISPLAY[countryKey];
          if (display) {
            country.name = display.name;
            country.city = display.city;
          }
          return country;
        }
      }
      return null;
    }

    function makeIdentity(countryKey) {
      var identity;
      if (countryKey === "russia") {
        identity = {
          firstName: choice(RUSSIA_IDENTITY.first),
          lastName: choice(RUSSIA_IDENTITY.last),
          nickname: choice(RUSSIA_IDENTITY.nick)
        };
        identity.fullName = identity.firstName + ' "' + identity.nickname + '" ' + identity.lastName;
        return identity;
      }
      return window.makeIdentityBase ? window.makeIdentityBase(countryKey) : (function () {
        var pool = getCountryPool(countryKey);
        var seed = COUNTRY_DATA.seeds[countryKey];
        var surnameParts;
        var firstName;
        var lastName;
        var nickname;
        if (!pool) {
          return null;
        }
        if (seed && seed.firstJoin === "join") {
          firstName = choice(pool.firstNames);
        } else {
          firstName = choice(seed.firstLeft.concat(seed.firstRight));
        }
        surnameParts = seed && seed.lastJoin === "join" ? pool.lastNames.slice(0) : seed.lastLeft.concat(seed.lastRight);
        lastName = choice(surnameParts);
        if (chance(5) && surnameParts.length > 1) {
          var secondSurname = choice(surnameParts);
          var separator = (countryKey === "mexico" || countryKey === "cuba" || countryKey === "philippines") ? " " : "-";
          while (secondSurname === lastName) {
            secondSurname = choice(surnameParts);
          }
          lastName = lastName + separator + secondSurname;
        }
        nickname = choice(pool.nicknames);
        return {
          firstName: firstName,
          lastName: lastName,
          nickname: nickname,
          fullName: firstName + ' "' + nickname + '" ' + lastName
        };
      }());
    }

            "<div class='card'><h3>Вечер с близкими</h3><p>$10. Снимает напряжение и укрепляет отношения.</p><button class='button' onclick='actionLife(\"family\")'>Провести вечер</button></div>" +
            "<div class='card'><h3>Свидание</h3><p>$25. Сильнее качает отношения и мораль.</p><button class='button' onclick='actionLife(\"date\")'>Позвать на встречу</button></div>" +
            "<div class='card'><h3>Ночной отрыв</h3><p>$20. Дает эмоции и славу, но может ударить по телу и отношениям.</p><button class='danger' onclick='actionLife(\"party\")'>Уйти в ночь</button></div>" +
          "</div>" +
          "<div class='footer-actions'><button class='ghost' onclick='openPanel(\"home\")'>Назад</button></div>" +
        "</div>";
    }

    function renderFightSelectPanel() {
      var html = [];
      var i;
      html.push("<div class='panel'><h2 class='panel-title'>Выбор соперника</h2><div class='muted'>Все бойцы на этом экране принадлежат текущей стране: " + getCountryInfo(state.fighter.currentCountry).name + ". Арена недели: " + getCountryInfo(state.fighter.currentCountry).city + ".</div><div class='card-grid' style='margin-top:16px'>");
      for (i = 0; i < state.opponents.length; i += 1) {
        var opponent = state.opponents[i];
        html.push("<div class='card'>");
        html.push("<div class='meta'>" + opponent.danger + "</div>");
        html.push("<h3>" + fullOpponentName(opponent) + "</h3>");
        html.push("<p>" + opponent.profile + ". " + getCountryInfo(opponent.countryKey).name + ", " + opponent.venue + ". Кошелек $" + opponent.purse + ", слава +" + opponent.fameReward + ", форма " + opponent.condition + "/100, раундов " + opponent.rounds + ".</p>");
        html.push("<div class='split-row'><div class='chip'>Сила " + opponent.stats.power + "</div><div class='chip'>Скорость " + opponent.stats.speed + "</div><div class='chip'>Выносливость " + opponent.stats.endurance + "</div><div class='chip'>Техника " + opponent.stats.technique + "</div></div>");
        html.push("<button class='button' onclick='startFight(" + i + ")'>Принять бой</button>");
        html.push("</div>");
      }
      html.push("</div><div class='footer-actions'><button class='ghost' onclick='openPanel(\"home\")'>Назад</button></div></div>");

    function renderSkillPanel() {
      return "" +
        "<div class='panel'>" +
          "<h2 class='panel-title'>Навыки и архетипы</h2>" +
          "<div class='empty-state'>Пока эта система стоит на паузе. Здесь позже появятся ветки прокачки, пассивки и полноценные билды.</div>" +
          "<div class='panel' style='margin-top:14px'><h2 class='panel-title'>Текущий статус</h2>" + renderSkillList(state.fighter.skills) + "</div>" +
        "</div>";
    }

    function renderRetirePanel() {
      return "" +
        "<div class='panel'>" +
          "<h2 class='panel-title'>Завершить карьеру?</h2>" +
          "<div class='empty-state'>Если нажмешь сейчас, забег закончится, а игра покажет итог твоей истории.</div>" +
          "<div class='footer-actions'>" +
            "<button class='danger' onclick='retireCareer()'>Да, выйти из игры</button>" +
            "<button class='ghost' onclick='openPanel(\"home\")'>Нет, продолжать</button>" +
          "</div>" +
        "</div>";
    }

    function fightAction(actionKey) {
      var fight = state.fight;
      var action = FIGHT_ACTIONS[actionKey];
      if (!fight || fight.result || !action || fight.playerActionsLeft <= 0 || fight.actionLock) {
        return;
      }
      if (!canUseFightAction(fight, "player", actionKey)) {
        pushFightLine(fight, "Это действие сейчас недоступно по позиции на ринге.");
        render();
        return;
      }
      fight.actionLock = true;
      if (action.type === "move") {
        moveActor(fight, "player", actionKey);
        fight.playerActionsLeft -= 1;
        render();
        setTimeout(function () {
          runAiAfterPlayer();
        }, 1000);
        return;
      }
      if (strikeActor(fight, "player", actionKey)) {
        fight.playerActionsLeft -= 1;
        render();
        setTimeout(function () {
          applyFightAnimationResult();
        }, 1000);
        return;
      }
      fight.playerActionsLeft -= 1;
      render();
      setTimeout(function () {
        applyFightAnimationResult();
        if (fight.result) {
          return;
        }
        runAiAfterPlayer();
      }, 1000);
    }

    function closeFightResult() {
      state.fight = null;
      state.panel = "home";
      render();
    }

    function generateOpponent(tier) {
      var fighter = state.fighter;
      var country = getCountryInfo(fighter.currentCountry);
      var identity = makeIdentity(fighter.currentCountry);
      var bonus = currentTravelBonus(fighter);
      var tierBonus = tier === "safe" ? -1 : (tier === "even" ? 1 : 3);
      var base = clamp(Math.round(combatRating(fighter)) + tierBonus + rand(-1, 1), 4, 12);
      var stats = {
        power: clamp(base + rand(-1, 2), 3, 14),
        speed: clamp(base + rand(-1, 2), 3, 14),
        endurance: clamp(base + rand(-1, 2), 3, 14),
        technique: clamp(base + rand(-1, 2), 3, 14),
        heart: clamp(base + rand(-1, 2), 3, 14),
        charisma: rand(3, 8)
      };
      return {
        firstName: identity.firstName,
        lastName: identity.lastName,
        nickname: identity.nickname,
        fullName: identity.fullName,
        countryKey: fighter.currentCountry,
        profile: choice(["Давит по центру", "Любит обход по флангу", "Выжидает и ловит", "Лезет в корпус", "Охотится за ближней"]),
        stats: stats,
        purse: Math.round(((tier === "safe" ? 65 : (tier === "even" ? 95 : 150)) + base * 8 + rand(0, 24)) * bonus.money),
        fameReward: Math.round(((tier === "safe" ? 6 : (tier === "even" ? 11 : 17)) + Math.max(0, base - 5) * 2 + rand(0, 4)) * bonus.fame),
        condition: rand(72, 100),
        rounds: tier === "danger" ? choice([6, 7]) : (tier === "even" ? choice([5, 6]) : choice([4, 5])),
        danger: tier === "safe" ? "Ниже по риску" : (tier === "even" ? "Ровный бой" : "Очень опасен"),
        venue: country ? country.city : ""
      };
    }

    function fullOpponentName(opponent) {
      return opponent.fullName || (opponent.firstName + ' "' + opponent.nickname + '" ' + opponent.lastName);
    }

    function openFightSelect() {
      state.opponents = [generateOpponent("safe"), generateOpponent("even"), generateOpponent("danger")];
      state.panel = "fightSelect";
      render();
    }

    function fightStateBySide(fight, side) {
      return side === "player" ? fight.playerState : fight.opponentState;
    }

    function fightStatsBySide(fight, side) {
      return side === "player" ? state.fighter.stats : fight.opponent.stats;
    }

    function fightNameBySide(fight, side) {
      return side === "player" ? state.fighter.name : fullOpponentName(fight.opponent);
    }

    function otherSide(side) {
      return side === "player" ? "opponent" : "player";
    }

    function canUseFightAction(fight, side, actionKey) {
      var action = FIGHT_ACTIONS[actionKey];
      var actor = fightStateBySide(fight, side);
      var target = fightStateBySide(fight, otherSide(side));
      var nextX;
      var nextY;
      var distance;
      if (!action) {
        return false;
      }
      if (action.type === "move") {
        nextX = actor.position.x + action.dx;
        nextY = actor.position.y + action.dy;
        return insideRing(nextX, nextY) && !(nextX === target.position.x && nextY === target.position.y);
      }
      distance = ringDistance(actor.position, target.position);
      if (action.reach === "close") {
        return distance === 1;
      }
      return distance >= 1 && distance <= action.range && (actor.position.x === target.position.x || actor.position.y === target.position.y);
    }

    function pushFightLine(fight, text) {
      fight.lines.unshift(text);
      if (fight.lines.length > 48) {
        fight.lines = fight.lines.slice(0, 48);
      }
    }

    function awardFightPressure(fight, side, amount) {
      fight.roundPoints[side] += amount;
      fightStateBySide(fight, side).score += amount;
    }

    function moveActor(fight, side, actionKey) {
      var actor = fightStateBySide(fight, side);
      var action = FIGHT_ACTIONS[actionKey];
      var fromX = actor.position.x + 1;
      var fromY = actor.position.y + 1;
      actor.position = {
        x: actor.position.x + action.dx,
        y: actor.position.y + action.dy
      };
      pushFightLine(fight, fightNameBySide(fight, side) + " смещается: " + fromX + ":" + fromY + " -> " + (actor.position.x + 1) + ":" + (actor.position.y + 1) + ".");
    }

    function fatalityRoll(loserState, loserCondition) {
      var risk = Math.max(0, loserState.trauma - 4) * 7;
      risk += Math.max(0, -loserState.hp) * 2;
      risk += Math.max(0, loserState.bodyDamage - 24) / 2;
      risk += Math.max(0, 42 - loserCondition) / 3;
      return chance(Math.max(0, Math.round(risk)));
    }

    function resolveKnockdown(fight, victimSide) {
      var victim = fightStateBySide(fight, victimSide);
      var attackerSide = otherSide(victimSide);
      var victimStats = fightStatsBySide(fight, victimSide);
      var victimName = fightNameBySide(fight, victimSide);
      var riseChance = 34 + victimStats.heart * 5 + victimStats.endurance * 2 - victim.trauma * 8 - victim.knockdowns * 15;
      awardFightPressure(fight, attackerSide, 12);
      riseChance = clamp(riseChance, 5, 88);
      if (victim.knockdowns < 2 && chance(riseChance)) {
        victim.knockdowns += 1;
        victim.hp = 12 + victimStats.heart * 2;
        victim.stamina = clamp(victim.stamina - 12, 0, 100);
        victim.trauma += 1;
        resetRingPositions(fight);
        pushFightLine(fight, victimName + " падает, встает на счет и бой возвращается в центр ринга.");
        return false;
      }
      pushFightLine(fight, victimName + " больше не поднимается после отсчета.");
      finalizeFight(
        victimSide === "player" ? "loss" : "win",
        "KO/TKO",
        [],
        fatalityRoll(victim, victimSide === "player" ? state.fighter.health : fight.opponent.condition) ? victimSide : ""
      );
      return true;
    }

    function strikeActor(fight, side, actionKey) {
      var attacker = fightStateBySide(fight, side);
      var defender = fightStateBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);
      var defenderStats = fightStatsBySide(fight, otherSide(side));
      var attackerName = fightNameBySide(fight, side);
      var defenderName = fightNameBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var distance = ringDistance(attacker.position, defender.position);
      var hitChance;
      var damage;
      var critical;
      var bodyDrain;
      attacker.stamina = clamp(attacker.stamina - (action.stamina + Math.max(0, distance - 1)), 0, 100);
      if (!canUseFightAction(fight, side, actionKey)) {
        pushFightLine(fight, attackerName + " выбрасывает " + action.label.toLowerCase() + ", но дистанция не позволяет попасть.");
        return false;
      }
      hitChance = action.accuracy + attackerStats.speed * 2 + attackerStats.technique * 2 + attackerStats.power * 0.4;
      hitChance -= defenderStats.speed * 1.5 + defenderStats.technique * 1.2 + defenderStats.heart * 0.35;
      hitChance -= Math.max(0, 40 - attacker.stamina) / 2;
      if (action.reach === "line" && distance === 2) {
        hitChance -= 8;
      }
      hitChance = clamp(Math.round(hitChance), 24, 90);
      if (!chance(hitChance)) {
        pushFightLine(fight, attackerName + " не доносит " + action.label.toLowerCase() + ", и " + defenderName + " уходит с линии атаки.");
        return false;
      }
      damage = action.damage + attackerStats.power * 1.1 + attackerStats.technique * 0.5 + attackerStats.speed * 0.2;
      damage -= defenderStats.endurance * 0.75 + defenderStats.heart * 0.25;
      if (action.reach === "line" && distance === 2) {
        damage -= 2;
      }
      if (actionKey === "uppercut") {
        damage += 2;
      } else if (actionKey === "hook") {
        damage += 1;
      } else if (actionKey === "jab") {
        damage -= 1;
      }
      damage = Math.max(4, Math.round(damage + rand(-2, 2)));
      critical = chance(clamp(8 + attackerStats.technique * 2 + (actionKey === "uppercut" ? 8 : 0) + (actionKey === "cross" ? 4 : 0), 8, 38));
      if (critical) {
        damage += rand(3, 6);
      }
      defender.hp -= damage;
      defender.damageTaken += damage;
      defender.trauma += action.trauma + (critical ? 1 : 0);
      if (chance(5)) {
        defender.trauma += 1;
        pushFightLine(fight, defenderName + " получает дополнительную травму после точного попадания.");
      }
      awardFightPressure(fight, side, damage + (critical ? 4 : 2));
      if (action.body) {
        bodyDrain = rand(6, 10) + Math.max(0, attackerStats.power - 5);
        defender.stamina = clamp(defender.stamina - bodyDrain, 0, 100);
        defender.bodyDamage += damage;
      }
      if (critical) {
        pushFightLine(fight, attackerName + " ловит момент и тяжело попадает: " + action.label + " проходит на " + damage + " урона.");
      } else {
        pushFightLine(fight, attackerName + " попадает ударом '" + action.label + "' и снимает " + damage + " прочности.");
      }
      if (action.body) {
        pushFightLine(fight, defenderName + " теряет темп после работы по корпусу.");
      }
      if (defender.hp <= 0) {
        return resolveKnockdown(fight, otherSide(side));
      }
      return false;
    }

    function doctorStopNeeded(fight, side) {
      var actor = fightStateBySide(fight, side);
      return actor.trauma >= 9 || (actor.bodyDamage >= 28 && actor.hp < actor.maxHp * 0.4);
    }

    function checkFightSafety(fight) {
      if (doctorStopNeeded(fight, "player")) {
        pushFightLine(fight, "Врач останавливает бой: твоему углу нельзя выпускать тебя дальше.");
        finalizeFight("loss", "Остановлен врачом", [], fatalityRoll(fight.playerState, state.fighter.health) ? "player" : "");
        return true;
      }
      if (doctorStopNeeded(fight, "opponent")) {
        pushFightLine(fight, "Угол соперника выбрасывает полотенце. Продолжать опасно.");
        finalizeFight("win", "Остановлен врачом", [], fatalityRoll(fight.opponentState, fight.opponent.condition) ? "opponent" : "");
        return true;
      }
      return false;
    }

    function availableFightActions(fight, side, type) {
      var keys = [];
      var key;
      for (key in FIGHT_ACTIONS) {
        if (FIGHT_ACTIONS.hasOwnProperty(key) && (!type || FIGHT_ACTIONS[key].type === type) && canUseFightAction(fight, side, key)) {
          keys.push(key);
        }
      }
      return keys;
    }

    function pickAIMove(fight, retreat) {
      var keys = ["move_up", "move_left", "move_right", "move_down"];
      var actor = fight.opponentState;
      var target = fight.playerState;
      var best = [];
      var bestScore = retreat ? -999 : 999;
      var i;
      var action;
      var nextPos;
      var distance;
      var score;
      for (i = 0; i < keys.length; i += 1) {
        if (!canUseFightAction(fight, "opponent", keys[i])) {
          continue;
        }
        action = FIGHT_ACTIONS[keys[i]];
        nextPos = { x: actor.position.x + action.dx, y: actor.position.y + action.dy };
        distance = ringDistance(nextPos, target.position);
        score = distance * 10 + ((nextPos.x === target.position.x || nextPos.y === target.position.y) ? 0 : 1);
        if (retreat) {
          if (score > bestScore) {
            bestScore = score;
            best = [keys[i]];
          } else if (score === bestScore) {
            best.push(keys[i]);
          }
        } else if (score < bestScore) {
          bestScore = score;
          best = [keys[i]];
        } else if (score === bestScore) {
          best.push(keys[i]);
        }
      }
      return best.length ? choice(best) : null;
    }

    function pickAiAction(fight) {
      var ai = fight.opponentState;
      var player = fight.playerState;
      var distance = ringDistance(ai.position, player.position);
      var attacks = availableFightActions(fight, "opponent", "attack");
      var retreat = ai.hp < ai.maxHp * 0.25 || ai.trauma >= 6 || ai.stamina < 16;
      if (attacks.length) {
        if (distance === 1) {
          if ((player.hp < player.maxHp * 0.32 || player.trauma >= 5) && canUseFightAction(fight, "opponent", "uppercut")) {
            return "uppercut";
          }
          if (canUseFightAction(fight, "opponent", "hook") && chance(60)) {
            return "hook";
          }
          if (canUseFightAction(fight, "opponent", "body") && chance(35)) {
            return "body";
          }
        } else {
          if (canUseFightAction(fight, "opponent", "cross") && chance(55)) {
            return "cross";
          }
          if (canUseFightAction(fight, "opponent", "jab") && chance(70)) {
            return "jab";
          }
        }
        return choice(attacks);
      }
      return pickAIMove(fight, retreat || distance === 1);
    }

    function finishFightRound() {
      var fight = state.fight;
      var playerCard = 10;
      var opponentCard = 10;
      var delta = fight.roundPoints.player - fight.roundPoints.opponent;
      if (delta >= 14) {
        opponentCard = 8;
      } else if (delta > 0) {
        opponentCard = 9;
      } else if (delta <= -14) {
        playerCard = 8;
      } else if (delta < 0) {
        playerCard = 9;
      }
      fight.judges.player += playerCard;
      fight.judges.opponent += opponentCard;
      fight.roundCards.unshift("Раунд " + fight.round + ": " + playerCard + "-" + opponentCard);
      fight.roundsCompleted = fight.round;
      pushFightLine(fight, "Раунд " + fight.round + " закрыт по активности: " + playerCard + "-" + opponentCard + ".");
      pushLog("Раунд " + fight.round + " завершен. Карточка отрезков: " + playerCard + "-" + opponentCard + ".", "warn");
      if (fight.round >= fight.opponent.rounds) {
        finalizeFight(
          fight.judges.player > fight.judges.opponent ? "win" : (fight.judges.player < fight.judges.opponent ? "loss" : "draw"),
          "Решение судей " + fight.judges.player + ":" + fight.judges.opponent,
          ["Судейские записки: " + fight.roundCards.slice(0).reverse().join(", ") + "."],
          ""
        );
        return;
      }
      fight.round += 1;
      fight.segment = 1;
      fight.playerActionsLeft = 3;
      fight.aiActionsLeft = 3;
      fight.roundPoints = { player: 0, opponent: 0 };
      resetRingPositions(fight);
      fight.playerState.stamina = clamp(fight.playerState.stamina + 16 + Math.floor(state.fighter.stats.endurance / 2), 0, 100);
      fight.opponentState.stamina = clamp(fight.opponentState.stamina + 16 + Math.floor(fight.opponent.stats.endurance / 2), 0, 100);
      pushFightLine(fight, "Стартует раунд " + fight.round + ". Бойцов снова сводят в центр.");
    }

    function completeFightSegment() {
      var fight = state.fight;
      if (fight.result) {
        return;
      }
      if (checkFightSafety(fight)) {
        return;
      }
      pushFightLine(fight, "Отрезок " + fight.segment + " завершен. Дистанция между бойцами: " + ringDistance(fight.playerState.position, fight.opponentState.position) + " клетк.");
      if (fight.segment >= 10) {
        finishFightRound();
        return;
      }
      fight.segment += 1;
      fight.playerActionsLeft = 3;
      fight.aiActionsLeft = 3;
      fight.playerState.stamina = clamp(fight.playerState.stamina + 3, 0, 100);
      fight.opponentState.stamina = clamp(fight.opponentState.stamina + 3, 0, 100);
      pushFightLine(fight, "Раунд " + fight.round + ", отрезок " + fight.segment + ". На оба угла снова по 3 действия.");
    }

    function startFight(index) {
      var opponent = state.opponents[index];
      state.fight = {
        opponent: opponent,
        round: 1,
        segment: 1,
        uiTab: "controls",
        actionGroup: "move",
        playerActionsLeft: 3,
        aiActionsLeft: 3,
        playerState: buildFightState(state.fighter.stats, state.fighter.health, startRingPosition("player")),
        opponentState: buildFightState(opponent.stats, opponent.condition, startRingPosition("opponent")),
        lines: [
          "Бой против " + fullOpponentName(opponent) + " начинается. Ринг 5x5, в каждом раунде 10 отрезков по 3 действия."
        ],
        result: null,
        method: null,
        fatality: "",
        roundsCompleted: 0,
        judges: { player: 0, opponent: 0 },
        roundPoints: { player: 0, opponent: 0 },
        roundCards: []
      };
      state.panel = "fightLive";
      render();
    }

    function openFightTab(tabKey) {
      if (!state.fight) {
        return;
      }
      state.fight.uiTab = tabKey;
      render();
    }

    function openFightActionGroup(groupKey) {
      if (!state.fight) {
        return;
      }
      state.fight.uiTab = "controls";
      state.fight.actionGroup = groupKey;
      render();
    }

    function fightAction(actionKey) {
      var fight = state.fight;
      var action = FIGHT_ACTIONS[actionKey];
      var aiActionKey;
      if (!fight || fight.result || !action || fight.playerActionsLeft <= 0) {
        return;
      }
      if (!canUseFightAction(fight, "player", actionKey)) {
        pushFightLine(fight, "Это действие сейчас недоступно по позиции на ринге.");
        render();
        return;
      }
      if (action.type === "move") {
        moveActor(fight, "player", actionKey);
      } else if (strikeActor(fight, "player", actionKey)) {
        return;
      }
      fight.playerActionsLeft -= 1;
      if (fight.result || checkFightSafety(fight)) {
        return;
      }
      if (fight.aiActionsLeft > 0) {
        aiActionKey = pickAiAction(fight);
        if (aiActionKey) {
          if (FIGHT_ACTIONS[aiActionKey].type === "move") {
            moveActor(fight, "opponent", aiActionKey);
          } else if (strikeActor(fight, "opponent", aiActionKey)) {
            fight.aiActionsLeft -= 1;
            return;
          }
          fight.aiActionsLeft -= 1;
        } else {
          fight.aiActionsLeft = 0;
          pushFightLine(fight, fullOpponentName(fight.opponent) + " теряет темп и не находит чистого действия.");
        }
      }
      if (fight.result || checkFightSafety(fight)) {
        return;
      }
      if (fight.playerActionsLeft <= 0 && fight.aiActionsLeft <= 0) {
        completeFightSegment();
        if (fight.result) {
          return;
        }
      }
      render();
    }

    function playFightRound(playerTactic) {
      fightAction(playerTactic);
    }

    function renderFightActionButton(actionKey, className) {

    function finalizeFight(result, method, lines, fatality) {
      var fight = state.fight;
      var extraLines = lines || [];
      fight.result = result;
      fight.method = method;
      fight.fatality = fatality;
      fight.roundsCompleted = Math.max(fight.roundsCompleted, fight.round);
      fight.lines = extraLines.concat(fight.lines);
      applyFightResults();
      if (evaluateEndState()) {
        return;
      }
      advanceWeek();
      if (evaluateEndState()) {
        return;
      }
      state.panel = "fightResult";
      render();
    }

    function applyFightResults() {
      var fight = state.fight;
      var fighter = state.fighter;
      var opponent = fight.opponent;
      var injury = Math.floor(fight.playerState.damageTaken * 0.32 + fight.playerState.trauma * 5 + fight.playerState.knockdowns * 8 + fight.playerState.bodyDamage * 0.35);
      var fameGain;
      fighter.health -= injury;
      fighter.stress += 7 + fight.playerState.trauma * 4 + Math.floor(fight.playerState.bodyDamage / 5);
      if (fight.result === "win") {
        fighter.wins += 1;
        fighter.money += opponent.purse;
        fighter.fame += opponent.fameReward;
        fighter.morale += 10;
        if (fight.method.indexOf("KO") !== -1) {
          fighter.kos += 1;
        }
        pushLog("Победа. Ты забираешь $" + opponent.purse + " и +" + opponent.fameReward + " к известности.", "good");
      } else if (fight.result === "loss") {
        fameGain = Math.max(2, Math.floor(opponent.fameReward / 3));
        fighter.losses += 1;
        fighter.money += Math.floor(opponent.purse * 0.35);
        fighter.fame += fameGain;
        fighter.morale -= 12;
        fighter.stress += 6;
        pushLog("Поражение. Даже оно приносит часть денег и оставляет шум вокруг имени.", "bad");
      } else {
        fameGain = Math.max(4, Math.floor(opponent.fameReward / 2));
        fighter.money += Math.floor(opponent.purse * 0.55);
        fighter.fame += fameGain;
        fighter.morale += 1;
        pushLog("Ничья. Ты выжил в рубке и ушел с деньгами и известностью.", "warn");
      }
      if (fight.fatality === "opponent") {
        fighter.deathsCaused += 1;
        fighter.fame += 12;
        fighter.relationship -= 10;
        fighter.stress += 18;
        pushLog("Бой закончился трагедией. Имя гремит сильнее, но цена за это чудовищная.", "bad");
      } else if (fight.fatality === "player") {
        fighter.alive = false;
        pushLog("Повреждения оказываются критическими. Этот бой становится последним.", "bad");
      }
      applyBounds(fighter);
    }

    function ringVector(fromPos, toPos) {
      return { dx: toPos.x - fromPos.x, dy: toPos.y - fromPos.y, adx: Math.abs(toPos.x - fromPos.x), ady: Math.abs(toPos.y - fromPos.y) };
    }

    function attackZone(fromPos, toPos) {
      var vector = ringVector(fromPos, toPos);
      if (vector.adx === 0 && vector.ady === 0) {
        return "same";
      }
      if (Math.max(vector.adx, vector.ady) === 1) {
        return "close";
      }
      if ((vector.adx === 0 && vector.ady <= 2) || (vector.ady === 0 && vector.adx <= 2) || (vector.adx === vector.ady && vector.adx === 2)) {
        return "line";
      }
      return "far";
    }

    function animationDirection(fromPos, toPos) {
      var vector = ringVector(fromPos, toPos);
      if (vector.adx >= vector.ady) {
        return vector.dx >= 0 ? "right" : "left";
      }
      return vector.dy >= 0 ? "down" : "up";
    }

    function setFightAnimation(attackerSide, mode) {
      var fight = state.fight;
      var attacker = attackerSide === "player" ? fight.playerState : fight.opponentState;
      var defender = attackerSide === "player" ? fight.opponentState : fight.playerState;
      fight.animation = {
        attackerSide: attackerSide,
        defenderSide: attackerSide === "player" ? "opponent" : "player",
        mode: mode,
        direction: animationDirection(attacker.position, defender.position)
      };
    }

    function clearFightAnimation() {

        state.fight.animation = null;
      }

    function tokenClassFor(side) {
      var fight = state.fight;
      var tokenClass = "token " + (side === "player" ? "player" : "opponent");
      var animation;
      if (!fight || !fight.animation) {
        return tokenClass;
      }
      animation = fight.animation;
      if (animation.attackerSide === side) {
        tokenClass += " attack-" + animation.direction;
      }
      if (animation.defenderSide === side) {
        tokenClass += animation.mode === "hit" ? " hit-react" : " dodge-" + animation.direction;
      }
      return tokenClass;
    }

    function canUseFightAction(fight, side, actionKey) {
      var actor = fightStateBySide(fight, side);
      var target = fightStateBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var nextX;
      var nextY;
      var zone;
      if (!action) {
        return false;
      }
      if (action.type === "move") {
        nextX = actor.position.x + action.dx;
        nextY = actor.position.y + action.dy;
        return insideRing(nextX, nextY) && !(target.position.x === nextX && target.position.y === nextY);
      }
      zone = attackZone(actor.position, target.position);
      if (action.reach === "close") {
        return zone === "close";
      }
      return zone === "line";
    }
