<html>
<head>
  <title>Fight Simulator</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=9" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <style>

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0d1117;
      color: #eff4fb;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(196, 73, 37, 0.26), transparent 26%),
        radial-gradient(circle at top right, rgba(229, 180, 90, 0.16), transparent 24%),
        linear-gradient(180deg, #12161d 0%, #0c1015 100%);
      overflow-x: hidden;
      overflow-y: auto;
      font-size: 20px;
      line-height: 1.5;
    }

    * {
      box-sizing: border-box;
    }

    .shell,
    .battle-shell {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
    }

    .update-banner-wrap {
      padding: 12px 12px 0 12px;
    }

    .update-banner {
      padding: 16px 18px;
      background: linear-gradient(135deg, rgba(217, 77, 103, 0.95), rgba(185, 45, 72, 0.95));
      border-color: rgba(255, 255, 255, 0.14);
      color: #fff4f6;
    }

    .update-banner strong {
      display: block;
      font-size: 22px;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .update-banner p {
      margin: 0 0 12px 0;
      font-size: 17px;
      line-height: 1.45;
      color: #fff4f6;
    }

    .update-banner .button {
      min-height: 58px;
      margin-bottom: 0;
      background: #fff4f6;
      color: #8e2039;
    }

    .debug-dock {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .debug-toggle {
      min-width: 72px;
      min-height: 46px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(8, 12, 18, 0.96);
      color: #f8cf76;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .debug-panel {
      width: 240px;
      padding: 12px 14px;
      border: 1px solid rgba(248, 207, 118, 0.24);
      border-radius: 16px;
      background: rgba(8, 12, 18, 0.96);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
      color: #f5f8ff;
      font-size: 14px;
      line-height: 1.4;
    }

    .debug-panel strong {
      display: block;
      margin-bottom: 8px;
      color: #f8cf76;
      font-size: 15px;
    }

    .debug-row {
      margin-bottom: 6px;
    }

    .debug-row:last-child {
      margin-bottom: 0;
    }

    .topbar,
    .panel,
    .hero,
    .card,
    .create-card,
    .battle-topbar,
    .battle-stage,
    .battle-bottom,
    .battle-result {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(17, 22, 29, 0.92);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      border-radius: 20px;
    }

    .topbar,
    .panel,
    .hero,
    .battle-topbar,
    .battle-stage,
    .battle-bottom,
    .battle-result {
      padding: 18px;
      margin-bottom: 12px;
    }

    .card,
    .create-card {
      padding: 16px;
      margin-bottom: 10px;
      border-radius: 18px;
    }

    .hero {
      min-height: calc(100vh - 24px);
    }

    .menu-hero {
      min-height: calc(100vh - 24px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      text-align: center;
      padding-top: 6vh;
      background:
        radial-gradient(circle at top, rgba(211, 66, 66, 0.22), transparent 34%),
        linear-gradient(180deg, rgba(20, 24, 31, 0.98) 0%, rgba(11, 15, 21, 0.98) 100%);
    }

    .menu-stack {
      width: 100%;
      max-width: none;
      margin: 0 auto;
    }

    .menu-title {
      width: 100%;
      margin: 0 0 40px 0;
      color: #ffd8dd;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 122px;
      line-height: 0.86;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 0 0 #000, 0 8px 24px rgba(0, 0, 0, 0.42);
    }

    .menu-title span {
      display: block;
      width: 100%;
      padding: 14px 8px 16px 8px;
      background: linear-gradient(135deg, #d94d67, #b92d48);
      color: #fff4f6;
      box-shadow: 0 16px 34px rgba(185, 45, 72, 0.3);
      transform: rotate(-2deg);
    }

    .menu-actions {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    .menu-actions .button,
    .menu-actions .ghost {
      min-height: 84px;
      font-size: 28px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .tab-screen {
      min-height: calc(100vh - 176px);
    }

    .tab-screen > .panel:first-child,
    .tab-screen > .hero:first-child {
      min-height: calc(100vh - 176px);
    }

    .hero .footer-actions {
      margin-top: auto;
      padding-top: 6px;
    }

    .page-stack {
      min-height: calc(100vh - 176px);
    }

    .fill-panel {
      min-height: calc(100vh - 210px);
    }

    .inset-panel {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: none;
    }

    .page-home .panel:first-child {
      min-height: 50vh;
    }

    .page-home .panel:last-child,
    .page-careerLog .panel:first-child,
    .page-skills .panel:first-child,
    .page-retire .panel:first-child {

    }

    .page-careerLog .log-list {
      min-height: 52vh;
    }

    .brand {
      display: block;
      margin-bottom: 12px;
    }

    .eyebrow {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .title {
      font-size: 42px;
      line-height: 1.15;
      font-weight: 700;
      margin: 0;
    }

    .subtitle,
    .muted,
    .empty-state,
    .card p,
    .create-card p {

      font-size: 20px;
      line-height: 1.55;
      margin: 0;
    }

    .week-chip,
    .chip {
      display: inline-block;
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #eff4fb;
      font-size: 18px;
      font-weight: 700;
      margin: 0 8px 8px 0;
      vertical-align: top;
    }

    .week-chip {
      background: rgba(255, 255, 255, 0.12);
      color: #ffe7a8;
    }

    .chip.gold {
      background: linear-gradient(135deg, #f4c56b, #dba647);
      color: #10151b;
    }

    .chip.red {
      background: linear-gradient(135deg, #d1583d, #a33227);
      color: #fff4ef;
    }

    .panel-title {
      margin: 0 0 14px 0;
      font-size: 34px;
      line-height: 1.2;
    }

    .fighter-name {
      font-size: 46px;
      line-height: 1.15;
      font-weight: 700;
      margin: 0 0 12px 0;
    }

    .fighter-class {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .nameplate {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 12px;
    }

    .footer-actions,
    .record-row,
    .battle-tabs,
    .battle-chip-line,
    .split-row {
      display: block;
    }

    .footer-actions:after,
    .record-row:after,
    .battle-tabs:after,
    .battle-chip-line:after,
    .split-row:after,
    .topbar:after,
    .battle-topbar:after,
    .battle-bottom:after {
      content: "";
      display: block;
      clear: both;
    }

    .nav-row,
    .battle-mode-row,
    .battle-actions-row {
      font-size: 0;
    }

    .nav-row .button,
    .nav-row .ghost {
      display: inline-block;
      width: 19.2%;
      margin-right: 1%;
      min-width: 0;
      min-height: 56px;
      padding: 12px 4px;
      font-size: 16px;
      vertical-align: top;
    }

    .nav-row .button:last-child,
    .nav-row .ghost:last-child {
      margin-right: 0;
    }

    .create-grid,
    .card-grid,
    .choice-grid,
    .fight-grid {
      display: block;
      margin-top: 14px;
    }

    .create-grid {
      font-size: 0;
    }

    .create-grid .create-card {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
      vertical-align: top;
      font-size: 20px;
    }

    .create-grid .create-card:nth-child(2n) {
      margin-right: 0;
    }

    .npc-card {
      margin-bottom: 12px;
    }

    .npc-meta-line {
      margin: 8px 0 12px 0;
    }

    .npc-action-grid {
      font-size: 0;
      margin-top: 12px;
    }

    .npc-action-grid .button,
    .npc-action-grid .ghost,
    .npc-action-grid .danger {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
      min-width: 0;
      min-height: 58px;
      padding: 12px 10px;
      font-size: 18px;
      vertical-align: top;
    }

    .npc-action-grid .button:nth-child(2n),
    .npc-action-grid .ghost:nth-child(2n),
    .npc-action-grid .danger:nth-child(2n) {
      margin-right: 0;
    }

    .button,
    .ghost,
    .danger {
      display: block;
      width: 100%;
      min-height: 64px;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      margin: 0 0 10px 0;
      font-size: 21px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      white-space: normal;
    }

    .button {
      background: linear-gradient(135deg, #f4c56b, #dba647);
      color: #10151b;
    }

    .ghost {
      background: #eef2f7;
      color: #10151b;
    }

    .danger {
      background: linear-gradient(135deg, #d1583d, #a33227);
      color: #fff4ef;
    }

    .button[disabled],
    .ghost[disabled],
    .danger[disabled] {
      opacity: 0.4;
      cursor: default;
    }

    .card h3,
    .create-card h3 {
      margin: 0 0 10px 0;
      font-size: 28px;
      line-height: 1.25;
    }

    .meta {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .create-card.selected {
      border-color: rgba(244, 197, 107, 0.88);
      box-shadow: 0 0 0 1px rgba(244, 197, 107, 0.32), 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .meter-block {
      margin-top: 12px;
    }

    .meter-row {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .meter-row span {
      color: #d7e0ea;
    }

    .meter-row strong {
      float: right;
      color: #ffffff;
    }

    .meter {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(135deg, #f4c56b, #dba647);
    }

    .empty-state {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
    }

    .log-list {
      margin-top: 12px;
    }

    .log-entry {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 10px;
      font-size: 20px;
      line-height: 1.5;
    }

    .log-entry.good {
      border-left: 4px solid #61d59a;
    }

    .log-entry.warn {
      border-left: 4px solid #f5c86f;
    }

    .log-entry.bad {
      border-left: 4px solid #d1583d;
    }

    .battle-shell {
      padding: 12px;
    }

    .battle-topbar,
    .battle-stage,
    .battle-bottom {
      width: 100%;
    }

    .battle-stage {
      min-height: 58vh;
    }

    .battle-result {
      min-height: calc(100vh - 24px);
    }

    .battle-health-card {
      width: 100%;
      margin-bottom: 10px;
    }

    .battle-health-card:last-child,
    .battle-column:last-child,
    .battle-panel:last-child,
    .panel:last-child,
    .card:last-child,
    .create-card:last-child {
      margin-bottom: 0;
    }

    .battle-column,
    .summary-box {
      width: 100%;
      margin-bottom: 10px;
    }

    .battle-panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .battle-panel strong {
      display: block;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .battle-log {
      max-height: none;
      overflow: visible;
    }

    .battle-tabs .button,
    .battle-tabs .ghost {
      display: inline-block;
      width: 32%;
      margin-right: 1%;
      min-width: 0;
      min-height: 54px;
      padding: 12px 8px;
      font-size: 20px;
    }

    .battle-tabs .button:last-child,
    .battle-tabs .ghost:last-child {
      margin-right: 0;
    }

    .battle-actions-row .button,
    .battle-actions-row .ghost,
    .battle-actions-row .danger {
      width: 100%;
      min-height: 72px;
      padding: 14px 12px;
      margin-bottom: 6px;
    }

    .battle-mode-row .button,
    .battle-mode-row .ghost {
      display: inline-block;
      width: 32%;
      margin-right: 2%;
      min-width: 0;
      vertical-align: top;
    }

    .battle-mode-row .button:nth-child(3n),
    .battle-mode-row .ghost:nth-child(3n) {
      margin-right: 0;
    }

    .battle-actions-row .fight-action-item {
      width: 100%;
      margin-bottom: 12px;
      vertical-align: top;
    }

    .battle-actions-row.move-grid .fight-action-item {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
    }

    .battle-actions-row.move-grid .fight-action-item:nth-child(2n) {
      margin-right: 0;
    }

    .battle-actions-row.attack-grid .fight-action-item {
      display: inline-block;
      width: 32%;
      margin-right: 2%;
    }

    .battle-actions-row.attack-grid .fight-action-item:nth-child(3n) {
      margin-right: 0;
    }

    .battle-actions-row.defense-grid .fight-action-item {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
    }

    .battle-actions-row.defense-grid .fight-action-item:nth-child(2n) {
      margin-right: 0;
    }

    .battle-stage {
      min-height: 0;
      padding-bottom: 14px;
    }

    .controls-stage .ring-board {
      margin-bottom: 12px;
    }

    .action-button-title {
      display: block;
      font-size: 24px;
      line-height: 1.2;
    }

    .action-button-meta {
      display: block;
      font-size: 20px;
      line-height: 1.45;
      font-weight: 800;
      text-align: center;
      padding: 2px 4px 0 4px;
    }

    .action-button-meta span {
      display: block;
      margin: 0 0 4px 0;
    }

    .action-blue {
      color: #7fd0ff;
    }

    .action-red {
      color: #ff8a80;
    }

    .action-yellow {
      color: #ffe189;
    }

    .dev-header {
      margin-bottom: 14px;
    }

    .dev-highlight {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 12px;
    }

    .dev-progress {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      margin-top: 8px;
    }

    .dev-progress span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(135deg, #f4c56b, #dba647);
    }

    .dev-meta {
      color: #ced8e4;
      font-size: 18px;
      line-height: 1.45;
      margin-top: 8px;
    }

    .dev-mini {
      color: #ced8e4;
      font-size: 17px;
      line-height: 1.45;
      margin-top: 6px;
    }

    .perk-card.active {
      border-color: rgba(244, 197, 107, 0.68);
      box-shadow: 0 0 0 1px rgba(244, 197, 107, 0.22), 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .perk-state {
      margin-top: 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .perk-state.ready {
      color: #ffe189;
    }

    .perk-state.locked {
      color: #ced8e4;
    }

    .perk-state.active {
      color: #61d59a;
    }

    .knockdown-banner {
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(209, 88, 61, 0.95), rgba(163, 50, 39, 0.95));
      color: #fff4ef;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ring-board {
      display: block;
      width: 100%;
      max-width: none;
      height: 92vw;
      min-height: 360px;
      max-height: 520px;
      margin: 16px auto 0 auto;
      padding: 44px 8px 48px 8px;
      background-color: #d9dee6;
      background-image: url('ring_top_view.png');
      background-repeat: no-repeat;
      background-position: center 33%;
      background-size: 132% 130%;
      text-align: center;
      font-size: 0;
    }

    .ring-row {
      display: block;
      white-space: nowrap;
      margin-bottom: 8px;
    }

    .ring-cell {
      width: 18%;
      height: 16vw;
      min-height: 54px;
      max-height: 76px;
      margin: 0 1% 0 1%;
      display: inline-block;
      vertical-align: top;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(15, 20, 28, 0.12);
      position: relative;
      text-align: center;
    }

    .ring-cell:after {
      content: attr(data-cell);
      position: absolute;
      right: 5px;
      bottom: 4px;
      color: rgba(255, 255, 255, 0.28);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .token {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: inline-block;
      margin: 6px auto 0 auto;
      line-height: 42px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
      position: relative;
      transition: background 0.5s ease, box-shadow 0.5s ease, color 0.5s ease;
    }

    .token.player {
      background: linear-gradient(135deg, #f4c56b, #dd9e39);
      color: #10151b;
    }

    .token.opponent {
      background: linear-gradient(135deg, #d35433, #9b2d24);
      color: #fff4ef;
    }

    .token.attack-right { animation: tokenAttackRight 0.32s ease-out; }
    .token.attack-left { animation: tokenAttackLeft 0.32s ease-out; }
    .token.attack-up { animation: tokenAttackUp 0.32s ease-out; }
    .token.attack-down { animation: tokenAttackDown 0.32s ease-out; }
    .token.hit-react { animation: tokenHitReact 0.26s linear 1; }
    .token.crit-flash {
      background: linear-gradient(135deg, #ff6f61, #d12e2e) !important;
      color: #fff4ef !important;
      box-shadow: 0 0 0 4px rgba(255, 111, 97, 0.18), 0 12px 26px rgba(0, 0, 0, 0.28);
    }
    .token.dodge-right { animation: tokenDodgeRight 0.32s ease-out; }
    .token.dodge-left { animation: tokenDodgeLeft 0.32s ease-out; }
    .token.dodge-up { animation: tokenDodgeUp 0.32s ease-out; }
    .token.dodge-down { animation: tokenDodgeDown 0.32s ease-out; }

    @keyframes tokenAttackRight {
      0% { transform: translateX(0); }
      35% { transform: translateX(16px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenAttackLeft {
      0% { transform: translateX(0); }
      35% { transform: translateX(-16px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenAttackUp {
      0% { transform: translateY(0); }
      35% { transform: translateY(-16px); }
      100% { transform: translateY(0); }
    }

    @keyframes tokenAttackDown {
      0% { transform: translateY(0); }
      35% { transform: translateY(16px); }
      100% { transform: translateY(0); }
    }

    @keyframes tokenHitReact {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-6px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenDodgeRight {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(14px) translateY(-10px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeLeft {

        development.focusId = "technique";
      }
      if (typeof development.totalXp !== "number") {
        development.totalXp = 0;
      }
      if (typeof development.perkPoints !== "number") {
        development.perkPoints = 0;
      }
      if (!(development.activePerks instanceof Array)) {
        development.activePerks = [];
      }
      if (!development.focusProgress || typeof development.focusProgress !== "object") {
        development.focusProgress = {};
      }
      if (!development.styleProgress || typeof development.styleProgress !== "object") {
        development.styleProgress = {};
      }
      focuses = listTrainingFocuses();
      for (i = 0; i < focuses.length; i += 1) {
        if (typeof development.focusProgress[focuses[i].id] !== "number") {
          development.focusProgress[focuses[i].id] = 0;
        }
      }
      styles = listDevelopmentStyles();
      for (i = 0; i < styles.length; i += 1) {
        if (typeof development.styleProgress[styles[i].id] !== "number") {
          development.styleProgress[styles[i].id] = 0;
        }
      }
      development.totalXp = Math.max(0, Math.round(development.totalXp));
      development.perkPoints = Math.max(0, Math.round(development.perkPoints));
      development.activePerks = uniqueList(development.activePerks);
      return development;
    }

    function currentDevelopment(fighter) {
      return ensureDevelopmentState(fighter || state.fighter);
    }

    function currentFocus(fighter) {
      var development = currentDevelopment(fighter);
      return development ? getTrainingFocus(development.focusId) : null;
    }

    function developmentFocusValue(fighter, focusId) {
      var development = currentDevelopment(fighter);
      return development && typeof development.focusProgress[focusId] === "number" ? development.focusProgress[focusId] : 0;
    }

    function developmentStyleValue(fighter, styleId) {
      var development = currentDevelopment(fighter);
      return development && typeof development.styleProgress[styleId] === "number" ? development.styleProgress[styleId] : 0;
    }

    function styleTierAtProgress(styleDef, progress) {
      var i;
      var currentTier = null;
      if (!styleDef || !(styleDef.tiers instanceof Array)) {
        return null;
      }
      for (i = 0; i < styleDef.tiers.length; i += 1) {
        if (progress >= styleDef.tiers[i].threshold) {
          currentTier = styleDef.tiers[i];
        }
      }
      return currentTier;
    }

    function currentStyleSnapshot(fighter) {
      var styles = listDevelopmentStyles();
      var development = currentDevelopment(fighter);
      var focus = currentFocus(fighter);
      var bestStyle = null;
      var bestValue = -1;
      var i;
      var score;
      if (!development || !styles.length) {
        return null;
      }
      for (i = 0; i < styles.length; i += 1) {
        score = developmentStyleValue(fighter, styles[i].id);
        if (score === 0 && focus && focus.styleWeights && typeof focus.styleWeights[styles[i].id] === "number") {
          score = focus.styleWeights[styles[i].id] * 0.25;
        }
        if (score > bestValue) {
          bestValue = score;
          bestStyle = styles[i];
        }
      }
      return bestStyle ? {
        style: bestStyle,
        progress: developmentStyleValue(fighter, bestStyle.id),
        tier: styleTierAtProgress(bestStyle, developmentStyleValue(fighter, bestStyle.id))
      } : null;
    }

    function perkCategoryLabel(category) {
      return DATA.perkCategoryLabels && DATA.perkCategoryLabels[category] ? DATA.perkCategoryLabels[category] : "Перк";
    }

    function activeStyleBonuses(fighter) {
      var snapshot = currentStyleSnapshot(fighter);
      var bonuses = [];
      var i;
      if (!snapshot || !snapshot.style || !(snapshot.style.tiers instanceof Array)) {
        return bonuses;
      }
      for (i = 0; i < snapshot.style.tiers.length; i += 1) {
        if (snapshot.progress >= snapshot.style.tiers[i].threshold && snapshot.style.tiers[i].bonuses) {
          bonuses.push(snapshot.style.tiers[i].bonuses);
        }
      }
      return bonuses;
    }

    function activePerkDefinitions(fighter) {
      var development = currentDevelopment(fighter);
      var list = [];
      var i;
      var perk;
      if (!development) {
        return list;
      }
      for (i = 0; i < development.activePerks.length; i += 1) {
        perk = getDevelopmentPerk(development.activePerks[i]);
        if (perk) {
          list.push(perk);
        }
      }
      return list;
    }

    function allDevelopmentBonusSources(fighter) {
      var sources = activeStyleBonuses(fighter);
      var perks = activePerkDefinitions(fighter);
      var i;
      for (i = 0; i < perks.length; i += 1) {
        if (perks[i].bonuses) {
          sources.push(perks[i].bonuses);
        }
      }
      return sources;
    }

    function developmentScalarBonus(fighter, key) {
      var sources = allDevelopmentBonusSources(fighter);
      var total = 0;
      var i;
      for (i = 0; i < sources.length; i += 1) {
        if (sources[i] && typeof sources[i][key] === "number") {
          total += sources[i][key];
        }
      }
      return total;
    }

    function developmentActionBonus(fighter, key, actionKey) {
      var sources = allDevelopmentBonusSources(fighter);
      var total = 0;
      var i;
      var bucket;
      for (i = 0; i < sources.length; i += 1) {
        bucket = sources[i] ? sources[i][key] : null;
        if (bucket && typeof bucket[actionKey] === "number") {
          total += bucket[actionKey];
        }
      }
      return total;
    }

    function developmentTrainingBoostForFocus(focusId) {
      var gym = currentGym();
      var trainerType = currentTrainerType();
      var total = 0;
      var gymProfile = gym ? gymDevelopmentProfile(gym.id) : null;
      var trainerProfile = trainerType ? trainerDevelopmentProfile(trainerType.id) : null;
      if (gymProfile && gymProfile.focusBoosts && typeof gymProfile.focusBoosts[focusId] === "number") {
        total += gymProfile.focusBoosts[focusId];
      }
      if (trainerProfile && trainerProfile.focusBoosts && typeof trainerProfile.focusBoosts[focusId] === "number") {
        total += trainerProfile.focusBoosts[focusId];
      }
      return total;
    }

    function developmentStyleBoost(styleId) {
      var gym = currentGym();
      var trainerType = currentTrainerType();
      var total = 0;
      var gymProfile = gym ? gymDevelopmentProfile(gym.id) : null;
      var trainerProfile = trainerType ? trainerDevelopmentProfile(trainerType.id) : null;
      if (gymProfile && gymProfile.styleWeights && typeof gymProfile.styleWeights[styleId] === "number") {
        total += gymProfile.styleWeights[styleId];
      }
      if (trainerProfile && trainerProfile.styleWeights && typeof trainerProfile.styleWeights[styleId] === "number") {
        total += trainerProfile.styleWeights[styleId];
      }
      return total;
    }

    function trainingIntensityFactor(kind) {
      if (kind === "hard") {
        return 3;
      }
      if (kind === "medium") {
        return 2;
      }
      return 1;
    }

    function addDevelopmentXp(fighter, focusId, amount) {
      var development = currentDevelopment(fighter);
      var oldLevel;
      var newLevel;
      if (!development || !focusId || !amount) {
        return 0;
      }
      oldLevel = Math.floor(development.totalXp / 20);
      development.focusProgress[focusId] = Math.max(0, development.focusProgress[focusId] + amount);
      development.totalXp = Math.max(0, development.totalXp + amount);
      newLevel = Math.floor(development.totalXp / 20);
      if (newLevel > oldLevel) {
        development.perkPoints += newLevel - oldLevel;
      }
      return newLevel - oldLevel;
    }

    function addStyleProgress(fighter, styleId, amount) {
      var development = currentDevelopment(fighter);
      if (!development || !styleId || !amount) {
        return;
      }
      development.styleProgress[styleId] = Math.max(0, development.styleProgress[styleId] + amount);
    }

    function applyTrainingDevelopment(fighter, kind) {
      var focus = currentFocus(fighter);
      var perkPointGain;
      var focusXp;
      var focusLabel = focus ? focus.label : "Техника";
      var styleGains = [];
      var styleId;
      var amount;
      var perkXpBonus = developmentScalarBonus(fighter, "trainingXp");
      var i;
      if (!focus) {
        return null;
      }
      focusXp = (focus.xpByTraining && typeof focus.xpByTraining[kind] === "number" ? focus.xpByTraining[kind] : 0) + developmentTrainingBoostForFocus(focus.id) + perkXpBonus;
      perkPointGain = addDevelopmentXp(fighter, focus.id, focusXp);
      for (styleId in focus.styleWeights) {
        if (focus.styleWeights.hasOwnProperty(styleId)) {
          amount = focus.styleWeights[styleId] * trainingIntensityFactor(kind) + developmentStyleBoost(styleId);
          addStyleProgress(fighter, styleId, amount);
          styleGains.push({ styleId: styleId, amount: amount });
        }
      }
      for (i = 0; i < styleGains.length; i += 1) {
        styleGains[i].style = getDevelopmentStyle(styleGains[i].styleId);
      }
      return {
        focus: focusLabel,
        focusXp: focusXp,
        perkPointGain: perkPointGain,
        styleGains: styleGains
      };
    }

    function perkRequirementMet(perk, fighter) {
      var req = perk ? perk.requirements || {} : {};
      var key;
      if (!perk || !fighter) {
        return false;
      }
      if (req.styleAtLeast) {
        for (key in req.styleAtLeast) {
          if (req.styleAtLeast.hasOwnProperty(key) && developmentStyleValue(fighter, key) < req.styleAtLeast[key]) {
            return false;
          }
        }
      }
      if (req.focusAtLeast) {
        for (key in req.focusAtLeast) {
          if (req.focusAtLeast.hasOwnProperty(key) && developmentFocusValue(fighter, key) < req.focusAtLeast[key]) {
            return false;
          }
        }
      }
      if (req.statAtLeast) {
        for (key in req.statAtLeast) {
          if (req.statAtLeast.hasOwnProperty(key) && (!fighter.stats || fighter.stats[key] < req.statAtLeast[key])) {
            return false;
          }
        }
      }
      if (typeof req.weekAtLeast === "number" && fighter.week < req.weekAtLeast) {
        return false;
      }
      if (typeof req.fameAtLeast === "number" && fighter.fame < req.fameAtLeast) {
        return false;
      }
      if (typeof req.moraleAtLeast === "number" && fighter.morale < req.moraleAtLeast) {
        return false;
      }
      if (typeof req.supportAtLeast === "number" && fighter.support < req.supportAtLeast) {
        return false;
      }
      return true;
    }

    function perkRequirementText(perk) {
      var req = perk ? perk.requirements || {} : {};
      var parts = [];
      var key;
      if (req.styleAtLeast) {
        for (key in req.styleAtLeast) {
          if (req.styleAtLeast.hasOwnProperty(key)) {
            parts.push((getDevelopmentStyle(key) ? getDevelopmentStyle(key).label : key) + " " + req.styleAtLeast[key]);
          }
        }
      }
      if (req.focusAtLeast) {
        for (key in req.focusAtLeast) {
          if (req.focusAtLeast.hasOwnProperty(key)) {
            parts.push((getTrainingFocus(key) ? getTrainingFocus(key).label : key) + " " + req.focusAtLeast[key]);
          }
        }
      }
      if (req.statAtLeast) {
        for (key in req.statAtLeast) {
          if (req.statAtLeast.hasOwnProperty(key)) {
            parts.push(DATA.statLabels[key] + " " + req.statAtLeast[key]);
          }
        }
      }
      if (typeof req.weekAtLeast === "number") {
        parts.push("неделя " + req.weekAtLeast + "+");
      }
      if (typeof req.fameAtLeast === "number") {
        parts.push("слава " + req.fameAtLeast + "+");
      }
      if (typeof req.moraleAtLeast === "number") {
        parts.push("мораль " + req.moraleAtLeast + "+");
      }
      if (typeof req.supportAtLeast === "number") {
        parts.push("опора " + req.supportAtLeast + "+");
      }
      return parts.join(", ");
    }

    function unlockPerk(perkId) {
      var fighter = state.fighter;
      var development = currentDevelopment(fighter);
      var perk = getDevelopmentPerk(perkId);
      if (!fighter || !development || !perk) {
        return;
      }
      if (containsTag(development.activePerks, perkId)) {
        pushLog("Этот перк уже активен.", "warn");
        render();
        return;
      }
      if (!perkRequirementMet(perk, fighter)) {
        pushLog("Для перка '" + perk.label + "' пока не выполнены требования.", "bad");
        render();
        return;
      }
      if (development.perkPoints < 1) {
        pushLog("Пока нет очков перков.", "bad");
        render();
        return;
      }
      development.perkPoints -= 1;
      development.activePerks.push(perkId);
      development.activePerks = uniqueList(development.activePerks);
      pushLog("Открыт перк '" + perk.label + "'.", "good");
      render();
    }

    function setTrainingFocus(focusId) {
      var development = currentDevelopment(state.fighter);
      var focus = getTrainingFocus(focusId);
      if (!development || !focus || development.focusId === focusId) {
        return;
      }
      development.focusId = focusId;
      pushLog("Лагерь смещает акцент на направление '" + focus.label + "'.", "warn");
      render();
    }

    function developmentProgressPercent(currentValue, threshold) {
      if (threshold <= 0) {
        return 100;
      }
      return clamp(Math.round((currentValue / threshold) * 100), 0, 100);
    }

    function nextStyleThreshold(styleDef, progress) {
      var i;
      if (!styleDef || !(styleDef.tiers instanceof Array)) {
        return null;
      }
      for (i = 0; i < styleDef.tiers.length; i += 1) {
        if (progress < styleDef.tiers[i].threshold) {
          return styleDef.tiers[i];
        }
      }
      return null;
    }

    function summarizeDevelopmentBonuses(bonuses) {
      var parts = [];
      var key;
      var action;
      if (!bonuses) {
        return "Без заметного эффекта.";
      }
      if (bonuses.dodge) {
        parts.push("уклон +" + bonuses.dodge + "%");
      }
      if (bonuses.critChance) {
        parts.push("крит +" + bonuses.critChance + "%");
      }
      if (bonuses.counterChance) {
        parts.push("контратака +" + bonuses.counterChance + "%");
      }
      if (bonuses.blockReduction) {
        parts.push("блок сильнее на " + Math.round(bonuses.blockReduction * 100) + "%");
      }
      if (bonuses.turnRecoveryStamina) {
        parts.push("стамина/ход +" + bonuses.turnRecoveryStamina);
      }
      if (bonuses.trainingPointsFlat) {
        parts.push("очки тренировки +" + bonuses.trainingPointsFlat);
      }
      if (bonuses.trainingXp) {
        parts.push("XP лагеря +" + bonuses.trainingXp);
      }
      if (bonuses.travelDiscountPercent) {
        parts.push("перелёты -" + bonuses.travelDiscountPercent + "%");
      }
      if (bonuses.workMoney) {
        parts.push("работа +$" + bonuses.workMoney);
      }
      if (bonuses.offerPurse) {
        parts.push("офферы +$" + bonuses.offerPurse);
      }
      if (bonuses.offerFame) {
        parts.push("известность офферов +" + bonuses.offerFame);
      }
      if (bonuses.toxicRiskGuard) {
        parts.push("токсичность -" + bonuses.toxicRiskGuard + "%");
      }
      if (bonuses.supportGain) {
        parts.push("опора +" + bonuses.supportGain);
      }
      if (bonuses.recoverStressRelief) {
        parts.push("стресс восстановления " + (bonuses.recoverStressRelief > 0 ? "-" : "+") + Math.abs(bonuses.recoverStressRelief));
      }
      if (bonuses.moraleShield) {
        parts.push("защита морали +" + bonuses.moraleShield);
      }
      if (bonuses.accuracyByAction) {
        for (action in bonuses.accuracyByAction) {
          if (bonuses.accuracyByAction.hasOwnProperty(action) && FIGHT_ACTIONS[action]) {
            parts.push(FIGHT_ACTIONS[action].label + " точность +" + bonuses.accuracyByAction[action] + "%");
          }
        }
      }
      if (bonuses.damageByAction) {
        for (action in bonuses.damageByAction) {
          if (bonuses.damageByAction.hasOwnProperty(action) && FIGHT_ACTIONS[action]) {
            parts.push(FIGHT_ACTIONS[action].label + " урон +" + bonuses.damageByAction[action]);
          }
        }
      }
      if (bonuses.staminaCostByAction) {
        for (action in bonuses.staminaCostByAction) {
          if (bonuses.staminaCostByAction.hasOwnProperty(action) && FIGHT_ACTIONS[action]) {
            parts.push(FIGHT_ACTIONS[action].label + " стамина " + bonuses.staminaCostByAction[action]);
          }
        }
      }
      if (!parts.length) {
        return "Без заметного эффекта.";
      }
      return parts.join(", ");
    }

    function summarizeDevelopmentProfile(profile) {
      var parts = [];
      var key;
      if (!profile) {
        return "Без смещения развития.";
      }
      if (profile.focusBoosts) {
        for (key in profile.focusBoosts) {
          if (profile.focusBoosts.hasOwnProperty(key) && getTrainingFocus(key)) {
            parts.push(getTrainingFocus(key).label + " +" + profile.focusBoosts[key] + " XP");
          }
        }
      }
      if (profile.styleWeights) {
        for (key in profile.styleWeights) {
          if (profile.styleWeights.hasOwnProperty(key) && getDevelopmentStyle(key)) {
            parts.push(getDevelopmentStyle(key).label + " +" + profile.styleWeights[key] + " к школе");
          }
        }
      }
      if (!parts.length) {
        return "Без смещения развития.";
      }
      return parts.join(", ");
    }

    function currentFightSideFighter(fight, side) {
      if (side === "player") {
        return state.fighter;
      }
      return fight && fight.opponent && fight.opponent.development ? fight.opponent : null;
    }

    function fightActionStaminaCost(fight, side, actionKey) {
      var action = FIGHT_ACTIONS[actionKey];
      var fighter = currentFightSideFighter(fight, side);
      if (!action) {
        return 0;
      }
      if (action.type === "defense") {
        return 0;
      }
      return Math.max(0, action.stamina + developmentActionBonus(fighter, "staminaCostByAction", actionKey));
    }

    function markFightStyle(fight, styleId, amount) {
      if (!fight || !fight.styleMarks || !styleId || !amount) {
        return;
      }
      if (typeof fight.styleMarks[styleId] !== "number") {
        fight.styleMarks[styleId] = 0;
      }
      fight.styleMarks[styleId] += amount;
    }

    function supportLabel(value) {
      if (value >= 75) {
        return "сильная опора";
      }
      if (value >= 55) {
        return "устойчивая связь";
      }
      if (value >= 35) {
        return "шаткий баланс";
      }
      return "одиночество";
    }

    function disciplineScore(fighter) {
      var housing = fighter ? getHousingOption(fighter.housingId || "normal") : null;
      var housingBonus = housing ? housing.disciplineBonus || 0 : 0;
      if (!fighter) {
        return 50;
      }
      return clamp(Math.round(20 + fighter.morale * 0.3 + fighter.support * 0.2 - fighter.stress * 0.15 - fighter.fatigue * 0.12 - fighter.wear * 0.08 + housingBonus), 0, 100);
    }

    function currentSupportScore() {
      return state.fighter ? clamp(state.fighter.support || 0, 0, 100) : 50;
    }

    function housingEffectSummary(housing) {
      var option = housing || currentHousing();
      var parts = [];
      if (!option) {
        return "Без выраженных бытовых эффектов.";
      }
      parts.push("расходы +$" + option.weeklyCost + "/нед.");
      parts.push("стресс " + (option.weeklyStress >= 0 ? "+" : "") + option.weeklyStress);
      parts.push("мораль " + (option.weeklyMorale >= 0 ? "+" : "") + option.weeklyMorale);
      parts.push("износ " + (option.weeklyWear >= 0 ? "+" : "") + option.weeklyWear);
      if (option.recoveryHealthBonus) {
        parts.push("восстановление " + (option.recoveryHealthBonus >= 0 ? "+" : "") + option.recoveryHealthBonus);
      }
      return parts.join(", ");
    }

    function signedNumber(value) {
      return (value > 0 ? "+" : "") + value;
    }

    function signedMoney(value) {
      return value >= 0 ? ("+$" + value) : ("-$" + Math.abs(value));
    }

    function hasBrokenText(value) {
      return typeof value === "string" && value.indexOf("\uFFFD") !== -1;
    }

    function safeUiText(value, fallback) {
      if (hasBrokenText(value)) {
        return fallback || "";
      }
      return value || fallback || "";
    }

    function moraleRecoveryModifier(fighter) {
      if (!fighter) {
        return 0;
      }
      if (fighter.morale >= 75) {
        return 4;
      }
      if (fighter.morale >= 60) {
        return 2;
      }
      if (fighter.morale <= 25) {
        return -4;
      }
      if (fighter.morale <= 40) {
        return -2;
      }
      return 0;
    }

    function housingRecoveryHealthBonus(fighter) {
      var housing = fighter ? getHousingOption(fighter.housingId || "normal") : null;
      return housing ? housing.recoveryHealthBonus || 0 : 0;
    }

    function housingRecoveryStressRelief(fighter) {
      var housing = fighter ? getHousingOption(fighter.housingId || "normal") : null;
      return housing ? housing.recoveryStressRelief || 0 : 0;
    }

    function weeklyHousingCost(fighter) {
      var housing = fighter ? getHousingOption(fighter.housingId || "normal") : null;
      return housing ? housing.weeklyCost || 0 : 0;
    }

    function socialSupportBuffer(fighter) {
      if (!fighter) {
        return 0;
      }
      if (fighter.support >= 80) {
        return 3;
      }
      if (fighter.support >= 60) {
        return 2;
      }
      if (fighter.support <= 25) {
        return -3;
      }
      if (fighter.support <= 40) {
        return -1;
      }
      return 0;
    }

    function applyHousingWeekEffects(fighter) {
      var housing = fighter ? getHousingOption(fighter.housingId || "normal") : null;
      var supportShift;
      if (!fighter || !housing) {
        return;
      }
      fighter.stress += housing.weeklyStress || 0;
      fighter.morale += housing.weeklyMorale || 0;
      fighter.wear += housing.weeklyWear || 0;
      supportShift = 0;
      if (housing.id === "rough" && fighter.support > 0) {
        supportShift = -1;
      } else if (housing.id === "comfortable" && fighter.support < 100) {
        supportShift = 1;
      }
      fighter.support += supportShift;
      if (supportShift !== 0) {
        pushLog("Быт влияет на твою опору: " + (supportShift > 0 ? "+" : "") + supportShift + ".", supportShift > 0 ? "good" : "warn");
      }
      pushLog("Условия жизни '" + housing.label + "': " + housingEffectSummary(housing) + ".", housing.weeklyStress > 0 || housing.weeklyWear > 0 ? "warn" : "good");
    }

    function fighterReadinessBonus(fighter) {
      if (!fighter) {
        return 0;
      }
      return clamp(Math.round((fighter.morale - 50) * 0.12 + (disciplineScore(fighter) - 50) * 0.08 + socialSupportBuffer(fighter) * 2), -10, 10);
    }

    function setHousing(housingId) {
      var fighter = state.fighter;
      var housing = getHousingOption(housingId);
      if (!fighter || !housing || fighter.housingId === housingId) {
        return;
      }
      fighter.housingId = housingId;
      applyBounds(fighter);
      refreshWorldState();
      pushLog("Теперь ты живёшь так: " + housing.label + ". " + housing.description, "warn");
      render();
    }

    function applySocialRelationEffect(effectDef) {
      var npc;
      var relation;
      if (!effectDef || !effectDef.role) {
        return;
      }
      npc = findNpcByRole(effectDef.role);
      relation = npc ? findRelationship(npc.id) : null;
      if (!npc || !relation) {
        return;
      }

    function uniqueList(list) {
      var out = [];

      var j;

      for (i = 0; i < list.length; i += 1) {
        if (typeof list[i] !== "string" || !list[i]) {
          continue;
        }
        exists = false;
        for (j = 0; j < out.length; j += 1) {
          if (out[j] === list[i]) {
            exists = true;
            break;
          }
        }
        if (!exists) {
          out.push(list[i]);
        }
      }
      return out;
    }

    function hasTag(list, value) {

        if ((state.world.rivalries[i].pendingRematch ? 1 : 0) > (best.pendingRematch ? 1 : 0) ||
