      makeNpc(currentCountry, "journalist");
      syncAllNpcRelationSnapshots();
      pushLog("Вокруг тебя собирается круг людей: тренер, друг, соперник, промоутер и ещё несколько важных контактов.", "warn");
    }

    function ensureNpcWorld() {
      var i;
      var existing;
      ensureLifeState();
      if (!state.fighter) {
        return;
      }
      if (!state.world.npcs.length) {
        generateCareerNpcWorld();
        return;
      }
      for (i = 0; i < state.world.npcs.length; i += 1) {
        existing = state.world.npcs[i];
        if (!(existing.history instanceof Array)) {
          existing.history = [];
        }
        if (!(existing.flags instanceof Array)) {
          existing.flags = [];
        }
        ensureRelationshipForNpc(existing);
      }
      addMissingNpcRole("trainer", state.fighter.homeCountry);
      addMissingNpcRole("friend", state.fighter.homeCountry);
      addMissingNpcRole("rival", state.fighter.homeCountry);
      addMissingNpcRole("promoter", state.fighter.currentCountry);
      syncAllNpcRelationSnapshots();
    }

    function containsTag(list, tag) {
      var i;
      if (!(list instanceof Array)) {
        return false;
      }
      for (i = 0; i < list.length; i += 1) {
        if (list[i] === tag) {
          return true;
        }
      }
      return false;
    }

    function findNpcByRole(roleId) {
      var i;
      ensureNpcWorld();
      for (i = 0; i < state.world.npcs.length; i += 1) {
        if (state.world.npcs[i].role === roleId) {
          return state.world.npcs[i];
        }
      }
      return null;
    }

    function findNpcByRoleInCountry(roleId, countryKey) {
      var i;
      var fallback = null;
      ensureNpcWorld();
      for (i = 0; i < state.world.npcs.length; i += 1) {
        if (state.world.npcs[i].role !== roleId) {
          continue;
        }
        if (!fallback) {
          fallback = state.world.npcs[i];
        }
        if (state.world.npcs[i].country === countryKey) {
          return state.world.npcs[i];
        }
      }
      return fallback;
    }

    function currentPromoterNpc() {
      return findNpcByRoleInCountry("promoter", state.fighter ? state.fighter.currentCountry : "");
    }

    function currentGymMembership() {
      ensureLifeState();
      return state.world.gymMembership;
    }

    function currentGym() {
      var membership = currentGymMembership();
      return membership && membership.gymId ? getGym(membership.gymId) : null;
    }

    function currentTrainerAssignment() {
      ensureLifeState();
      return state.world.trainerAssignment;
    }

    function currentTrainerNpc() {
      var assignment = currentTrainerAssignment();
      return assignment && assignment.npcId ? findNpcById(assignment.npcId) : null;
    }

    function currentTrainerType() {
      var assignment = currentTrainerAssignment();
      return assignment && assignment.trainerTypeId ? getTrainerType(assignment.trainerTypeId) : null;
    }

    function currentContract() {
      ensureLifeState();
      return state.world.activeContract;
    }

    function trainerSupportScale() {
      var assignment = currentTrainerAssignment();
      var relation = assignment ? findRelationship(assignment.npcId) : null;
      if (!assignment || !relation) {
        return 0;
      }
      if (relation.tension >= 75 || relation.trust <= 20) {
        return 0.2;
      }
      if (relation.tension >= 55 || relation.trust <= 35) {
        return 0.55;
      }
      if (relation.respect >= 65 && relation.trust >= 60) {
        return 1;
      }
      return 0.8;
    }

    function gymBonusValue(key) {
      var gym = currentGym();
      if (!gym || !gym.bonuses) {
        return 0;
      }
      return typeof gym.bonuses[key] === "number" ? gym.bonuses[key] : 0;
    }

    function trainerBonusValue(key) {
      var trainerType = currentTrainerType();
      var scale = trainerSupportScale();
      var baseValue;
      if (!trainerType || !trainerType.bonuses) {
        return 0;
      }
      baseValue = typeof trainerType.bonuses[key] === "number" ? trainerType.bonuses[key] : 0;
      if (baseValue === 0) {
        return 0;
      }
      return Math.round(baseValue * scale);
    }

    function promoterInfluence() {
      var promoter = currentPromoterNpc();
      var relation = promoter ? findRelationship(promoter.id) : null;
      var respect = relation ? relation.respect : 35;
      var trust = relation ? relation.trust : 30;
      var tension = relation ? relation.tension : 10;
      return {
        npc: promoter,
        purseBonus: Math.round((respect + trust - tension) / 7),
        offerBonus: clamp(Math.round((respect + trust) / 55) - 1, 0, 2),
        toxicShift: Math.round((tension - trust) / 3),
        repGuard: Math.round((respect - tension) / 10)
      };
    }

    function ensureTrainerNpcForGym(gym, trainerTypeId) {
      var i;
      var trainerType = getTrainerType(trainerTypeId);
      var npc;
      if (!gym || !trainerType) {
        return null;
      }
      ensureNpcWorld();
      for (i = 0; i < state.world.npcs.length; i += 1) {
        npc = state.world.npcs[i];
        if (npc.role === "trainer" && containsTag(npc.flags, gym.id) && containsTag(npc.flags, trainerTypeId)) {
          return npc;
        }
      }
      npc = makeNpc(gym.country, "trainer", {
        status: trainerType.label + " в " + gym.name,
        flags: [gym.id, trainerTypeId, "trainer_offer"],
        age: rand(29, 58)
      });
      npc.history = appendHistoryEntry(npc.history, {
        week: relationWeekStamp(),
        type: "career",
        text: "Доступен для найма в " + gym.name + "."
      }, 12);
      return npc;
    }

    function releaseTrainer(reason, silent) {
      var assignment = currentTrainerAssignment();
      var trainerNpc = currentTrainerNpc();
      if (!assignment) {
        return;
      }
      if (trainerNpc) {
        trainerNpc.status = reason || "больше не ведёт твой лагерь";
        trainerNpc.history = appendHistoryEntry(trainerNpc.history, {
          week: relationWeekStamp(),
          type: "career",
          text: reason || "Сотрудничество остановлено."
        }, 12);
      }
      state.world.trainerAssignment = null;
      if (!silent) {
        pushLog("Тренерский штаб изменился: " + (reason || "тренер ушёл из лагеря") + ".", "warn");
      }
    }

    function joinGym(gymId) {
      var gym = getGym(gymId);
      var previous = currentGym();
      var ownerRelation;
      if (!gym) {
        return;
      }
      ensureLifeState();
      state.world.gymMembership = {
        gymId: gym.id,
        joinedWeek: state.fighter.week,
        country: gym.country,
        city: gym.city,
        weeklyCost: gym.cost,
        reputation: gym.reputation,
        specialization: gym.specialization,
        bonuses: clonePlainData(gym.bonuses || {})
      };
      if (state.world.trainerAssignment && state.world.trainerAssignment.gymId !== gym.id) {
        releaseTrainer("смена зала оборвала прежний лагерь", true);
      }
      ownerRelation = findRelationship(findNpcByRoleInCountry("gym_owner", gym.country) ? findNpcByRoleInCountry("gym_owner", gym.country).id : "");
      if (ownerRelation) {
        ownerRelation.respect = clampRelationValue(ownerRelation.respect + 2);
        ownerRelation.trust = clampRelationValue(ownerRelation.trust + 1);
      }
      pushLog(previous ? ("Ты переходишь из " + previous.name + " в " + gym.name + ".") : ("Ты вступаешь в зал " + gym.name + "."), "good");
      refreshWorldState();
      render();
    }

    function hireTrainer(trainerTypeId) {
      var gym = currentGym();
      var trainerType = getTrainerType(trainerTypeId);
      var trainerNpc;
      var relation;
      if (!gym) {
        pushLog("Сначала нужен зал, чтобы собрать тренерский штаб.", "bad");
        render();
        return;
      }
      if (!trainerType || !containsTag(gym.trainerTypeIds || [], trainerTypeId)) {
        pushLog("Этот тренер не работает в текущем зале.", "bad");
        render();
        return;
      }
      trainerNpc = ensureTrainerNpcForGym(gym, trainerTypeId);
      if (!trainerNpc) {
        return;
      }
      if (state.world.trainerAssignment && state.world.trainerAssignment.npcId === trainerNpc.id) {
        pushLog(trainerNpc.name + " уже ведёт твой лагерь.", "warn");
        render();
        return;
      }
      if (state.world.trainerAssignment) {
        releaseTrainer("тренерский штаб был заменён", true);
      }
      state.world.trainerAssignment = {
        npcId: trainerNpc.id,
        trainerTypeId: trainerType.id,
        gymId: gym.id,
        hiredWeek: state.fighter.week,
        weeklyFee: trainerType.weeklyFee,
        status: "active"
      };
      relation = ensureRelationshipForNpc(trainerNpc);
      relation.respect = clampRelationValue(relation.respect + 6);
      relation.trust = clampRelationValue(relation.trust + 4);
      trainerNpc.status = "ведёт твой лагерь в " + gym.name;
      syncNpcRelationSnapshot(trainerNpc.id);
      pushLog(trainerNpc.name + " становится твоим тренером. Тип: " + trainerType.label + ".", "good");
      refreshWorldState();
      render();
    }

    function buildContractOffer(templateId) {
      var template = getContractTemplate(templateId);
      var promoterInfo = promoterInfluence();
      var promoter = promoterInfo.npc;
      var offer;
      if (!template || !promoter) {
        return null;
      }
      offer = {
        id: template.id + "_" + state.fighter.week + "_" + rand(100, 999),
        templateId: template.id,
        promoterId: promoter.id,
        label: template.label,
        durationWeeks: template.durationWeeks,
        guaranteedPurse: Math.max(50, template.guaranteedPurse + promoterInfo.purseBonus + developmentScalarBonus(state.fighter, "offerPurse")),
        winBonus: Math.max(10, template.winBonus + Math.round(promoterInfo.purseBonus * 0.5)),
        koBonus: Math.max(10, template.koBonus + trainerBonusValue("koBonus")),
        fameMultiplier: Math.max(0.85, template.fameMultiplier + (promoterInfo.repGuard * 0.01) + developmentScalarBonus(state.fighter, "offerFame") * 0.01),
        fightFrequency: Math.max(1, template.fightFrequency + promoterInfo.offerBonus),
        toxicRisk: clamp(template.toxicRisk + promoterInfo.toxicShift - gymBonusValue("toxicGuard") - trainerBonusValue("toxicGuard") - developmentScalarBonus(state.fighter, "toxicRiskGuard"), 0, 90),
        reputationDelta: template.reputationDelta + Math.max(0, promoterInfo.repGuard),
        conditionsText: template.conditionsText,
        description: template.description,
        promoterName: promoter.name
      };
      return offer;
    }

    function buildContractOffers() {
      var templates = [];
      var fighter = state.fighter;
      var promoter = currentPromoterNpc();
      var i;
      var offer;
      if (!fighter || !promoter || currentContract()) {
        return [];
      }
      templates.push("local_handshake");
      if (fighter.fame >= 8 || promoter.relationToPlayer.respect >= 45) {
        templates.push("road_grinder");
      }
      if (fighter.fame >= 16 || promoter.relationToPlayer.affinity >= 55) {
        templates.push("spotlight_push");
      }
      if (fighter.fame >= 24 || promoter.relationToPlayer.tension >= 40) {
        templates.push("shark_clause");
      }
      templates = uniqueList(templates);
      for (i = templates.length - 1; i >= 0; i -= 1) {
        offer = buildContractOffer(templates[i]);
        if (!offer) {
          templates.splice(i, 1);
        } else {
          templates[i] = offer;
        }
      }
      return templates.slice(0, 3);
    }

    function acceptContract(templateId) {
      var offer;
      var i;
      var promoter;
      var relation;
      if (currentContract()) {
        pushLog("Сначала нужно закрыть или дождаться конца текущего контракта.", "bad");
        render();
        return;
      }
      for (i = 0; i < state.world.offers.contractOffers.length; i += 1) {
        if (state.world.offers.contractOffers[i].templateId === templateId) {
          offer = state.world.offers.contractOffers[i];
          break;
        }
      }
      if (!offer) {
        return;
      }
      state.world.activeContract = {
        id: "contract_" + state.fighter.week + "_" + rand(1000, 9999),
        templateId: offer.templateId,
        promoterId: offer.promoterId,
        label: offer.label,
        signedWeek: state.fighter.week,
        endsWeek: state.fighter.week + offer.durationWeeks - 1,
        guaranteedPurse: offer.guaranteedPurse,
        winBonus: offer.winBonus,
        koBonus: offer.koBonus,
        fameMultiplier: offer.fameMultiplier,
        fightFrequency: offer.fightFrequency,
        toxicRisk: offer.toxicRisk,
        reputationDelta: offer.reputationDelta,
        conditionsText: offer.conditionsText,
        status: "active"
      };
      state.world.contracts.unshift(clonePlainData(state.world.activeContract));
      promoter = findNpcById(offer.promoterId);
      relation = promoter ? findRelationship(promoter.id) : null;
      if (relation) {
        relation.respect = clampRelationValue(relation.respect + 5);
        relation.trust = clampRelationValue(relation.trust + (offer.toxicRisk >= 35 ? 1 : 3));
        relation.tension = clampRelationValue(relation.tension + (offer.toxicRisk >= 35 ? 4 : 0));
        syncNpcRelationSnapshot(promoter.id);
      }
      pushLog("Подписан контракт '" + offer.label + "'. Гарантия $" + offer.guaranteedPurse + ", бонус за победу $" + offer.winBonus + ".", offer.toxicRisk >= 35 ? "warn" : "good");
      refreshWorldState();
      render();
    }

    function endActiveContract(reason, tone) {
      var contract = currentContract();
      var i;
      if (!contract) {
        return;
      }
      contract.status = "ended";
      for (i = 0; i < state.world.contracts.length; i += 1) {
        if (state.world.contracts[i].id === contract.id) {
          state.world.contracts[i].status = "ended";
        }
      }
      state.world.activeContract = null;
      pushLog(reason || ("Контракт '" + contract.label + "' завершён."), tone || "warn");
    }

    function activeContractFightFrequency() {
      var contract = currentContract();
      return contract ? Math.max(1, contract.fightFrequency || 1) : 1;
    }

    function latestFightActionMeta() {
      var history = state.world && state.world.eventState ? state.world.eventState.actionHistory : [];
      var i;
      for (i = 0; i < history.length; i += 1) {
        if (history[i] && history[i].type === "fight" && typeof history[i].week === "number" && history[i].week >= state.fighter.week - 3) {
          return history[i].meta || null;
        }
      }
      return null;
    }

    function pickAwayCountry() {
      var countries = listCountries();
      var pool = [];
      var i;
      for (i = 0; i < countries.length; i += 1) {
        if (countries[i].id !== state.fighter.currentCountry) {
          pool.push(countries[i].id);
        }
      }
      return pool.length ? choice(pool) : state.fighter.currentCountry;
    }

    function effectiveTravelBonusForCountry(countryKey) {
      var effects = ContentLoader.getCountryEffects(countryKey);
      if (!effects) {
        return { money: 1.0, fame: 1.0 };
      }
      if (countryKey === state.fighter.homeCountry) {
        return { money: effects.homeMoneyMultiplier, fame: effects.homeFameMultiplier };
      }
      return { money: 1.0, fame: effects.abroadFameMultiplier };
    }

    function opponentTierDevelopmentBase(tier) {
      if (tier === "danger") {
        return 68;
      }
      if (tier === "even") {
        return 44;
      }
      return 24;
    }

    function randomStyleByWeights(weights) {
      var styles = listDevelopmentStyles();
      var total = 0;
      var i;
      var roll;
      var weight;
      if (!(styles instanceof Array) || !styles.length) {
        return null;
      }
      for (i = 0; i < styles.length; i += 1) {
        weight = weights && typeof weights[styles[i].id] === "number" ? weights[styles[i].id] : 0;
        total += Math.max(0, weight);
      }
      if (total <= 0) {
        return choice(styles).id;
      }
      roll = rand(1, total);
      total = 0;
      for (i = 0; i < styles.length; i += 1) {
        weight = weights && typeof weights[styles[i].id] === "number" ? weights[styles[i].id] : 0;
        total += Math.max(0, weight);
        if (roll <= total) {
          return styles[i].id;
        }
      }
      return styles[0].id;
    }

    function buildOpponentDevelopment(profileDef, tier, gym, trainerType, stats) {
      var development = createDevelopmentState();
      var gymProfile = gym ? gymDevelopmentProfile(gym.id) : null;
      var trainerProfile = trainerType ? trainerDevelopmentProfile(trainerType.id) : null;
      var baseXp = opponentTierDevelopmentBase(tier) + rand(-4, 6);
      var focusId = profileDef && profileDef.focusId ? profileDef.focusId : "technique";
      var targetStyleId = randomStyleByWeights(profileDef ? profileDef.styleWeights : null) || "outboxer";
      var styleId;
      var styleAmount;
      var perkPool;
      var perkLimit;
      var i;
      var perk;
      development.focusId = focusId;
      development.totalXp = Math.max(0, baseXp);
      development.focusProgress[focusId] = Math.max(0, baseXp + (gymProfile && gymProfile.focusBoosts && gymProfile.focusBoosts[focusId] ? gymProfile.focusBoosts[focusId] * 4 : 0) + (trainerProfile && trainerProfile.focusBoosts && trainerProfile.focusBoosts[focusId] ? trainerProfile.focusBoosts[focusId] * 5 : 0));
      for (styleId in development.styleProgress) {
        if (development.styleProgress.hasOwnProperty(styleId)) {
          styleAmount = 4 + rand(0, 6);
          if (profileDef && profileDef.styleWeights && typeof profileDef.styleWeights[styleId] === "number") {
            styleAmount += profileDef.styleWeights[styleId] * 8;
          }
          if (gymProfile && gymProfile.styleWeights && typeof gymProfile.styleWeights[styleId] === "number") {
            styleAmount += gymProfile.styleWeights[styleId] * 4;
          }
          if (trainerProfile && trainerProfile.styleWeights && typeof trainerProfile.styleWeights[styleId] === "number") {
            styleAmount += trainerProfile.styleWeights[styleId] * 5;
          }
          if (styleId === targetStyleId) {
            styleAmount += baseXp;
          } else {
            styleAmount += Math.round(baseXp * 0.2);
          }
          development.styleProgress[styleId] = Math.max(0, styleAmount);
        }
      }
      perkPool = profileDef && profileDef.perkPool ? profileDef.perkPool.slice(0) : [];
      perkLimit = tier === "danger" ? 3 : (tier === "even" ? 2 : 1);
      for (i = 0; i < perkPool.length && development.activePerks.length < perkLimit; i += 1) {
        perk = getDevelopmentPerk(perkPool[i]);
        if (perk && perkRequirementMet(perk, { stats: stats, development: development, week: 12, fame: tier === "danger" ? 24 : (tier === "even" ? 14 : 6), morale: 55, support: 40 })) {
          development.activePerks.push(perk.id);
        }
      }
      development.activePerks = uniqueList(development.activePerks);
      development.perkPoints = 0;
      return development;
    }

    function buildOpponentSnapshot(opponent) {
      return opponent ? clonePlainData(opponent) : null;
    }

    function generateConfiguredOpponent(tier, countryKeyOverride, snapshotOverride) {
      var fighter = state.fighter;
      var opponentCountryKey;
      var country;
      var arena;
      var identity;
      var bonus;
      var tierData;
      var tierBonus;
      var base;
      var stats;
      var opponentType;
      var countryGyms;
      var gym;
      var trainerType;
      var development;
      var styleSnapshot;
      var opponentClone;
      var types;
      var i;
      if (snapshotOverride) {
        opponentClone = clonePlainData(snapshotOverride);
        if (opponentClone && !opponentClone.development) {
          opponentCountryKey = opponentClone.countryKey || countryKeyOverride || fighter.currentCountry;
          types = listOpponentTypes();
          opponentType = null;
          for (i = 0; i < types.length; i += 1) {
            if (types[i].id === opponentClone.profileId || types[i].label === opponentClone.profile) {
              opponentType = types[i];
              break;
            }
          }
          opponentType = opponentType || (types.length ? choice(types) : { id: "pressure", label: "Прессингует и душит темпом" });
          countryGyms = listCountryGyms(opponentCountryKey);
          gym = opponentClone.gymId ? getGym(opponentClone.gymId) : null;
          if (!gym) {
            gym = countryGyms.length ? choice(countryGyms) : null;
          }
          trainerType = opponentClone.trainerTypeId ? getTrainerType(opponentClone.trainerTypeId) : null;
          if (!trainerType && gym && gym.trainerTypeIds && gym.trainerTypeIds.length) {
            trainerType = getTrainerType(choice(gym.trainerTypeIds));
          }
          development = buildOpponentDevelopment(opponentType, tier, gym, trainerType, opponentClone.stats || baseStats());
          styleSnapshot = currentStyleSnapshot({
            stats: opponentClone.stats || baseStats(),
            development: development
          });
          opponentClone.profileId = opponentType.id;
          opponentClone.profile = opponentClone.profile || opponentType.label;
          opponentClone.gymId = gym ? gym.id : "";
          opponentClone.gymName = gym ? gym.name : "";
          opponentClone.trainerTypeId = trainerType ? trainerType.id : "";
          opponentClone.trainerLabel = trainerType ? trainerType.label : "";
          opponentClone.development = development;
          opponentClone.styleLabel = styleSnapshot && styleSnapshot.style ? styleSnapshot.style.label : "";
        } else if (opponentClone && opponentClone.development && !opponentClone.styleLabel) {
          styleSnapshot = currentStyleSnapshot(opponentClone);
          opponentClone.styleLabel = styleSnapshot && styleSnapshot.style ? styleSnapshot.style.label : "";
        }
        return opponentClone;
      }
      opponentCountryKey = countryKeyOverride || fighter.currentCountry;
      country = getCountryInfo(opponentCountryKey);
      arena = ContentLoader.getRandomArena(opponentCountryKey);
      identity = makeIdentity(opponentCountryKey);
      bonus = effectiveTravelBonusForCountry(opponentCountryKey);
      tierData = ContentLoader.getOpponentTier(tier);
      tierBonus = tierData.tierBonus;
      base = clamp(Math.round(combatRating(fighter)) + tierBonus + rand(-1, 1), 1, 40);
      opponentType = choice(listOpponentTypes()) || { id: "pressure", label: "Прессингует и душит темпом" };
      stats = {
        str: clamp(base + rand(-1, 2), 1, 45),
        tec: clamp(base + rand(-1, 2), 1, 45),
        spd: clamp(base + rand(-1, 2), 1, 45),
        end: clamp(base + rand(-1, 2), 1, 45),
        vit: clamp(base + rand(-1, 2), 1, 45)
      };
      countryGyms = listCountryGyms(opponentCountryKey);
      gym = countryGyms.length ? choice(countryGyms) : null;
      trainerType = gym && gym.trainerTypeIds && gym.trainerTypeIds.length ? getTrainerType(choice(gym.trainerTypeIds)) : null;
      development = buildOpponentDevelopment(opponentType, tier, gym, trainerType, stats);
      styleSnapshot = currentStyleSnapshot({
        stats: stats,
        development: development
      });
      return {
        firstName: identity.firstName,
        lastName: identity.lastName,
        nickname: identity.nickname,
        fullName: identity.fullName,
        countryKey: opponentCountryKey,
        profileId: opponentType.id,
        profile: opponentType.label,
        stats: stats,
        gymId: gym ? gym.id : "",
        gymName: gym ? gym.name : "",
        trainerTypeId: trainerType ? trainerType.id : "",
        trainerLabel: trainerType ? trainerType.label : "",
        development: development,
        styleLabel: styleSnapshot && styleSnapshot.style ? styleSnapshot.style.label : "",
        purse: Math.round((tierData.purseBase + base * 8 + rand(0, 24)) * bonus.money),
        fameReward: Math.round((tierData.fameBase + Math.max(0, base - 5) * 2 + rand(0, 4)) * bonus.fame),
        condition: rand(72, 100),
        rounds: choice(tierData.rounds),
        danger: tierData.danger,
        venue: arena ? arena.name : (country ? country.venueName : "")
      };
    }

    function buildFightOffer(templateId, rematchSnapshot, rivalry) {
      var template = getFightOfferTemplate(templateId);
      var promoter = promoterInfluence();
      var contract = currentContract();
      var countryKey;
      var country;
      var arena;
      var opponent;
      var contractPurse = contract ? contract.guaranteedPurse : 0;
      var contractWin = contract ? contract.winBonus : 0;
      var contractKo = contract ? contract.koBonus : 0;
      var contractFame = contract ? contract.fameMultiplier : 1;
      var gym;
      var offer;
      var reputationSwing;
      if (!template) {
        return null;
      }
      if (template.travel === "away") {
        countryKey = pickAwayCountry();
      } else if (template.travel === "rematch" && rematchSnapshot) {
        countryKey = rematchSnapshot.countryKey || state.fighter.currentCountry;
      } else {
        countryKey = state.fighter.currentCountry;
      }
      country = getCountryInfo(countryKey);
      arena = ContentLoader.getRandomArena(countryKey);
      opponent = generateOpponent(template.tier, countryKey, rematchSnapshot || null);
      if (arena) {
        opponent.venue = arena.name;
      }
      gym = currentGym();
      reputationSwing = template.acceptRep + (promoter.repGuard > 0 ? 1 : 0);
      offer = {
        id: template.id + "_" + state.fighter.week + "_" + rand(100, 999),
        templateId: template.id,
        label: template.label,
        description: template.description,
        travel: template.travel,
        tier: template.tier,
        countryKey: countryKey,
        countryName: country ? country.name : countryKey,
        city: arena ? arena.city : (country ? country.city : ""),
        venue: arena ? arena.name : (country ? country.venueName : ""),
        guaranteedPurse: Math.max(40, template.purseBase + contractPurse + promoter.purseBonus + gymBonusValue("purseBonus") + trainerBonusValue("purseBonus") + developmentScalarBonus(state.fighter, "offerPurse")),
        winBonus: Math.max(10, template.winBonus + contractWin + Math.round(promoter.purseBonus * 0.5)),
        koBonus: Math.max(10, template.koBonus + contractKo + trainerBonusValue("koBonus")),
        fameReward: Math.max(2, Math.round((template.fameBase + gymBonusValue("fameBonus") + trainerBonusValue("fameBonus") + developmentScalarBonus(state.fighter, "offerFame")) * contractFame)),
        toxicRisk: clamp(template.toxicBase + (contract ? contract.toxicRisk : 0) + promoter.toxicShift - gymBonusValue("toxicGuard") - trainerBonusValue("toxicGuard") - developmentScalarBonus(state.fighter, "toxicRiskGuard"), 0, 95),
        reputationOnAccept: reputationSwing,
        reputationOnDecline: template.declineRep,
        contractLabel: contract ? contract.label : "Без контракта",
        promoterId: promoter.npc ? promoter.npc.id : "",
        promoterName: promoter.npc ? promoter.npc.name : "Свободный матчмейкер",
        gymName: gym ? gym.name : "Уличная база",
        rematchRivalryId: rivalry ? rivalry.id : "",
        seriesLabel: rivalry ? rivalrySeriesLabel(rivalry) : "",
        stakesText: rivalry ? rivalrySummary(rivalry) : "",
        opponent: opponent
      };
      return offer;
    }

    function buildFightOffers() {
      var ids = ["home_safe", "home_even", "home_danger"];
      var promoter = promoterInfluence();
      var contract = currentContract();
      var maxExtra = promoter.offerBonus + Math.max(0, activeContractFightFrequency() - 1) + gymBonusValue("awayBias") + trainerBonusValue("awayBias");
      var safeBias = gymBonusValue("safeBias") + trainerBonusValue("safeBias");
      var dangerBias = gymBonusValue("dangerBias") + trainerBonusValue("dangerBias");
      var lastFight = latestFightActionMeta();
      var rematchRivalry = bestPendingRivalry();
      var offers = [];
      var i;
      var builtOffer;
      if (maxExtra >= 1) {
        ids.push("away_even");
      }
      if (maxExtra >= 2) {
        ids.push("away_safe");
      }
      if ((contract && contract.fightFrequency >= 3) || state.fighter.fame >= 22 || dangerBias >= 2) {
        ids.push("away_danger");
      }
      if (safeBias >= 3) {
        ids.push("away_safe");
      }
      ids = uniqueList(ids);
      for (i = 0; i < ids.length; i += 1) {
        builtOffer = buildFightOffer(ids[i], null, null);
        if (builtOffer) {
          offers.push(builtOffer);
        }
      }
      if (rematchRivalry && rematchRivalry.lastOpponentSnapshot) {
        builtOffer = buildFightOffer("rematch_offer", rematchRivalry.lastOpponentSnapshot, rematchRivalry);
        if (builtOffer) {
          offers.unshift(builtOffer);
        }
      } else if (lastFight && lastFight.opponentSnapshot && lastFight.result !== "draw") {
        builtOffer = buildFightOffer("rematch_offer", lastFight.opponentSnapshot, null);
        if (builtOffer) {
          offers.unshift(builtOffer);
        }
      }
      return offers;
    }

    function buildWeeklyOffers() {
      var fightOffers = buildFightOffers();
      var contractOffers = buildContractOffers();
      var summaries = [];
      var headline = "";
      if (fightOffers.length) {
        headline = fightOffers[0].label + ": $" + fightOffers[0].guaranteedPurse + " гарантии";
        summaries.push({
          id: fightOffers[0].id,
          type: "fight",
          title: fightOffers[0].label,
          text: fightOffers[0].description
        });
      }
      if (contractOffers.length) {
        summaries.push({
          id: contractOffers[0].id,
          type: "contract",
          title: contractOffers[0].label,
          text: "Контракт от " + contractOffers[0].promoterName + " с гарантией $" + contractOffers[0].guaranteedPurse + "."
        });
        if (!headline) {
          headline = contractOffers[0].label + " от " + contractOffers[0].promoterName;
        }
      }
      if (!headline) {
        headline = "Неделя тише обычного, но рынок всё ещё смотрит на твой лагерь.";
      }
      return {
        weekStamp: state.fighter.week,
        available: summaries,
        headline: headline,
        fightOffers: fightOffers,
        contractOffers: contractOffers
      };
    }

    function normalizeFightOffer(offer) {
      if (!offer || !offer.opponent) {
        return offer;
      }
      offer.opponent = generateOpponent(offer.tier || "even", offer.countryKey || state.fighter.currentCountry, offer.opponent);
      if (typeof offer.rematchRivalryId !== "string") {
        offer.rematchRivalryId = "";
      }
      if (typeof offer.seriesLabel !== "string") {
        offer.seriesLabel = "";
      }
      if (typeof offer.stakesText !== "string") {
        offer.stakesText = "";
      }
      if (!offer.venue && offer.opponent.venue) {
        offer.venue = offer.opponent.venue;
      }
      return offer;
    }

    function normalizeWorldOffers() {
      var offers = state.world && state.world.offers && state.world.offers.fightOffers ? state.world.offers.fightOffers : [];
      var i;
      for (i = 0; i < offers.length; i += 1) {
        normalizeFightOffer(offers[i]);
      }
    }

    function payGymAndTrainerUpkeep() {
      var membership = currentGymMembership();
      var gym = currentGym();
      var assignment;
      var trainerType;
      var trainerRelation;
      if (membership && gym) {
        if (state.fighter.money >= membership.weeklyCost) {
          state.fighter.money -= membership.weeklyCost;
          pushLog("Взнос за зал " + gym.name + ": -$" + membership.weeklyCost + ".", "warn");
        } else {
          pushLog("Не хватило денег на взнос за " + gym.name + ". Ты теряешь место в зале.", "bad");
          state.world.gymMembership = null;
          releaseTrainer("зал потерян из-за долгов", true);
        }
      }
      assignment = currentTrainerAssignment();
      trainerType = currentTrainerType();
      if (assignment && trainerType) {
        trainerRelation = findRelationship(assignment.npcId);
        if (state.fighter.money >= assignment.weeklyFee) {
          state.fighter.money -= assignment.weeklyFee;
          pushLog("Гонорар тренеру (" + trainerType.label + "): -$" + assignment.weeklyFee + ".", "warn");
        } else {
          releaseTrainer("не удалось оплатить гонорар тренеру", false);
        }
        if (trainerRelation && trainerRelation.tension >= 80 && trainerRelation.trust <= 25) {
          releaseTrainer("плохие отношения разорвали сотрудничество", false);
        }
      }
    }

    function updateContractsForWeek() {
      var contract = currentContract();
      var promoter;
      var relation;
      if (!contract) {
        return;
      }
      if (state.fighter.week > contract.endsWeek) {
        promoter = findNpcById(contract.promoterId);
        relation = promoter ? findRelationship(promoter.id) : null;
        if (relation) {
          relation.respect = clampRelationValue(relation.respect + 2);
          syncNpcRelationSnapshot(promoter.id);
        }
        endActiveContract("Контракт '" + contract.label + "' завершён.", "warn");
      }
    }

    function updateNpcWorldForWeek(action) {
      var fighter = state.fighter;
      var currentWeek = relationWeekStamp();
      var i;
      var npc;
      var relation;
      var weeksSince;
      var rivalry;
      ensureNpcWorld();
      for (i = 0; i < state.world.npcs.length; i += 1) {
        npc = state.world.npcs[i];
        relation = ensureRelationshipForNpc(npc);
        weeksSince = Math.max(0, currentWeek - (relation.lastInteractionWeek || currentWeek));
        if (weeksSince >= 6) {
          relation.affinity -= 1;
          relation.trust -= 1;
          if (npc.role !== "rival") {
            relation.tension -= 1;
          }
        }
        if (action.type === "train" && npc.role === "trainer") {
          relation.respect += 2;
          relation.trust += 1;
        }
        if (action.type === "recover" && (npc.role === "friend" || npc.role === "doctor")) {
          relation.affinity += 1;
          relation.trust += 1;
        }
        if (action.type === "fight" && npc.role === "promoter") {
          relation.respect += action.meta && action.meta.result === "win" ? 3 : 1;
        }
        if (action.type === "fight" && npc.role === "rival" && action.meta && action.meta.result === "win") {
          relation.respect += 1;
          relation.tension += 3;
        }
        if (action.type === "work" && npc.role === "gym_owner") {
          relation.respect += 1;
        }
        relation.affinity = clampRelationValue(relation.affinity);
        relation.respect = clampRelationValue(relation.respect);
        relation.trust = clampRelationValue(relation.trust);
        relation.tension = clampRelationValue(relation.tension);
        if (chance(35)) {
          npc.status = choice(npcRoleInfo(npc.role).statusPool) || npc.status;
        }
        if (chance(20) && npc.role === "rival" && fighter.fame >= 10) {
          relation.tension = clampRelationValue(relation.tension + 1);
        }
        syncNpcRelationSnapshot(npc.id);
      }
      for (i = 0; i < state.world.rivalries.length; i += 1) {
        rivalry = state.world.rivalries[i];
        if (!rivalry) {
          continue;
        }
        if (rivalry.pendingRematch && action.type !== "fight") {
          rivalry.tension = clampRelationValue((rivalry.tension || 0) + 1);
          rivalry.stakes = clamp(Math.round((rivalry.stakes || 0) + 1), 0, 100);
        } else if (!rivalry.pendingRematch && rivalry.tension > 0) {
          rivalry.tension = clampRelationValue(rivalry.tension - 1);
        }
        if (typeof rivalry.holdUntilWeek !== "number") {
          rivalry.holdUntilWeek = 0;
        }
      }
    }

    function roleHelpEffect(npc) {
      var fighter = state.fighter;
      var role = npc ? npc.role : "";
      if (role === "trainer") {
        fighter.skillPoints += 4;
        return "Тренер разложил лагерь по полочкам. +4 очка навыков.";
      }
      if (role === "friend") {
        fighter.stress -= 5;
        fighter.morale += 4;
        return "Друг вытянул тебя из тяжёлой головы. Стресс падает.";
      }
      if (role === "rival") {
        fighter.skillPoints += 2;
        fighter.stress += 2;
        return "Соперник дал жёсткий ориентир через спарринг. +2 очка навыков, но нервы на пределе.";
      }
      if (role === "promoter") {
        fighter.fame += 3;
        return "Промоутер бросил пару слов куда надо. +3 известности.";
      }
      if (role === "journalist") {
        fighter.fame += 4;
        fighter.stress += 2;
        return "Журналист подогрел интерес к твоему имени. +4 известности.";
      }
      if (role === "doctor") {
        fighter.health += 8;
        fighter.stress -= 2;
        return "Врач быстро собрал тебя обратно. +8 здоровья.";
      }
      if (role === "gym_owner") {
        fighter.money += 20;
        return "Владелец зала подкинул смену и крышу. +$20.";
      }
      fighter.skillPoints += 3;
      fighter.health -= 2;
      return "Контакт помог через спарринг и советы. +3 очка навыков.";
    }

    function interactWithNpc(npcId, interactionKey) {
      var npc = findNpcById(npcId);
      var relation = findRelationship(npcId);
      var label;
      var delta;
      var relationDelta;
      var roleInfo;
      var helpText = "";
      if (!npc || !relation || !state.fighter) {
        return;
      }
      roleInfo = npcRoleInfo(npc.role);
      label = "Встреча";
      delta = { fatigue: 2, wear: 0, morale: 1 };
      relationDelta = { affinity: 4, respect: 1, trust: 2, tension: -2 };
      if (interactionKey === "talk") {
        label = "Разговор";
        delta = { fatigue: 1, wear: 0, morale: 2 };
        relationDelta = { affinity: 3, respect: 2, trust: 3, tension: -1 };
      } else if (interactionKey === "help") {
        label = "Просьба о помощи";
        delta = { fatigue: 2, wear: 0, morale: 2 };
        relationDelta = { affinity: 1, respect: 3, trust: 5, tension: 0 };
        helpText = roleHelpEffect(npc);
      } else if (interactionKey === "conflict") {
        label = "Обострение";
        delta = { fatigue: 3, wear: 0, morale: -3 };
        relationDelta = { affinity: -8, respect: -2, trust: -7, tension: 12 };
      }
      relation.affinity = clampRelationValue(relation.affinity + relationDelta.affinity);
      relation.respect = clampRelationValue(relation.respect + relationDelta.respect);
      relation.trust = clampRelationValue(relation.trust + relationDelta.trust);
      relation.tension = clampRelationValue(relation.tension + relationDelta.tension);
      relation.lastInteractionWeek = relationWeekStamp();
      relation.historyEntries = appendHistoryEntry(relation.historyEntries, {
        week: relationWeekStamp(),
        type: interactionKey,
        text: label + " с " + npc.name + "."
      }, 16);
      npc.history = appendHistoryEntry(npc.history, {
        week: relationWeekStamp(),
        type: interactionKey,
        text: label + " с игроком."
      }, 12);
      registerWeeklyAction("npc", label + ": " + roleInfo.label, delta, {
        npcId: npc.id,
        role: npc.role,
        interaction: interactionKey
      });
      syncNpcRelationSnapshot(npc.id);
      applyBounds(state.fighter);
      pushLog(label + ": " + npc.name + " (" + roleInfo.label + "). Связь теперь: " + relationSummary(relation) + ".", interactionKey === "conflict" ? "bad" : "good");
      if (helpText) {
        pushLog(helpText, "good");
      }
      spendWeek();
    }

    function refreshWorldState() {
      var fighter = state.fighter;
      ensureLifeState();
      ensureNpcWorld();
      state.world.offers = buildWeeklyOffers();
      state.opponents = [];
      if (state.world.offers.fightOffers instanceof Array) {
        var i;
        for (i = 0; i < state.world.offers.fightOffers.length; i += 1) {
          if (state.world.offers.fightOffers[i] && state.world.offers.fightOffers[i].opponent) {
            state.opponents.push(state.world.offers.fightOffers[i].opponent);
          }
        }
      }
      state.world.opponents = state.opponents;
      state.world.scene.updatedWeek = fighter.week;
      state.world.scene.buzz = clamp(Math.round(fighter.fame + fighter.morale * 0.35 - fighter.stress * 0.2), 0, 100);
      state.world.scene.temperature = clamp(Math.round(35 + fighter.fatigue * 0.35 + fighter.wear * 0.25), 0, 100);
      syncAllNpcRelationSnapshots();
    }

    function resolveEventActor(slot) {
      if (!state.activeEvent || !state.activeEvent.actors || !slot) {
        return null;
      }
      return state.activeEvent.actors[slot] || null;
    }

    function applyRelationEffect(effect) {
      var actor;
      var relation;
      if (!effect || !effect.slot) {
        return;
      }
      actor = resolveEventActor(effect.slot);
      if (!actor || !actor.id) {
        return;
      }
      relation = findRelationship(actor.id);
      if (!relation) {
        return;
      }
      relation.affinity = clampRelationValue(relation.affinity + (effect.affinity || 0));
      relation.respect = clampRelationValue(relation.respect + (effect.respect || 0));
      relation.trust = clampRelationValue(relation.trust + (effect.trust || 0));
      relation.tension = clampRelationValue(relation.tension + (effect.tension || 0));
      relation.lastInteractionWeek = relationWeekStamp();
      relation.historyEntries = appendHistoryEntry(relation.historyEntries, {
        week: relationWeekStamp(),
        type: "event",
        text: state.activeEvent.title
      }, 16);
      syncNpcRelationSnapshot(actor.id);
    }

    function applyRivalryEffect(effect) {
      var actor;
      var rivalry;
      var lastFight;
      if (!effect) {
        return;
      }
      actor = effect.slot ? resolveEventActor(effect.slot) : null;
      rivalry = actor && actor.rivalryId ? findRivalryById(actor.rivalryId) : null;
      if (!rivalry && state.activeEvent && state.activeEvent.arcId) {
        var arc = findRelationshipArcById(state.activeEvent.arcId);
        if (arc && arc.rivalryId) {
          rivalry = findRivalryById(arc.rivalryId);
        }
      }
      if (!rivalry) {
        lastFight = latestFightActionMeta();
        if (lastFight && lastFight.opponentSnapshot) {
          rivalry = ensureRivalryForSnapshot(lastFight.opponentSnapshot);
        }
      }
      if (!rivalry) {
        return;
      }
      if (state.activeEvent && state.activeEvent.arcId) {
        var activeArc = findRelationshipArcById(state.activeEvent.arcId);
        if (activeArc && !activeArc.rivalryId) {
          activeArc.rivalryId = rivalry.id;
        }
      }
      if (effect.mode === "promote") {
        rivalry.pendingRematch = effect.pendingRematch !== false;
        rivalry.tension = clampRelationValue((rivalry.tension || 0) + (effect.deltaTension || 0));
        rivalry.stakes = clamp(Math.round((rivalry.stakes || 0) + (effect.stakes || 0)), 0, 100);
      } else if (effect.mode === "sceneBuzz") {
        state.world.scene.buzz = clamp(Math.round((state.world.scene.buzz || 0) + (effect.deltaBuzz || 0)), 0, 100);
      } else {
        rivalry.tension = clampRelationValue((rivalry.tension || 0) + (effect.deltaTension || 0));
      }
      if (typeof effect.delayWeeks === "number") {
        rivalry.holdUntilWeek = Math.max(state.fighter.week, state.fighter.week + effect.delayWeeks);
      }
      rivalry.active = true;
    }

    function applyTagChanges(tagChanges) {
      var i;
      var actor;
      var arc;
      if (!tagChanges) {
        return;
      }
      addBiographyFlags(tagChanges.add || [], tagChanges.remove || []);
      if (tagChanges.npcFlags instanceof Array) {
        for (i = 0; i < tagChanges.npcFlags.length; i += 1) {
          actor = resolveEventActor(tagChanges.npcFlags[i].slot);
          if (actor && actor.id) {
            setNpcFlags(actor.id, tagChanges.npcFlags[i].add || [], tagChanges.npcFlags[i].remove || []);
          }
        }
      }
      if (tagChanges.relationTags instanceof Array) {
        for (i = 0; i < tagChanges.relationTags.length; i += 1) {
          actor = resolveEventActor(tagChanges.relationTags[i].slot);
          if (actor && actor.id) {
            setRelationTags(actor.id, tagChanges.relationTags[i].add || [], tagChanges.relationTags[i].remove || []);
          }
        }
      }
      if (tagChanges.arcTags && state.activeEvent && state.activeEvent.arcId) {
        arc = findRelationshipArcById(state.activeEvent.arcId);
        if (arc) {
          arc.tags = uniqueList((arc.tags || []).concat(tagChanges.arcTags.add instanceof Array ? tagChanges.arcTags.add : []));
          if (tagChanges.arcTags.remove instanceof Array && tagChanges.arcTags.remove.length) {
            var filtered = [];
            for (i = 0; i < arc.tags.length; i += 1) {
              if (!hasTag(tagChanges.arcTags.remove, arc.tags[i])) {
                filtered.push(arc.tags[i]);
              }
            }
            arc.tags = uniqueList(filtered);
          }
        }
      }
    }

    function applyEventEffect(effect) {
      var fighter = state.fighter;
      if (!effect || !fighter) {
        return;
      }
      if (effect.type === "resource") {
        if (effect.key === "money" || effect.key === "health" || effect.key === "stress" || effect.key === "fame" || effect.key === "skillPoints") {
          fighter[effect.key] += effect.delta || 0;
        } else if (effect.key === "morale") {
          fighter.morale += effect.delta || 0;
        }
      } else if (effect.type === "condition") {
        if (effect.key === "fatigue" || effect.key === "wear" || effect.key === "morale") {
          fighter[effect.key] += effect.delta || 0;
        }
      } else if (effect.type === "life") {
        if (effect.key === "support") {
          fighter.support += effect.delta || 0;
        } else if (effect.key === "housingId" && typeof effect.value === "string" && getHousingOption(effect.value)) {
          fighter.housingId = effect.value;
        }
      } else if (effect.type === "relation") {
        applyRelationEffect(effect);
      } else if (effect.type === "rivalry") {
        applyRivalryEffect(effect);
      }
    }

    function recordResolvedEvent(activeEvent, choice) {
      var eventState = state.world.eventState;
      var eventEntry;
      var safeTitle;
      var safeChoice;
      if (!activeEvent || !choice) {
        return;
      }
      safeTitle = safeUiText(activeEvent.title, "Событие недели");
      safeChoice = safeUiText(choice.label, "Выбор");
      if (activeEvent.sourceType !== "relationshipArc") {
        eventState.cooldowns[activeEvent.id] = state.fighter.week;
        if (activeEvent.once || activeEvent.repeatable === false) {
          eventState.onceResolved = uniqueList(eventState.onceResolved.concat([activeEvent.id]));
        }
      }
      eventEntry = {
        id: activeEvent.sourceType === "relationshipArc" ? (activeEvent.arcTemplateId || activeEvent.id) : activeEvent.id,
        title: safeTitle,
        choiceId: choice.id,
        week: state.fighter.week
      };
      eventState.recentEvents.unshift(eventEntry);
      if (eventState.recentEvents.length > 20) {
        eventState.recentEvents = eventState.recentEvents.slice(0, 20);
      }
      addBiographyHistory(safeTitle + ": " + safeChoice + ".", "event");
    }

    function resolveActiveEventChoice(choiceId) {
      var activeEvent = state.activeEvent;
      var choice = findChoiceInActiveEvent(choiceId);
      var arcResult = null;
      var i;
      var safeTitle;
      var safeResult;
      if (!activeEvent || !choice) {
        return;
      }
      safeTitle = safeUiText(activeEvent.title, "Событие недели");
      safeResult = safeUiText(choice.resultText, "Ты принимаешь решение и двигаешься дальше.");
      for (i = 0; i < choice.effects.length; i += 1) {
        applyEventEffect(choice.effects[i]);
      }
      if (choice.tagChanges) {
        applyTagChanges(choice.tagChanges);
      }
      if (activeEvent.sourceType === "relationshipArc") {
        arcResult = RelationshipArcEngine.applyChoice(state.world, activeEvent, choice, listRelationshipArcTemplates(), state.fighter.week);
        if (arcResult && arcResult.arcState && arcResult.arcState.outcome === "lost_trainer") {
          var trainerActor = resolveEventActor("trainer");
          if (trainerActor && state.world.trainerAssignment && state.world.trainerAssignment.npcId === trainerActor.id) {
            releaseTrainer("тренер ушёл в другой лагерь", false);
          }
        }
        if (arcResult && arcResult.arcState && arcResult.arcState.label) {
          if (arcResult.resolved) {
            pushLog("Линия '" + arcResult.arcState.label + "' получает исход: " + (arcResult.arcState.outcome || "развязка") + ".", hasTag(arcResult.arcState.tags || [], "conflict") ? "warn" : "good");
          } else {
            pushLog("Линия '" + arcResult.arcState.label + "' продолжает развиваться.", "warn");
          }
        }
      }
      recordResolvedEvent(activeEvent, choice);
      applyBounds(state.fighter);
      refreshWorldState();
      pushLog(safeTitle + ": " + safeResult, "warn");
      state.activeEvent = null;
      if (state.screen === "game") {
        state.panel = "home";
      }
      if (evaluateEndState()) {
        return;
      }
      render();
    }

    function weeklyEvent() {
      var gameState;
      var arcEvent;
      var eventDef;
      ensureLifeState();
      if (state.activeEvent || !state.fighter) {
        return;
      }
      gameState = syncGameStateFromRuntime();
      arcEvent = RelationshipArcEngine.pickEvent(gameState, listRelationshipArcTemplates(), state.rng);
      if (arcEvent && arcEvent.event) {
        if (arcEvent.started) {
          state.world.relationshipArcs.push(arcEvent.arcState);
          pushLog("Новая личная линия: " + arcEvent.arcState.label + ".", hasTag(arcEvent.arcState.tags || [], "conflict") ? "warn" : "good");
        }
        state.activeEvent = arcEvent.event;
        state.panel = "worldEvent";
        return;
      }
      if (!chance(ContentLoader.getContextEventTriggerChance())) {
        return;
      }
      eventDef = EventEngine.pickEvent(gameState, ContentLoader.getContextEvents(), state.rng);
      if (!eventDef) {
        return;
      }
      state.activeEvent = eventDef;
      state.panel = "worldEvent";
    }

    function runWorldTick() {
      var fighter = state.fighter;
      var previousCalendar;
      var nextCalendar;
      var previousAge;
      var nextAge;
      var action;
      var housingCost;
      var supportShift;
      ensureLifeState();
      previousCalendar = currentCalendarView(fighter);
      previousAge = currentAgeView(fighter);
      fighter.calendar = TimeSystem.advanceWeek(fighter.calendar);
      nextCalendar = currentCalendarView(fighter);
      nextAge = currentAgeView(fighter);
      fighter.money -= WEEKLY_EXPENSE;
      pushLog("Обязательные расходы недели: -$" + WEEKLY_EXPENSE + ".", "warn");
      housingCost = weeklyHousingCost(fighter);
      if (housingCost > 0) {
        fighter.money -= housingCost;
        pushLog("Расходы на жильё (" + currentHousing().label + "): -$" + housingCost + ".", "warn");
      }
      payGymAndTrainerUpkeep();
      updateContractsForWeek();
      if (previousCalendar.monthIndex !== nextCalendar.monthIndex || previousCalendar.year !== nextCalendar.year) {
        pushLog("Начинается " + nextCalendar.monthName + " " + nextCalendar.year + ".", "warn");
      }
      if (previousAge.years !== nextAge.years) {
        pushLog("Новый возраст: " + nextAge.label + ".", "good");
      }
      action = state.world.lastWeekAction || { type: "idle" };
      applyHousingWeekEffects(fighter);
      fighter.fatigue = clamp(fighter.fatigue - 3, 0, 100);
      if (action.type === "recover") {
        fighter.fatigue = clamp(fighter.fatigue - 4, 0, 100);
      }
      if (String(action.type || "").indexOf("social_") === 0 || action.type === "npc") {
        fighter.support += 1;
      } else if (action.type !== "fight" && action.type !== "idle") {
        fighter.support -= 1;
      }
      supportShift = socialSupportBuffer(fighter);
      if (supportShift > 0 && (action.type === "fight" || action.type === "recover")) {
        fighter.stress -= supportShift;
        fighter.morale += Math.max(1, supportShift - 1);
      } else if (supportShift < 0) {
        fighter.stress += Math.abs(supportShift);
        fighter.morale += supportShift;
      }
      if (fighter.stress > 70) {
        fighter.health -= 1;
      }
      if (fighter.stress >= 75) {
        fighter.fatigue += 2;
        fighter.morale -= 2;
      }
      if (fighter.health <= 35) {
        fighter.morale -= 1;
      }
      if (fighter.fatigue >= 75) {
        fighter.health -= 1;
      }
      if (fighter.wear >= 70) {
        fighter.health -= 1;
      }
      if (fighter.morale >= 70 && fighter.stress > 0) {
        fighter.stress -= 1;
      }
      if (fighter.morale <= 30) {
        fighter.stress += 1;
      }
      applyBounds(fighter);
      updateNpcWorldForWeek(action);
      refreshWorldState();
      state.world.lastWeekAction = {
        type: "idle",
        label: "",
        meta: null
      };
      weeklyEvent();
    }

    function applyBounds(fighter) {
      var key;
      for (key in fighter.stats) {
        if (fighter.stats.hasOwnProperty(key)) {
          fighter.stats[key] = clamp(fighter.stats[key], 1, 99);
        }
      }
      fighter.money = Math.max(0, fighter.money);
      fighter.health = clamp(fighter.health, 0, 100);
      fighter.stress = clamp(fighter.stress, 0, 100);
      fighter.fame = Math.max(0, fighter.fame);
      fighter.skillPoints = Math.max(0, fighter.skillPoints || 0);
      fighter.fatigue = clamp(fighter.fatigue || 0, 0, 100);
      fighter.wear = clamp(fighter.wear || 0, 0, 100);
      fighter.morale = clamp(typeof fighter.morale === "number" ? fighter.morale : 55, 0, 100);
      fighter.support = clamp(typeof fighter.support === "number" ? fighter.support : 50, 0, 100);
      fighter.housingId = typeof fighter.housingId === "string" && getHousingOption(fighter.housingId) ? fighter.housingId : "normal";
      fighter.startingAge = Math.max(16, Math.min(40, typeof fighter.startingAge === "number" ? fighter.startingAge : 22));
      ensureDevelopmentState(fighter);
      if (fighter.development) {
        var focusKey;
        var styleKey;
        fighter.development.totalXp = Math.max(0, Math.round(fighter.development.totalXp || 0));
        fighter.development.perkPoints = Math.max(0, Math.round(fighter.development.perkPoints || 0));
        fighter.development.activePerks = uniqueList(fighter.development.activePerks || []);
        for (focusKey in fighter.development.focusProgress) {
          if (fighter.development.focusProgress.hasOwnProperty(focusKey)) {
            fighter.development.focusProgress[focusKey] = Math.max(0, Math.round(fighter.development.focusProgress[focusKey] || 0));
          }
        }
        for (styleKey in fighter.development.styleProgress) {
          if (fighter.development.styleProgress.hasOwnProperty(styleKey)) {
            fighter.development.styleProgress[styleKey] = Math.max(0, Math.round(fighter.development.styleProgress[styleKey] || 0));
          }
        }
      }
    }

    function recordText(fighter) {
      return fighter.wins + "-" + fighter.losses + " (КО: " + fighter.kos + ")";
    }

    function combatRating(fighter) {
      var stats = fighter.stats;
      var base = (stats.str + stats.tec + stats.spd + stats.end + stats.vit) / 5;
      return base + fighter.wins * 0.35 + fighter.fame * 0.04;
    }

    var RING_SIZE = 5;
    var ACTION_DELAY_MS = 500;
    var COUNT_STEP_MS = 500;
    var KO_TEXT_MS = 1000;
    var ACTION_ANIMATION_MS = 320;
    var COUNT_SHAKE_MS = 260;
    var CRIT_FLASH_MS = 500;

    function buildFightState(stats, condition, position) {
      var maxHp = 100 + stats.vit * 10;
      var maxStamina = 100 + stats.end * 5;
      var hp = Math.round(maxHp * clamp(condition, 0, 100) / 100);
      return {
        hp: clamp(hp, 1, maxHp),
        maxHp: maxHp,
        stamina: maxStamina,
        maxStamina: maxStamina,
        knockdowns: 0,
        damageTaken: 0,
        position: { x: position.x, y: position.y },
        defenseMode: null,
        lastAttackKey: null,
        attackChain: 0,
        actedAttack: false
      };
    }

    function applyFightReadiness(stateSlice, fighter) {
      var readiness = fighterReadinessBonus(fighter);
      if (!stateSlice || !fighter) {
        return 0;
      }
      stateSlice.stamina = clamp(stateSlice.stamina + readiness, 1, stateSlice.maxStamina);
      stateSlice.hp = clamp(stateSlice.hp + Math.round(readiness / 2), 1, stateSlice.maxHp);
      return readiness;
    }

    function startRingPosition(side) {
      return side === "player" ? { x: 0, y: 2 } : { x: 4, y: 2 };
    }

    function insideRing(x, y) {
      return x >= 0 && x < RING_SIZE && y >= 0 && y < RING_SIZE;
    }

    function resetRingPositions(fight) {
      fight.playerState.position = startRingPosition("player");
      fight.opponentState.position = startRingPosition("opponent");
    }

    function resetCreate() {
      clearFightTimers();
      state.screen = "create";
      state.panel = "home";
      state.create = {
        country: null,
        identity: null
      };
      state.fighter = null;
      state.opponents = [];
      state.world = defaultWorldState();
      state.fight = null;
      state.endingReason = "";
      state.log = [
        { text: "Новый забег начинается. Собери бойца и выбери, каким именем район будет его помнить.", tone: "warn" }
      ];
    }

    function startCareer() {
      var startingAge;
      var stats = baseStats();
      if (!state.create.country || !state.create.identity) {
        return;
      }
      startingAge = rand(18, 32);
      state.fighter = {
        name: state.create.identity.fullName,
        stats: stats,
        skillPoints: 0,
        money: 120,
        week: 1,
        calendar: TimeSystem.createCalendar(),
        startingAge: startingAge,
        health: 100,
        stress: 12,
        fatigue: 8,
        wear: 0,
        morale: 56,
        housingId: "normal",
        support: 52,
        development: createDevelopmentState(),
        fame: 0,
        wins: 0,
        losses: 0,
        kos: 0,
        deathsCaused: 0,
        homeCountry: state.create.country,
        currentCountry: state.create.country
      };
      state.world = defaultWorldState();
      applyBounds(state.fighter);
      generateCareerNpcWorld();
      refreshWorldState();
      state.screen = "game";
      state.panel = "home";
      state.log.unshift({
        text: state.fighter.name + " стартует в " + getCountryInfo(state.fighter.homeCountry).name + ".",
        tone: "good"
      });
      render();
    }

    function setCreateCountry(key) {
      state.create.country = key;
      state.create.identity = makeIdentity(key);
      render();
    }

    function rerollName() {
      if (!state.create.country) {
        return;
      }
      state.create.identity = makeIdentity(state.create.country);
      render();
    }

    function pushLog(text, tone) {
      state.log.unshift({ text: text, tone: tone || "" });
      if (state.log.length > 32) {
        state.log = state.log.slice(0, 32);
      }
    }

    function meter(label, value, maxValue) {
      var limit = typeof maxValue === "number" ? maxValue : 100;
      var width = limit > 0 ? Math.round((value / limit) * 100) : 0;
      return "" +
        "<div class='meter-block'>" +
          "<div class='meter-row'><span>" + label + "</span><strong>" + value + "/" + limit + "</strong></div>" +
          "<div class='meter'><span style='width:" + clamp(width, 0, 100) + "%'></span></div>" +
        "</div>";
    }

    function statPointCost(value) {
      return Math.floor(value / 10) + 1;
    }

    function buyStatPoint(statKey) {
      var fighter = state.fighter;
      var cost = statPointCost(fighter.stats[statKey]);
      if (fighter.skillPoints < cost) {
        pushLog("На улучшение '" + DATA.statLabels[statKey] + "' не хватает очков.", "bad");
        render();
        return;
      }
      fighter.skillPoints -= cost;
      fighter.stats[statKey] += 1;
      applyBounds(fighter);
      pushLog(DATA.statLabels[statKey] + " выросла до " + fighter.stats[statKey] + ".", "good");
      render();
    }

    function openPanel(panel) {
      if (state.activeEvent && panel !== "worldEvent") {
        state.panel = "worldEvent";
        render();
        return;
      }
      state.panel = panel;
      render();
    }

    function spendWeek() {
      if (evaluateEndState()) {
        return;
      }
      advanceWeek();
      if (evaluateEndState()) {
        return;
      }
      state.panel = state.activeEvent ? "worldEvent" : "home";
      render();
    }

    function advanceWeek() {
      runWorldTick();
    }

    function evaluateEndState() {
      var fighter = state.fighter;
      if (!fighter) {
        return false;
      }
      if (fighter.health <= 0) {
        state.screen = "end";
        state.endingReason = "body";
        render();
        return true;
      }
      if (fighter.stress >= 100) {
        state.screen = "end";
        state.endingReason = "stress";
        render();
        return true;
      }
      return false;
    }

    function retireCareer() {
      state.screen = "end";
      state.endingReason = "retired";
      render();
    }

    function legacyRank(fighter) {
      var score = fighter.wins * 8 + fighter.fame - fighter.losses * 3;
      if (fighter.deathsCaused) {
        score += 10;
      }
      if (score >= 160) {
        return "Легенда подполья";
      }
      if (score >= 110) {
        return "Король района";
      }
      if (score >= 70) {
        return "Громкое имя";
      }
      if (score >= 40) {
        return "Известный боец";
      }
      return "Новичок улиц";
    }

    function travelToCountry(countryKey) {
      var fighter = state.fighter;
      var destination = getCountryInfo(countryKey);
      var cost = flightCost(fighter.currentCountry, countryKey);
      if (!destination || fighter.currentCountry === countryKey) {
        return;
      }
      if (fighter.money < cost) {
        pushLog("На перелет в " + destination.name + " сейчас не хватает денег.", "bad");
        render();
        return;
      }
      fighter.money -= cost;
      fighter.currentCountry = countryKey;
      fighter.stress += 4;
      registerWeeklyAction("travel", "Перелет в " + destination.name, {
        fatigue: 8,
        wear: 0,
        morale: 1
      }, {
        country: countryKey
      });
      applyBounds(fighter);
      pushLog("Перелет в " + destination.name + " обошелся в $" + cost + ". Новая арена: " + destination.city + ".", "warn");
      spendWeek();
    }

    function actionTrain(kind) {
      var fighter = state.fighter;
      var option = TRAINING_OPTIONS[kind];
      var trainDelta;
      var bonusPoints;
      var developmentSummary;
      var styleParts = [];
      var i;
      if (!option) {
        return;
      }
      trainDelta = {
        light: { fatigue: 8, wear: 1, morale: 2 },
        medium: { fatigue: 14, wear: 2, morale: 1 },
        hard: { fatigue: 20, wear: 3, morale: -2 }
      }[kind] || { fatigue: 10, wear: 1, morale: 0 };
      bonusPoints = gymBonusValue("trainingPoints") + trainerBonusValue("trainingPoints") + developmentScalarBonus(fighter, "trainingPointsFlat");
      fighter.skillPoints += option.points + bonusPoints;
      fighter.health += option.health;
      fighter.stress += option.stress;
      developmentSummary = applyTrainingDevelopment(fighter, kind);
      registerWeeklyAction("train", option.label, trainDelta, { kind: kind });
      applyBounds(fighter);
      pushLog(fighter.name + " проводит " + option.label.toLowerCase() + " тренировку и получает +" + (option.points + bonusPoints) + " очков навыков.", "good");
      if (developmentSummary) {
        for (i = 0; i < developmentSummary.styleGains.length; i += 1) {
          if (developmentSummary.styleGains[i].style) {
            styleParts.push(developmentSummary.styleGains[i].style.label + " +" + developmentSummary.styleGains[i].amount);
          }
        }
        pushLog("Фокус '" + developmentSummary.focus + "' даёт +" + developmentSummary.focusXp + " XP развития" + (developmentSummary.perkPointGain > 0 ? (" и +" + developmentSummary.perkPointGain + " очко перка") : "") + (styleParts.length ? (". Стили: " + styleParts.join(", ") + ".") : "."), "warn");
      }
      spendWeek();
    }

    function actionRecover(kind) {
      var fighter = state.fighter;
      var option = RECOVERY_OPTIONS[kind];
      var recoveryDelta;
      var bonusHealth;
      var stressShift;
      var moraleBonus;
      if (!option) {
        return;
      }
      recoveryDelta = {
        home: { fatigue: -12, wear: 0, morale: 3 },
        doctor: { fatigue: -18, wear: -1, morale: 2 },
        therapy: { fatigue: -15, wear: -1, morale: 6 }
      }[kind] || { fatigue: -10, wear: 0, morale: 2 };
      if (fighter.money < option.cost) {
        pushLog("На вариант восстановления '" + option.label + "' сейчас не хватает денег.", "bad");
        render();
        return;
      }
      moraleBonus = moraleRecoveryModifier(fighter);
      bonusHealth = gymBonusValue("recoveryHealth") + trainerBonusValue("recoveryHealth") + housingRecoveryHealthBonus(fighter) + moraleBonus;
      stressShift = option.stress - trainerBonusValue("stressRelief") - housingRecoveryStressRelief(fighter) - Math.max(0, socialSupportBuffer(fighter)) - developmentScalarBonus(fighter, "recoverStressRelief");
      fighter.money -= option.cost;
      fighter.health += option.health + bonusHealth;
      fighter.stress += stressShift;
      registerWeeklyAction("recover", option.label, recoveryDelta, { kind: kind });
      applyBounds(fighter);
      pushLog(option.label + " возвращает " + (option.health + bonusHealth) + " здоровья и меняет стресс на " + stressShift + ".", "good");
      spendWeek();
    }

    function actionWork() {
      var fighter = state.fighter;
      var moneyGain = LEGAL_JOB.money + developmentScalarBonus(fighter, "workMoney");
      fighter.money += moneyGain;
      fighter.health += LEGAL_JOB.health;
      fighter.stress += LEGAL_JOB.stress;
      registerWeeklyAction("work", LEGAL_JOB.label, {
        fatigue: 16,
        wear: 1,
        morale: -4
      }, null);
      pushLog(LEGAL_JOB.label + " приносит $" + moneyGain + ", здоровье " + LEGAL_JOB.health + " и стресс +" + LEGAL_JOB.stress + ".", "warn");
      applyBounds(fighter);
      spendWeek();
    }

    function getCountryInfo(countryKey) {
      return ContentLoader.getCountry(countryKey);
    }

    function makeIdentity(countryKey) {
      var identity;
      var country = getCountryInfo(countryKey);
      var override = country && country.identityOverride;
      if (override) {
        identity = {
          firstName: choice(override.first),
          lastName: choice(override.last),
          nickname: choice(override.nick)
        };
        identity.fullName = identity.firstName + ' "' + identity.nickname + '" ' + identity.lastName;
        return identity;
      }
      return window.makeIdentityBase ? window.makeIdentityBase(countryKey) : (function () {
        var pool = getCountryPool(countryKey);
        var seed = ContentLoader.getCountrySeedConfig(countryKey);
        var surnameParts;
        var firstName;
        var lastName;
        var nickname;
        if (!pool) {
          return null;
        }
        if (seed && seed.firstJoin === "join") {
          firstName = choice(pool.firstNames);
        } else {
          firstName = choice(seed.firstLeft.concat(seed.firstRight));
        }
        surnameParts = seed && seed.lastJoin === "join" ? pool.lastNames.slice(0) : seed.lastLeft.concat(seed.lastRight);
        lastName = choice(surnameParts);
        if (chance(5) && surnameParts.length > 1) {
          var secondSurname = choice(surnameParts);
          var separator = (countryKey === "mexico" || countryKey === "cuba" || countryKey === "philippines") ? " " : "-";
          while (secondSurname === lastName) {
            secondSurname = choice(surnameParts);
          }
          lastName = lastName + separator + secondSurname;
        }
        nickname = choice(pool.nicknames);
        return {
          firstName: firstName,
          lastName: lastName,
          nickname: nickname,
          fullName: firstName + ' "' + nickname + '" ' + lastName
        };
      }());
    }

    function generateOpponent(tier, countryKeyOverride, snapshotOverride) {
      return generateConfiguredOpponent(tier, countryKeyOverride, snapshotOverride);
    }

    function fullOpponentName(opponent) {
      return opponent.fullName || (opponent.firstName + ' "' + opponent.nickname + '" ' + opponent.lastName);
    }

    function openFightSelect() {
      ensureLifeState();
      if (!state.world.offers || state.world.offers.weekStamp !== state.fighter.week || !(state.world.offers.fightOffers instanceof Array) || !state.world.offers.fightOffers.length) {
        refreshWorldState();
      }
      state.opponents = [];
      if (state.world.offers && state.world.offers.fightOffers) {
        var i;
        for (i = 0; i < state.world.offers.fightOffers.length; i += 1) {
          if (state.world.offers.fightOffers[i] && state.world.offers.fightOffers[i].opponent) {
            state.opponents.push(state.world.offers.fightOffers[i].opponent);
          }
        }
      }
      state.world.opponents = state.opponents;
      state.panel = "fightSelect";
      render();
    }

    function fightStateBySide(fight, side) {
      return side === "player" ? fight.playerState : fight.opponentState;
    }

    function fightStatsBySide(fight, side) {
      return side === "player" ? state.fighter.stats : fight.opponent.stats;
    }

    function fightNameBySide(fight, side) {
      return side === "player" ? state.fighter.name : fullOpponentName(fight.opponent);
    }

    function otherSide(side) {
      return side === "player" ? "opponent" : "player";
    }

    function pushFightLine(fight, text) {
      fight.lines.unshift(text);
      if (fight.lines.length > 48) {
        fight.lines = fight.lines.slice(0, 48);
      }
    }

    function awardFightPressure(fight, side, amount) {
      fight.roundPoints[side] += amount;
    }

    function moveActor(fight, side, actionKey) {
      var actor = fightStateBySide(fight, side);
      var staminaCost = fightActionStaminaCost(fight, side, actionKey);
      var fromX = actor.position.x + 1;
      var fromY = actor.position.y + 1;
      actor.stamina = clamp(actor.stamina - staminaCost, 0, actor.maxStamina);
      actor.position = {
        x: actor.position.x + FIGHT_ACTIONS[actionKey].dx,
        y: actor.position.y + FIGHT_ACTIONS[actionKey].dy
      };
      actor.actedAttack = false;
      actor.defenseMode = null;
      resetActionChain(actor);
      if (side === "player") {
        markFightStyle(fight, "outboxer", 1);
        markFightStyle(fight, "tempo", 1);
      }
      pushFightLine(fight, fightNameBySide(fight, side) + " смещается: " + fromX + ":" + fromY + " -> " + (actor.position.x + 1) + ":" + (actor.position.y + 1) + ".");
    }

    function availableFightActions(fight, side, type) {
      var keys = [];
      var key;
      for (key in FIGHT_ACTIONS) {
        if (FIGHT_ACTIONS.hasOwnProperty(key) && (!type || FIGHT_ACTIONS[key].type === type) && canUseFightAction(fight, side, key)) {
          keys.push(key);
        }
      }
      return keys;
    }

    function openFightTab(tabKey) {
      if (!state.fight) {
        return;
      }
      state.fight.uiTab = tabKey;
      render();
    }

    function openFightActionGroup(groupKey) {
      if (!state.fight) {
        return;
      }
      state.fight.uiTab = "controls";
      state.fight.actionGroup = groupKey;
      render();
    }

    function previewAttackChain(actor, actionKey) {
      return actor.lastAttackKey === actionKey ? actor.attackChain + 1 : 1;
    }

    function previewAttackModifiers(fight, side, actionKey) {
      var attacker = fightStateBySide(fight, side);
      var fighter = currentFightSideFighter(fight, side);
      var chainCount = previewAttackChain(attacker, actionKey);
      var accuracyShift = 0;
      var damageMultiplier = 1;
      var flatDamage = developmentActionBonus(fighter, "damageByAction", actionKey);
      if (chainCount === 2) {
        accuracyShift -= 10;
        damageMultiplier *= 0.95;
      } else if (chainCount >= 3) {
        accuracyShift -= 15;
        damageMultiplier *= 0.9;
      }
      if (staminaIsLow(attacker)) {
        accuracyShift -= 10;
        damageMultiplier *= 0.9;
      }
      return {
        accuracyShift: accuracyShift + developmentActionBonus(fighter, "accuracyByAction", actionKey),
        damageMultiplier: damageMultiplier,
        flatDamage: flatDamage
      };
    }

    function blockDamageMultiplier(fight, side) {
      var defenderFighter = currentFightSideFighter(fight, side);
      var reduction = 0.5 + developmentScalarBonus(defenderFighter, "blockReduction");
      return clamp(1 - reduction, 0.15, 0.95);
    }

    function previewHitChance(fight, side, actionKey) {
      var defender = fightStateBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);
      var defenderStats = fightStatsBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var modifiers;
      var dodge;
      if (!action || action.type !== "attack") {
        return 0;
      }
      if (!actionReachAllowed(fight, side, actionKey)) {
        return 0;
      }
      modifiers = previewAttackModifiers(fight, side, actionKey);
      dodge = effectiveDodgeChance(fight, otherSide(side), defender, defenderStats);
      return clamp(Math.round(65 + action.hitBonus + attackerStats.tec * 0.5 + modifiers.accuracyShift - dodge), 25, 95);
    }

    function previewDamage(fight, side, actionKey) {
      var defender = fightStateBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);
      var action = FIGHT_ACTIONS[actionKey];
      var modifiers;
      var damage;
      if (!action || action.type !== "attack") {
        return 0;
      }
      modifiers = previewAttackModifiers(fight, side, actionKey);
      damage = action.damage * (1 + attackerStats.str * 0.05) * modifiers.damageMultiplier + modifiers.flatDamage;
      if (defender.stamina < 5) {
        damage *= 1.2;
      }
      if (defender.defenseMode === "block") {
        damage *= blockDamageMultiplier(fight, otherSide(side));
      }
      return Math.max(1, Math.round(damage));
    }

    }

        "<div class='panel'>" +

    function renderTravelPanel() {
      var html = [];
      var fighter = state.fighter;
