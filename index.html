<html>
<head>
  <title>Fight Simulator</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=9" />
  <style>

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #0d1117;
      color: #eff4fb;
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(196, 73, 37, 0.26), transparent 26%),
        radial-gradient(circle at top right, rgba(229, 180, 90, 0.16), transparent 24%),
        linear-gradient(180deg, #12161d 0%, #0c1015 100%);
      overflow-x: hidden;
      overflow-y: auto;
      font-size: 20px;
      line-height: 1.5;
    }

    * {
      box-sizing: border-box;
    }

    .shell,
    .battle-shell {
      width: 100%;
      min-height: 100vh;
      padding: 12px;
    }

    .topbar,
    .panel,
    .hero,
    .card,
    .create-card,
    .battle-topbar,
    .battle-stage,
    .battle-bottom,
    .battle-result {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(17, 22, 29, 0.92);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      border-radius: 20px;
    }

    .topbar,
    .panel,
    .hero,
    .battle-topbar,
    .battle-stage,
    .battle-bottom,
    .battle-result {
      padding: 18px;
      margin-bottom: 12px;
    }

    .card,
    .create-card {
      padding: 16px;
      margin-bottom: 10px;
      border-radius: 18px;
    }

    .hero {
      min-height: calc(100vh - 24px);
    }

    .tab-screen {
      min-height: calc(100vh - 176px);
    }

    .tab-screen > .panel:first-child,
    .tab-screen > .hero:first-child {
      min-height: calc(100vh - 176px);
    }

    .hero .footer-actions {
      margin-top: auto;
      padding-top: 6px;
    }

    .page-stack {
      min-height: calc(100vh - 176px);
    }

    .fill-panel {
      min-height: calc(100vh - 210px);
    }

    .inset-panel {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: none;
    }

    .page-home .panel:first-child {
      min-height: 50vh;
    }

    .page-home .panel:last-child,
    .page-careerLog .panel:first-child,
    .page-skills .panel:first-child,
    .page-retire .panel:first-child {
      min-height: 34vh;
    }

    .page-careerLog .log-list {
      min-height: 52vh;
    }

    .brand {
      display: block;
      margin-bottom: 12px;
    }

    .eyebrow {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .title {
      font-size: 42px;
      line-height: 1.15;
      font-weight: 700;
      margin: 0;
    }

    .subtitle,
    .muted,
    .empty-state,
    .card p,
    .create-card p {
      color: #ced8e4;
      font-size: 20px;
      line-height: 1.55;
      margin: 0;
    }

    .week-chip,
    .chip {
      display: inline-block;
      padding: 11px 15px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #eff4fb;
      font-size: 18px;
      font-weight: 700;
      margin: 0 8px 8px 0;
      vertical-align: top;
    }

    .week-chip {
      background: rgba(255, 255, 255, 0.12);
      color: #ffe7a8;
    }

    .chip.gold {
      background: linear-gradient(135deg, #f4c56b, #dba647);
      color: #10151b;
    }

    .chip.red {
      background: linear-gradient(135deg, #d1583d, #a33227);
      color: #fff4ef;
    }

    .panel-title {
      margin: 0 0 14px 0;
      font-size: 34px;
      line-height: 1.2;
    }

    .fighter-name {
      font-size: 46px;
      line-height: 1.15;
      font-weight: 700;
      margin: 0 0 12px 0;
    }

    .fighter-class {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .nameplate {
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      margin-bottom: 12px;
    }

    .footer-actions,
    .record-row,
    .battle-tabs,
    .battle-chip-line,
    .split-row {
      display: block;
    }

    .footer-actions:after,
    .record-row:after,
    .battle-tabs:after,
    .battle-chip-line:after,
    .split-row:after,
    .topbar:after,
    .battle-topbar:after,
    .battle-bottom:after {
      content: "";
      display: block;
      clear: both;
    }

    .nav-row,
    .battle-mode-row,
    .battle-actions-row {
      font-size: 0;
    }

    .nav-row .button,
    .nav-row .ghost {
      display: inline-block;
      width: 24.25%;
      margin-right: 1%;
      min-width: 0;
      min-height: 56px;
      padding: 12px 6px;
      font-size: 18px;
      vertical-align: top;
    }

    .nav-row .button:last-child,
    .nav-row .ghost:last-child {
      margin-right: 0;
    }

    .create-grid,
    .card-grid,
    .skill-grid,
    .choice-grid,
    .action-grid,
    .stat-grid,
    .fight-grid {
      display: block;
      margin-top: 14px;
    }

    .create-grid {
      font-size: 0;
    }

    .create-grid .create-card {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
      vertical-align: top;
      font-size: 20px;
    }

    .create-grid .create-card:nth-child(2n) {
      margin-right: 0;
    }

    .button,
    .ghost,
    .danger {
      display: block;
      width: 100%;
      min-height: 64px;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      margin: 0 0 10px 0;
      font-size: 21px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      white-space: normal;
    }

    .button {
      background: linear-gradient(135deg, #f4c56b, #dba647);
      color: #10151b;
    }

    .ghost {
      background: #eef2f7;
      color: #10151b;
    }

    .danger {
      background: linear-gradient(135deg, #d1583d, #a33227);
      color: #fff4ef;
    }

    .button[disabled],
    .ghost[disabled],
    .danger[disabled] {
      opacity: 0.4;
      cursor: default;
    }

    .card h3,
    .create-card h3 {
      margin: 0 0 10px 0;
      font-size: 28px;
      line-height: 1.25;
    }

    .meta {
      color: #f5c86f;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .create-card.selected {
      border-color: rgba(244, 197, 107, 0.88);
      box-shadow: 0 0 0 1px rgba(244, 197, 107, 0.32), 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    .meter-block {
      margin-top: 12px;
    }

    .meter-row {
      font-size: 20px;
      margin-bottom: 6px;
    }

    .meter-row span {
      color: #d7e0ea;
    }

    .meter-row strong {
      float: right;
      color: #ffffff;
    }

    .meter {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(135deg, #f4c56b, #dba647);
    }

    .stat-line {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 10px;
      font-size: 20px;
      font-weight: 600;
    }

    .stat-line span {
      color: #dbe4ef;
    }

    .stat-line strong {
      float: right;
      color: #ffffff;
    }

    .empty-state {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
    }

    .log-list {
      margin-top: 12px;
    }

    .log-entry {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 10px;
      font-size: 20px;
      line-height: 1.5;
    }

    .log-entry.good {
      border-left: 4px solid #61d59a;
    }

    .log-entry.warn {
      border-left: 4px solid #f5c86f;
    }

    .log-entry.bad {
      border-left: 4px solid #d1583d;
    }

    .battle-shell {
      padding: 12px;
    }

    .battle-topbar,
    .battle-stage,
    .battle-bottom {
      width: 100%;
    }

    .battle-stage {
      min-height: 58vh;
    }

    .battle-result {
      min-height: calc(100vh - 24px);
    }

    .battle-health-card {
      width: 100%;
      margin-bottom: 10px;
    }

    .battle-health-card:last-child,
    .battle-column:last-child,
    .battle-panel:last-child,
    .panel:last-child,
    .card:last-child,
    .create-card:last-child {
      margin-bottom: 0;
    }

    .battle-column,
    .summary-box {
      width: 100%;
      margin-bottom: 10px;
    }

    .battle-panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .battle-panel strong {
      display: block;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .battle-log {
      max-height: none;
      overflow: visible;
    }

    .battle-tabs .button,
    .battle-tabs .ghost {
      display: inline-block;
      width: 32%;
      margin-right: 1%;
      min-width: 0;
      min-height: 54px;
      padding: 12px 8px;
      font-size: 20px;
    }

    .battle-tabs .button:last-child,
    .battle-tabs .ghost:last-child {
      margin-right: 0;
    }

    .battle-actions-row .button,
    .battle-actions-row .ghost,
    .battle-actions-row .danger {
      width: 100%;
      min-height: 98px;
      padding: 12px 12px 10px 12px;
    }

    .battle-mode-row .button,
    .battle-mode-row .ghost {
      display: inline-block;
      width: 32%;
      margin-right: 2%;
      min-width: 0;
      vertical-align: top;
    }

    .battle-mode-row .button:nth-child(3n),
    .battle-mode-row .ghost:nth-child(3n) {
      margin-right: 0;
    }

    .battle-actions-row.move-grid .button,
    .battle-actions-row.move-grid .ghost,
    .battle-actions-row.move-grid .danger {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
      vertical-align: top;
    }

    .battle-actions-row.move-grid .button:nth-child(2n),
    .battle-actions-row.move-grid .ghost:nth-child(2n),
    .battle-actions-row.move-grid .danger:nth-child(2n) {
      margin-right: 0;
    }

    .battle-actions-row.attack-grid .button,
    .battle-actions-row.attack-grid .ghost,
    .battle-actions-row.attack-grid .danger {
      display: inline-block;
      width: 32%;
      margin-right: 2%;
      vertical-align: top;
    }

    .battle-actions-row.attack-grid .button:nth-child(3n),
    .battle-actions-row.attack-grid .ghost:nth-child(3n),
    .battle-actions-row.attack-grid .danger:nth-child(3n) {
      margin-right: 0;
    }

    .battle-actions-row.defense-grid .button,
    .battle-actions-row.defense-grid .ghost,
    .battle-actions-row.defense-grid .danger {
      display: inline-block;
      width: 48.5%;
      margin-right: 3%;
      vertical-align: top;
    }

    .battle-actions-row.defense-grid .button:nth-child(2n),
    .battle-actions-row.defense-grid .ghost:nth-child(2n),
    .battle-actions-row.defense-grid .danger:nth-child(2n) {
      margin-right: 0;
    }

    .battle-stage {
      min-height: 0;
      padding-bottom: 14px;
    }

    .controls-stage .ring-board {
      margin-bottom: 12px;
    }

    .action-button-title {
      display: block;
      font-size: 20px;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .action-button-meta {
      display: block;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 700;
    }

    .action-button-meta span {
      display: inline-block;
      margin: 0 8px 4px 0;
    }

    .action-blue {
      color: #7fd0ff;
    }

    .action-red {
      color: #ff8a80;
    }

    .action-yellow {
      color: #ffe189;
    }

    .knockdown-banner {
      margin-bottom: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(209, 88, 61, 0.95), rgba(163, 50, 39, 0.95));
      color: #fff4ef;
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ring-board {
      display: block;
      width: 100%;
      max-width: none;
      height: 92vw;
      min-height: 360px;
      max-height: 520px;
      margin: 16px auto 0 auto;
      padding: 44px 8px 48px 8px;
      background-color: #d9dee6;
      background-image: url('ring_top_view.png');
      background-repeat: no-repeat;
      background-position: center 33%;
      background-size: 132% 130%;
      text-align: center;
      font-size: 0;
    }

    .ring-row {
      display: block;
      white-space: nowrap;
      margin-bottom: 8px;
    }

    .ring-cell {
      width: 18%;
      height: 16vw;
      min-height: 54px;
      max-height: 76px;
      margin: 0 1% 0 1%;
      display: inline-block;
      vertical-align: top;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(15, 20, 28, 0.12);
      position: relative;
      text-align: center;
    }

    .ring-cell:after {
      content: attr(data-cell);
      position: absolute;
      right: 5px;
      bottom: 4px;
      color: rgba(255, 255, 255, 0.28);
      font-size: 11px;
      letter-spacing: 0.08em;
    }

    .token {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: inline-block;
      margin: 6px auto 0 auto;
      line-height: 42px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.28);
      position: relative;
      transition: background 0.5s ease, box-shadow 0.5s ease, color 0.5s ease;
    }

    .token.player {
      background: linear-gradient(135deg, #f4c56b, #dd9e39);
      color: #10151b;
    }

    .token.opponent {
      background: linear-gradient(135deg, #d35433, #9b2d24);
      color: #fff4ef;
    }

    .token.attack-right { animation: tokenAttackRight 0.32s ease-out; }
    .token.attack-left { animation: tokenAttackLeft 0.32s ease-out; }
    .token.attack-up { animation: tokenAttackUp 0.32s ease-out; }
    .token.attack-down { animation: tokenAttackDown 0.32s ease-out; }
    .token.hit-react { animation: tokenHitReact 0.26s linear 1; }
    .token.crit-flash {
      background: linear-gradient(135deg, #ff6f61, #d12e2e) !important;
      color: #fff4ef !important;
      box-shadow: 0 0 0 4px rgba(255, 111, 97, 0.18), 0 12px 26px rgba(0, 0, 0, 0.28);
    }
    .token.dodge-right { animation: tokenDodgeRight 0.32s ease-out; }
    .token.dodge-left { animation: tokenDodgeLeft 0.32s ease-out; }
    .token.dodge-up { animation: tokenDodgeUp 0.32s ease-out; }
    .token.dodge-down { animation: tokenDodgeDown 0.32s ease-out; }

    @keyframes tokenAttackRight {
      0% { transform: translateX(0); }
      35% { transform: translateX(16px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenAttackLeft {
      0% { transform: translateX(0); }
      35% { transform: translateX(-16px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenAttackUp {
      0% { transform: translateY(0); }
      35% { transform: translateY(-16px); }
      100% { transform: translateY(0); }
    }

    @keyframes tokenAttackDown {
      0% { transform: translateY(0); }
      35% { transform: translateY(16px); }
      100% { transform: translateY(0); }
    }

    @keyframes tokenHitReact {
      0% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-6px); }
      100% { transform: translateX(0); }
    }

    @keyframes tokenDodgeRight {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(14px) translateY(-10px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeLeft {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(-14px) translateY(-10px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeUp {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(10px) translateY(-14px); }
      100% { transform: translateX(0) translateY(0); }
    }

    @keyframes tokenDodgeDown {
      0% { transform: translateX(0) translateY(0); }
      35% { transform: translateX(10px) translateY(14px); }
      100% { transform: translateX(0) translateY(0); }
    }
  </style>

  <script type="text/javascript" src="country_data.js"></script>
  <script type="text/javascript">
    var DATA = {
      statLabels: {
        str: "Сила",
        tec: "Техника",
        spd: "Скорость",
        end: "Выносливость",
        vit: "Здоровье"
      },
      statDescriptions: {
        str: "Увеличивает множитель урона.",
        tec: "Поднимает точность и шанс крита.",
        spd: "Даёт уклон и усиливает контратаку.",
        end: "Повышает максимум стамины.",
        vit: "Повышает максимум здоровья."
      }
    };

    var state = {
      screen: "create",
      panel: "home",
      create: null,
      fighter: null,
      opponents: [],
      fight: null,
      log: [],
      endingReason: ""
    };

    function clamp(value, low, high) {
      return Math.max(low, Math.min(high, value));
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function chance(percent) {
      return rand(1, 100) <= percent;
    }

    function choice(list) {
      return list[rand(0, list.length - 1)];
    }

    function getCountryPool(countryKey) {
      return COUNTRY_DATA.pools[countryKey];
    }

    function flightCost(fromKey, toKey) {
      var from = getCountryInfo(fromKey);
      var to = getCountryInfo(toKey);
      var distance;
      if (!from || !to || fromKey === toKey) {
        return 0;
      }
      distance = Math.abs(from.x - to.x) + Math.abs(from.y - to.y);
      return Math.round((60 + distance * 22) / 5) * 5;
    }

    function currentTravelBonus(fighter) {
      if (fighter.currentCountry === fighter.homeCountry) {
        return { money: 1.2, fame: 1.0 };
      }
      return { money: 1.0, fame: 1.2 };
    }

    function baseStats() {
      return { str: 1, tec: 1, spd: 1, end: 1, vit: 1 };
    }

    function applyBounds(fighter) {
      var key;
      for (key in fighter.stats) {
        if (fighter.stats.hasOwnProperty(key)) {
          fighter.stats[key] = clamp(fighter.stats[key], 1, 99);
        }
      }
      fighter.money = Math.max(0, fighter.money);
      fighter.health = clamp(fighter.health, 0, 100);
      fighter.stress = clamp(fighter.stress, 0, 100);
      fighter.fame = Math.max(0, fighter.fame);
      fighter.skillPoints = Math.max(0, fighter.skillPoints || 0);
    }

    function recordText(fighter) {
      return fighter.wins + "-" + fighter.losses + " (КО: " + fighter.kos + ")";
    }

    function combatRating(fighter) {
      var stats = fighter.stats;
      var base = (stats.str + stats.tec + stats.spd + stats.end + stats.vit) / 5;
      return base + fighter.wins * 0.35 + fighter.fame * 0.04;
    }

    var RING_SIZE = 5;
    var ACTION_DELAY_MS = 500;
    var COUNT_STEP_MS = 500;
    var KO_TEXT_MS = 1000;
    var ACTION_ANIMATION_MS = 320;
    var COUNT_SHAKE_MS = 260;
    var CRIT_FLASH_MS = 500;
    var FIGHT_ACTIONS = {
      move_up: { type: "move", label: "Шаг вверх", dx: 0, dy: -1, stamina: 5 },
      move_left: { type: "move", label: "Шаг влево", dx: -1, dy: 0, stamina: 5 },
      move_right: { type: "move", label: "Шаг вправо", dx: 1, dy: 0, stamina: 5 },
      move_down: { type: "move", label: "Шаг вниз", dx: 0, dy: 1, stamina: 5 },
      jab: { type: "attack", label: "Джеб", reach: "line", hitBonus: 10, damage: 8, stamina: 7 },
      cross: { type: "attack", label: "Кросс", reach: "line", hitBonus: 0, damage: 12, stamina: 11 },
      body: { type: "attack", label: "Удар в корпус", reach: "line", hitBonus: 5, damage: 10, stamina: 10 },
      hook: { type: "attack", label: "Хук", reach: "close", hitBonus: -6, damage: 16, stamina: 15 },
      uppercut: { type: "attack", label: "Апперкот", reach: "close", hitBonus: -12, damage: 21, stamina: 18 },
      block: { type: "defense", label: "Блок", staminaGain: 30 },
      counter: { type: "defense", label: "Контратака", staminaGain: 15 }
    };

    var TRAINING_OPTIONS = {
      light: { label: "Лёгкая", points: 10, health: -6, stress: 6 },
      medium: { label: "Средняя", points: 20, health: -12, stress: 12 },
      hard: { label: "Жёсткая", points: 30, health: -18, stress: 18 }
    };

    var RECOVERY_OPTIONS = {
      home: { label: "Отлежаться дома", cost: 0, health: 18, stress: -10 },
      doctor: { label: "Спортивный врач", cost: 60, health: 30, stress: -6 },
      therapy: { label: "Терапия и массаж", cost: 35, health: 20, stress: -16 }
    };

    function buildFightState(stats, condition, position) {
      var maxHp = 100 + stats.vit * 10;
      var maxStamina = 100 + stats.end * 5;
      var hp = Math.round(maxHp * clamp(condition, 0, 100) / 100);
      return {
        hp: clamp(hp, 1, maxHp),
        maxHp: maxHp,
        stamina: maxStamina,
        maxStamina: maxStamina,
        knockdowns: 0,
        damageTaken: 0,
        position: { x: position.x, y: position.y },
        defenseMode: null,
        lastAttackKey: null,
        attackChain: 0,
        actedAttack: false
      };
    }

    function startRingPosition(side) {
      return side === "player" ? { x: 0, y: 2 } : { x: 4, y: 2 };
    }

    function insideRing(x, y) {
      return x >= 0 && x < RING_SIZE && y >= 0 && y < RING_SIZE;
    }

    function resetRingPositions(fight) {
      fight.playerState.position = startRingPosition("player");
      fight.opponentState.position = startRingPosition("opponent");
    }

    function resetCreate() {
      clearFightTimers();
      state.screen = "create";
      state.panel = "home";
      state.create = {
        country: null,
        identity: null
      };
      state.fighter = null;
      state.opponents = [];
      state.fight = null;
      state.endingReason = "";
      state.log = [
        { text: "Новый забег начинается. Собери бойца и выбери, каким именем район будет его помнить.", tone: "warn" }
      ];
    }

    function startCareer() {
      var stats = baseStats();
      if (!state.create.country || !state.create.identity) {
        return;
      }
      state.fighter = {
        name: state.create.identity.fullName,
        stats: stats,
        skillPoints: 0,
        money: 120,
        week: 1,
        health: 100,
        stress: 12,
        fame: 0,
        wins: 0,
        losses: 0,
        kos: 0,
        deathsCaused: 0,
        homeCountry: state.create.country,
        currentCountry: state.create.country
      };
      applyBounds(state.fighter);
      state.screen = "game";
      state.panel = "home";
      state.log.unshift({
        text: state.fighter.name + " стартует в " + getCountryInfo(state.fighter.homeCountry).name + ".",
        tone: "good"
      });
      render();
    }

    function setCreateCountry(key) {
      state.create.country = key;
      state.create.identity = makeIdentity(key);
      render();
    }

    function rerollName() {
      if (!state.create.country) {
        return;
      }
      state.create.identity = makeIdentity(state.create.country);
      render();
    }

    function pushLog(text, tone) {
      state.log.unshift({ text: text, tone: tone || "" });
      if (state.log.length > 32) {
        state.log = state.log.slice(0, 32);
      }
    }

    function meter(label, value, maxValue) {
      var limit = typeof maxValue === "number" ? maxValue : 100;
      var width = limit > 0 ? Math.round((value / limit) * 100) : 0;
      return "" +
        "<div class='meter-block'>" +
          "<div class='meter-row'><span>" + label + "</span><strong>" + value + "/" + limit + "</strong></div>" +
          "<div class='meter'><span style='width:" + clamp(width, 0, 100) + "%'></span></div>" +
        "</div>";
    }

    function statPointCost(value) {
      return Math.floor(value / 10) + 1;
    }

    function buyStatPoint(statKey) {
      var fighter = state.fighter;
      var cost = statPointCost(fighter.stats[statKey]);
      if (fighter.skillPoints < cost) {
        pushLog("На улучшение '" + DATA.statLabels[statKey] + "' не хватает очков.", "bad");
        render();
        return;
      }
      fighter.skillPoints -= cost;
      fighter.stats[statKey] += 1;
      applyBounds(fighter);
      pushLog(DATA.statLabels[statKey] + " выросла до " + fighter.stats[statKey] + ".", "good");
      render();
    }

    function renderStatLines(stats) {
      var html = [];
      var key;
      for (key in DATA.statLabels) {
        if (DATA.statLabels.hasOwnProperty(key)) {
          html.push("<div class='stat-line'><span>" + DATA.statLabels[key] + "</span><strong>" + stats[key] + "</strong></div>");
        }
      }
      return html.join("");
    }

    function openPanel(panel) {
      state.panel = panel;
      render();
    }

    function spendWeek() {
      if (evaluateEndState()) {
        return;
      }
      advanceWeek();
      if (evaluateEndState()) {
        return;
      }
      state.panel = "home";
      render();
    }

    function advanceWeek() {
      var fighter = state.fighter;
      fighter.week += 1;
      if (fighter.stress > 70) {
        fighter.health -= 1;
      }
      applyBounds(fighter);
      weeklyEvent();
    }

    function weeklyEvent() {
      var fighter = state.fighter;
      var roll;
      if (!chance(35)) {
        return;
      }
      roll = choice(["cash", "pressure", "injury", "fans", "coach"]);
      if (roll === "cash") {
        fighter.money += rand(20, 45);
        pushLog("Случайный калым помог пережить неделю спокойнее.", "good");
      } else if (roll === "pressure") {
        fighter.stress += 8;
        pushLog("Напряжение вокруг боев растет. Голова снова гудит.", "bad");
      } else if (roll === "injury") {
        fighter.health -= 8;
        fighter.stress += 5;
        pushLog("Старая боль напоминает о себе и тормозит подготовку.", "bad");
      } else if (roll === "fans") {
        fighter.fame += 5;
        pushLog("Район снова говорит о тебе. Известность подросла.", "good");
      } else {
        fighter.skillPoints += 5;
        pushLog("Тренер докрутил мелочи. +5 очков навыков.", "good");
      }
      applyBounds(fighter);
    }

    function evaluateEndState() {
      var fighter = state.fighter;
      if (!fighter) {
        return false;
      }
      if (fighter.health <= 0) {
        state.screen = "end";
        state.endingReason = "body";
        render();
        return true;
      }
      if (fighter.stress >= 100) {
        state.screen = "end";
        state.endingReason = "stress";
        render();
        return true;
      }
      return false;
    }

    function retireCareer() {
      state.screen = "end";
      state.endingReason = "retired";
      render();
    }

    function legacyRank(fighter) {
      var score = fighter.wins * 8 + fighter.fame - fighter.losses * 3;
      if (fighter.deathsCaused) {
        score += 10;
      }
      if (score >= 160) {
        return "Легенда подполья";
      }
      if (score >= 110) {
        return "Король района";
      }
      if (score >= 70) {
        return "Громкое имя";
      }
      if (score >= 40) {
        return "Известный боец";
      }
      return "Новичок улиц";
    }

    function travelToCountry(countryKey) {
      var fighter = state.fighter;
      var destination = getCountryInfo(countryKey);
      var cost = flightCost(fighter.currentCountry, countryKey);
      if (!destination || fighter.currentCountry === countryKey) {
        return;
      }
      if (fighter.money < cost) {
        pushLog("На перелет в " + destination.name + " сейчас не хватает денег.", "bad");
        render();
        return;
      }
      fighter.money -= cost;
      fighter.currentCountry = countryKey;
      fighter.stress += 4;
      applyBounds(fighter);
      pushLog("Перелет в " + destination.name + " обошелся в $" + cost + ". Новая арена: " + destination.city + ".", "warn");
      spendWeek();
    }

    function actionTrain(kind) {
      var fighter = state.fighter;
      var option = TRAINING_OPTIONS[kind];
      if (!option) {
        return;
      }
      fighter.skillPoints += option.points;
      fighter.health += option.health;
      fighter.stress += option.stress;
      applyBounds(fighter);
      pushLog(fighter.name + " проводит " + option.label.toLowerCase() + " тренировку и получает +" + option.points + " очков навыков.", "good");
      spendWeek();
    }

    function actionRecover(kind) {
      var fighter = state.fighter;
      var option = RECOVERY_OPTIONS[kind];
      if (!option) {
        return;
      }
      if (fighter.money < option.cost) {
        pushLog("На вариант восстановления '" + option.label + "' сейчас не хватает денег.", "bad");
        render();
        return;
      }
      fighter.money -= option.cost;
      fighter.health += option.health;
      fighter.stress += option.stress;
      applyBounds(fighter);
      pushLog(option.label + " возвращает " + option.health + " здоровья и меняет стресс на " + option.stress + ".", "good");
      spendWeek();
    }

    function actionWork(kind) {
      var fighter = state.fighter;
      if (kind === "guard") {
        fighter.money += rand(40, 55);
        fighter.stress += 4;
        fighter.health -= rand(0, 3);
        pushLog("Смена на охране прошла тяжело, но кошелек стал чуть толще.", "warn");
      } else if (kind === "collector") {
        fighter.money += rand(70, 95);
        fighter.stress += rand(7, 12);
        fighter.health -= rand(3, 9);
        fighter.fame += 4;
        pushLog("Грязная работа закрыта. Денег больше, но тело и нервы просели.", "bad");
      } else {
        fighter.money += rand(20, 35) + Math.max(0, fighter.stats.tec - 1) * 3;
        fighter.fame += 4;
        fighter.stress += 2;
        pushLog("Видео со спарринга залетело. Имя крутится по району все чаще.", "good");
      }
      applyBounds(fighter);
      spendWeek();
    }

    var COUNTRY_DISPLAY = {
      mexico: { name: "Мексика", city: "Мехико" },
      usa: { name: "США", city: "Лас-Вегас" },
      russia: { name: "Россия", city: "Москва" },
      cuba: { name: "Куба", city: "Гавана" },
      japan: { name: "Япония", city: "Токио" },
      china: { name: "Китай", city: "Шанхай" },
      uk: { name: "Великобритания", city: "Лондон" },
      philippines: { name: "Филиппины", city: "Манила" }
    };

    var RUSSIA_IDENTITY = {
      first: ["Иван", "Дмитрий", "Сергей", "Алексей", "Михаил", "Виктор", "Николай", "Андрей", "Павел", "Юрий", "Константин", "Артем", "Денис", "Егор", "Максим", "Роман", "Кирилл", "Олег", "Тимур", "Илья"],
      last: ["Иванов", "Петров", "Сидоров", "Смирнов", "Кузнецов", "Попов", "Васильев", "Федоров", "Волков", "Соловьев", "Морозов", "Лебедев", "Козлов", "Новиков", "Павлов", "Соколов", "Виноградов", "Макаров", "Орлов", "Егоров"],
      nick: ["Северный Волк", "Железный Молот", "Дикий Волк", "Ледяной Шторм", "Стальной Кулак", "Ночной Ворон", "Грозный Таран", "Красный Град", "Русский Медведь", "Сибирский Лис"]
    };

    function getCountryInfo(countryKey) {
      var i;
      var country;
      var display;
      for (i = 0; i < COUNTRY_DATA.countries.length; i += 1) {
        country = COUNTRY_DATA.countries[i];
        if (country.key === countryKey) {
          display = COUNTRY_DISPLAY[countryKey];
          if (display) {
            country.name = display.name;
            country.city = display.city;
          }
          return country;
        }
      }
      return null;
    }

    function makeIdentity(countryKey) {
      var identity;
      if (countryKey === "russia") {
        identity = {
          firstName: choice(RUSSIA_IDENTITY.first),
          lastName: choice(RUSSIA_IDENTITY.last),
          nickname: choice(RUSSIA_IDENTITY.nick)
        };
        identity.fullName = identity.firstName + ' "' + identity.nickname + '" ' + identity.lastName;
        return identity;
      }
      return window.makeIdentityBase ? window.makeIdentityBase(countryKey) : (function () {
        var pool = getCountryPool(countryKey);
        var seed = COUNTRY_DATA.seeds[countryKey];
        var surnameParts;
        var firstName;
        var lastName;
        var nickname;
        if (!pool) {
          return null;
        }
        if (seed && seed.firstJoin === "join") {
          firstName = choice(pool.firstNames);
        } else {
          firstName = choice(seed.firstLeft.concat(seed.firstRight));
        }
        surnameParts = seed && seed.lastJoin === "join" ? pool.lastNames.slice(0) : seed.lastLeft.concat(seed.lastRight);
        lastName = choice(surnameParts);
        if (chance(5) && surnameParts.length > 1) {
          var secondSurname = choice(surnameParts);
          var separator = (countryKey === "mexico" || countryKey === "cuba" || countryKey === "philippines") ? " " : "-";
          while (secondSurname === lastName) {
            secondSurname = choice(surnameParts);
          }
          lastName = lastName + separator + secondSurname;
        }
        nickname = choice(pool.nicknames);
        return {
          firstName: firstName,
          lastName: lastName,
          nickname: nickname,
          fullName: firstName + ' "' + nickname + '" ' + lastName
        };
      }());
    }

    function generateOpponent(tier) {
      var fighter = state.fighter;
      var country = getCountryInfo(fighter.currentCountry);
      var identity = makeIdentity(fighter.currentCountry);
      var bonus = currentTravelBonus(fighter);
      var tierBonus = tier === "safe" ? -1 : (tier === "even" ? 1 : 3);
      var base = clamp(Math.round(combatRating(fighter)) + tierBonus + rand(-1, 1), 1, 40);
      var stats = {
        str: clamp(base + rand(-1, 2), 1, 45),
        tec: clamp(base + rand(-1, 2), 1, 45),
        spd: clamp(base + rand(-1, 2), 1, 45),
        end: clamp(base + rand(-1, 2), 1, 45),
        vit: clamp(base + rand(-1, 2), 1, 45)
      };
      return {
        firstName: identity.firstName,
        lastName: identity.lastName,
        nickname: identity.nickname,
        fullName: identity.fullName,
        countryKey: fighter.currentCountry,
        profile: choice(["Давит по центру", "Любит ловить на блоке", "Работает вторым номером", "Сушит темп и колет джебом", "Лезет в корпус"]),
        stats: stats,
        purse: Math.round(((tier === "safe" ? 65 : (tier === "even" ? 95 : 150)) + base * 8 + rand(0, 24)) * bonus.money),
        fameReward: Math.round(((tier === "safe" ? 6 : (tier === "even" ? 11 : 17)) + Math.max(0, base - 5) * 2 + rand(0, 4)) * bonus.fame),
        condition: rand(72, 100),
        rounds: tier === "danger" ? choice([6, 7]) : (tier === "even" ? choice([5, 6]) : choice([4, 5])),
        danger: tier === "safe" ? "Ниже по риску" : (tier === "even" ? "Ровный бой" : "Очень опасен"),
        venue: country ? country.city : ""
      };
    }

    function fullOpponentName(opponent) {
      return opponent.fullName || (opponent.firstName + ' "' + opponent.nickname + '" ' + opponent.lastName);
    }

    function openFightSelect() {
      state.opponents = [generateOpponent("safe"), generateOpponent("even"), generateOpponent("danger")];
      state.panel = "fightSelect";
      render();
    }

    function fightStateBySide(fight, side) {
      return side === "player" ? fight.playerState : fight.opponentState;
    }

    function fightStatsBySide(fight, side) {
      return side === "player" ? state.fighter.stats : fight.opponent.stats;
    }

    function fightNameBySide(fight, side) {
      return side === "player" ? state.fighter.name : fullOpponentName(fight.opponent);
    }

    function otherSide(side) {
      return side === "player" ? "opponent" : "player";
    }

    function pushFightLine(fight, text) {
      fight.lines.unshift(text);
      if (fight.lines.length > 48) {
        fight.lines = fight.lines.slice(0, 48);
      }
    }

    function awardFightPressure(fight, side, amount) {
      fight.roundPoints[side] += amount;
    }

    function moveActor(fight, side, actionKey) {
      var actor = fightStateBySide(fight, side);
      var action = FIGHT_ACTIONS[actionKey];
      var fromX = actor.position.x + 1;
      var fromY = actor.position.y + 1;
      actor.stamina = clamp(actor.stamina - action.stamina, 0, actor.maxStamina);
      actor.position = {
        x: actor.position.x + action.dx,
        y: actor.position.y + action.dy
      };
      actor.actedAttack = false;
      actor.defenseMode = null;
      resetActionChain(actor);
      pushFightLine(fight, fightNameBySide(fight, side) + " смещается: " + fromX + ":" + fromY + " -> " + (actor.position.x + 1) + ":" + (actor.position.y + 1) + ".");
    }

    function availableFightActions(fight, side, type) {
      var keys = [];
      var key;
      for (key in FIGHT_ACTIONS) {
        if (FIGHT_ACTIONS.hasOwnProperty(key) && (!type || FIGHT_ACTIONS[key].type === type) && canUseFightAction(fight, side, key)) {
          keys.push(key);
        }
      }
      return keys;
    }

    function openFightTab(tabKey) {
      if (!state.fight) {
        return;
      }
      state.fight.uiTab = tabKey;
      render();
    }

    function openFightActionGroup(groupKey) {
      if (!state.fight) {
        return;
      }
      state.fight.uiTab = "controls";
      state.fight.actionGroup = groupKey;
      render();
    }

    function previewAttackChain(actor, actionKey) {
      return actor.lastAttackKey === actionKey ? actor.attackChain + 1 : 1;
    }

    function previewAttackModifiers(attacker, actionKey) {
      var chainCount = previewAttackChain(attacker, actionKey);
      var accuracyPenalty = 0;
      var damageMultiplier = 1;
      if (chainCount === 2) {
        accuracyPenalty -= 10;
        damageMultiplier *= 0.95;
      } else if (chainCount >= 3) {
        accuracyPenalty -= 15;
        damageMultiplier *= 0.9;
      }
      if (staminaIsLow(attacker)) {
        accuracyPenalty -= 10;
        damageMultiplier *= 0.9;
      }
      return {
        accuracyPenalty: accuracyPenalty,
        damageMultiplier: damageMultiplier
      };
    }

    function previewHitChance(fight, side, actionKey) {
      var attacker = fightStateBySide(fight, side);
      var defender = fightStateBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);
      var defenderStats = fightStatsBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var modifiers;
      var dodge;
      if (!action || action.type !== "attack") {
        return 0;
      }
      if (!actionReachAllowed(fight, side, actionKey)) {
        return 0;
      }
      modifiers = previewAttackModifiers(attacker, actionKey);
      dodge = effectiveDodgeChance(defender, defenderStats);
      return clamp(Math.round(65 + action.hitBonus + attackerStats.tec * 0.5 + modifiers.accuracyPenalty - dodge), 25, 95);
    }

    function previewDamage(fight, side, actionKey) {
      var attacker = fightStateBySide(fight, side);
      var defender = fightStateBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);
      var action = FIGHT_ACTIONS[actionKey];
      var modifiers;
      var damage;
      if (!action || action.type !== "attack") {
        return 0;
      }
      modifiers = previewAttackModifiers(attacker, actionKey);
      damage = action.damage * (1 + attackerStats.str * 0.05) * modifiers.damageMultiplier;
      if (defender.stamina < 5) {
        damage *= 1.2;
      }
      if (defender.defenseMode === "block") {
        damage *= 0.5;
      }
      return Math.max(1, Math.round(damage));
    }

    function renderFightActionMeta(actionKey) {
      var fight = state.fight;
      var action = FIGHT_ACTIONS[actionKey];
      var parts = [];
      if (!fight || !action) {
        return "";
      }
      if (action.type === "move") {
        parts.push("<span class='action-blue'>Стамина -" + action.stamina + "</span>");
      } else if (action.type === "defense") {
        parts.push("<span class='action-blue'>Стамина +" + action.staminaGain + "</span>");
      } else if (action.type === "attack") {
        parts.push("<span class='action-blue'>Стамина -" + action.stamina + "</span>");
        parts.push("<span class='action-red'>Урон " + previewDamage(fight, "player", actionKey) + "</span>");
        parts.push("<span class='action-yellow'>Точность " + previewHitChance(fight, "player", actionKey) + "%</span>");
      }
      return "<div class='action-button-meta'>" + parts.join("") + "</div>";
    }

    function renderFightControlsPanel(fight) {
      var html = [];
      var group = fight.actionGroup || "move";
      html.push("<div class='battle-panel'>");
      html.push("<strong>Управление</strong>");
      html.push("<div class='battle-mode-row'>");
      html.push("<button class='" + (group === "move" ? "button" : "ghost") + "' onclick='openFightActionGroup(\"move\")'>Движение</button>");
      html.push("<button class='" + (group === "attack" ? "button" : "ghost") + "' onclick='openFightActionGroup(\"attack\")'>Удары</button>");
      html.push("<button class='" + (group === "defense" ? "button" : "ghost") + "' onclick='openFightActionGroup(\"defense\")'>Защита</button>");
      html.push("</div>");
      html.push("<div class='battle-actions-row " + (group === "move" ? "move-grid" : (group === "attack" ? "attack-grid" : "defense-grid")) + "'>");
      if (group === "move") {
        html.push(renderFightActionButton("move_up", "ghost"));
        html.push(renderFightActionButton("move_left", "ghost"));
        html.push(renderFightActionButton("move_right", "ghost"));
        html.push(renderFightActionButton("move_down", "ghost"));
      } else if (group === "attack") {
        html.push(renderFightActionButton("jab", "button"));
        html.push(renderFightActionButton("cross", "button"));
        html.push(renderFightActionButton("body", "button"));
        html.push(renderFightActionButton("hook", "danger"));
        html.push(renderFightActionButton("uppercut", "danger"));
      } else {
        html.push(renderFightActionButton("block", "ghost"));
        html.push(renderFightActionButton("counter", "button"));
      }
      html.push("</div></div>");
      return html.join("");
    }

    function renderFightLogPanel(fight) {
      var html = [];
      var i;
      html.push("<div class='battle-panel'><strong>Лента боя</strong><div class='battle-log'>");
      for (i = 0; i < Math.min(14, fight.lines.length); i += 1) {
        html.push("<div class='log-entry'>" + fight.lines[i] + "</div>");
      }
      html.push("</div></div>");
      return html.join("");
    }

    function finalizeFight(result, method, lines) {
      var fight = state.fight;
      var extraLines = lines || [];
      clearFightTimers();
      fight.result = result;
      fight.method = method;

    function ringVector(fromPos, toPos) {
      return { dx: toPos.x - fromPos.x, dy: toPos.y - fromPos.y, adx: Math.abs(toPos.x - fromPos.x), ady: Math.abs(toPos.y - fromPos.y) };
    }

    function attackZone(fromPos, toPos) {
      var vector = ringVector(fromPos, toPos);
      if (vector.adx === 0 && vector.ady === 0) {
        return "same";
      }
      if (Math.max(vector.adx, vector.ady) === 1) {
        return "close";
      }
      if ((vector.adx === 0 && vector.ady <= 2) || (vector.ady === 0 && vector.adx <= 2) || (vector.adx === vector.ady && vector.adx === 2)) {
        return "line";
      }
      return "far";
    }

    function animationDirection(fromPos, toPos) {
      var vector = ringVector(fromPos, toPos);
      if (vector.adx >= vector.ady) {
        return vector.dx >= 0 ? "right" : "left";
      }
      return vector.dy >= 0 ? "down" : "up";
    }

    function clearFightStepTimeout() {
      if (state.fight && state.fight.pendingTimeout) {
        window.clearTimeout(state.fight.pendingTimeout);
        state.fight.pendingTimeout = null;
      }
    }

    function clearFightAnimationTimeout() {
      if (state.fight && state.fight.animationTimeout) {
        window.clearTimeout(state.fight.animationTimeout);
        state.fight.animationTimeout = null;
      }
    }

    function clearFightAnimationState() {
      if (state.fight) {
        clearFightAnimationTimeout();
        state.fight.animation = null;
      }
    }

    function clearFightAnimation() {
      var hadAnimation = state.fight && state.fight.animation;
      clearFightAnimationState();
      if (hadAnimation) {
        render();
      }
    }

    function clearFightTimers() {
      clearFightStepTimeout();
      clearFightAnimationState();
    }

    function scheduleFightStep(callbackName, delay) {
      if (!state.fight) {
        return;
      }
      clearFightStepTimeout();
      state.fight.pendingTimeout = window.setTimeout(callbackName + "()", delay);
    }

    function consumeFightStepTimeout() {
      if (state.fight) {
        state.fight.pendingTimeout = null;
      }
    }

    function setFightAnimationFrame(playerClass, opponentClass, duration) {
      if (!state.fight) {
        return;
      }
      clearFightAnimationState();
      state.fight.animation = {
        playerClass: playerClass || "",
        opponentClass: opponentClass || ""
      };
      render();
      state.fight.animationTimeout = window.setTimeout("clearFightAnimation()", duration || ACTION_ANIMATION_MS);
    }

    function setStrikeAnimation(attackerSide, mode, critical) {
      var fight = state.fight;
      var attacker = attackerSide === "player" ? fight.playerState : fight.opponentState;
      var defender = attackerSide === "player" ? fight.opponentState : fight.playerState;
      var direction = animationDirection(attacker.position, defender.position);
      var attackerClass = "attack-" + direction;
      var defenderClass = mode === "hit" ? "hit-react" : "dodge-" + direction;
      var duration = ACTION_ANIMATION_MS;
      if (critical) {
        defenderClass += " crit-flash";
        duration = CRIT_FLASH_MS;
      }
      if (attackerSide === "player") {
        setFightAnimationFrame(attackerClass, defenderClass, duration);
      } else {
        setFightAnimationFrame(defenderClass, attackerClass, duration);
      }
    }

    function pulseKnockdownAnimation(victimSide) {
      if (victimSide === "player") {
        setFightAnimationFrame("hit-react", "", COUNT_SHAKE_MS);
      } else {
        setFightAnimationFrame("", "hit-react", COUNT_SHAKE_MS);
      }
    }

    function tokenClassFor(side) {
      var fight = state.fight;
      var tokenClass = "token " + (side === "player" ? "player" : "opponent");
      var sideClass;
      if (!fight) {
        return tokenClass;
      }
      if (!fight.animation) {
        return tokenClass;
      }
      sideClass = side === "player" ? fight.animation.playerClass : fight.animation.opponentClass;
      if (sideClass) {
        tokenClass += " " + sideClass;
      }
      return tokenClass;
    }

    function actionReachAllowed(fight, side, actionKey) {
      var actor = fightStateBySide(fight, side);
      var target = fightStateBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var zone;
      if (!action) {
        return false;
      }
      if (action.type !== "attack") {
        return true;
      }
      zone = attackZone(actor.position, target.position);
      if (action.reach === "close") {
        return zone === "close";
      }
      return zone === "close" || zone === "line";
    }

    function canUseFightAction(fight, side, actionKey) {
      var actor = fightStateBySide(fight, side);
      var target = fightStateBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var nextX;
      var nextY;
      if (!action) {
        return false;
      }
      if (action.type === "move") {
        nextX = actor.position.x + action.dx;
        nextY = actor.position.y + action.dy;
        return actor.stamina >= action.stamina && insideRing(nextX, nextY) && !(target.position.x === nextX && target.position.y === nextY);
      }
      if (action.type === "defense") {
        return actionKey !== "counter" || actor.stamina >= 5;
      }
      return actor.stamina >= action.stamina && actionReachAllowed(fight, side, actionKey);
    }

    function staminaIsLow(actor) {
      return actor.stamina < actor.maxStamina * 0.2;
    }

    function resetActionChain(actor) {
      actor.lastAttackKey = null;
      actor.attackChain = 0;
    }

    function nextAttackChain(actor, actionKey) {
      return actor.lastAttackKey === actionKey ? actor.attackChain + 1 : 1;
    }

    function applyAttackChain(actor, actionKey) {
      actor.lastAttackKey = actionKey;
      actor.attackChain = nextAttackChain(actor, actionKey);
    }

    function effectiveDodgeChance(defender, defenderStats) {
      var dodge = 5 + defenderStats.spd * 0.5;
      if (defender.stamina < 5) {
        return 0;
      }
      if (defender.defenseMode === "block") {
        dodge = dodge / 2;
      } else if (defender.defenseMode === "counter") {
        dodge = 20 + defenderStats.spd * 0.5;
      }
      return clamp(Math.round(dodge), 0, 90);
    }

    function knockdownRiseChance(fight, victimSide, count) {
      var victim = fightStateBySide(fight, victimSide);
      var victimStats = fightStatsBySide(fight, victimSide);
      var overkill = fight.knockdown ? fight.knockdown.overkill : 0;
      var riseChance = 12 + count * 7 + victimStats.vit * 0.8 + victimStats.end * 0.8;
      riseChance -= overkill * 6;
      riseChance -= victim.knockdowns * 10;
      return clamp(Math.round(riseChance), 3, 88);
    }

    function restoreAfterKnockdown(stateBoxer) {
      stateBoxer.hp = clamp(stateBoxer.hp + Math.round(stateBoxer.maxHp * 0.25), 0, stateBoxer.maxHp);
      stateBoxer.stamina = clamp(stateBoxer.stamina + Math.round(stateBoxer.maxStamina * 0.25), 0, stateBoxer.maxStamina);
      stateBoxer.defenseMode = null;
      stateBoxer.actedAttack = false;
      resetActionChain(stateBoxer);
    }

    function resolveKnockdown(fight, victimSide) {
      var victim = fightStateBySide(fight, victimSide);
      var attackerSide = otherSide(victimSide);
      var victimName = fightNameBySide(fight, victimSide);
      var overkill = Math.max(0, 0 - victim.hp);
      awardFightPressure(fight, attackerSide, 16);
      clearFightTimers();
      victim.hp = 0;
      fight.actionLock = true;
      fight.knockdown = {
        victimSide: victimSide,
        victimName: victimName,
        text: "Нокдаун",
        count: 0,
        overkill: overkill
      };
      pushFightLine(fight, victimName + " падает в нокдаун.");
      pulseKnockdownAnimation(victimSide);
      scheduleFightStep("advanceKnockdownSequence", COUNT_STEP_MS);
      return true;
    }

    function startKnockdownRecovery() {
      consumeFightStepTimeout();
      if (!state.fight || !state.fight.knockdown) {
        return;
      }
      state.fight.knockdown.text = "Встал";
      clearFightAnimationState();
      render();
      scheduleFightStep("finishKnockdownRecovery", COUNT_STEP_MS);
    }

    function finishKnockdownRecovery() {
      var fight = state.fight;
      var knockdown;
      var victim;
      var attacker;
      consumeFightStepTimeout();
      if (!fight || !fight.knockdown) {
        return;
      }
      knockdown = fight.knockdown;
      victim = fightStateBySide(fight, knockdown.victimSide);
      attacker = fightStateBySide(fight, otherSide(knockdown.victimSide));
      victim.knockdowns += 1;
      restoreAfterKnockdown(victim);
      restoreAfterKnockdown(attacker);
      resetRingPositions(fight);
      clearFightAnimationState();
      pushFightLine(fight, knockdown.victimName + " поднимается на счет " + knockdown.count + ". Оба бойца возвращают по 25% здоровья и стамины.");
      fight.knockdown = null;
      fight.skipTurnRecovery = true;
      render();
      scheduleFightStep("completeFightTurn", ACTION_DELAY_MS);
    }

    function startKnockdownKnockout() {
      consumeFightStepTimeout();
      if (!state.fight || !state.fight.knockdown) {
        return;
      }
      state.fight.knockdown.text = "Нокаут";
      clearFightAnimationState();
      render();
      scheduleFightStep("finishKnockdownKnockout", KO_TEXT_MS);
    }

    function finishKnockdownKnockout() {
      var fight = state.fight;
      var knockdown;
      consumeFightStepTimeout();
      if (!fight || !fight.knockdown) {
        return;
      }
      knockdown = fight.knockdown;
      clearFightTimers();
      fight.knockdown = null;
      pushFightLine(fight, knockdown.victimName + " не поднимается к счету 10.");
      finalizeFight(knockdown.victimSide === "player" ? "loss" : "win", "KO/TKO", []);
    }

    function advanceKnockdownSequence() {
      var fight = state.fight;
      var riseChance;
      consumeFightStepTimeout();
      if (!fight || !fight.knockdown) {
        return;
      }
      if (fight.knockdown.count < 10) {
        fight.knockdown.count += 1;
        fight.knockdown.text = String(fight.knockdown.count);
        pulseKnockdownAnimation(fight.knockdown.victimSide);
        if (fight.knockdown.count >= 10) {
          scheduleFightStep("startKnockdownKnockout", COUNT_STEP_MS);
          return;
        }
        riseChance = knockdownRiseChance(fight, fight.knockdown.victimSide, fight.knockdown.count);
        if (chance(riseChance)) {
          scheduleFightStep("startKnockdownRecovery", COUNT_STEP_MS);
          return;
        }
        scheduleFightStep("advanceKnockdownSequence", COUNT_STEP_MS);
      }
    }

    function applyDefenseAction(fight, side, actionKey) {
      var actor = fightStateBySide(fight, side);
      var action = FIGHT_ACTIONS[actionKey];
      actor.stamina = clamp(actor.stamina + action.staminaGain, 0, actor.maxStamina);
      actor.defenseMode = actionKey;
      actor.actedAttack = false;
      resetActionChain(actor);
      pushFightLine(fight, fightNameBySide(fight, side) + " готовит " + action.label.toLowerCase() + ".");
    }

    function counterAttackChoices(fight, side) {
      var keys = ["jab", "cross", "body"];
      var list = [];
      var i;
      for (i = 0; i < keys.length; i += 1) {
        if (actionReachAllowed(fight, side, keys[i])) {
          list.push(keys[i]);
        }
      }
      return list;
    }

    function attemptCounterAttack(fight, defenderSide) {
      var defender = fightStateBySide(fight, defenderSide);
      var defenderStats = fightStatsBySide(fight, defenderSide);
      var choices = counterAttackChoices(fight, defenderSide);
      var chanceToCounter;
      var pickedAction;
      if (!choices.length || defender.stamina < 5) {
        return false;
      }
      chanceToCounter = clamp(Math.round(50 + defenderStats.tec * 0.5), 5, 95);
      defender.defenseMode = null;
      if (!chance(chanceToCounter)) {
        pushFightLine(fight, fightNameBySide(fight, defenderSide) + " хотел ответить на контратаке, но окно закрылось.");
        return false;
      }
      pickedAction = choice(choices);
      pushFightLine(fight, fightNameBySide(fight, defenderSide) + " ловит момент и отвечает на контратаке.");
      return strikeActor(fight, defenderSide, pickedAction, { free: true, counter: true });
    }

    function strikeActor(fight, side, actionKey, options) {
      var attacker = fightStateBySide(fight, side);
      var defender = fightStateBySide(fight, otherSide(side));
      var attackerStats = fightStatsBySide(fight, side);
      var defenderStats = fightStatsBySide(fight, otherSide(side));
      var attackerName = fightNameBySide(fight, side);
      var defenderName = fightNameBySide(fight, otherSide(side));
      var action = FIGHT_ACTIONS[actionKey];
      var hitChance;
      var damage;
      var critical;
      var dodge;
      var modifiers;
      var defenseMode = defender.defenseMode;
      var allowCounter = !(options && options.counter);
      options = options || {};
      if (!action || !actionReachAllowed(fight, side, actionKey)) {
        pushFightLine(fight, attackerName + " выбрасывает " + (action ? action.label.toLowerCase() : "удар") + ", но дистанция не позволяет попасть.");
        setStrikeAnimation(side, "miss", false);
        return false;
      }
      if (!options.free && attacker.stamina < action.stamina) {
        pushFightLine(fight, attackerName + " не хватает стамины на " + action.label.toLowerCase() + ".");
        return false;
      }
      if (!options.free) {
        attacker.stamina = clamp(attacker.stamina - action.stamina, 0, attacker.maxStamina);
      }
      attacker.defenseMode = null;
      attacker.actedAttack = true;
      modifiers = previewAttackModifiers(attacker, actionKey);
      dodge = effectiveDodgeChance(defender, defenderStats);
      hitChance = clamp(Math.round(65 + action.hitBonus + attackerStats.tec * 0.5 + modifiers.accuracyPenalty - dodge), 25, 95);
      if (!chance(hitChance)) {
        pushFightLine(fight, attackerName + " промахивается: " + action.label.toLowerCase() + " не доходит до цели.");
        setStrikeAnimation(side, "miss", false);
        if (allowCounter && defenseMode === "counter") {
          return attemptCounterAttack(fight, otherSide(side));
        }
        defender.defenseMode = null;
        applyAttackChain(attacker, actionKey);
        return false;
      }
      damage = action.damage * (1 + attackerStats.str * 0.05) * modifiers.damageMultiplier;
      if (defender.stamina < 5) {
        damage *= 1.2;
      }
      if (defenseMode === "block") {
        damage *= 0.5;
      }
      critical = chance(clamp(Math.round(5 + attackerStats.tec * 0.2), 5, 95));
      if (critical) {
        damage *= 1.5;
      }
      damage = Math.max(1, Math.round(damage));
      defender.hp -= damage;
      defender.damageTaken += damage;
      defender.defenseMode = null;
      awardFightPressure(fight, side, damage + (critical ? 6 : 2));
      if (critical) {
        pushFightLine(fight, attackerName + " ловит критический удар '" + action.label + "' на " + damage + " урона.");
      } else {
        pushFightLine(fight, attackerName + " попадает ударом '" + action.label + "' и снимает " + damage + " прочности.");
      }
      setStrikeAnimation(side, "hit", critical);
      applyAttackChain(attacker, actionKey);
      if (defender.hp <= 0) {
        return resolveKnockdown(fight, otherSide(side));
      }
      return false;
    }

    function pickAIMove(fight, retreat) {
      var keys = ["move_up", "move_left", "move_right", "move_down"];
      var actor = fight.opponentState;
      var target = fight.playerState;
      var best = [];
      var bestScore = retreat ? -999 : 999;
      var i;
      var action;
      var nextPos;
      var targetDistance;
      var centerDistance;
      var score;
      for (i = 0; i < keys.length; i += 1) {
        if (!canUseFightAction(fight, "opponent", keys[i])) {
          continue;
        }
        action = FIGHT_ACTIONS[keys[i]];
        nextPos = { x: actor.position.x + action.dx, y: actor.position.y + action.dy };
        targetDistance = Math.max(Math.abs(nextPos.x - target.position.x), Math.abs(nextPos.y - target.position.y));
        centerDistance = Math.abs(nextPos.x - 2) + Math.abs(nextPos.y - 2);
        score = targetDistance * 14 + centerDistance * 4 + rand(0, 3);
        if (retreat) {
          score = targetDistance * 14 - centerDistance * 3 + rand(0, 3);
          if (score > bestScore) {
            bestScore = score;
            best = [keys[i]];
          } else if (score === bestScore) {
            best.push(keys[i]);
          }
        } else if (score < bestScore) {
          bestScore = score;
          best = [keys[i]];
        } else if (score === bestScore) {
          best.push(keys[i]);
        }
      }
      return best.length ? choice(best) : null;
    }

    function pickAiAction(fight) {
      var ai = fight.opponentState;
      var player = fight.playerState;
      var attacks = availableFightActions(fight, "opponent", "attack");
      var retreat = ai.hp < ai.maxHp * 0.3 || ai.stamina < ai.maxStamina * 0.2;
      if (ai.stamina < ai.maxStamina * 0.15 && canUseFightAction(fight, "opponent", "block") && chance(65)) {
        return "block";
      }
      if (ai.hp < ai.maxHp * 0.45 && canUseFightAction(fight, "opponent", "counter") && chance(40)) {
        return "counter";
      }
      if (attacks.length) {
        if (player.hp < player.maxHp * 0.3 && canUseFightAction(fight, "opponent", "uppercut")) {
          return "uppercut";
        }
        if (canUseFightAction(fight, "opponent", "cross") && chance(50)) {
          return "cross";
        }
        if (canUseFightAction(fight, "opponent", "jab") && chance(65)) {
          return "jab";
        }
        if (canUseFightAction(fight, "opponent", "body") && chance(45)) {
          return "body";
        }
        if (canUseFightAction(fight, "opponent", "hook") && chance(35)) {
          return "hook";
        }
        return choice(attacks);
      }
      return pickAIMove(fight, retreat);
    }

    function applyFightResults() {
      var fight = state.fight;
      var fighter = state.fighter;
      var opponent = fight.opponent;
      var injury = Math.floor(fight.playerState.damageTaken * 0.1 + fight.playerState.knockdowns * 10);
      var fameGain;
      var pointReward = 0;
      fighter.health -= injury;
      fighter.stress += 6 + fight.playerState.knockdowns * 3;
      if (fight.result === "win") {
        fighter.wins += 1;
        fighter.money += opponent.purse;
        fighter.fame += opponent.fameReward;
        pointReward = 40;
        if (fight.method.indexOf("KO") !== -1) {
          fighter.kos += 1;
          pointReward = 60;
        }
        if (fight.method.indexOf("Смерть") !== -1 || fight.method.indexOf("Убийство") !== -1) {
          fighter.deathsCaused += 1;
          pointReward = 80;
        }
        fighter.skillPoints += pointReward;
        pushLog("Победа. Ты забираешь $" + opponent.purse + ", +" + opponent.fameReward + " к известности и +" + pointReward + " очков навыков.", "good");
      } else if (fight.result === "loss") {
        fameGain = Math.max(2, Math.floor(opponent.fameReward / 3));
        fighter.losses += 1;
        fighter.money += Math.floor(opponent.purse * 0.35);
        fighter.fame += fameGain;
        fighter.stress += 6;

        pushLog("Поражение. Ты всё равно получаешь часть денег, немного известности и +30 очков навыков.", "bad");
      } else {
        fameGain = Math.max(4, Math.floor(opponent.fameReward / 2));
        fighter.money += Math.floor(opponent.purse * 0.55);
        fighter.fame += fameGain;
        fighter.skillPoints += 35;
        pushLog("Ничья. Ты уходишь с деньгами, известностью и +35 очками навыков.", "warn");

      applyBounds(fighter);
    }

    }

    function finishFightRound() {
      var fight = state.fight;
      var playerCard = 10;
      var opponentCard = 10;
      var delta = fight.roundPoints.player - fight.roundPoints.opponent;
      var playerHeal;
      var opponentHeal;
      var playerStaminaGain;
      var opponentStaminaGain;
      clearFightTimers();
      if (delta >= 14) {
        opponentCard = 8;
      } else if (delta > 0) {
        opponentCard = 9;
      } else if (delta <= -14) {
        playerCard = 8;
      } else if (delta < 0) {
        playerCard = 9;
      }
      fight.judges.player += playerCard;
      fight.judges.opponent += opponentCard;
      fight.roundCards.unshift("Раунд " + fight.round + ": " + playerCard + "-" + opponentCard);
      fight.roundsCompleted = fight.round;
      pushFightLine(fight, "Раунд " + fight.round + " завершен: " + playerCard + "-" + opponentCard + ".");
      pushLog("Раунд " + fight.round + " завершен. Карточка судей: " + playerCard + "-" + opponentCard + ".", "warn");
      if (fight.round >= fight.opponent.rounds) {
        finalizeFight(
          fight.judges.player > fight.judges.opponent ? "win" : (fight.judges.player < fight.judges.opponent ? "loss" : "draw"),
          "Решение судей " + fight.judges.player + ":" + fight.judges.opponent,
          ["Судейские записки: " + fight.roundCards.slice(0).reverse().join(", ") + "."]
        );
        return;
      }
      playerHeal = Math.min(fight.playerState.maxHp - fight.playerState.hp, Math.round(fight.playerState.maxHp * 0.4));
      opponentHeal = Math.min(fight.opponentState.maxHp - fight.opponentState.hp, Math.round(fight.opponentState.maxHp * 0.4));
      playerStaminaGain = Math.min(fight.playerState.maxStamina - fight.playerState.stamina, Math.round(fight.playerState.maxStamina * 0.4));
      opponentStaminaGain = Math.min(fight.opponentState.maxStamina - fight.opponentState.stamina, Math.round(fight.opponentState.maxStamina * 0.4));
      fight.playerState.hp = clamp(fight.playerState.hp + playerHeal, 0, fight.playerState.maxHp);
      fight.opponentState.hp = clamp(fight.opponentState.hp + opponentHeal, 0, fight.opponentState.maxHp);
      fight.playerState.stamina = clamp(fight.playerState.stamina + playerStaminaGain, 0, fight.playerState.maxStamina);
      fight.opponentState.stamina = clamp(fight.opponentState.stamina + opponentStaminaGain, 0, fight.opponentState.maxStamina);
      fight.breakSummary = {
        nextRound: fight.round + 1,
        playerHeal: playerHeal,
        opponentHeal: opponentHeal,
        playerStamina: playerStaminaGain,
        opponentStamina: opponentStaminaGain
      };
      fight.actionLock = false;
      state.panel = "fightBreak";
      render();
    }

    function completeFightTurn() {
      var fight = state.fight;
      consumeFightStepTimeout();
      if (!fight || fight.result || fight.knockdown) {
        return;
      }
      pushFightLine(fight, "Ход " + fight.turn + " завершен.");
      if (!fight.skipTurnRecovery) {
        fight.playerState.hp = clamp(fight.playerState.hp + (fight.playerState.actedAttack ? 2 : 4), 0, fight.playerState.maxHp);
        fight.opponentState.hp = clamp(fight.opponentState.hp + (fight.opponentState.actedAttack ? 2 : 4), 0, fight.opponentState.maxHp);
        fight.playerState.stamina = clamp(fight.playerState.stamina + (fight.playerState.actedAttack ? 2 : 4), 0, fight.playerState.maxStamina);
        fight.opponentState.stamina = clamp(fight.opponentState.stamina + (fight.opponentState.actedAttack ? 2 : 4), 0, fight.opponentState.maxStamina);
      }
      fight.skipTurnRecovery = false;
      fight.playerState.actedAttack = false;
      fight.opponentState.actedAttack = false;
      if (fight.turn >= fight.turnsPerRound) {
        finishFightRound();
        return;
      }
      fight.turn += 1;
      fight.aiActionsLeft = 1;
      fight.actionLock = false;
      render();
    }

    function startNextRound() {
      var fight = state.fight;
      clearFightTimers();
      if (!fight || fight.result) {
        return;
      }
      fight.round += 1;
      fight.turn = 1;
      fight.aiActionsLeft = 1;
      fight.roundPoints = { player: 0, opponent: 0 };
      fight.breakSummary = null;
      fight.knockdown = null;
      fight.skipTurnRecovery = false;
      fight.animation = null;
      fight.actionLock = false;
      fight.playerState.actedAttack = false;
      fight.opponentState.actedAttack = false;
      fight.playerState.defenseMode = null;
      fight.opponentState.defenseMode = null;
      resetActionChain(fight.playerState);
      resetActionChain(fight.opponentState);
      resetRingPositions(fight);
      pushFightLine(fight, "Начинается раунд " + fight.round + ". После перерыва бойцы снова сходятся в центре.");
      state.panel = "fightLive";
      render();
    }

    function renderFightBreakPanel() {
      var fight = state.fight;
      var summary = fight.breakSummary;
      return "" +
        "<div class='battle-shell'><div class='battle-result'>" +
          "<div class='result-banner'><div class='eyebrow'>Перерыв</div><div class='title' style='font-size:24px'>Раунд " + fight.round + " завершен</div>" +
          "<div class='subtitle'>Дальше начнется раунд " + summary.nextRound + ".</div></div>" +
          "<div class='battle-bottom' style='margin-top:12px'>" +
            "<div class='battle-column'><div class='battle-panel'><strong>Твой угол</strong>" +
              "<div class='battle-chip-line'><div class='chip gold'>Здоровье +" + summary.playerHeal + "</div><div class='chip'>Стамина +" + summary.playerStamina + "</div></div>" +
              meter("Прочность", fight.playerState.hp, fight.playerState.maxHp) +
              meter("Стамина", fight.playerState.stamina, fight.playerState.maxStamina) +
            "</div></div>" +
            "<div class='battle-column right'><div class='battle-panel'><strong>Его угол</strong>" +
              "<div class='battle-chip-line'><div class='chip red'>Здоровье +" + summary.opponentHeal + "</div><div class='chip'>Стамина +" + summary.opponentStamina + "</div></div>" +
              meter("Прочность", fight.opponentState.hp, fight.opponentState.maxHp) +
              meter("Стамина", fight.opponentState.stamina, fight.opponentState.maxStamina) +
            "</div></div>" +
          "</div>" +
          "<div class='footer-actions'><button class='button' onclick='startNextRound()'>Начать следующий раунд</button></div>" +
        "</div></div>";
    }

    function finishPlayerFightAction() {
      consumeFightStepTimeout();
      if (!state.fight) {
        return;
      }
      if (!state.fight || state.fight.result || state.fight.knockdown) {
        return;
      }
      runAiAfterPlayer();
    }

    function finishAiFightAction() {
      consumeFightStepTimeout();
      if (!state.fight) {
        return;
      }
      if (!state.fight || state.fight.result || state.fight.knockdown) {
        return;
      }
      completeFightTurn();
    }

    function runAiAfterPlayer() {
      var fight = state.fight;
      var aiActionKey;
      var strikeOutcome;
      consumeFightStepTimeout();
      if (!fight || fight.result || fight.knockdown) {
        return;
      }
      if (fight.aiActionsLeft <= 0) {
        completeFightTurn();
        return;
      }
      aiActionKey = pickAiAction(fight);
      if (!aiActionKey) {
        fight.aiActionsLeft = 0;
        pushFightLine(fight, fullOpponentName(fight.opponent) + " теряет темп и пропускает действие.");
        completeFightTurn();
        return;
      }
      if (FIGHT_ACTIONS[aiActionKey].type === "move") {
        moveActor(fight, "opponent", aiActionKey);
        fight.aiActionsLeft = 0;
        render();
        scheduleFightStep("completeFightTurn", ACTION_DELAY_MS);
        return;
      }
      if (FIGHT_ACTIONS[aiActionKey].type === "defense") {
        applyDefenseAction(fight, "opponent", aiActionKey);
        fight.aiActionsLeft = 0;
        render();
        scheduleFightStep("completeFightTurn", ACTION_DELAY_MS);
        return;
      }
      strikeOutcome = strikeActor(fight, "opponent", aiActionKey);
      fight.aiActionsLeft = 0;
      render();
      if (strikeOutcome) {
        return;
      }
      scheduleFightStep("finishAiFightAction", ACTION_DELAY_MS);
    }

    function fightAction(actionKey) {
      var fight = state.fight;
      var action = FIGHT_ACTIONS[actionKey];
      var strikeOutcome;
      if (!fight || fight.result || !action || fight.actionLock) {
        return;
      }
      if (!canUseFightAction(fight, "player", actionKey)) {
        pushFightLine(fight, "Это действие сейчас недоступно из-за позиции на ринге или нехватки стамины.");
        render();
        return;
      }
      fight.actionLock = true;
      if (action.type === "move") {
        moveActor(fight, "player", actionKey);
        render();
        scheduleFightStep("runAiAfterPlayer", ACTION_DELAY_MS);
        return;
      }
      if (action.type === "defense") {
        applyDefenseAction(fight, "player", actionKey);
        render();
        scheduleFightStep("runAiAfterPlayer", ACTION_DELAY_MS);
        return;
      }
      strikeOutcome = strikeActor(fight, "player", actionKey);
      render();
      if (strikeOutcome) {
        return;
      }
      scheduleFightStep("finishPlayerFightAction", ACTION_DELAY_MS);
    }

    function renderFightStatsPanel(fight) {
      var html = [];
      html.push("<div class='battle-panel'><strong>Статистика</strong>");
      html.push("<div class='battle-chip-line'><div class='chip'>Раунд " + fight.round + " / " + fight.opponent.rounds + "</div><div class='chip'>Ход " + fight.turn + " / " + fight.turnsPerRound + "</div></div>");
      html.push("<div class='battle-panel inset-panel'><strong>Ты</strong>" + meter("Прочность", fight.playerState.hp, fight.playerState.maxHp) + meter("Стамина", fight.playerState.stamina, fight.playerState.maxStamina) + "<div class='battle-chip-line'><div class='chip'>Нокдауны " + fight.playerState.knockdowns + "</div><div class='chip'>Позиция " + (fight.playerState.position.x + 1) + ":" + (fight.playerState.position.y + 1) + "</div><div class='chip'>Защита " + (fight.playerState.defenseMode ? FIGHT_ACTIONS[fight.playerState.defenseMode].label : "Нет") + "</div></div></div>");
      html.push("<div class='battle-panel inset-panel'><strong>Соперник</strong>" + meter("Прочность", fight.opponentState.hp, fight.opponentState.maxHp) + meter("Стамина", fight.opponentState.stamina, fight.opponentState.maxStamina) + "<div class='battle-chip-line'><div class='chip'>Нокдауны " + fight.opponentState.knockdowns + "</div><div class='chip'>Позиция " + (fight.opponentState.position.x + 1) + ":" + (fight.opponentState.position.y + 1) + "</div><div class='chip'>Защита " + (fight.opponentState.defenseMode ? FIGHT_ACTIONS[fight.opponentState.defenseMode].label : "Нет") + "</div></div></div>");
      if (fight.roundCards.length) {
        html.push("<div class='battle-panel inset-panel'><strong>Карточки</strong>");
        html.push("<div class='log-entry'>" + fight.roundCards[0] + "</div>");
        html.push("</div>");
      }
      html.push("</div>");
      return html.join("");
    }

    function renderFightLivePanel() {
      var fight = state.fight;
      var html = [];
      var x;
      var y;
      var i;
      var playerCell;
      var opponentCell;
      var activeTab = fight.uiTab || "controls";
      html.push("<div class='battle-shell'>");
      html.push("<div class='battle-topbar'>");
      html.push("<div class='battle-health-card'>");
      html.push("<div class='chip gold'>Ты</div>");
      html.push("<div class='battle-stats-line'>" + meter("Прочность", fight.playerState.hp, fight.playerState.maxHp) + "</div>");
      html.push("<div class='battle-stats-line'>" + meter("Стамина", fight.playerState.stamina, fight.playerState.maxStamina) + "</div>");
      html.push("</div>");
      html.push("<div class='battle-health-card right'>");
      html.push("<div class='chip red'>" + fullOpponentName(fight.opponent) + "</div>");
      html.push("<div class='battle-stats-line'>" + meter("Прочность", fight.opponentState.hp, fight.opponentState.maxHp) + "</div>");
      html.push("<div class='battle-stats-line'>" + meter("Стамина", fight.opponentState.stamina, fight.opponentState.maxStamina) + "</div>");
      html.push("</div>");
      html.push("</div>");
      html.push("<div class='battle-panel'><div class='battle-tabs'>");
      html.push("<button class='" + (activeTab === "controls" ? "button" : "ghost") + "' onclick='openFightTab(\"controls\")'>Управление</button>");
      html.push("<button class='" + (activeTab === "stats" ? "button" : "ghost") + "' onclick='openFightTab(\"stats\")'>Статистика</button>");
      html.push("<button class='" + (activeTab === "log" ? "button" : "ghost") + "' onclick='openFightTab(\"log\")'>Лента</button>");
      html.push("</div></div>");
      if (activeTab === "stats") {
        html.push("<div class='battle-stage'>" + renderFightStatsPanel(fight) + "</div>");
      } else if (activeTab === "log") {
        html.push("<div class='battle-stage'>" + renderFightLogPanel(fight) + "</div>");
      } else {
        html.push("<div class='battle-stage controls-stage'>");
        html.push("<div class='eyebrow'>Раунд " + fight.round + " / " + fight.opponent.rounds + " • Ход " + fight.turn + " / " + fight.turnsPerRound + "</div>");
        html.push("<div class='title' style='font-size:28px'>Ринг 5x5</div>");
        if (fight.knockdown && fight.knockdown.text) {
          html.push("<div class='knockdown-banner'>" + fight.knockdown.text + "</div>");
        }
        html.push("<div class='ring-board'>");
        for (y = 0; y < RING_SIZE; y += 1) {
          html.push("<div class='ring-row'>");
          for (x = 0; x < RING_SIZE; x += 1) {
            playerCell = fight.playerState.position.x === x && fight.playerState.position.y === y;
            opponentCell = fight.opponentState.position.x === x && fight.opponentState.position.y === y;
            html.push("<div class='ring-cell' data-cell='" + (x + 1) + ":" + (y + 1) + "'>" + (playerCell ? "<div class='" + tokenClassFor("player") + "'>Ты</div>" : (opponentCell ? "<div class='" + tokenClassFor("opponent") + "'>Он</div>" : "")) + "</div>");
          }
          html.push("</div>");
        }
        html.push("</div>");
        html.push(renderFightControlsPanel(fight));
        html.push("</div>");
      }
      html.push("</div>");
      return html.join("");
    }

    function render() {
      var app = document.getElementById("app");
      if (state.screen === "create") {
        app.innerHTML = renderCreate();
      } else if (state.screen === "end") {
        app.innerHTML = renderEnding();
      } else {
        app.innerHTML = renderGame();
      }
    }

    window.onload = function () {
      resetCreate();
      render();
    };

    window.onresize = function () {
      render();
    };
  </script>
</head>
<body>
  <div id="app"></div>
</body>
</html>
